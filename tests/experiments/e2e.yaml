experiment_id: skill-tests-e2e
description: "End-to-end tests — full lifecycle with staging tenant connectivity"

defaults:
  run_limits:
    max_turns: 200
    task_timeout: 1200
    turn_timeout: 300

  # Smoke-tagged tasks under tests/tasks/**/*.yaml use `driver: docker`
  # (set per-task by skills#856). The daily runner's `--suite skills`
  # invokes those tasks under this experiment, so the docker mounts +
  # env passthrough must be configured here too — otherwise the
  # in-container uip CLI has no auth (host's ~/.uipath isn't bound).
  # Keep this block in sync with tests/experiments/default.yaml.
  sandbox:
    docker:
      env_passthrough_extra:
        - SKILLS_REPO_PATH
        - BEDROCK_MODEL
        - TASK_PARALLELISM
        - UIPATH_CLI_ENABLE_ENV_AUTH
        - UIPATH_CLI_AUTH_TOKEN
        - UIPATH_CLI_ORGANIZATION_NAME
        - UIPATH_CLI_ORGANIZATION_ID
        - UIPATH_CLI_TENANT_NAME
        - UIPATH_CLI_TENANT_ID
        - TRACES_SMOKE_PROCESS_KEY
      extra_mounts:
        - ~/.uipath:/.uipath:rw

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    system_prompt: |
      You are a coding agent. Do not access files in sibling runs/* directories. Everywhere else is permitted.
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

  # Append default post_run to every e2e task. Order matters: solution cleanup
  # talks to the tenant (still needs npm-installed CLIs), then sandbox-local
  # cleanup wipes <sandbox>/{node_modules,.npm-prefix} so preserved artifacts
  # stay slim (mirrors coder_eval #253 / sandbox isolation in #250 — MST-9674).
  post_run:
    - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
      timeout: 120
    - command: "rm -rf node_modules .npm-prefix"
      timeout: 30

variants:
  - variant_id: default
