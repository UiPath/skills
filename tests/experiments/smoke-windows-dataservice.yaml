experiment_id: skill-tests-smoke-windows-dataservice
description: "Windows RPA Data Service tests — tempdir + pre_run helm warmup (decoupled from non-DS RPA smoke)"

defaults:
  run_limits:
    # DS tasks chain `uip rpa init` + DS activities install + entity install
    # + XAML authoring + `uip rpa validate`. ~50-100 turns end-to-end.
    max_turns: 180
    task_timeout: 2700
    # First turn cost dominates: bun rpa-tool entity install (~16 min cold,
    # ~30s warm). pre_run below shifts the cold-start out of this budget.
    turn_timeout: 1800

  sandbox:
    driver: tempdir

  # Warm the Data Fabric / Helm path once per task BEFORE the agent's turn
  # budget starts. The bun rpa-tool is what *starts* helm — `uip rpa` calls
  # only work after helm is already running. Run 2026-06-11_15-52-54 proved
  # the `uip rpa data-fabric-entities list` variant fails with
  # HelmFeatureNotAvailableException on a cold sandbox; the install-style
  # bun command below brings helm up properly.
  #
  # `--add SystemUser` is zero-impact: every DS task in this experiment
  # installs SystemUser anyway as part of its own entity-install step, so
  # the warmup neither adds nor removes tenant state. fail_on_error: false
  # means a warmup miss never blocks the actual task (the agent still runs
  # its own install command).
  #
  # coder_eval caps per-step timeout at 300s, so this is best-effort: it
  # won't fully absorb a worst-case 16-min cold install, but it takes the
  # bun startup + helm chart bootstrap + auth handshake off the agent's
  # first turn budget.
  pre_run:
    - command: 'cmd /c "mkdir df-warmup 2>nul & bun C:\Users\suphalathlur\Studio\RpaTool\rpa-tool\src\index.ts install-data-fabric-entities --add SystemUser --project-dir df-warmup --format json"'
      timeout: 300
      fail_on_error: false

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    system_prompt: |
      You are a coding agent. Do not access files in sibling runs/* directories. Everywhere else is permitted.
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

  # Sandbox cleanup between tasks (preserved artifacts stay slim; concurrent
  # sandboxes don't leak Node module resolution).
  post_run:
    - command: "rm -rf node_modules .npm-prefix df-warmup"
      timeout: 30

variants:
  - variant_id: default
