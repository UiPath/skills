experiment_id: skill-tests-default
description: "Default config — docker, full lifecycle, staging tenant connectivity"

defaults:
  run_limits:
    max_turns: 200
    task_timeout: 1200
    turn_timeout: 300

  sandbox:
    driver: docker
    docker:
      image: skills-image:latest
      env_passthrough_extra:
        - SKILLS_REPO_PATH
        - BEDROCK_MODEL
        - TASK_PARALLELISM
        - UIPATH_CLI_ENABLE_ENV_AUTH
        - UIPATH_CLI_AUTH_TOKEN
        - UIPATH_CLI_ORGANIZATION_NAME
        - UIPATH_CLI_ORGANIZATION_ID
        - UIPATH_CLI_TENANT_NAME
        - UIPATH_CLI_TENANT_ID
        - TRACES_SMOKE_PROCESS_KEY
      extra_mounts:
        - ~/.uipath:/.uipath:rw

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    system_prompt: |
      You are a coding agent. Do not access files in sibling runs/* directories. Everywhere else is permitted.
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

  # Cross-cutting sandbox cleanup: wipe <sandbox>/{node_modules,.npm-prefix} so
  # preserved artifacts stay slim (mirrors coder_eval #253 / sandbox isolation
  # in #250 — MST-9674). Tasks that upload Studio Web solutions wire
  # cleanup_solutions.py into their own post_run; it must run before this step
  # because it still needs npm-installed CLIs.
  post_run:
    - command: "rm -rf node_modules .npm-prefix"
      timeout: 30

variants:
  - variant_id: default
