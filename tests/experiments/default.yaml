experiment_id: skill-tests-default
description: "Default experiment for skill e2e tests — loads the full UiPath skills plugin"

defaults:
  max_iterations: 2
  task_timeout: 600
  turn_timeout: 300

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    max_turns: 20
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

variants:
  - variant_id: default
