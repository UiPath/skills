experiment_id: skill-tests-live-e2e-local
description: "Live e2e tests against a real UiPath tenant — tempdir, env-var auth (mirrors GH Actions pattern)"

# REQUIRED: set these env vars before running.
# tempdir inherits the parent shell environment automatically — no extra sandbox config needed.
#
#   export UIPATH_CLI_ENABLE_ENV_AUTH=1
#   export UIPATH_CLI_AUTH_TOKEN=<access token from `uip login status`>
#   export UIPATH_CLI_ORGANIZATION_ID=<org UUID>
#   export UIPATH_CLI_ORGANIZATION_NAME=<org name, e.g. appsdev>
#   export UIPATH_CLI_TENANT_ID=<tenant UUID>
#   export UIPATH_CLI_TENANT_NAME=<tenant name, e.g. appsdevDefault>
#
# Run with:
#   PYTHONIOENCODING=utf-8 SKILLS_REPO_PATH="<repo>" \
#     coder-eval run tasks/uipath-governance/compliance-pack/full_apply_e2e_live.yaml \
#     -e experiments/live-e2e-local.yaml -v

defaults:
  run_limits:
    max_turns: 40
    # Real API calls on a live tenant are slow — match nightly.yaml timeouts.
    task_timeout: 1200
    turn_timeout: 900

  sandbox:
    driver: tempdir

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    system_prompt: |
      You are a coding agent. Do not access files in sibling runs/* directories. Everywhere else is permitted.
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

  post_run:
    - command: "rm -rf node_modules .npm-prefix"
      timeout: 30

variants:
  - variant_id: default
