experiment_id: skill-activation-default
description: >
  Default experiment for skill activation evals. Each row presents a single
  user prompt; the agent decides whether to invoke a Skill. We measure the
  classification (precision / recall / F1) per skill.

defaults:
  # Activation is a one-shot decision per prompt — short timeouts are fine.
  run_limits:
    # Activation is a recognition decision, not a work loop. We give the agent a
    # small turn budget (3) rather than a hard 1-turn cap, then arm early-stop on
    # the stacked skill_triggered criteria (stop_when: auto, see the task file).
    # Under coder_eval >= 0.8.10 `auto` arms each instance's own decidable
    # polarity: the row's positive criterion (skill_name == expected_skill) arms
    # pass, the distractors arm fail. A positive row pass-stops the moment the
    # expected skill is engaged — turn 1, with the exact verdict a max_turns:1
    # cap would have produced — while the extra headroom no longer truncates a
    # correct invocation the model emits after a brief reasoning turn. A
    # wrong-skill misfire fail-stops on engagement; true negatives have no live
    # event and run to the cap, so keep it small. (`decided` is invalid here:
    # >= 0.8.9's any-engagement latch narrows each instance to ONE decidable
    # polarity.) See coder_eval "early stop on criterion".
    max_turns: 3
    stop_early: true
    task_timeout: 120
    turn_timeout: 120

  agent:
    # type omitted on purpose — the runner selects the harness via --type (codex/antigravity);
    # coder-eval's baseline default experiment supplies claude-code otherwise.
    permission_mode: acceptEdits
    model: claude-sonnet-5
    # Skill must be allowed so the agent can invoke a skill when it decides
    # to. Read/Write/Bash included so the agent isn't starved of basic tools
    # when it decides NOT to use Skill — removing them would bias the
    # decision toward "don't invoke".
    allowed_tools: [Skill, Bash, Read, Write, Edit, Glob, Grep]
    plugins:
      - type: local
        path: $SKILLS_REPO_PATH
    ignore_patterns: []

  # Drop <sandbox>/{node_modules,.npm-prefix,.venv} so preserved artifacts stay slim
  # and Node module resolution can't leak across concurrent sandboxes
  # (mirrors coder_eval #253 / sandbox isolation in #250 — MST-9674). Also drop
  # .agents: non-Claude harnesses (codex) stage the whole skills catalog there
  # per task, so cleaning it after each row keeps the run dir from ballooning
  # across the ~480-row activation sweep (no-op for claude, which never stages it).
  post_run:
    - command: "find . -maxdepth 5 -type d \\( -name node_modules -o -name .npm-prefix -o -name .venv -o -name .agents \\) -prune -exec rm -rf {} +"
      timeout: 30

variants:
  - variant_id: default
