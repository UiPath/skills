task_id: skill-platform-licensing-users-licenses-available
description: >
  Smoke test: agent uses the uipath-platform skill to check account-level seat
  availability for the Attended Named User bundle and reports the result using
  the friendly-name format mandated by the skill (`<Friendly Name> (<CODE>)`).
  Verifies (1) the agent invokes `uip platform users licenses available --output json`,
  (2) it fetches the UiPath docs license-codes page to resolve the code, and
  (3) the final reply uses the required friendly-name format. CLI auth failure
  is expected in this offline environment; the friendly-name rule still applies.
tags: [uipath-platform, smoke, licensing, users]

agent:
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch"]

sandbox:
  # uip PATH shim -> .uip-cmdlog (see _shared/uip-shim): command telemetry as a
  # filesystem side effect. Some agent backends (Antigravity) run commands via
  # background tasks that never surface as tool calls, so command_executed
  # criteria see zero commands even when the agent ran the exact command.
  template_sources:
    - type: template_dir
      path: _shared/uip-shim
  mock_path_dirs:
    - .cmdlog-bin

initial_prompt: |
  How many Attended Named User seats does this account have available right
  now? When you reply, refer to the bundle by its friendly name AND its code,
  per the skill's docs-page resolution rule.

  Fetch the UiPath docs license-codes page and save the mapping you use as
  `license-codes-evidence.json` in the current directory. Include the source
  URL and the resolved friendly-name/code pair you used.

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant in this
    environment. Commands may fail with auth errors — that is expected. Run
    each command once and move on. Do NOT retry or attempt to login.
  - If the CLI fails, still resolve the bundle name → code mapping from the
    UiPath docs license-codes page so you can answer in the required format.
  - Use `--output json` on every uip command.

success_criteria:
  - type: run_command
    description: "Agent ran `uip platform users licenses available` (.uip-cmdlog shim log)"
    command: "grep -Eq 'uip platform users licenses available' .uip-cmdlog"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Agent wrote web-resolution evidence at license-codes-evidence.json"
    path: "license-codes-evidence.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Evidence file records the docs source URL and the resolved ATTUNU bundle code"
    path: "license-codes-evidence.json"
    includes:
      [
        "docs.uipath.com",
        "license-codes",
        "ATTUNU"
      ]
    weight: 1.5
    pass_threshold: 1.0

  - type: llm_judge
    description: "Agent's final reply uses the `<Friendly Name> (<CODE>)` format"
    include_agent_output: true
    prompt: |
      Evaluate ONLY the agent's final reply to the user. Score 1.0 if it
      references the ATTUNU bundle in `<Friendly Name> (<CODE>)` form, with
      both an Attended Named User label and `ATTUNU` together. Accept both the
      official docs spelling `Attended - Named User (ATTUNU)` and the
      normalized `Attended Named User (ATTUNU)`; punctuation and code
      backticks are equivalent. Score 0.0 if the reply shows only the raw code
      or only the friendly name. Ignore whether the CLI call succeeded — the
      rubric is solely about the reporting format.
    weight: 2.0
    pass_threshold: 1.0
