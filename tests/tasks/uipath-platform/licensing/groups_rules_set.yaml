task_id: skill-platform-licensing-groups-rules-set
description: >
  Smoke test: agent uses the uipath-platform skill to set a group rule that
  entitles the group to two bundles with one carrying a quota. Verifies
  (1) the agent fetches the docs page to resolve product names to codes,
  (2) writes a JSON input file with the resolved codes and a `quota` entry,
  and (3) calls `uip platform groups rules set <group> --input <path>
  --output json`. CLI auth failure is expected; this validates command shape
  only.
tags: [uipath-platform, smoke, licensing, groups]

agent:
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch"]

sandbox:
  # uip PATH shim -> .uip-cmdlog (see _shared/uip-shim): command telemetry as a
  # filesystem side effect. Some agent backends (Antigravity) run commands via
  # background tasks that never surface as tool calls, so command_executed
  # criteria see zero commands even when the agent ran the exact command.
  template_sources:
    - type: template_dir
      path: _shared/uip-shim
  mock_path_dirs:
    - .cmdlog-bin

initial_prompt: |
  Configure the group rule for the "RPA Developers" group so that:
  - every member gets an Automation Developer Named User license (no quota)
  - up to 10 members can also get an Attended Named User license

  Use the `uipath-platform` skill and its User & Group License Allocations
  workflow for this request.

  Fetch the UiPath docs license-codes page and save the mappings you use as
  `license-codes-evidence.json` in the current directory. Include the source
  URL and the resolved friendly-name/code pairs you used.

  Save the input JSON file as `group-rule.json` in the current directory,
  then apply it.

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant in this
    environment. Commands may fail with auth errors — that is expected.
  - Resolve product names to codes from the UiPath docs license-codes page
    before writing the input file.
  - Use `--output json` on every uip command.

success_criteria:
  - type: file_exists
    description: "Agent wrote web-resolution evidence at license-codes-evidence.json"
    path: "license-codes-evidence.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Evidence file records the docs source URL and the resolved bundle codes"
    path: "license-codes-evidence.json"
    includes:
      [
        "docs.uipath.com",
        "RPADEVPRONU",
        "ATTUNU"
      ]
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Agent wrote the input file at group-rule.json"
    path: "group-rule.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Input JSON contains resolved codes and a quota"
    path: "group-rule.json"
    includes: ["RPADEVPRONU", "ATTUNU", "quota"]
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Agent ran `uip platform groups rules set` with --input (.uip-cmdlog shim log)"
    command: "grep -E 'uip platform groups rules set [^ ]+' .uip-cmdlog | grep -Eq -- '--input[= ][^ ]+'"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
