task_id: skill-platform-licensing-groups-rules-details
description: >
  Smoke test: agent uses the uipath-platform skill to drill into a single
  group's license-rule details — who in the group holds which bundle — and
  saves the full CLI response to `details.json`. Verifies the file is written
  and captures the response envelope. CLI auth failure is expected offline.
tags: [uipath-platform, smoke, licensing, groups]

initial_prompt: |
  Who in the "RPA Developers" group currently holds which license bundle?

  Save the full CLI response envelope as `details.json` in the current
  directory.

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant in this
    environment. Commands may fail with auth errors — that is expected.
  - Use `--output json` on every uip command.

success_criteria:
  - type: file_exists
    description: "Agent wrote the CLI response to details.json"
    path: "details.json"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "details.json captures a JSON response envelope"
    path: "details.json"
    includes: ['"Result"']
    weight: 1.0
    pass_threshold: 1.0
