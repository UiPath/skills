task_id: skill-platform-webhook-lifecycle-e2e
description: >
  E2E: agent leaves the tenant with a webhook subscription that exists,
  subscribes to at least one event type, and is currently disabled (so the
  agent exercises the disable transition).
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, resources, webhooks]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=webhook python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_init.py"
    timeout: 30

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  `seed.json` provides `uuid8`.

  Goal: leave the tenant with a webhook subscription:
  - Name: `e2e-webhook-<uuid8>`
  - URL: any reasonable (e.g., `https://webhook.site/test`)
  - Subscribed to at least one valid event type
  - **Currently disabled** (you must have exercised the disable path)

  Webhooks are tenant-scoped (no folder).

  Append a manifest record:
  `{"kind": "webhook", "key": "<webhook-key>"}`

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: run_command
    description: "Tenant state: webhook exists with subscribed events, disabled"
    command: "python3 $TASK_DIR/check_webhook.py"
    timeout: 60
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
