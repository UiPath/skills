task_id: skill-platform-assets-crud-e2e
description: >
  E2E asset CRUD across types: create one Text, Integer, and Bool asset in a
  seeded folder, list them, fetch each value, update one, then delete all.
  Verifies values round-trip exactly and update is reflected.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, resources, assets]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=assets-crud SEED_FOLDERS_COUNT=1 python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_folders.py"
    timeout: 60

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  Read `seed.json`. It has `uuid8`, `folder_a_key`, `folder_a_path`.

  Goal: create three assets (Text, Integer, Bool) in `folder_a_path`, verify
  each value round-trips, update the Text asset, confirm the update, then
  delete all three. Save every CLI step's `--output json` envelope to its own
  sandbox file (the check script reads them).

  Use `--output json` on EVERY uip command.

  Steps:

  1. `uip resource assets create <uuid8>-text "hello-world" --type Text --folder-path <folder_a_path>` → save to `create_text.json`
  2. `uip resource assets create <uuid8>-int "42" --type Integer --folder-path <folder_a_path>` → save to `create_int.json`
  3. `uip resource assets create <uuid8>-bool "true" --type Bool --folder-path <folder_a_path>` → save to `create_bool.json`
  4. For each of the 3 keys returned, append to `created-resources.jsonl`:
     `{"kind": "asset", "key": "<asset-key>"}`
  5. `uip resource assets list --folder-path <folder_a_path>` → `list_after_create.json`. **This is the authoritative source for values** — the `Data[]` entries inline `stringValue`, `intValue`, `boolValue`. (`get-asset-value` is a robot-only API; don't use it here — it 403s on user accounts.)
  6. `uip resource assets update <text-key> "updated-hello"` → `update_text.json`
  7. `uip resource assets list --folder-path <folder_a_path>` → `list_after_update.json` (the text asset's `stringValue` should now equal `updated-hello`).
  8. Delete all three: `uip resource assets delete <key>` per asset → `delete_text.json`, `delete_int.json`, `delete_bool.json`

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: command_executed
    description: "Agent created assets across multiple types"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+create.*--type\s+(Text|Integer|Bool)'
    min_count: 3
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed assets to verify values (list is authoritative)"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+list.*--folder-path'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated at least one asset"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+update'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted at least one asset (may chain multiple in a single Bash call)"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+delete'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral check: values round-trip and update is reflected"
    command: "python3 $TASK_DIR/check_assets_crud.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
