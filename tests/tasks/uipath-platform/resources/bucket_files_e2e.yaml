task_id: skill-platform-bucket-files-e2e
description: >
  E2E bucket file round-trip: generate a binary, get a pre-signed upload URL,
  HTTP PUT the file, list it, get a download URL, HTTP GET it, verify
  byte-equality (sha256). Then delete the file + bucket.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, resources, buckets]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=bucket-files SEED_FOLDERS_COUNT=1 python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_folders.py"
    timeout: 60

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  Read `seed.json` for `uuid8`, `folder_a_path`, `folder_a_key`.

  Goal: round-trip a binary file through a UiPath Orchestrator bucket and
  verify byte-equality via sha256. The CLI doesn't have direct upload/download
  — use `get-upload-url` + curl PUT, and `get-download-url` + curl GET.

  Steps (use `--output json` on EVERY uip command):

  1. Generate 64 KB of random bytes into `source.bin`:
     `dd if=/dev/urandom of=source.bin bs=1024 count=64`
     Capture sha256: `shasum -a 256 source.bin > source.sha256`
  2. `uip resource buckets create <uuid8>-bucket --folder-path <folder_a_path>` → `create_bucket.json`. Capture bucket key.
  3. Append `{"kind": "bucket", "key": "<bucket-key>", "extra": {"folder_path": "<folder_a_path>"}}` to `created-resources.jsonl`.
  4. `uip resource bucket-files get-upload-url <bucket-key> probe.bin --folder-path <folder_a_path>` → `upload_url.json`. The response Data has `Uri` (the pre-signed URL) and may have `Headers`.
  5. Upload via curl PUT to that URL with `--upload-file source.bin` and any required headers (e.g. `Content-Type: application/octet-stream`, plus any headers from the response).
  6. Append `{"kind": "bucket-file", "key": "probe.bin", "extra": {"bucket_key": "<bucket-key>", "folder_path": "<folder_a_path>"}}` to manifest.
  7. `uip resource bucket-files list <bucket-key> --folder-path <folder_a_path>` → `list.json`. Confirm `probe.bin` appears.
  8. `uip resource bucket-files get-download-url <bucket-key> probe.bin --folder-path <folder_a_path>` → `download_url.json`.
  9. Download via curl GET from that URL to `downloaded.bin`.
  10. Verify byte-equality: `shasum -a 256 downloaded.bin > downloaded.sha256` and `diff source.sha256 downloaded.sha256` (rewrite the path in one of them so the comparison only matches the hash).
  11. `uip resource bucket-files delete <bucket-key> probe.bin --folder-path <folder_a_path>` → `delete_file.json`.
  12. `uip resource buckets delete <bucket-key> --folder-path <folder_a_path>` → `delete_bucket.json`.

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: file_exists
    description: "Random source binary was generated"
    path: "source.bin"
    weight: 0.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created a bucket"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+buckets\s+create'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent requested a pre-signed upload URL"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+bucket-files\s+get-upload-url'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded via curl PUT"
    tool_name: "Bash"
    command_pattern: 'curl.*(-X\s+PUT|--upload-file)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent requested a pre-signed download URL"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+bucket-files\s+get-download-url'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral check: sha256(source) == sha256(downloaded), file listed in bucket"
    command: "python3 $TASK_DIR/check_bucket_files.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
