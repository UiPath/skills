task_id: skill-platform-resources-assets-get
description: >
  Smoke test: agent uses the uipath-platform skill to fetch full configuration
  of an Orchestrator asset. The realistic and documented flow is
  `assets list` → resolve key → `assets get <key>` (the get help text
  literally says "Use 'assets list' to retrieve the key"). Verifies both
  steps fire. Empty/404 results acceptable — the goal is correct command
  shape, not tenant state. The prompt is intentionally generic ("any asset")
  so the test works against any tenant with at least one asset; no specific
  asset name needs to exist.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Show me the full configuration of any one Orchestrator asset in the
  current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed assets (to discover one) via uip resource assets list"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the resolved asset by key via uip resource assets get"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+get\s+\S'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
