task_id: skill-platform-asset-share-e2e
description: >
  E2E asset sharing: create an asset in folder A, share it with folder B,
  verify `get-folders` lists both, unshare from B, verify only A remains.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, resources, assets]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=asset-share SEED_FOLDERS_COUNT=2 python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_folders.py"
    timeout: 60

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  Read `seed.json`. It has `uuid8`, `folder_a_path`, `folder_a_key`,
  `folder_b_path`, `folder_b_key`. Both folders already exist.

  Goal: prove asset sharing works.

  Steps (use `--output json` on EVERY uip command):

  1. Create asset `<uuid8>-shared` of type Text with value `share-me` in
     `folder_a_path`. Save to `create.json`. Capture the asset key from
     `Data.Key` (or `Data.key`).
  2. Append `{"kind": "asset", "key": "<key>"}` to `created-resources.jsonl`.
  3. `uip resource assets get-folders <key>` → save to `folders_before_share.json`
  4. `uip resource assets share <key> --folder-path <folder_b_path>` → `share.json`
  5. `uip resource assets get-folders <key>` → `folders_after_share.json`
  6. `uip resource assets unshare <key> --folder-path <folder_b_path>` → `unshare.json`
  7. `uip resource assets get-folders <key>` → `folders_after_unshare.json`
  8. `uip resource assets delete <key>` → `delete.json`

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: command_executed
    description: "Agent created an asset"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+create'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked assets share"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+share'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked assets unshare"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+unshare'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried get-folders at least 3 times (before/after share/after unshare)"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+get-folders'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral check: folder count went 1 → 2 → 1"
    command: "python3 $TASK_DIR/check_asset_share.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
