task_id: skill-platform-resources-queue-items-list
description: >
  Smoke test: agent uses the uipath-platform skill to discover an Orchestrator
  folder it can access and list its queue items via
  `uip resource queue-items list --folder-(key|path) ...`. Empty results are
  acceptable — the goal is correct command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Discover the Orchestrator folders available in the current UiPath tenant and
  list the queue items in any one of those folders.

success_criteria:
  - type: command_executed
    description: "Agent listed queue items via uip resource queue-items list"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+queue-items\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+queue-items\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

