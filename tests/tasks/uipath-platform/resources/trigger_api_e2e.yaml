task_id: skill-platform-trigger-api-e2e
description: >
  E2E API trigger lifecycle (Confluence S30, scoped): create an API trigger on
  the seeded process with slug + method, get it back to verify config persists,
  rename via update, delete. Drops the external HTTP-invoke step from the
  original S30 — that needs tenant-specific URL knowledge and auth setup.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, resources, triggers]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=trigger-api SEED_FOLDERS_COUNT=1 python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_folders.py && TASK_ID=trigger-api python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_process.py"
    timeout: 180

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill. Read `seed.json` for `uuid8`, `process_key`, `folder_a_path`.

  Goal: round-trip an API trigger's lifecycle. API triggers require **--slug**,
  **--method**, AND **--runtime-type** — all three are mandatory on `create`.

  Steps (use `--output json` on EVERY uip command):

  1. Create API trigger:
     `uip resource triggers create --type api --name <uuid8>-api --release-key <process_key> --slug <uuid8>-api-slug --method Post --runtime-type Serverless --folder-path <folder_a_path>` → `create.json`.
     Capture the trigger key from `Data.Key`.
  2. Append `{"kind": "trigger", "key": "<trigger-key>", "extra": {"type": "api", "folder_path": "<folder_a_path>"}}` to `created-resources.jsonl`.
  3. `uip resource triggers get <trigger-key> --type api --folder-path <folder_a_path>` → `get_after_create.json`. Verify Slug and Method match what was set.
  4. `uip resource triggers update <trigger-key> --type api --name <uuid8>-api-renamed --folder-path <folder_a_path>` → `update.json`.
  5. `uip resource triggers get <trigger-key> --type api --folder-path <folder_a_path>` → `get_after_update.json` (name should match).
  6. `uip resource triggers delete <trigger-key> --type api --folder-path <folder_a_path>` → `delete.json`.

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: command_executed
    description: "Agent created an API trigger with required flags"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+triggers\s+create.*--type\s+api.*--slug'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated and deleted the trigger"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+triggers\s+(update|delete).*--type\s+api'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral check: trigger persists with slug+method; rename reflected"
    command: "python3 $TASK_DIR/check_trigger_api.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
