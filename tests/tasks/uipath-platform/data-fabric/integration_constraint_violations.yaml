task_id: skill-datafabric-integration-constraint-violations
description: >
  Integration test: agent probes per-type constraint boundaries with
  paired positive/negative attempts that differ by exactly one variable.
  Covers required vs null vs empty string (three distinct semantics),
  STRING at lengthLimit and at limit+1, INTEGER at min/max and just
  outside, DECIMAL at decimalPrecision and just over, DATE at year
  boundaries plus an invalid calendar date, AUTO_NUMBER client-supplied
  (server-managed — should reject), system fields client-supplied
  (CreatedBy / Id), and a relationship pointing to a non-existent row.
  Per skill Rule 18 the agent must surface the upstream error verbatim
  and NOT silently substitute or retry — captured in report.json. End
  state is validated via assert_record_count.py to confirm only the
  positive attempts landed.
tags: [uipath-platform, data-fabric, integration, constraints, error-paths, mode:diagnose, lifecycle:setup]

run_limits:
  expected_turns: 30
  max_turns: 70
  turn_timeout: 600

initial_prompt: |
  We're loading a batch of product SKUs into a new list. For rows the
  system rejects, record the actual error verbatim — don't guess or
  rewrite values.

  Set up `CE_ConstraintTest` with these columns:
    - Code — required, short text, up to 10 characters
    - Quantity — whole number, 0 to 100
    - Price — dollars with cents, never negative
    - HireDate — a date
    - Serial — an auto-generated number the system fills in
    - ParentLink — optional, links to another row in this list

  Try loading each row. For failures, record the error verbatim:

    1A. "OK1",      Qty 5
    1B. Code missing, Qty 5
    1C. Code = null,  Qty 5
    1D. Code = "",    Qty 5
    2A. "AAAAAAAAAA" (10 chars), Qty 5
    2B. "AAAAAAAAAAB" (11 chars), Qty 5
    3A. "MIN0", Qty 0
    3B. "NEG1", Qty -1
    4A. "MAX",  Qty 100
    4B. "OVR",  Qty 101
    4C. "INTOV",Qty 2147483648
    5A. "DP2",  Qty 5, Price 9.99
    5B. "DP3",  Qty 5, Price 9.999
    6A. "DT1",  HireDate "2024-01-15"
    6B. "DTLOW",HireDate "0001-01-01"
    6C. "DTHI", HireDate "9999-12-31"
    6D. "DTBAD",HireDate "2024-02-30"
    7A. "AUTO", Qty 5 — let Serial auto-fill; note the number
    7B. "SET",  Qty 5, Serial 999 — manual serial
    7C. "SYS",  Qty 5, CreatedBy "fake-user" — audit column
    7D. "IDSET",Qty 5, Id "00000000-0000-0000-0000-000000000001"
    8A. "REL1", ParentLink = row ID of 1A (first successful row)
    8B. "RELBAD",ParentLink = "00000000-0000-0000-0000-000000000099"

  Save to `report.json` — put "succeeded" for accepted rows, the raw
  error text for rejected ones:

    {
      "entity_id": "<list ID>",
      "pair_1_A": "...", "pair_1_B": "...", "pair_1_C": "...", "pair_1_D": "...",
      "pair_2_A": "...", "pair_2_B": "...",
      "pair_3_A": "...", "pair_3_B": "...",
      "pair_4_A": "...", "pair_4_B": "...", "pair_4_C": "...",
      "pair_5_A": "...", "pair_5_B": "...",
      "pair_6_A": "...", "pair_6_B": "...", "pair_6_C": "...", "pair_6_D": "...",
      "pair_7_A": "...", "pair_7_B": "...", "pair_7_C": "...", "pair_7_D": "...",
      "pair_8_A": "...", "pair_8_B": "...",
      "successful_inserts": <row count at end>
    }

success_criteria:
  - type: command_executed
    description: "Agent created the test list with the constraint columns"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CE_ConstraintTest)(?=.*lengthLimit)(?=.*decimalPrecision)(?=.*(minValue|maxValue))'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted several inserts (the 23 rows may be batched into fewer CLI calls if the agent uses array bodies)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 6
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT retry a failed insert with substituted values (allow batched inserts up to ~3 retries' worth)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 6
    max_count: 50
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 1 — required field handling captured for all three semantics"
    path: "report.json"
    assertions:
      - expression: "pair_1_A"
        operator: contains
        expected: "succeeded"
      - expression: "pair_1_B"
        operator: not_equals
        expected: "succeeded"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 2 — string length boundary: at-limit succeeds, over-limit fails"
    path: "report.json"
    assertions:
      - expression: "pair_2_A"
        operator: contains
        expected: "succeeded"
      - expression: "pair_2_B"
        operator: not_equals
        expected: "succeeded"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 3 — numeric minimum: at-min succeeds, below-min fails"
    path: "report.json"
    assertions:
      - expression: "pair_3_A"
        operator: contains
        expected: "succeeded"
      - expression: "pair_3_B"
        operator: not_equals
        expected: "succeeded"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 4 — numeric maximum: at-max succeeds, over-max fails, int32+1 fails"
    path: "report.json"
    assertions:
      - expression: "pair_4_A"
        operator: contains
        expected: "succeeded"
      - expression: "pair_4_B"
        operator: not_equals
        expected: "succeeded"
      - expression: "pair_4_C"
        operator: not_equals
        expected: "succeeded"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 5 — decimal precision behavior captured"
    path: "report.json"
    assertions:
      - expression: "pair_5_A"
        operator: contains
        expected: "succeeded"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 6 — invalid calendar date rejected"
    path: "report.json"
    assertions:
      - expression: "pair_6_A"
        operator: contains
        expected: "succeeded"
      - expression: "pair_6_D"
        operator: not_equals
        expected: "succeeded"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 7 — baseline insert without a client-supplied Serial succeeds (system / auto behavior is platform-dependent and just captured)"
    path: "report.json"
    assertions:
      - expression: "pair_7_A"
        operator: contains
        expected: "succeeded"
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "Pair 7 — outcomes for client-supplied Serial / CreatedBy / Id all recorded (each may pass or fail depending on platform)"
    command: "python3 -c \"import json,sys; d=json.load(open('report.json')); sys.exit(0 if all(isinstance(d.get(k),str) and d[k] for k in ['pair_7_B','pair_7_C','pair_7_D']) else 1)\""
    timeout: 10
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "Pair 8 — relationship to non-existent row is rejected"
    path: "report.json"
    assertions:
      - expression: "pair_8_A"
        operator: contains
        expected: "succeeded"
      - expression: "pair_8_B"
        operator: not_equals
        expected: "succeeded"
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Side-effect check: only the rows the server accepted actually landed"
    command: "python3 -c \"import json,sys; d=json.load(open('report.json')); pos=sum(1 for k,v in d.items() if k.startswith('pair_') and isinstance(v,str) and 'succeeded' in v.lower()); count=d.get('successful_inserts',-1); sys.exit(0 if count==pos and pos>=8 else 1)\""
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_ConstraintTest"
    timeout: 60
    fail_on_error: false

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_ConstraintTest"
    timeout: 60
