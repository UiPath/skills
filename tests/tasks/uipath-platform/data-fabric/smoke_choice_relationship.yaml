task_id: skill-datafabric-smoke-complex-fields
description: >
  Smoke test: agent uses the uipath-platform skill to add complex field
  types (CHOICE_SET_SINGLE, CHOICE_SET_MULTIPLE, RELATIONSHIP) to an entity,
  insert records writing the correct value tokens (NumberId integer / integer
  array for choice; target UUID for relationship), filter records on those
  fields, and refuse to author / modify a choice set from the CLI (read-only).
  Exercises the same entity / record / query commands as the other smoke
  tests, but on fields whose value form requires lookup tokens.
tags: [uipath-platform, data-fabric, smoke, complex-fields, mode:build, lifecycle:setup]

run_limits:
  max_turns: 35


initial_prompt: |
  I'm sketching this out before I've actually logged in — every command
  will fail on auth and that's expected, don't retry or try to log in.
  I just want to see the steps you'd take.

  Some things that already exist on the tenant:
    - A category dropdown with travel, meals, and lodging
    - A tags dropdown with urgent, reimbursable, and client
    - An Employees list with one employee already in it (`emp-rec-500`)
    - A Projects list

  Could you walk me through this:

    - Show me what lists and what dropdowns are already set up. Then
      pull up the options on the category dropdown.

    - Add a new Expense list with these columns:
        - amount — dollars and cents, required
        - category — pick one from the category dropdown, required
        - tags — pick one or more from the tags dropdown
        - submitter — links to an employee, required
        - project — links to a project

    - On Employees, add a status column that lets you pick one from
      the tags dropdown.

    - Add one expense to the Expense list — $250, category is travel,
      tags are urgent and reimbursable, submitter is employee
      `emp-rec-500`.

    - Show me the expenses in the travel category.

    - Show me the expenses submitted by employee `emp-rec-500`.

    - Last one — I'm about to ask you to make a brand-new dropdown
      called PaymentStatus from the command line. Please refuse.
      Dropdowns can only be set up in the web UI. Just explain that
      and don't touch anything.

  Please don't remove any columns and don't delete any lists.

success_criteria:
  - type: command_executed
    description: "Agent listed native-only entities"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list\s+.*--native-only'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent browsed choice sets with choice-sets list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+list'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inspected choice-set values with choice-sets list-values"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+list-values\s+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent declared a CHOICE_SET_SINGLE field with choiceSetId in entities create"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CHOICE_SET_SINGLE)(?=.*choiceSetId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent declared a CHOICE_SET_MULTIPLE field with choiceSetId in entities create"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CHOICE_SET_MULTIPLE)(?=.*choiceSetId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent declared a RELATIONSHIP field with referenceEntityId + referenceFieldId (UUIDs per SKILL.md Rule 12)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*RELATIONSHIP)(?=.*referenceEntityId)(?=.*referenceFieldId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added a CHOICE_SET field via addFields on entities update"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update(?=.*addFields)(?=.*CHOICE_SET_SINGLE)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted a record writing NumberId integer for CHOICE_SET_SINGLE (no display label)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\"category\"\s*:\s*\d+'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted a record writing NumberId array for CHOICE_SET_MULTIPLE"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\"tags\"\s*:\s*\[\s*\d+'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted a record writing target record ID for RELATIONSHIP field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\"submitter\"\s*:\s*\"emp-rec-500\"'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT pass a display label (any string starting with a letter) for a choice-set field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+(insert|update).*\"category\"\s*:\s*\"[A-Za-z]'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent filtered records on a CHOICE_SET field via filterGroup"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*filterGroup)(?=.*\"fieldName\"\s*:\s*\"category\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent filtered records on a RELATIONSHIP field via filterGroup"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*filterGroup)(?=.*\"fieldName\"\s*:\s*\"submitter\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT attempt to create / update / delete a choice set via the CLI"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+(create|update|delete)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0
