task_id: skill-datafabric-integration-files
description: >
  Integration test: agent performs a complete file attachment lifecycle against a
  live tenant — checks login, creates or reuses an entity with a FILE-type field,
  inserts a record, uploads a file, downloads it back and verifies byte integrity
  via SHA-256 hash, uploads a second version to confirm overwrite, deletes the
  attachment, and verifies the field is empty post-delete. Covers the full files
  upload/download/delete workflow including overwrite semantics and byte integrity.
tags: [uipath-platform, data-fabric, integration, files, mode:build, lifecycle:setup]
run_limits:
  turn_timeout: 600

initial_prompt: |
  We have an Assets list called `CE_IntegrationAssets` with one row
  already in it. Each asset has an asset name and a Document
  attachment slot.

  Walk me through the full attach-and-swap-and-remove cycle on that
  one row's Document:

    - Make a small local file called `original.txt` with the text
      "hello data fabric v1".
    - Attach it to that row's Document.
    - Pull it back down as `downloaded.txt`. Confirm it came back
      byte-for-byte the same as `original.txt`.
    - Make another file `updated.txt` with the text "hello data
      fabric v2". Attach that to the same slot — it should replace
      the first one.
    - Pull it back down as `verify_update.txt`. Confirm it matches
      the new file, not the old one.
    - Remove the attachment, then try to pull the file down one more
      time — that should fail. Tell me what came back.

  I also want to see how three unusual files behave. For each, try
  the upload once and tell me what came back — don't retry or swap
  in something else:
    - Make an empty file `empty.txt` (zero bytes) and try to attach
      it. Was a zero-byte file accepted?
    - Make a file `café-📎.txt` (unicode name plus an emoji) with
      some text in it. Try to attach it. Did the filename come back
      intact?
    - Make a file `../../etc-passwd.txt` (weird name, plain text
      inside). Try to attach it. Did the system reject the filename
      or sanitize it?

  Save your observations to `report.json`:
    {
      "entity_id": "<list ID>",
      "record_id": "<row ID>",
      "empty_file_accepted": <true|false>,
      "unicode_filename_preserved": <true|false>,
      "traversal_filename_outcome": "<rejected|sanitized|<error>>"
    }

  Leave the list and its row in place — just remove the last file
  attachment when you're done.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent looked up the seed record (records query / list / get)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(query|list|get)\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded file at least twice (v1 and v2 overwrite)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 2
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent downloaded file at least twice (after v1 and after v2)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+download\s+.*--destination'
    min_count: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted the file attachment"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+files\s+delete\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted to upload the empty / unicode / traversal-named files (3 extra edge attempts)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 5
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json with the edge-case observations was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Empty file was created (zero-byte edge)"
    path: "empty.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Edge observations recorded as the right shape (booleans + traversal-outcome string)"
    command: 'python3 -c "import json,sys; d=json.load(open(''report.json'')); ok=(isinstance(d.get(''empty_file_accepted''),bool) and isinstance(d.get(''unicode_filename_preserved''),bool) and isinstance(d.get(''traversal_filename_outcome''),str)); sys.exit(0 if ok else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "original.txt was created"
    path: "original.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "downloaded.txt was created from download"
    path: "downloaded.txt"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "updated.txt (v2 source) was created"
    path: "updated.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "verify_update.txt (v2 download) was created"
    path: "verify_update.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "v1 byte integrity: downloaded.txt is identical to original.txt"
    command: "cmp -s original.txt downloaded.txt"
    timeout: 5
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "v2 byte integrity: verify_update.txt is identical to updated.txt"
    command: "cmp -s updated.txt verify_update.txt"
    timeout: 5
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seed_entity.py
      --entity-name CE_IntegrationAssets
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/integration_assets.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/integration_assets.records.json
    timeout: 180
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_IntegrationAssets
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/integration_assets.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/integration_assets.records.json
    timeout: 180
