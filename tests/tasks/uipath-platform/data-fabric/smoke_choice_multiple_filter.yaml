task_id: skill-datafabric-smoke-choice-multiple-filter
description: >
  Smoke test: agent uses the uipath-platform skill to filter records on a
  CHOICE_SET_MULTIPLE field — picking `contains` for membership and the
  JSON-array string form of `=` for set equality, and avoiding the two known
  HTTP 400 failure modes (bare value with `=`, bracket value with `contains`).
  Verified server behavior — see references/records-query.md §
  "Filtering on Choice-Set Fields".
tags: [uipath-platform, data-fabric, smoke, complex-fields, mode:operate, lifecycle:discover]

run_limits:
  max_turns: 25


initial_prompt: |
  I'm sketching this out before I've actually logged in — every command
  will fail on auth and that's expected, don't retry or try to log in.
  I just want to see the steps you'd take. Please run each search
  exactly once.

  We have an Expenses list. Each expense has an amount and a `tags`
  column where you can pick one or more from a fixed dropdown. The
  three tag options are travel, meals, and lodging (in that order —
  travel is 1, meals is 2, lodging is 3).

  Could you run these four searches for me:

    - Show me every expense tagged as travel.
    - Show me every expense whose tags are exactly travel and lodging
      together, nothing else.
    - Show me every expense that isn't tagged as meals.
    - Show me how many expenses fall under each unique tag
      combination.

success_criteria:
  - type: command_executed
    description: "Task 1 — agent used `contains` with a bare NumberId string for membership (travel=1)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"contains\")(?=.*\"value\"\s*:\s*\"1\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 2 — agent used `=` with a JSON-array string for set equality (travel + lodging = [1, 3])"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"=\")(?=.*\"value\"\s*:\s*\"\[1,\s*3\]\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 3 — agent used `not contains` for negated membership"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"not contains\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 4 — agent used groupBy on tags with COUNT aggregate"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"groupBy\"\s*:\s*\[\s*\"tags\")(?=.*\"function\"\s*:\s*\"COUNT\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT use `=` with a bare value on tags (HTTP 400)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*\"fieldName\"\s*:\s*\"tags\"\s*,\s*\"operator\"\s*:\s*\"=\"\s*,\s*\"value\"\s*:\s*\"\d+\"'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT use `contains` with a bracketed value on tags (HTTP 400)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"contains\")(?=.*\"value\"\s*:\s*\"\[)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT use unsupported operators on a CHOICE_SET_MULTIPLE field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"(in|not in|startswith|endswith|>|<|>=|<=)\")'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT pass a display label (`travel`/`meals`/`lodging`) into a tags filter"
    tool_name: "Bash"
    command_pattern: '(?si)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"value\"\s*:\s*\"(travel|meals|lodging)\")'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0
