task_id: skill-datafabric-integration-complex-fields
description: >
  Integration test: agent builds a two-entity Customer/Order schema that
  exercises the full advanced-schema surface — STRING/MULTILINE_TEXT
  lengthLimit, DECIMAL decimalPrecision + minValue/maxValue, a
  CHOICE_SET_SINGLE field on a discovered choice set, a RELATIONSHIP from
  Order back to Customer, and a FILE field bound to the EntityAttachment
  storage entity. Also covers the Rule 4 reserved-keyword rename
  (`Status` → `orderStatus`) and confirms `entities get` echoes every
  constraint back under Fields[].fieldDataType. Inserts records, filters
  by relationship + choice fields, and resolves a Customer by Email
  before writing the related Order. Distinct from e2e_expense_tracker
  (which covers CHOICE_SET_MULTIPLE + `in`-operator aggregation): this
  test exercises the resolve-by-unique-key pattern (Email → Id) before a
  relational write and the create-only FILE-field schema (upload via CLI
  is not supported). Choice sets are authored only in the web UI — if
  none exists in the tenant, the test records the gap and still
  completes the relationship + FILE-field + constraint workflow.
tags: [uipath-platform, data-fabric, integration, complex-fields, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 30
  max_turns: 65
  turn_timeout: 600

initial_prompt: |
  Build two linked lists — customers and their orders.

  `CE_IntegrationCustomer`:
    - name — required, up to 200 chars
    - email — required, unique, up to 255 chars
    - notes — long text, up to 2000 chars

  `CE_IntegrationOrder` (each order belongs to a customer):
    - amount in dollars — required, cents allowed, $0 to $1,000,000
    - customer link — required (call this column `customerId`)
    - a receipt attachment slot — call this column `Receipt`
    - status — pick from a dropdown if the tenant already has one. Skip
      this column entirely if none exist. Don't author new dropdowns.

  Seed: two customers (`alice@integration.test`, `bravo@integration.test`)
  and three orders (2 for alice, 1 for bravo).

  Sanity checks:
    - Find alice by email, then pull her orders. Should be 2.
    - Open one order and confirm the customer link is stored as her ID
      (not email, not name). If status was set, confirm it's stored as
      a number.
    - If status was set, all 3 orders filtered by that status should
      come back.

  Read both lists' settings back and save to `report.json`:

    {
      "choice_set_available":  <bool>,
      "chosen_choice_set_id":  "<id-or-null>",
      "chosen_choice_number_id": <int-or-null>,
      "attachment_entity_id":   "<id>",
      "attachment_name_field_id": "<id>",
      "parent_entity_id":       "<id>",
      "child_entity_id":        "<id>",
      "parent_id_a": "<id>", "parent_id_b": "<id>",
      "child_id_1":  "<id>", "child_id_2":  "<id>", "child_id_3": "<id>",
      "filter_by_relationship_count": <int>,
      "filter_by_choice_count":       <int-or-null>,
      "stored_relationship_is_uuid":  <bool>,
      "stored_choice_is_integer":     <bool-or-null>,
      "schema_echo": {
        "customer_name_length_limit":            <int>,
        "customer_notes_length_limit":           <int>,
        "order_amount_decimal_precision":        <int>,
        "order_amount_min_value":                <number>,
        "order_amount_max_value":                <number>,
        "order_receipt_type":                    "FILE",
        "order_receipt_reference_entity_matches": <bool>
      }
    }

  We'll wire receipt uploads up later — just get the column in place.
  Don't author any new dropdowns either.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed choice sets with choice-sets list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the parent entity CE_IntegrationCustomer"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*CE_IntegrationCustomer'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the child entity CE_IntegrationOrder with a RELATIONSHIP field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CE_IntegrationOrder)(?=.*RELATIONSHIP)(?=.*referenceEntityId)(?=.*referenceFieldId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied lengthLimit on STRING / MULTILINE_TEXT fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied decimalPrecision on the DECIMAL amount field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*decimalPrecision'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied minValue / maxValue on the DECIMAL amount field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created a FILE field on CE_IntegrationOrder with referenceEntityId/referenceFieldId (EntityAttachment binding)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CE_IntegrationOrder)(?=.*\"type\"\s*:\s*\"FILE\")(?=.*referenceEntityId)(?=.*referenceFieldId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT define a field literally named `Status` (Rule 4 reserved keyword — use orderStatus)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*\"fieldName\"\s*:\s*\"Status\"'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT attempt `uip df files upload` — the Receipt FILE field was newly created via CLI, so its referenceEntity is unwired and upload would fail with Relationship violation (see Not Supported)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+files\s+upload'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted parent records (any reasonable name/email field name)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\"(?:[Nn]ame|[Ee]mail)\"\s*:'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted child records writing customerId as a UUID (not an email or name)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\"customerId\"\s*:\s*\"[0-9a-fA-F-]{8,}'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT write an email / non-UUID into a relationship field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+(insert|update).*\"customerId\"\s*:\s*\"[^\"]*@'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran a query / list against the parent Customer entity to resolve a UUID before the relational write"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(query|list)\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent filtered child records by the RELATIONSHIP field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*filterGroup)(?=.*\"fieldName\"\s*:\s*\"customerId\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent read a record back (records get or records query) to verify stored shape"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(get|query)\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT attempt to create / update / delete a choice set via the CLI"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+(create|update|delete)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json captured parent + child entity IDs"
    path: "report.json"
    assertions:
      - expression: "parent_entity_id"
        operator: regex
        expected: "^[0-9a-fA-F-]{8,}"
      - expression: "child_entity_id"
        operator: regex
        expected: "^[0-9a-fA-F-]{8,}"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Relationship filter returned exactly 2 records for parent_id_a"
    path: "report.json"
    assertions:
      - expression: "filter_by_relationship_count"
        operator: equals
        expected: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Stored relationship value is a UUID (not a label / email)"
    path: "report.json"
    assertions:
      - expression: "stored_relationship_is_uuid"
        operator: equals
        expected: true
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "entities get echoed back the constraint values authored on the schema"
    path: "report.json"
    assertions:
      - expression: "schema_echo.customer_name_length_limit"
        operator: equals
        expected: 200
      - expression: "schema_echo.customer_notes_length_limit"
        operator: equals
        expected: 2000
      - expression: "schema_echo.order_amount_decimal_precision"
        operator: equals
        expected: 2
      - expression: "schema_echo.order_amount_min_value"
        operator: equals
        expected: 0
      - expression: "schema_echo.order_amount_max_value"
        operator: equals
        expected: 1000000
      - expression: "schema_echo.order_receipt_type"
        operator: equals
        expected: "FILE"
      - expression: "schema_echo.order_receipt_reference_entity_matches"
        operator: equals
        expected: true
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  # Sweep leftover state from any prior crashed run. Child first, then
  # parent — the FK constraint blocks parent deletion while children exist.
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_IntegrationOrder"
    timeout: 60
    fail_on_error: false
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_IntegrationCustomer"
    timeout: 60
    fail_on_error: false

post_run:
  # Cleanup order matters: child entity must be deleted BEFORE parent
  # because Order has a RELATIONSHIP FK pointing at Customer. The CLI
  # delete on Customer would otherwise fail with an FK constraint.
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_IntegrationOrder"
    timeout: 60
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_IntegrationCustomer"
    timeout: 60
