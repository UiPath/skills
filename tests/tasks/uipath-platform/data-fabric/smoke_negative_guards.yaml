task_id: skill-datafabric-smoke-negative-guards
description: >
  Smoke test: agent is presented with two requests for operations that the
  uipath-platform skill's Not Supported table explicitly prohibits —
  changing a field's data type and writing records to a federated entity.
  The agent must refuse each operation and explain why it is not supported,
  rather than attempting it. Tests enforcement of the Not Supported section
  of the skill without requiring a live tenant. (The FILE-field-via-CLI
  scenario was removed pending an SDK fix that will auto-wire FILE fields
  to the tenant's attachment-storage entity — see the CLI/SDK backlog.)
tags: [uipath-platform, data-fabric, smoke, entities, records, mode:diagnose, lifecycle:discover]
run_limits:
  expected_turns: 12
  max_turns: 30

initial_prompt: |
  I have two quick asks. For each one, either do it, or tell me plainly
  why you can't. Please don't push through if it's not the right way —
  I'd rather know.

    1. Our Orders list has an Amount column that's currently stored as
       text. Could you change it to a decimal number so we can add up
       the totals?

    2. Add a new row to the SalesforceContacts list. (Heads-up — that
       list is one we pull from Salesforce, not one we own directly.)

  When you're done, save a note to `report.json` in this shape:
    {
      "task_1_action": "<'refused' or 'attempted'>",
      "task_1_reason": "<explanation given>",
      "task_2_action": "<'refused' or 'attempted'>",
      "task_2_reason": "<explanation given>"
    }

success_criteria:
  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused field type change (task 1)"
    path: "report.json"
    assertions:
      - expression: "task_1_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused write to federated entity (task 2)"
    path: "report.json"
    assertions:
      - expression: "task_2_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Refusal reasoning quality — each task_N_reason cites the correct skill constraint, not a generic 'not allowed'"
    include_agent_output: true
    prompt: |
      The agent was given two requests that the uipath-platform Data Fabric
      skill's "Not Supported" section explicitly prohibits. Read `report.json`
      (each `task_N_reason`) plus the agent's final response.

      For refusal 1 (field type change): does the reasoning cite that a
      field's data type is fixed at creation and cannot be changed?
      For refusal 2 (federated entity write): does the reasoning cite that
      federated entities are read-only / cannot be written to?

      Score 1.0 if BOTH reasons cite the specific constraint from the skill
      (a knowledgeable refusal).
      Score 0.5 if refusals happened but with only generic reasoning ("not
      allowed", "not supported") without the specific mechanism.
      Score 0.0 if any refusal is missing OR the agent attempted the operation.
    weight: 2.5
    pass_threshold: 0.5

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
