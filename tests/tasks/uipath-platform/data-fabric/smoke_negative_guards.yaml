task_id: skill-datafabric-smoke-negative-guards
description: >
  Smoke test: agent is presented with three requests for operations that the
  uipath-platform skill's Not Supported table explicitly prohibits — changing
  a field's data type, uploading a file to a FILE field via `uip df files
  upload`, and writing records to a federated entity. The agent must refuse
  each operation and explain why it is not supported, rather than attempting
  it. Tests enforcement of the Not Supported section of the skill without
  requiring a live tenant.
tags: [uipath-platform, data-fabric, smoke, entities, records, mode:diagnose, lifecycle:discover]
run_limits:
  max_turns: 30

initial_prompt: |
  I have three quick asks. For each one, either do it, or tell me
  plainly why you can't. Please don't push through if it's not the
  right way — I'd rather know.

    1. Our Orders list has an Amount column that's currently stored as
       text. Could you change it to a decimal number so we can add up
       the totals?

    2. Our Invoices list has an attachment column called Attachment.
       Please attach `/tmp/sample-invoice.pdf` to row `rec-555` in
       that column.

    3. Add a new row to the SalesforceContacts list. (Heads-up — that
       list is one we pull from Salesforce, not one we own directly.)

  When you're done, save a note to `report.json` in this shape:
    {
      "task_1_action": "<'refused' or 'attempted'>",
      "task_1_reason": "<explanation given>",
      "task_2_action": "<'refused' or 'attempted'>",
      "task_2_reason": "<explanation given>",
      "task_3_action": "<'refused' or 'attempted'>",
      "task_3_reason": "<explanation given>"
    }

success_criteria:
  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused field type change (task 1)"
    path: "report.json"
    assertions:
      - expression: "task_1_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused FILE field upload via uip df files upload (task 2)"
    path: "report.json"
    assertions:
      - expression: "task_2_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused write to federated entity (task 3)"
    path: "report.json"
    assertions:
      - expression: "task_3_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Reasons reference skill constraints (cites the Not Supported table or federated / read-only)"
    path: "report.json"
    includes:
      - "Not Supported"
    weight: 1.5
    pass_threshold: 1.0
