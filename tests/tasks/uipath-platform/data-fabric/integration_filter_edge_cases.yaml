task_id: skill-datafabric-integration-filter-edge-cases
description: >
  Integration test: agent runs filter and pagination scenarios that
  catch real-world regressions — null-vs-not-null semantics, special
  characters in filter literals (single quote, percent, underscore,
  backslash — SQL injection and LIKE-escape vectors), case sensitivity
  on STRING equality, $top=0, $top above the documented max, $skip
  past the end of the result set, $orderby on a nullable field
  (null-first vs null-last consistency across pages), and pagination
  consistency while the underlying data is modified mid-walk. Each
  scenario has an expected outcome captured in report.json; an
  independent record-count oracle verifies the entity ended up in the
  expected state.
tags: [uipath-platform, data-fabric, integration, records, filter-edges, mode:operate, lifecycle:discover]

run_limits:
  expected_turns: 30
  max_turns: 60
  turn_timeout: 1200

initial_prompt: |
  Set up a list `CE_FilterEdgeTest` with three columns: Title (required
  text, up to 200 chars), Score (optional whole number), Notes (optional
  long text). Load these 10 rows and remember every row ID:

    1.  "alpha",              Score 10,   Notes "first"
    2.  "beta",                Score 20,  Notes blank
    3.  "Gamma",              Score blank, Notes ""
    4.  "delta",              Score 30,   Notes "with quote: O'Brien"
    5.  "epsilon",            Score 40,   Notes "with percent 50%"
    6.  "zeta",               Score 50,   Notes "with underscore _ here"
    7.  "eta",                Score 60,   Notes "with backslash \\ here"
    8.  "ALPHA",              Score 70,   Notes "uppercase twin"
    9.  "row with newline",   Score 80,   Notes "line1\nline2"
    10. "unicode café résumé",Score 90,   Notes "non-ascii"

  Run these and record counts:

  Null / empty:
    - customers with no score (edge_1_A) / with a score (edge_1_B)
    - notes blank (edge_1_C) / notes empty-string (edge_1_D) — the two
      should NOT be the same set

  Substring / special chars in Notes:
    - contains "O'Brien" (edge_2_A), "%" (edge_2_B), "_" (edge_2_C),
      "\\" (edge_2_D)

  Case-sensitivity:
    - Title exactly "alpha" (edge_3_A). Note whether "ALPHA" also
      matched (edge_3_A_case_insensitive).

  Paging edges (describe what came back — no exceptions):
    - page size 0 (edge_4_A: empty | error | count)
    - page size 100000 (edge_4_B: clamped | count | error)
    - start position 1000 on a 10-row list (edge_4_C: empty | error)

  Sort stability:
    - sort by Score ascending. Where does the null-score row land
      (edge_5_A_null_position: first | last | middle)? Repeat the
      same sort and check position matches (edge_5_A_position_stable).

  Concurrent write during walk:
    - Start walking in pages of 3. Between page 1 and page 2, add a
      row "midstream-add" (score 95) and delete row 5. Keep walking
      with the SAME cursor. Report duplicate IDs (edge_6_C_duplicate_ids)
      and missing IDs (edge_6_C_missing_ids).

  Save to `report.json`:
    {
      "entity_id": "<list ID>",
      "row_ids": ["<r1>", "<r2>", ... "<r10>"],
      "edge_1_A_count": <int>,
      "edge_1_B_count": <int>,
      "edge_1_C_count": <int>,
      "edge_1_D_count": <int>,
      "edge_2_A_count": <int>,
      "edge_2_B_count": <int>,
      "edge_2_C_count": <int>,
      "edge_2_D_count": <int>,
      "edge_3_A_count": <int>,
      "edge_3_A_case_insensitive": <true|false>,
      "edge_4_A_result": "<empty|error|count>",
      "edge_4_B_result": "<count|error|clamped>",
      "edge_4_C_result": "<empty|error>",
      "edge_5_A_null_position": "<first|last|middle>",
      "edge_5_A_position_stable": <true|false>,
      "edge_6_C_duplicate_ids": [<list of ids that appeared in 2+ pages, or []>],
      "edge_6_C_missing_ids": [<list of ids that should have appeared but didn't, or []>]
    }

success_criteria:
  - type: command_executed
    description: "Agent created the test list"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*CE_FilterEdgeTest'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent loaded the 10 edge-case rows"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran null-handling searches (is null / is not null on Score and Notes)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"value"\s*:\s*null'
    min_count: 2
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched on special characters (quote / percent / underscore / backslash)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 10
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted page size 0 and a very large page size"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)\s+.*--limit\s+(0|100000)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent sorted by Score (nullable column)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*sortOptions.*Score'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Null vs empty vs missing distinction captured correctly"
    path: "report.json"
    assertions:
      - expression: "edge_1_A_count"
        operator: equals
        expected: 1
      - expression: "edge_1_B_count"
        operator: equals
        expected: 9
      - expression: "edge_1_C_count"
        operator: equals
        expected: 1
      - expression: "edge_1_D_count"
        operator: equals
        expected: 1
    weight: 3.5
    pass_threshold: 1.0

  - type: json_check
    description: "Special-character searches at least found the target row (the platform treats %/_ as LIKE wildcards so they may match extra rows — captured separately)"
    path: "report.json"
    assertions:
      - expression: "edge_2_A_count"
        operator: gte
        expected: 1
      - expression: "edge_2_B_count"
        operator: gte
        expected: 1
      - expression: "edge_2_C_count"
        operator: gte
        expected: 1
      - expression: "edge_2_D_count"
        operator: gte
        expected: 1
    weight: 3.5
    pass_threshold: 1.0

  - type: json_check
    description: "Case-sensitivity behavior recorded (test does not prescribe — agent must observe)"
    path: "report.json"
    assertions:
      - expression: "edge_3_A_count"
        operator: gte
        expected: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Pagination edges captured (page size 0, oversized, past-end)"
    path: "report.json"
    assertions:
      - expression: "edge_4_C_result"
        operator: equals
        expected: "empty"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Sort on nullable column is stable across repeated queries"
    path: "report.json"
    assertions:
      - expression: "edge_5_A_position_stable"
        operator: equals
        expected: true
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_FilterEdgeTest"
    timeout: 60
    fail_on_error: false

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_FilterEdgeTest"
    timeout: 60
