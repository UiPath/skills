task_id: skill-datafabric-integration-preseeded-entity
description: >
  Integration test: agent discovers CodeEvalTestEntity (auto-creating and
  seeding it with 20 records if missing), then exercises the full Discover
  workflow — introspect schema (7 fields), run 5 filterGroup queries with
  known expected counts (Active=true → 12, Score>7 → 6, Title="The Matrix"
  → 1, Title contains "Matrix" → 3), verify sort order (Score desc → 10.0
  first), paginate all 20 records, do a targeted Notes update and restore.
  Entity is never deleted.
tags: [uipath-platform, data-fabric, integration, pre-seeded, discover, mode:operate, lifecycle:discover]
run_limits:
  max_turns: 50
  turn_timeout: 600

initial_prompt: |
  We have a movie list called `CodeEvalTestEntity` already loaded up
  with 20 rows. Please help me poke at it — no changes I don't ask
  for, and please don't delete anything.

  Start by reading the list's settings back and confirming all 7
  columns are there with the right types.

  Then run each of these searches and tell me the count that came
  back:
    - All the active rows (expect 12)
    - Everything with a score above 7 (expect 6 — scores 7.5 through
      10.0)
    - Title exactly "The Matrix" (expect 1)
    - Title contains "Matrix" (expect 3)
    - Score at least 7 AND active (expect 7)

  Sort everything by score, highest first — the top score should be
  10.0.

  Page through every row in batches of 5. Each page has to be its
  own separate command (a loop inside one Python process doesn't
  count). Move forward one page at a time until you're done — you
  should see 4 pages and 20 unique IDs.

  Then pick one of the active rows, set its notes to
  "test-annotation-by-agent", read it back to confirm, then clear
  the notes (set them empty) and read it back once more. Tell me
  which row you touched.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed entities to discover CodeEvalTestEntity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inspected the entity schema (entities get or list) before querying"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+(get|list)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran multiple filterGroup queries"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 4
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated through records with --limit"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)\s+.*--limit'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated a record and verified with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified updates with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+get'
    min_count: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 4
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used logicalOperator in AND filterGroup query (step 4e)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*logicalOperator'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran records update (either `--body` with inline Id or `--file` payload — Rule 5 requires Id in the body)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update\s+\S+\s+(?:--body[\s\S]*\"Id\"|--file\s+\S+\.json)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seed_entity.py
      --entity-name CodeEvalTestEntity
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/codeeval_test_entity.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/codeeval_test_entity.records.json
    timeout: 240
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CodeEvalTestEntity
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/codeeval_test_entity.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/codeeval_test_entity.records.json
    timeout: 240
