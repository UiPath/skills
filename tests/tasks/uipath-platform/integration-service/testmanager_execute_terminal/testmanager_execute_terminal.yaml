# Asserts REAL EXECUTION (not just invocation): the agent executes a test set via
# the TM connector, then polls until the execution reaches a TERMINAL status.
# skip:true — needs a maintained FIXTURE: a runnable test set in the eval tenant
# whose execution actually completes (linked automation + robot). TODO before
# un-skipping: pin <FIXTURE_TEST_SET_KEY> below to such a test set in codereval.
task_id: skill-platform-is-testmanager-execute-terminal
description: >
  Data-grounded execution: agent runs a test set via the uipath-uipath-testmanager
  connector (Execute Test Set), captures the ExecutionId, and polls the execution
  (Get Test Execution) until it reaches a terminal status. Graded on invoking
  Execute + Get AND on the execution actually reaching terminal (Passed/Failed/…),
  i.e. a real run happened — not just that Execute was called.
tags: [uipath-platform, integration, integration-service, resources, execute]
skip: true

sandbox:
  driver: tempdir
  python: {}
  node: {}

run_limits:
  expected_turns: 18
  task_timeout: 1800

initial_prompt: |
  Before starting, load the uipath-platform skill and follow its workflow.

  You are connected to a live tenant. Using the UiPath Test Manager Integration
  Service connector (`uipath-uipath-testmanager`):

  1. Execute the test set `<FIXTURE_TEST_SET_KEY>` (`uip is resources run create
     uipath-uipath-testmanager ExecuteTestSet ...`). Capture the returned
     ExecutionId.
  2. Poll the execution (`uip is resources run get uipath-uipath-testmanager
     TestExecution ...`) until its status is terminal — i.e. no longer Pending or
     Running (e.g. Passed / Failed / Completed). Retry with a short delay.
  3. Write result.json with `execution_id` and the final `status`.

  Use `--output json` and `--connection-id` on every resource command.

  Do NOT ask for approval. Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent executed the test set (`uip is resources run create uipath-uipath-testmanager ExecuteTestSet`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+create\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?ExecuteTestSet'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
    require_success: true

  - type: command_executed
    description: "Agent polled the execution (`uip is resources run get uipath-uipath-testmanager TestExecution`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+get\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?TestExecution'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Data-grounded: the execution reached a TERMINAL status (real run completed, not just Execute invoked)"
    command: "python3 $TASK_DIR/check_terminal.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
