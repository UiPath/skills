task_id: skill-platform-is-testmanager-testcase-lifecycle
description: >
  Coverage test: agent uses the uipath-platform skill to exercise every UiPath
  Test Manager connector activity on the TestCase object through the `uip is`
  surface — create, get, update, delete a test case, plus execute test cases.
  Offline (command-shape) grading; runs in CI without a live connection. Verified
  against a live tenant (2026-06-15): TestCase.Create = POST /v2/{ProjectId}/testcases
  (required `name`).
tags: [uipath-platform, integration, integration-service, resources, execute]

run_limits:
  expected_turns: 24

sandbox:
  driver: tempdir
  python: {}
  node: {}

initial_prompt: |
  Before starting, load the uipath-platform skill and follow its workflow.

  Exercise the full set of UiPath Test Manager TestCase operations through
  UiPath Integration Service, using connector `uipath-uipath-testmanager`. Run
  the matching `uip is resources run <verb> uipath-uipath-testmanager <Object>`:

  - Create a Test Case   (object `TestCase`, name "IS Coverage - TC")
  - Get the Test Case    (object `TestCase`)
  - Update the Test Case (object `TestCase`)
  - Delete the Test Case (object `TestCase`)
  - Execute test cases   (object `ExecuteTestCases`)

  Important:
  - The `uip` CLI is available but NOT connected to a live tenant. Commands will
    fail with auth errors — expected. Run each once; do NOT retry or login.
  - Use `--output json` and `--connection-id` (placeholder if needed) on resource
    commands; use placeholder ids/bodies where prior output would be needed.

success_criteria:
  - type: command_executed
    description: "Create Test Case (`uip is resources run create uipath-uipath-testmanager TestCase`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+create\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?TestCase'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Get Test Case (`uip is resources run get uipath-uipath-testmanager TestCase`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+get\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?TestCase'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Update Test Case (`uip is resources run update uipath-uipath-testmanager TestCase`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+update\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?TestCase'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Delete Test Case (`uip is resources run delete uipath-uipath-testmanager TestCase`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+delete\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?TestCase'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Execute Test Cases (`... run create uipath-uipath-testmanager ExecuteTestCases`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+\S+\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?ExecuteTestCases'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Used --output json on resource commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
