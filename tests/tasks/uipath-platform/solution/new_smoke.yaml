task_id: skill-platform-solution-new-init
description: >
  Smoke test: agent uses the uipath-platform skill to scaffold a new UiPath
  solution via `uip solution new` and produces the `.uipx` manifest on disk.
  Runs entirely in the sandbox tempdir — no tenant interaction.
tags: [uipath-platform, smoke, mode:build, lifecycle:generate]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new empty UiPath solution called "MySolution" and confirm the
  solution manifest was created correctly.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new\s+.*MySolution'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Solution manifest was created"
    path: "MySolution/MySolution.uipx"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
