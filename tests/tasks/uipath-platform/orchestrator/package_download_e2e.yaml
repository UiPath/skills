task_id: skill-platform-package-download-integration
description: >
  Integration: agent uses the skill to download the seeded package locally.
  Verifies the downloaded file is a valid .nupkg (zip with PK magic bytes).
tags: [uipath-platform, integration, mode:operate, lifecycle:discover, orchestrator, packages]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=package-download python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_process.py"
    timeout: 180

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  `seed.json` provides `package_id`, `package_version`, `process_key`.

  Goal: download the seeded package locally to a file named `pkg.nupkg` in
  the sandbox. The check script verifies it's a valid zip (PK magic bytes).

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: run_command
    description: "Downloaded pkg.nupkg starts with PK magic bytes"
    command: "python3 $TASK_DIR/check_package_download.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
