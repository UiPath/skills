task_id: skill-platform-job-logs-traces-e2e
description: >
  E2E: agent uses the skill to start a job on the seeded process, wait for
  completion, and verify (locally) that logs + traces were retrievable.
  Writes a small observation file the check reads.
tags: [uipath-platform, e2e, mode:operate, lifecycle:discover, orchestrator, jobs]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=job-logs-traces python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_process.py"
    timeout: 180

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  `seed.json` provides `process_key` and `folder_path`.

  Goal: start a job for `process_key`, wait for it to reach a terminal state,
  retrieve logs and traces.

  Use the skill's recommended pattern (`--wait-for-completion` on `jobs start`
  — don't poll `jobs get` in a loop, it'll time out the agent turn before
  picking up the terminal state).

  Write a JSON summary to `job_outcome.json` with these fields:
  ```
  {
    "job_key": "<job-key>",
    "terminal_state": "<Successful|Faulted|Stopped>",
    "log_count": <number of log entries returned>,
    "span_count": <number of trace spans returned>
  }
  ```

  Trace ingestion may lag — be patient (retry traces fetch a few times if Data
  is empty initially).

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: run_command
    description: "Job reached terminal state and produced logs + traces"
    command: "python3 $TASK_DIR/check_job_logs_traces.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
