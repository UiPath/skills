task_id: skill-platform-job-control-e2e
description: >
  E2E job stop + restart: start a long-running job, stop it via SoftStop,
  verify state goes to Stopped/Stopping, restart, wait for terminal state.
  Verifies the state-transition sequence is monotonically valid.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, orchestrator, jobs]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=job-control SEED_PROCESS_LONG=1 python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_process.py"
    timeout: 120

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill. Read `seed.json` for `process_key`.

  Steps (use `--output json`):
  1. `jobs start <process_key> --runtime-type Serverless` → `start.json`. Capture job key.
  2. Wait a few seconds for the job to reach Running.
  3. `jobs stop <job-key> --strategy SoftStop` → `stop.json`.
  4. Poll `jobs get` every 5s until state ∈ {Stopped, Stopping, Faulted}. Save to `get_after_stop.json`.
  5. `jobs restart <job-key>` → `restart.json`.
  6. Poll terminal state. Save to `get_terminal.json`.

success_criteria:
  - type: command_executed
    description: "Agent issued stop and restart"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+jobs\s+(stop|restart)'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0
