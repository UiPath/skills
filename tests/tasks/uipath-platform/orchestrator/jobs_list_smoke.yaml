task_id: skill-platform-orchestrator-jobs-list
description: >
  Smoke test: agent uses the uipath-platform skill to discover an Orchestrator
  folder it can access and list its jobs via
  `uip or jobs list --folder-(key|path) ... --output json`.
  Empty results are acceptable — the goal is correct command shape, not tenant
  state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Discover the Orchestrator folders available in the current UiPath tenant and
  list the recently faulted jobs in any one of those folders.

success_criteria:
  - type: command_executed
    description: "Agent listed jobs via uip or jobs list"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+jobs\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+jobs\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent filtered by job state with --state Faulted (skill teaches --state filter — agent should use it, not list all jobs and filter mentally)"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+jobs\s+list.*--state\s+Faulted'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

