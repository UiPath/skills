task_id: skill-platform-role-lifecycle-e2e
description: >
  E2E role + permissions lifecycle: create a Tenant-scoped role, add a
  permission via edit-role, verify the permission appears in get-role, remove
  it, then delete the role.
tags: [uipath-platform, e2e, mode:build, lifecycle:setup, orchestrator, roles]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=role-lifecycle python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_init.py"
    timeout: 30

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 180

initial_prompt: |
  Use the `uipath-platform` skill.

  Read `seed.json` for `uuid8`.

  Goal: full lifecycle of a custom tenant role — create empty, add a known
  permission, verify it appears, remove it, delete the role.

  Steps (use `--output json` on EVERY uip command):

  1. `uip or roles list-permissions --limit 5` → `available_perms.json`. Pick
     the first permission Name and save it to `perm.txt`.
  2. `uip or roles create-role --name e2e-role-<uuid8> --type Tenant` → `create.json`. Capture role key.
  3. Append `{"kind": "role", "key": "<role-key>"}` to `created-resources.jsonl`.
  4. `uip or roles get-role <role-key>` → `get_before.json`.
  5. `uip or roles edit-role <role-key> --add-permissions "$(cat perm.txt)"` → `edit_add.json`.
  6. `uip or roles get-role <role-key>` → `get_after_add.json`.
  7. `uip or roles edit-role <role-key> --remove-permissions "$(cat perm.txt)"` → `edit_remove.json`.
  8. `uip or roles get-role <role-key>` → `get_after_remove.json`.
  9. `uip or roles delete-role <role-key>` → `delete.json`.

  **STOP after step 9.** Do NOT inspect the JSON files, summarize what
  happened, or run any verification — the check script does that. Do NOT ask
  for approval. Do NOT pause.

success_criteria:
  - type: command_executed
    description: "Agent listed available permissions"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+roles\s+list-permissions'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created a role"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+roles\s+create-role.*--type\s+Tenant'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent edited role twice (add + remove)"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+roles\s+edit-role'
    min_count: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted the role"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+roles\s+delete-role'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral check: permission absent before, present after add, absent after remove"
    command: "python3 $TASK_DIR/check_role_lifecycle.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
