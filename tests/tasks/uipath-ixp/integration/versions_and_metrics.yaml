task_id: skill-ixp-integration-versions-and-metrics
description: >
  Integration: multi-version metrics reasoning on a live project. The agent
  produces two trained versions (via a configure-model A/B change + retrain),
  then pulls per-version metrics, compares them, and ranks the versions by score.
  The value is the computed comparison/ranking — agent reasoning over live
  metric values, which a command-shape smoke cannot produce.
tags: [uipath-ixp, integration, mode:diagnose]

run_limits:
  expected_turns: 36
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I want to compare model configurations on an invoice project. Use the tenant
  I'm already signed into (check I'm logged in; don't re-authenticate): start a
  project from the files in `./fixtures/` — import the taxonomy, upload the three
  invoices — and let it train.

  Note the scores for version 1 (the current model). Then reconfigure the model to
  use `table` preprocessing and retrain to produce version 2. Once both are
  trained, compare version 1 and version 2: tell me which scored better and by how
  much, calling out the fields that moved. Then give me both versions ranked
  best-to-worst by score, with the score you used for each.

  Delete the project when you're done.

success_criteria:
  - type: command_executed
    description: "Verified login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed model versions"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+list-models'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Changed model configuration (A/B)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+configure-model'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Pulled metrics scoped to a specific version (-m/--model-version)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+get-metrics\b.*(--model-version|-m)\s'
    min_count: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\s+.*--confirm-data-loss'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
