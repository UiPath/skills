task_id: skill-ixp-integration-versions-and-metrics
description: >
  Integration: multi-version metrics reasoning on a live project. The agent
  produces two trained versions (via a configure-model A/B change + retrain),
  then pulls per-version metrics, compares them, and ranks the versions by score.
  The value is the computed comparison/ranking — agent reasoning over live
  metric values, which a command-shape smoke cannot produce.
tags: [uipath-ixp, integration, mode:diagnose]

run_limits:
  max_turns: 72
  task_timeout: 2400
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I want to compare model configurations on an invoice project. Use the tenant
  I'm already signed into (check I'm logged in; don't re-authenticate): start a
  project from the files in `./fixtures/` — import the taxonomy, upload the three
  invoices — and let it train.

  Once it's trained, review and confirm the predictions on the documents so the
  project has ground truth to score against — without that there are no metrics.
  Pull the metrics for version 1 and save them to `metrics_v1.json` exactly as the
  command returns them — the full JSON output, not a summary or reshaped subset.
  Then try to improve it — change the model's configuration and retrain to get a
  second version — and pull version 2's metrics the same way into `metrics_v2.json`.
  With both saved, tell me which version scored better and by how much, calling out
  the fields that moved, and rank them best-to-worst by score.

  Delete the project when you're done.

success_criteria:
  - type: command_executed
    description: "Confirmed predictions to establish ground truth (so metrics exist)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+labellings\s+confirm'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed model versions"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+list-models'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Changed model configuration (A/B)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+configure-model'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Pulled metrics scoped to a specific version (-m/--model-version)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+get-metrics\b.*(--model-version|-m)\s'
    min_count: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\b(?=.*(--yes|-y))'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification: real per-version metrics were captured ---
  - type: json_check
    description: "Version 1 metrics captured with real per-field scores"
    path: "metrics_v1.json"
    assertions:
      # `Data || @`: accept either save shape. We don't control how the agent
      # writes the file — it may store the full CLI response (root has `Data`)
      # or just the unwrapped payload (root IS the data). `@` is the JMESPath
      # current node, so this resolves `Fields` whichever way it was saved.
      - expression: "length((Data || @).Fields)"
        operator: gte
        expected: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Version 2 metrics captured with real per-field scores"
    path: "metrics_v2.json"
    assertions:
      # `Data || @`: accept either save shape. We don't control how the agent
      # writes the file — it may store the full CLI response (root has `Data`)
      # or just the unwrapped payload (root IS the data). `@` is the JMESPath
      # current node, so this resolves `Fields` whichever way it was saved.
      - expression: "length((Data || @).Fields)"
        operator: gte
        expected: 1
    weight: 2.0
    pass_threshold: 1.0
