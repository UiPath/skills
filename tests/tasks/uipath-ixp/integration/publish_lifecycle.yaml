task_id: skill-ixp-integration-publish-lifecycle
description: >
  Integration: model publish/tag lifecycle on a live project, verified by
  re-reading `list-models` after each transition. Covers publish, tag
  staging/live, moving a tag to another version, unpublish, and untag — asserting
  the published flag / tag pointer actually moved (wire-effect), not just command
  shape.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  max_turns: 68
  task_timeout: 6000
  turn_timeout: 1800

sandbox:
  # driver: docker (NOT tempdir) so `uip ixp` resolves the migrated in-image
  # ixp-tool, not the BYOS host's stale pre-migration plugin.
  driver: docker
  python: {}
  mock_path_dirs: [mocks]
  template_sources:
    - type: template_dir
      path: ../_shared/live_calls_template
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I need to manage releases on an invoice project. Use the tenant I'm already
  signed into (check I'm logged in; don't re-authenticate): start a project from
  the files in `./fixtures/` (give it a unique title
  `codereval-integ-publish-<random-suffix>` so concurrent runs don't collide) — import the taxonomy, upload one of the invoices —
  and let it train. I want two trained versions to tag, so once the first has
  trained, tweak the "Total Amount" field's instruction to retrain a second.
  Work only on the project you create; other runs share this tenant, so never
  list, read, or modify any other project.

  Training takes a few minutes (you'll wait through it twice). Each time, poll
  the project's training status on a fixed interval — wait 2 min between checks,
  up to 5 checks. Do NOT use a single long sleep or escalating waits. Move on
  only once training has completed; if it's still training after 5 checks, stop
  and report rather than waiting longer.

  Then, saving the model list after each step so I can see the state move:
  - Put the first trained version on staging and the second on live → save to
    `models_tagged.json`.
  - Move the live tag over to the first version → save to `models_after_move.json`.
  - Take the tags off the first version → save to `models_after_untag.json`.
  - Unpublish the second version → save to `models_after_unpublish.json`.

  Right after the project is created, write `report.json` for cleanup: {"project_name": "<the ProjectName from the create response>"}.

success_criteria:
  - type: run_command
    description: "Published with a tag (staging/live)"
    command: |
      python3 mocks/check_calls.py --min-count 2 <<'REGEX'
      uip\s+ixp\s+projects\s+publish\b.*--tag\s+(live|staging)
      REGEX
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Removed the staging tag by name (untag --tag staging)"
    command: |
      python3 mocks/check_calls.py --min-count 1 <<'REGEX'
      uip\s+ixp\s+projects\s+untag\b.*--tag\s+["']?staging\b
      REGEX
    timeout: 5
    expected_exit_code: 0
    weight: 0.75
    pass_threshold: 1.0

  - type: run_command
    description: "Removed the live tag by name (untag --tag live)"
    command: |
      python3 mocks/check_calls.py --min-count 1 <<'REGEX'
      uip\s+ixp\s+projects\s+untag\b.*--tag\s+["']?live\b
      REGEX
    timeout: 5
    expected_exit_code: 0
    weight: 0.75
    pass_threshold: 1.0

  - type: run_command
    description: "Unpublished a version"
    command: |
      python3 mocks/check_calls.py --min-count 1 <<'REGEX'
      uip\s+ixp\s+projects\s+unpublish\b.*--model-version
      REGEX
    timeout: 5
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Re-read list-models after each step (one snapshot per transition)"
    command: |
      python3 mocks/check_calls.py --min-count 4 <<'REGEX'
      uip\s+ixp\s+projects\s+list-models
      REGEX
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json written for post-run cleanup"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification: full tag/publish lifecycle (see check_tags.py) ---
  # Version numbers are dynamic, so it checks relative wire-effects, not fixed values.
  - type: run_command
    description: "Tag + publish lifecycle landed: tag -> move -> untag -> unpublish all verified across snapshots"
    command: "python3 $TASK_DIR/check_tags.py"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

# Safety net: delete the project even if the agent's in-band cleanup never ran
# (crash / MAX_TURNS before the final delete). Reads report.json; idempotent;
# always exits 0 so it never fails the test.
post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-ixp/_shared/cleanup_project.py"
    timeout: 60
