task_id: skill-ixp-integration-publish-lifecycle
description: >
  Integration: model publish/tag lifecycle on a live project, verified by
  re-reading `list-models` after each transition. Covers publish, tag
  staging/live, moving a tag to another version, unpublish, and untag — asserting
  the published flag / tag pointer actually moved (wire-effect), not just command
  shape.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  expected_turns: 34
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I need to manage releases on an invoice project. Use the tenant I'm already
  signed into (check I'm logged in; don't re-authenticate): start a project from
  the files in `./fixtures/` — import the taxonomy, upload the three invoices —
  let it train, and get it to at least two trained versions (make a small change
  and retrain).

  Then:
  - Put the earlier version on staging and the later one on live.
  - Move live over to the other version.
  - Take the tag off one version — it should stay published.
  - Unpublish a version — it should still show up as trained.

  After each change, show me the model list so I can see the tag and published
  state actually moved.

  Delete the project when you're done.

success_criteria:
  - type: command_executed
    description: "Verified login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Published with a tag (staging/live)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+publish\b.*--tag\s+(live|staging)'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Untagged a version"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+untag\b.*--model-version'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Unpublished a version"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+unpublish\b.*--model-version'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Re-read list-models to verify each transition (multiple calls)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+list-models'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\s+.*--confirm-data-loss'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
