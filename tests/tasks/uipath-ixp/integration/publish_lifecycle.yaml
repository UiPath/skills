task_id: skill-ixp-integration-publish-lifecycle
description: >
  Integration: model publish/tag lifecycle on a live project, verified by
  re-reading `list-models` after each transition. Covers publish, tag
  staging/live, moving a tag to another version, unpublish, and untag — asserting
  the published flag / tag pointer actually moved (wire-effect), not just command
  shape.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  max_turns: 68
  task_timeout: 2400
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I need to manage releases on an invoice project. Use the tenant I'm already
  signed into (check I'm logged in; don't re-authenticate): start a project from
  the files in `./fixtures/` — import the taxonomy, upload the three invoices —
  and train it. I'll want a couple of trained versions to work with, so produce a
  second one too.

  Then:
  - Put version 1 on staging and version 2 on live, then save the model list to
    `models_tagged.json`.
  - Move live over to version 1, then save the model list to `models_after_move.json`.
  - Take the tag off version 1, but keep that version published.
  - Unpublish version 2 — don't delete it, it stays a trained version.

  After each step, show me the model list so I can see the tag and published
  state actually moved.

  Delete the project when you're done.

success_criteria:
  - type: command_executed
    description: "Published with a tag (staging/live)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+publish\b.*--tag\s+(live|staging)'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Untagged a version"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+untag\b.*--model-version'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Unpublished a version"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+unpublish\b.*--model-version'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Re-read list-models to verify each transition (multiple calls)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+list-models'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\b(?=.*(--yes|-y))'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification: tag pointers actually moved (read back via list-models) ---
  - type: json_check
    description: "After tagging: staging points to v1, live points to v2"
    path: "models_tagged.json"
    assertions:
      # `Data || @`: accept either save shape. We don't control how the agent
      # writes the file — it may store the full `list-models` response (root has
      # `Data`) or just the unwrapped payload (root IS the data). `@` is the
      # JMESPath current node, so this resolves `Tags` whichever way it was saved.
      - expression: "(Data || @).Tags[?Name=='staging'].Version | [0]"
        operator: equals
        expected: 1
      - expression: "(Data || @).Tags[?Name=='live'].Version | [0]"
        operator: equals
        expected: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "After move: the live tag now points to v1"
    path: "models_after_move.json"
    assertions:
      # `Data || @`: accept either save shape (see note above) — full response
      # root has `Data`, unwrapped payload root IS the data.
      - expression: "(Data || @).Tags[?Name=='live'].Version | [0]"
        operator: equals
        expected: 1
    weight: 2.0
    pass_threshold: 1.0
