task_id: skill-ixp-integration-name-resolution
description: >
  Integration: name/title resolution on a live tenant. The agent must resolve
  user-facing references to the ids the CLI needs — a document by FILENAME (and
  by list position) → DocumentId via `documents list`, and a project by its TITLE
  → Name via `projects list` — rather than passing the human label straight
  through. The resolution step is the integration part; smokes pass the id in the
  prompt.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  expected_turns: 24
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  Use the tenant I'm already signed into (check I'm logged in; don't
  re-authenticate). Set up an invoice project from the files in `./fixtures/` —
  import the taxonomy and upload the three invoices — and give it a friendly title
  like "IxP Int Resolve <something>". You don't need to train or label.

  I'll only refer to things by their human names — work the ids out yourself:
  - Delete the file `york_solutions_invoice.png` (I'm giving you the filename, not
    an id, so find it first).
  - Then delete the first document still left in the list.
  - Rename the project (I'll refer to it by its title, so find its actual name
    first) to "IxP Int Resolve Renamed".

  Clean up by deleting the project at the end.

  Save these so I can check them: the document list after the deletions
  (`documents_after.json`) and the project's details after the rename
  (`project_after.json`).

success_criteria:
  - type: command_executed
    description: "Verified login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed documents to resolve filename/position → DocumentId (before + after)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+documents\s+list'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted documents by resolved id (with -y)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+documents\s+delete\b.*(-y|--yes)'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed projects to resolve Title → Name"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Renamed the project via update-title"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+update-title'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Did NOT pass the raw filename through as a document id to delete"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+documents\s+delete\s+\S+\s+york_solutions_invoice\.png'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\s+.*--confirm-data-loss'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification: resolution actually deleted the named doc + renamed the project ---
  - type: file_contains
    description: "The named document is gone from the remaining list"
    path: "documents_after.json"
    excludes: ["york_solutions_invoice.png"]
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "The project was renamed to the new title"
    path: "project_after.json"
    includes: ["IxP Int Resolve Renamed"]
    weight: 2.0
    pass_threshold: 1.0
