task_id: skill-ixp-integration-name-resolution
description: >
  Integration: name/title resolution on a live tenant. The agent must resolve
  user-facing references to the ids the CLI needs — a document by FILENAME →
  DocumentId via `documents list`, and a project by its TITLE → Name via
  `projects list` — rather than passing the human label straight through. The
  resolution step is the integration part; smokes pass the id in the prompt.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  max_turns: 48
  task_timeout: 1800
  turn_timeout: 600

sandbox:
  # driver: docker (NOT tempdir) so `uip ixp` resolves the migrated in-image
  # ixp-tool, not the BYOS host's stale pre-migration plugin.
  driver: docker
  mock_path_dirs: [mocks]
  template_sources:
    - type: template_dir
      path: ../_shared/live_calls_template
    - type: template_dir
      path: ../_shared/fixtures

pre_run:
  - command: |
      set -eu
      title="codereval-integ-resolve-$(date +%s%N)"
      mkdir -p invoice_docs
      cp fixtures/*.png invoice_docs/
      created="$(uip ixp projects create "$title" invoice_docs --skip-taxonomy --output json)"
      name="$(printf '%s' "$created" | jq -r '(.Data // .data // .) | (.ProjectName // .project_name // empty)')"
      test -n "$name"
      uip ixp projects import-taxonomy "$name" fixtures/taxonomy.json --output json
      jq -n --arg project_title "$title" '{project_title: $project_title}' > seed.json
      : > mocks/calls.log
    timeout: 600

initial_prompt: |
  Use the tenant I'm already signed into (check I'm logged in; don't
  re-authenticate). An invoice project with the taxonomy and three documents
  from `./fixtures/` has already been created for this run. Its current
  user-facing title is recorded in `seed.json`. Work only on that project;
  other runs share this tenant.

  Then:
  - Delete the file `york_solutions_invoice.png`, then save the remaining document
    list to `documents_after.json`.
  - Append `-renamed` to the project's current title, then save the project's
    details to `project_after.json`.

success_criteria:
  - type: file_matches_regex
    description: "Listed documents to resolve the filename → DocumentId, then re-read to save the remaining list"
    path: "mocks/calls.log"
    pattern: >-
      (?m)(?:[\s\S]*?^(?:uip\s+ixp\s+documents\s+list)[^\r\n]*$){2}
    weight: 2.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Deleted the named document by resolved id (with -y)"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+documents\s+delete\b.*(-y|--yes))[^\r\n]*$
    weight: 2.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Listed projects to resolve Title → Name"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+projects\s+list)[^\r\n]*$
    weight: 1.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Renamed the project via update-title"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+projects\s+update-title\s+\S+-ixp\s+\S+-renamed(?:\s|$))[^\r\n]*$
    weight: 1.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Did NOT pass the raw filename through as a document id to delete"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+documents\s+delete\s+\S+\s+york_solutions_invoice\.png)[^\r\n]*$
    must_match: false
    weight: 1.5
    pass_threshold: 1.0

  # --- Outcome verification: resolution actually deleted the named doc + renamed the project ---
  - type: file_contains
    description: "york is gone from the list; the other two documents remain"
    path: "documents_after.json"
    includes: ["csi_tower_invoice.png", "hp_tax_invoice.png"]
    excludes: ["york_solutions_invoice.png"]
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "The project was renamed: title now carries the `-renamed` suffix"
    path: "project_after.json"
    includes: ["codereval-integ-resolve", "-renamed"]
    weight: 2.0
    pass_threshold: 1.0

# Best-effort cleanup of the project created by pre_run.
post_run:
  - command: |
      set +e
      title="$(jq -r '.project_title // empty' seed.json 2>/dev/null)"
      test -n "$title" || exit 0
      uip ixp projects list --output json |
        jq -r --arg title "$title" '(.Data // .data // .) | (.Projects // .projects // [])[] | select((.Title // .title) == $title or (.Title // .title) == ($title + "-renamed")) | (.Name // .name)' |
        while IFS= read -r name; do
          test -z "$name" || uip ixp projects delete "$name" -y --output json >/dev/null 2>&1
        done
      exit 0
    timeout: 60
