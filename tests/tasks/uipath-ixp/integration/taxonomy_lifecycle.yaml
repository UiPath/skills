task_id: skill-ixp-integration-taxonomy-lifecycle
description: >
  Integration: full taxonomy-editing lifecycle against a live tenant, verified by
  reading taxonomy back with `get-taxonomy` after each edit. Covers create field
  group + fields (with sensible default types), add field, rename group/field,
  change-type, bulk update-prompts, import-taxonomy round-trip, and delete group.
  Asserts only
  CLI-observable taxonomy state (names/types/instructions) and agent judgment —
  NOT backend annotation semantics.
tags: [uipath-ixp, integration, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 30
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I want to set up an invoice project with a specific taxonomy and then reshape it.
  Use the tenant I'm already signed into (check I'm logged in; don't re-authenticate).
  Create the project using the taxonomy in `./fixtures/taxonomy.json` (not an
  auto-suggested one). I only care about the taxonomy structure here, so don't
  label or train anything.

  Then make these exact edits, checking after each that it took:
  - Add a new field group "Charges" with two fields: "Discount", a plain text field,
  and "Late Fee" — pick whatever type fits that one.
  - Add a third field, "Surcharge", to "Charges".
  - Rename the group "Charges" to "Adjustments".
  - Rename the field "Late Fee" to "Penalty Fee".
  - Change "Discount" to a Number type.
  - Update the instructions on "Discount" and "Surcharge".
  - Delete the "Adjustments" group.
  - Afterwards, confirm the original invoice groups (Invoice, Bill To, Line Items,
    Ship To) are still there.

  When you're done, delete the project.

  Save these so I can check them: the taxonomy just before you delete the group
  (`taxonomy_before_delete.json`) and the taxonomy after the delete
  (`taxonomy_final.json`).

success_criteria:
  - type: command_executed
    description: "Verified login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Imported the bundled taxonomy"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+import-taxonomy'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Created a field group and added fields"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+groups\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Renamed a field group"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+groups\s+rename'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Changed a field's type with the data-loss guard"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+fields\s+change-type\b.*--confirm-data-loss'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Bulk-updated field prompts"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+fields\s+update-prompts\b.*--updates'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the field group with the data-loss guard"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+groups\s+delete\b.*--confirm-data-loss'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Read taxonomy back to verify edits (multiple get-taxonomy calls)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+get-taxonomy'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\s+.*--confirm-data-loss'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification (read-back content, not just command shape) ---
  - type: file_exists
    description: "Captured the taxonomy before deleting the group"
    path: "taxonomy_before_delete.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Rename + add landed: Adjustments / Penalty Fee / Surcharge present, old names gone"
    path: "taxonomy_before_delete.json"
    includes: ["Adjustments", "Penalty Fee", "Surcharge"]
    excludes: ["Charges", "Late Fee"]
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "change-type took effect: the Discount field is now type Number"
    path: "taxonomy_before_delete.json"
    assertions:
      - expression: "Data.dataset.label_groups[].label_defs[].moon_form[?name=='Discount'].kind | [0]"
        operator: equals
        expected: "Number"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "After delete, Adjustments is gone and the original invoice groups remain"
    path: "taxonomy_final.json"
    includes: ["Invoice", "Line Items"]
    excludes: ["Adjustments"]
    weight: 1.5
    pass_threshold: 1.0
