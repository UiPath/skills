task_id: skill-ixp-integration-taxonomy-lifecycle
description: >
  Integration: full taxonomy-editing lifecycle against a live tenant, verified by
  reading taxonomy back with `get-taxonomy` after each edit. Covers create field
  group + fields (with sensible default types), add field, rename group/field,
  change-type, bulk update-prompts (incl. Unmatched reporting), import-taxonomy
  round-trip, and delete group with an accurate cascade count. Asserts only
  CLI-observable taxonomy state (names/types/instructions) and agent judgment —
  NOT backend annotation semantics.
tags: [uipath-ixp, integration, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 30
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I want to reshape an invoice project's taxonomy. Use the tenant I'm already
  signed into (check I'm logged in; don't re-authenticate). Spin up a fresh
  project from `./fixtures/` and import its `taxonomy.json` rather than letting it
  auto-suggest one. This is taxonomy editing only — you don't need to train or
  label anything (the sample invoices are just there so the project can be created).

  Then make these exact edits, checking after each that it took:
  - Add a new field group "Charges" with two fields, "Discount" and "Late Fee" —
    don't specify their types; let the skill pick sensible ones that fit.
  - Add a third field, "Surcharge", to "Charges".
  - Rename the group "Charges" to "Adjustments" — its three fields should carry over.
  - Rename the field "Late Fee" to "Penalty Fee".
  - Change the "Discount" field's type to "Number" — warn me first that it's destructive.
  - Update the instructions on "Discount" and "Surcharge" in one call, and include
    a field named "Nonexistent Field" that isn't in the taxonomy — I want that name
    to come back as unmatched, not a silent failure.
  - Tell me exactly how many fields are in "Adjustments", then delete that group.
  - Finally, show me the taxonomy still has the original invoice groups (Invoice,
    Bill To, Line Items, Ship To).

  When you're done, delete the project.

success_criteria:
  - type: command_executed
    description: "Verified login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Imported the bundled taxonomy"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+import-taxonomy'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Created a field group and added fields"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+groups\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Renamed a field group"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+groups\s+rename'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Changed a field's type with the data-loss guard"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+fields\s+change-type\b.*--confirm-data-loss'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Bulk-updated field prompts"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+fields\s+update-prompts\b.*--updates'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the field group with the data-loss guard"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+groups\s+delete\b.*--confirm-data-loss'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Read taxonomy back to verify edits (multiple get-taxonomy calls)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+get-taxonomy'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\s+.*--confirm-data-loss'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
