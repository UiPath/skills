task_id: skill-ixp-integration-labelling-correctness
description: >
  Integration: labelling correctness on a live trained project with a repeatable
  field group (Line Items). Verifies per-occurrence confirm targeting (only the
  chosen occurrences are confirmed), OCR-correction forwarding across occurrences
  under `--group`, unconfirm rollback, and mark-missing — each checked by
  re-reading `get-predictions`. These are CLI payload-construction behaviors, not
  backend semantics.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  expected_turns: 34
  turn_timeout: 900

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  Set up a trained invoice project so I can clean up its labelling. Use the
  tenant I'm already signed into (check I'm logged in; don't re-authenticate):
  start a project from the files in `./fixtures/` — import the taxonomy and
  upload the three invoices — and give it time to train before looking at
  predictions.

  Then, on `csi_tower_invoice.png` (the multi-line invoice):
  - Confirm only the first line item — the other rows look wrong, leave them.
  - The "Amount" field was mis-read by OCR on the first two line items; correct it
    on both of them in one batched call, and save that command's JSON response to
    `confirm_result.json`.
  - Actually, scrap that — roll back everything you just confirmed on this document.
  - The "Receipt Number" field isn't on this document at all — mark it missing, and
    save that response to `mark_missing_result.json`.

  Clean up by deleting the project when you're done.

success_criteria:
  - type: command_executed
    description: "Verified login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Fetched predictions to inspect occurrences (multiple calls: before + after mutations)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+labellings\s+get-predictions'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Confirmed a single occurrence via --group + --occurrence"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+labellings\s+confirm\b(?=.*--group)(?=.*--occurrence)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Batched confirm with --updates carrying a corrections entry across occurrences"
    tool_name: "Bash"
    command_pattern: '(?s)(uip|\$UIP)\s+ixp\s+labellings\s+confirm\b.*--group.*--updates.*corrections'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Rolled back with unconfirm"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+labellings\s+unconfirm'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Marked a genuinely-absent field missing"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+labellings\s+mark-missing\b.*--fields'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\s+.*--confirm-data-loss'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification: the mutating calls actually succeeded ---
  # (annotation state isn't readable via any uip command, so the verifiable
  #  outcome is the write response itself returning Result == Success)
  - type: json_check
    description: "Batched per-occurrence correction confirm succeeded"
    path: "confirm_result.json"
    assertions:
      - expression: "Result"
        operator: equals
        expected: "Success"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "mark-missing succeeded"
    path: "mark_missing_result.json"
    assertions:
      - expression: "Result"
        operator: equals
        expected: "Success"
    weight: 2.0
    pass_threshold: 1.0
