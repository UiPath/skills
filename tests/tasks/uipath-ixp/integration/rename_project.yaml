task_id: skill-ixp-integration-rename-project
description: >
  Integration: project title rename on a live tenant. The agent creates an
  isolated project, renames it using the Name returned by create, and verifies
  the resulting project details.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  max_turns: 48
  task_timeout: 1800
  turn_timeout: 600

sandbox:
  # driver: docker (NOT tempdir) so `uip ixp` resolves the migrated in-image
  # ixp-tool, not the BYOS host's stale pre-migration plugin.
  driver: docker
  python: {}
  mock_path_dirs: [mocks]
  template_sources:
    - type: template_dir
      path: ../_shared/live_calls_template
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  Use the tenant I'm already signed into (check I'm logged in; don't
  re-authenticate). Set up an invoice project from the files in `./fixtures/` —
  import the taxonomy and upload the three invoices — and give it a unique title
  `codereval-integ-resolve-<random-suffix>` so concurrent runs don't collide.

  Right after the project is created, write `report.json` for cleanup:
  {"project_name": "<the ProjectName from the create response>"}.

  Append `-renamed` to the project's title, then save the project's details to
  `project_after.json`.

success_criteria:
  - type: file_matches_regex
    description: "Renamed the project via update-title using its Name"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+projects\s+update-title\s+\S+-ixp\s+\S+-renamed(?:\s|$))[^\r\n]*$
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json written for post-run cleanup"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "The project was renamed: title now carries the `-renamed` suffix"
    path: "project_after.json"
    includes: ["codereval-integ-resolve", "-renamed"]
    weight: 2.0
    pass_threshold: 1.0

# Safety net: delete the project even if the agent's in-band cleanup never ran.
post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-ixp/_shared/cleanup_project.py"
    timeout: 60
