task_id: skill-ixp-taxonomy-edit-chain-smoke
description: >
  Smoke: agent builds a small taxonomy with `data-types add` then
  `groups add --fields '[…]'` referencing the new type by name.
  The new type is a money-kind type the agent SHOULD create — not a
  generic clone of the built-in `Monetary Quantity`, but a reusable
  concept carrying its own extraction instructions (the value-adding
  branch of Critical Rule 17; the plain-amount
  reuse-the-default branch is covered by reuse_default_type.yaml).
  Anti-pattern: `fields add` only edits fields in an existing
  group, so it can't seed a brand-new one.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:execute]

agent:
  type: claude-code

sandbox:
  driver: tempdir
  python: {}
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  On project `my_invoices-f1afa9ef-ixp`, set up the taxonomy for
  withholding-tax reconciliation:

  1. Create a reusable money-kind data type named `Withholding Tax
     Amount` with instructions: "A monetary amount representing tax
     withheld at source and remitted on the payer's behalf — distinct
     from the invoice total or the sales-tax line. Reuse for every
     withholding-tax figure in the project."

  2. Create an `Invoice Header` field group with one field — `Tax
     Withheld`, which should use the `Withholding Tax Amount` data
     type — and group instructions "Header fields covering the
     invoice's tax and withholding figures."

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP
    tenant in this environment. Commands will fail with auth errors
    — that is expected. Run each command once and move on. Do NOT
    retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated
    test.

success_criteria:
  # Step 1: data-types add with --kind money AND --instructions (the
  # tailored guidance is the reason to create it rather than reuse the
  # default). Money kind does NOT take --input-value (text/choice only
  # — the CLI rejects it otherwise), so no input-value criterion here.
  - type: file_matches_regex
    description: "Agent created the Withholding Tax Amount money type via data-types add --kind money with tailored --instructions"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+data-types\s+add\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*--name\s+["']?Withholding Tax Amount)(?=.*--kind\s+money)(?=.*--instructions).*)[^\r\n]*$
    weight: 3.0
    pass_threshold: 1.0

  # Step 2: groups add must happen, with --instructions AND a --fields
  # JSON array. The JSON must reference the data type by its name.
  - type: file_matches_regex
    description: "Agent created the Invoice Header group via groups add with --instructions and --fields"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+groups\s+add\s+["']?my_invoices-f1afa9ef-ixp["']?\s+.*--name\s+["']?Invoice Header["']?.*--instructions.*--fields)[^\r\n]*$
    weight: 3.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "groups add --fields JSON referenced the Withholding Tax Amount data type for the Tax Withheld field"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+groups\s+add\b(?=.*--fields\s+[^|;&]*Tax Withheld[^|;&]*Withholding Tax Amount).*)[^\r\n]*$
    weight: 2.0
    pass_threshold: 1.0

  # Anti-pattern: don't reach for `fields add` to put a field in a
  # group that doesn't exist yet. `groups add --fields` is the
  # one-shot path for creating a new group with its fields.
  - type: file_matches_regex
    description: "Agent did NOT use `fields add` to seed a non-existent group"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+fields\s+add\s+["']?my_invoices-f1afa9ef-ixp["']?\s+.*--group\s+["']?Invoice Header["']?)[^\r\n]*$
    must_match: false
    weight: 1.5
    pass_threshold: 1.0
