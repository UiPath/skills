task_id: skill-ixp-taxonomy-edit-chain-smoke
description: >
  Smoke: agent builds a small taxonomy with `data-types add` then
  `groups add --fields '[…]'` referencing the new type by name.
  Uses a Choice type — the one `--kind` with no built-in default, so
  creating it is correct (unlike money/number/date/text/boolean, which
  must reuse a default — Critical Rule 16 / ACTV-89215).
  Anti-pattern: `fields add` only edits fields in an existing
  group, so it can't seed a brand-new one.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:execute]

agent:
  type: claude-code

sandbox:
  driver: tempdir
  python: {}
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  On project `my_invoices-f1afa9ef-ixp`, set up the taxonomy for
  classifying incoming documents:

  1. Create a reusable `Document Category` data type — a Choice type
     whose values are `Invoice`, `Credit Note`, and `Purchase Order`.
     The category is inferred from the document's layout, so it need
     not appear verbatim. Instructions: "The kind of commercial
     document, inferred from its header and layout."

  2. Create an `Invoice Header` field group with one field — `Category`,
     which should use the `Document Category` data type — and group
     instructions "Header fields that classify and summarise the
     document."

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP
    tenant in this environment. Commands will fail with auth errors
    — that is expected. Run each command once and move on. Do NOT
    retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated
    test.

success_criteria:
  # Step 1: data-types add for a Choice type. Choice is the only kind
  # with no built-in default, so creating it is the right call. It
  # requires --choices and --input-value (the prompt says inferred).
  - type: command_executed
    description: "Agent created the Document Category choice type via data-types add --kind choice --choices"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+data-types\s+add\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*Document Category)(?=.*--kind\s+choice)(?=.*--choices)(?=.*Invoice)(?=.*Credit Note)(?=.*Purchase Order)(?=.*--input-value\s+inferred)(?=.*--instructions).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  # Step 2: groups add must happen, with --instructions AND a --fields
  # JSON array. The JSON must reference the data type by its name.
  - type: command_executed
    description: "Agent created the Invoice Header group via groups add with --instructions and --fields"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+groups\s+add\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+.*--name\s+["'']?Invoice Header["'']?.*--instructions.*--fields'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "groups add --fields JSON referenced the Document Category data type for the Category field"
    tool_name: "Bash"
    command_pattern: '--fields\s+[^|;&]*Category[^|;&]*Document Category'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Anti-pattern: don't reach for `fields add` to put a field in a
  # group that doesn't exist yet. `groups add --fields` is the
  # one-shot path for creating a new group with its fields.
  - type: command_not_executed
    description: "Agent did NOT use `fields add` to seed a non-existent group"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+fields\s+add\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+.*--group\s+["'']?Invoice Header["'']?'
    weight: 1.5
    pass_threshold: 1.0
