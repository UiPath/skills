task_id: skill-ixp-delete-document-smoke
description: >
  Smoke: agent deletes a document by id with
  `uip ixp documents delete <Name> <document-id>`. Irreversible — triggers a
  retrain. (Resolving a document by filename or list position is a separate,
  auth-dependent concern — covered in integration.)

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

initial_prompt: |
  In the IXP project my_invoices-f1afa9ef-ixp, delete document doc-abc-123.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent deleted the document via `documents delete <Name> doc-abc-123`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+documents\s+delete\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*doc-abc-123).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
