task_id: skill-ixp-untag-smoke
description: >
  Smoke: agent removes a model tag with
  `uip ixp projects untag <Name> --tag live`. Removing a tag drops only the
  tag pointer — the model version stays published, so the agent must NOT
  reach for `unpublish` or `delete`.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

initial_prompt: |
  The IXP project named `my_invoices-f1afa9ef-ixp` has its `live` tag on
  model version 27. Remove the `live` tag from the project — the model
  version itself must stay published; only the tag should be removed.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent removed the live tag via `projects untag <Name> --tag live`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+untag\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*--tag\s+["'']?live\b).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  # Anti-pattern guard: removing a tag is NOT unpublishing or deleting.
  - type: command_not_executed
    description: "Agent did NOT unpublish or delete (untag must not unpin or destroy the version)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+(projects\s+unpublish|projects\s+delete|documents\s+delete)\b'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
