task_id: skill-ixp-delete-project-smoke
description: >
  Smoke: agent deletes a project — destructive and irreversible, so it must
  pass -y/--yes (the CLI refuses without it), acknowledging the
  data loss.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

sandbox:
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  Delete the IXP project my_invoices-f1afa9ef-ixp.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: file_matches_regex
    description: "Agent deleted the project via `projects delete … -y/--yes`"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+projects\s+delete\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*(--yes\b|-y\b)).*)[^\r\n]*$
    weight: 3.0
    pass_threshold: 1.0
