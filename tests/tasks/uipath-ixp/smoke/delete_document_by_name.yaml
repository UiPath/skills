task_id: skill-ixp-delete-document-by-name-smoke
description: >
  Smoke: agent deletes a document referenced by filename — looks up the
  DocumentId via `documents list`, then `documents delete <Name> <DocumentId>`.
  Trap: the agent must NOT pass the filename straight through as the
  document-id; it must resolve the name to an id first.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 6

initial_prompt: |
  In the IXP project my_invoices-f1afa9ef-ixp, delete the file named
  invoice_042.pdf.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent deleted a document via `documents delete`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+documents\s+delete\b(?=.*my_invoices-f1afa9ef-ixp).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent resolved the filename to a DocumentId via `documents list`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+documents\s+list\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
