task_id: skill-ixp-confirm-predictions-smoke
description: >
  Smoke: agent reviews predictions and picks the right verdict per
  field — correct → `confirm --fields`; OCR-mangled → `confirm
  --corrections` (Rule 8); wrong-field prediction → left
  unannotated (Rule 11 — agent reviews, doesn't extract).

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:execute]

run_limits:
  expected_turns: 6

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  Review the IXP model's predictions for document `doc-abc-123` on
  project `my_invoices-f1afa9ef-ixp` and record your verdict in the
  labelling system.

  Document content (verbatim from the invoice header):

      Invoice Number: INV-2025-0042
      Invoice Date:   2025-01-15
      Vendor:         Beta Industries Inc.
      Total:          $12,000.00

  IXP model predictions:
  - Invoice Number (field id `f-001`): `INV-2025-0042`
  - Invoice Date (field id `f-002`): `2025-01-15`
  - Total Amount (field id `f-003`): `$1,200.00`
    (the model located the Total line but the OCR mis-read the digits)
  - Vendor Name (field id `f-004`): `Acme Corp`

  Compare each prediction to the document and record your verdict.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: file_matches_regex
    description: "Agent invoked `uip ixp labellings confirm <project> <document>` with --fields"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+labellings\s+confirm\s+["']?my_invoices-f1afa9ef-ixp["']?\s+["']?doc-abc-123["']?\s+.*--fields)[^\r\n]*$
    weight: 2.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "--fields flag value includes f-001 (cleanly-correct Invoice Number)"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+labellings\s+confirm\b(?=.*--fields\s+[^|;&]*f-001).*)[^\r\n]*$
    weight: 1.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "--fields flag value includes f-002 (cleanly-correct Invoice Date)"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+labellings\s+confirm\b(?=.*--fields\s+[^|;&]*f-002).*)[^\r\n]*$
    weight: 1.5
    pass_threshold: 1.0

  # At least one confirm-with-fields call must NOT include f-004 (wrong-field
  # prediction must be skipped per Rule #8). The calls.log regex filters
  # f-004-bearing calls.log entries, so a single confirm that includes f-004 yields 0
  # matches and fails. Weakness: if the agent issues multiple confirms, a
  # clean one masks a dirty one.
  - type: file_matches_regex
    description: "Confirm-with-fields call excludes f-004 (wrong-field prediction must be skipped)"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?![^\r\n]*(?:f-004))(?=[^\r\n]*(?:uip\s+ixp\s+labellings\s+confirm\s+["']?my_invoices-f1afa9ef-ixp["']?\s+["']?doc-abc-123["']?\s+.*--fields))[^\r\n]*$
    weight: 2.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Agent passed --corrections with the OCR-mangled field's corrected value"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+labellings\s+confirm\b(?=.*--corrections\s+.*f-003.*\$?12,?000\.00).*)[^\r\n]*$
    weight: 2.0
    pass_threshold: 1.0
