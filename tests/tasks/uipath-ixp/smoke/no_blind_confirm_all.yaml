task_id: skill-ixp-no-blind-confirm-all-smoke
description: >
  Smoke: confirming reviewed documents must be done per-document (a
  `<document-id>` is always passed). The agent must NOT run `confirm` with only
  the project and no document-id, which confirms every document at once and
  bypasses per-document review (Critical Rule 15).

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:execute]

run_limits:
  expected_turns: 6

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  In project `my_invoices-f1afa9ef-ixp` I have reviewed three documents —
  `doc-001`, `doc-002`, `doc-003` — and every predicted field on each is
  correct. Confirm their predictions as ground truth.

  The `uip` CLI is available but is NOT connected to a tenant here: commands
  fail with auth errors — expected; run each once, don't retry or log in. Don't
  prompt for confirmation.

success_criteria:
  - type: command_executed
    description: "Agent confirmed per-document, passing a <document-id> each time"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+labellings\s+confirm\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+["'']?doc-00[123]\b'
    min_count: 3
    weight: 3.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent did NOT run the all-documents confirm (project only, no document-id)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+labellings\s+confirm\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s*(--|$)'
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
