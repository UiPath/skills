task_id: skill-ixp-update-prompts-heredoc-smoke
description: >
  Smoke: agent improves a per-field instruction with
  `fields update-prompts --updates`. The skill constructs the JSON via
  heredoc; the grader verifies the complete expanded payload received by
  the CLI mock instead of matching the agent's shell spelling.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:edit]

run_limits:
  expected_turns: 8

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  The InvoiceNumber field on IXP project `my_invoices-f1afa9ef-ixp` is
  scoring poorly. Validation shows the model is confusing the Purchase
  Order (PO) number with the Invoice Number. Update the field instruction
  to clarify:

    "Extract the unique invoice identifier from the document header.
    Do NOT use the Purchase Order (PO) number, even if it is the most
    visually prominent number on the page."

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: file_matches_regex
    description: "Agent invoked `fields update-prompts` with --updates on the project"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+fields\s+update-prompts\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*--updates).*)[^\r\n]*$
    weight: 2.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Expanded --updates payload targets InvoiceNumber with the requested instruction"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+fields\s+update-prompts\b(?=.*--updates)(?=.*InvoiceNumber)(?=.*Extract the unique invoice identifier)(?=.*Purchase Order).*)[^\r\n]*$
    weight: 2.5
    pass_threshold: 1.0
