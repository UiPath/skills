task_id: skill-ixp-extract-runtime-smoke
description: >
  Smoke: agent picks `uip ixp extract <project> <file> --tag <tag>`
  to run runtime extraction against a published model, and does NOT
  substitute `labellings get-predictions` (which is for the training
  set, not a fresh runtime file).

  Harness is unauthenticated; CLI calls fail with auth/file errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:operate, lifecycle:discover]

run_limits:
  expected_turns: 4

initial_prompt: |
  A document automation engineer has a published IXP model on project
  `my_invoices-f1afa9ef-ixp` (tag `live`). They want to run that
  deployed model on a single new document, `./invoice.pdf`, and see the
  extracted field values.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth or file errors —
    that is expected. Run each command once and move on. Do NOT retry or
    attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran `uip ixp extract` with a model selector (--tag or --version)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+extract\s+.*--(tag|version)\b'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on the extract call"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+extract\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Runtime extraction is `extract`, not `get-predictions` (the latter
  # returns predictions on already-uploaded training docs). Guard the
  # agent against substituting the design-time command.
  - type: command_not_executed
    description: "Agent did NOT use `labellings get-predictions` for a fresh runtime file"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+labellings\s+get-predictions'
    weight: 1.5
    pass_threshold: 1.0
