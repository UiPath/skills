task_id: skill-ixp-list-documents-smoke
description: >
  Smoke: agent lists the documents in a project.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:operate, lifecycle:setup]

run_limits:
  expected_turns: 5

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  In the IXP project my_invoices-f1afa9ef-ixp, list all documents.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: run_command
    description: "Agent listed documents via `documents list <Name>`"
    command: |
      python3 mocks/check_calls.py --min-count 1 <<'REGEX'
      uip\s+ixp\s+documents\s+list\b(?=.*my_invoices-f1afa9ef-ixp).*
      REGEX
    timeout: 5
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
