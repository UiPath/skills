task_id: skill-ixp-rename-project-smoke
description: >
  Smoke: agent renames a project's title via `update-title`.
  Trap: the agent must NOT delete/recreate.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

sandbox:
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  Rename the IXP project my_invoices-f1afa9ef-ixp to "amazing IXP project".

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: file_matches_regex
    description: "Agent renamed the project via `projects update-title … \"amazing IXP project\"`"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+projects\s+update-title\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*amazing IXP project).*)[^\r\n]*$
    weight: 3.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Agent did NOT delete the project (rename must not destroy it)"
    path: "mocks/calls.log"
    pattern: >-
      (?m)^(?:uip\s+ixp\s+projects\s+delete\b)[^\r\n]*$
    must_match: false
    weight: 1.0
    pass_threshold: 1.0
