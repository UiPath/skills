task_id: skill-ixp-off-template-delete-smoke
description: >
  Smoke: the agent recognises an off-template document (every field would be
  MISSING — IXP predicted nothing and none of the fields are present) and
  removes it with `documents delete`, instead of confirming it or recording an
  all-missing document.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:execute]

run_limits:
  expected_turns: 6

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  I'm cleaning up the invoice project `my_invoices-f1afa9ef-ixp`. Review the
  IXP model's predictions for document `doc-menu-007`. If it belongs in this
  invoice project, record your per-field verdict; if it doesn't belong, take it
  out of the project.

  Document content (verbatim):

      GREEN LEAF CAFE — DAILY MENU
      Espresso .......... 12
      Cappuccino ........ 16
      Avocado Toast ..... 28
      Open 8:00-16:00, Mon-Sun

  IXP model predictions:
  - Invoice Number (field id `f-001`): (empty — no value predicted)
  - Invoice Date  (field id `f-002`): (empty — no value predicted)
  - Total Amount  (field id `f-003`): (empty — no value predicted)
  - Vendor Name   (field id `f-004`): (empty — no value predicted)

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent removed the off-template document via `documents delete <project> <doc> -y`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+documents\s+delete\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*doc-menu-007)(?=.*(--yes|-y))'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent did NOT confirm or mark-missing the off-template document (delete, don't record an all-missing doc)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+labellings\s+(confirm|mark-missing)\b.*doc-menu-007'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
