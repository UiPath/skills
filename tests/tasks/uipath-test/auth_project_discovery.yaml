task_id: skill-test-auth-project-discovery
description: >
  Smoke test: agent uses the uipath-test skill to verify authentication first
  and list Test Manager projects. Validates Critical Rule #1 ("always check
  login first") and the core `uip tm project list` workflow with --output json.
tags: [uipath-test, smoke, auth, project]

sandbox:
  driver: tempdir
  python: {}
  node:
    env_packages:
      - "@uipath/cli"

initial_prompt: |
  Before starting, load the uipath-test skill and follow its workflow.

  I want to see my UiPath Test Manager projects. Help me discover what I have
  access to.

  Save a summary of what you did to report.json:
  {
    "login_checked": <true if you verified auth status before any tm command, else false>,
    "project_count": <number of projects found, or 0 if auth error>,
    "commands_used": ["<list of uip commands you ran, verbatim>"]
  }

  Important:
  - This sandbox has no live tenant connection. Run each command once,
    capture the full output (including any error) in report.json, then
    continue to the next step. Do NOT retry or attempt interactive login.
  - Use `--output json` on every uip command.

success_criteria:
  - type: command_executed
    description: "Agent checked login status first (Critical Rule #1)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed Test Manager projects with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+project\s+list.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on tm commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json confirms login was checked first and logs the commands run"
    path: "report.json"
    assertions:
      - expression: "login_checked"
        operator: equals
        expected: true
      - expression: "length(commands_used)"
        operator: gte
        expected: 2
    weight: 2.0
    pass_threshold: 1.0
