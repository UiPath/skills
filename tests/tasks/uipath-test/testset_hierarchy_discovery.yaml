task_id: skill-test-testset-hierarchy-discovery
description: >
  Smoke test: agent uses the uipath-test skill to traverse the Test Manager
  discovery chain — project → testset → test cases in testset. Validates
  Critical Rule #7 ("discover before assuming") and the correct `uip tm`
  list command syntax for project, testset, and testset list-testcases.
tags: [uipath-test, smoke, testset, discovery]

sandbox:
  driver: tempdir
  python: {}
  node:
    env_packages:
      - "@uipath/cli"

initial_prompt: |
  Before starting, load the uipath-test skill and follow its workflow.

  I have a UiPath Test Manager project called "InvoiceAutomation". I want to
  see the test sets in it and, for the first test set, the test cases inside
  it. Walk the full discovery hierarchy.

  Note: the CLI is not connected to a live tenant here, so commands will fail
  with auth errors — that's expected. Still run the full discovery chain and
  record every command you attempted.

  Save a summary of what you did to report.json:
  {
    "project_key_used": "<the project key you discovered or attempted>",
    "testsets_found": <number of testsets returned, or 0 if auth error>,
    "first_testset_key": "<the test set key you used to list test cases>",
    "testcases_found": <number of test cases in that test set, or 0 if auth error>,
    "commands_used": ["<list of uip tm commands you ran, verbatim>"]
  }


success_criteria:
  - type: command_executed
    description: "Agent looked up the project with --filter (discover-before-assume)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+project\s+list.*--filter'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test sets scoped to the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testset\s+list.*--project-key'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test cases in a test set using --test-set-key"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testset\s+list-testcases.*--test-set-key'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on tm commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json records the project key used and the full command chain"
    path: "report.json"
    assertions:
      - expression: "length(commands_used)"
        operator: gte
        expected: 3
    weight: 2.0
    pass_threshold: 1.0
