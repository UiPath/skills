task_id: skill-test-testset-hierarchy-discovery
description: >
  Smoke test: agent uses the uipath-test skill to enter the Test Manager
  discovery chain. The smoke runner's tenant may not have Test Manager
  provisioned, so the required assertion is the correct project-list entry
  command with `--output json`. When the tenant is provisioned, the skill's
  documented workflow continues project → testsets → testcases.
tags: [uipath-test, smoke, mode:operate, lifecycle:discover, feature:test-case]

agent:
  type: claude-code

run_limits:
  max_turns: 30

sandbox:
  driver: tempdir
  python: {}
  node:
    env_packages:
      - "@uipath/test-manager-tool"

initial_prompt: |
  Before starting, load the uipath-test skill and follow its workflow.

  Walk me through the structure of one of my UiPath Test Manager projects.
  Find a project that actually has test sets, list its test sets, and for
  the first test set show me the test cases inside.
  If Test Manager is not enabled for the available tenant, report that after
  the project-list command instead of switching to unrelated APIs.

success_criteria:
  - type: command_executed
    description: "Agent looked up Test Manager projects with `--output json` (Critical Rule #2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+project\s+list.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
