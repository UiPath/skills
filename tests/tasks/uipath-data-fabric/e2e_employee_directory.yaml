task_id: skill-datafabric-e2e-employee-directory
description: >
  E2E scenario: agent builds an employee directory in Data Fabric from
  scratch — designs an entity schema with the full advanced-field surface
  (lengthLimit on every STRING, decimalPrecision + minValue + maxValue on
  Salary, a HeadshotPhoto FILE field bound to EntityAttachment), bulk-
  imports 20 employees from a generated CSV (4 departments, 5 each),
  evolves the schema by adding a PerformanceScore INTEGER (minValue 0,
  maxValue 100) post-import, updates 6 employees with scores, queries top
  performers and paginated department listings, and produces a workforce
  summary. Tests entity schema evolution with live data, CSV bulk import,
  addFields-with-constraints after insert, FILE-field schema (no upload —
  CLI upload is in Not Supported), batch updates, and filter+sort queries
  in a single end-to-end run.
tags: [uipath-data-fabric, e2e, employee-directory]

run_limits:
  max_turns: 50
  turn_timeout: 1200

initial_prompt: |
  HR needs a digital employee directory in UiPath Data Fabric.

  Make a list called `CE_EmployeeDirectory` with these fields:
    - Full name — required, no longer than 200 characters
    - Department — required, no longer than 50 characters (one of:
      Engineering, Sales, Finance, HR)
    - Job title — no longer than 100 characters
    - Hire date — just the date, no time of day
    - Salary — required, in dollars, two decimal places, between
      $0 and $1,000,000

  Then bulk-load 20 employees from a CSV file you generate
  (`employees.csv`):
    - 5 per department
    - Realistic names and job titles (Software Engineer, Account
      Executive, etc.)
    - Hire dates spread across 2020 to 2024
    - Salaries in the $45k–$120k range

  After the import, add one more field — a performance score (0 to
  100) — and set scores between 70 and 98 on 6 employees spanning
  all four departments.

  Then two quick queries for me:
    1. Top performers (score above 85), highest first.
    2. Headcount per department — one query per department.

  When you're done, save `report.json`:
    {
      "entity_id": "<created-entity-id>"
    }

  Leave the list in place when you're done — I'll wipe it later
  using the entity ID from `report.json`.

success_criteria:
  - type: command_executed
    description: "Agent created the entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent imported employees from CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added PerformanceScore field after initial import"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+update'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated employee records with performance scores"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried employees with filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entity create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used addFields key when evolving schema"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*addFields'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied lengthLimit on STRING fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied decimalPrecision on Salary"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*decimalPrecision'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied minValue / maxValue on a numeric field (Salary on create or PerformanceScore on addFields)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0


  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "employees.csv was generated"
    path: "employees.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "employees.csv has 20 data rows (header + 20)"
    command: "awk 'END { exit (NR == 21 ? 0 : 1) }' employees.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was written so cleanup can delete the entity"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_EmployeeDirectory"
    timeout: 60
    fail_on_error: false

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_EmployeeDirectory"
    timeout: 60
