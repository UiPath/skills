task_id: skill-datafabric-smoke-files
description: >
  Smoke test: agent uses the uipath-data-fabric skill to manage file attachments
  offline — create a local test file, upload it to a FILE-type field on a record
  using files upload, download it back using files download with --destination,
  and delete the attachment using files delete. Tests correct files command
  syntax: positional args (entity-id record-id field-name), --file flag for
  upload, --destination flag for download, and --output json on all commands.
tags: [uipath-data-fabric, smoke, files, mode:build, lifecycle:setup]
run_limits:
  max_turns: 30

initial_prompt: |
  Heads-up — I'm just sketching this out before I've actually logged in, so every command will error on auth. Don't worry about that, and please don't retry or try to log in — I just want to see the right steps in order.

  There is an entity "Documents" with entity ID "doc-001-ent".
  It has a FILE-type field named "Attachment".
  There is a record with ID "rec-001-id" in that entity.

  Could you:
    - Make a small `test_upload.txt` locally with some text.
    - Attach it to that row.
    - Pull it back down as `downloaded.txt`.
    - Then remove the attachment.

  Column names are case-sensitive — please use exactly `Attachment`.

success_criteria:
  - type: file_exists
    description: "test_upload.txt was created locally"
    path: "test_upload.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded file using files upload with --file flag"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent downloaded file using files download with --destination flag"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+download\s+.*--destination'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted file attachment using files delete"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+files\s+delete\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
