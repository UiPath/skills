task_id: skill-datafabric-e2e-loan-processing
description: >
  E2E scenario: agent builds a loan application tracker in Data Fabric from
  scratch — designs the entity schema, inserts 10 loan applications with
  varying credit scores and statuses, processes the pending pipeline by
  approving applications with CreditScore >= 700 and rejecting the rest,
  uploads a supporting document to one approved application, and produces
  a final pipeline summary with counts by status. Tests the full
  Discover → Act → Verify loop for a realistic loan processing use case.
tags: [uipath-data-fabric, e2e, loan-processing]

agent:
  type: claude-code
  max_turns: 50
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Our lending team needs a loan application tracker in UiPath Data Fabric.
  Load the uipath-data-fabric skill before starting.

  Each application has: applicant name, requested loan amount (decimal),
  status (Pending / Approved / Rejected), credit score (integer), and
  application date. The entity also needs a FILE field for supporting documents.

  Insert 10 loan applications: all start as Pending, with credit scores
  ranging from 580 to 780 (at least 4 below 700, at least 4 at or above 700).
  Use realistic applicant names and loan amounts between $5,000 and $50,000.

  Then process the pipeline:
  - Query all Pending applications.
  - Approve those with CreditScore >= 700 (update Status to "Approved").
  - Reject those with CreditScore < 700 (update Status to "Rejected").
  - Upload a placeholder file (terms.pdf — create it locally) to the
    supporting document field of the first approved application.
  - Verify the final state: no applications should remain as Pending.

  Save a summary to report.json:
  {
    "entity_id": "<LoanApplications entity ID>",
    "total_applications": 10,
    "approved_count": <number approved>,
    "rejected_count": <number rejected>,
    "pending_remaining": 0,
    "document_uploaded_to": "<applicant name of the application that got the file>",
    "highest_approved_credit_score": <integer>,
    "lowest_rejected_credit_score": <integer>
  }

  Do NOT delete the entity.

success_criteria:
  - type: command_executed
    description: "Agent created the entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted loan applications"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried Pending applications with filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated application statuses (Approved + Rejected)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 3
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded supporting document"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "All 10 applications processed, none remaining as Pending"
    path: "report.json"
    assertions:
      - expression: "total_applications"
        operator: equals
        expected: 10
      - expression: "pending_remaining"
        operator: equals
        expected: 0
      - expression: "approved_count"
        operator: gte
        expected: 1
      - expression: "rejected_count"
        operator: gte
        expected: 1
    weight: 5.0
    pass_threshold: 0.75

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities.py"
    timeout: 60
