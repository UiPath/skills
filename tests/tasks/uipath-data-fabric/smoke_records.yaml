task_id: skill-datafabric-smoke-records
description: >
  Smoke test: agent uses the uipath-data-fabric skill to manage records offline
  — single insert (JSON object), batch insert (2+ element JSON array routes to
  batch endpoint), filterGroup query, cursor-based pagination (--limit/--cursor),
  records get by ID, single update (Id required), batch update (Id required in
  every element), and records delete. Tests the full records command surface
  and the array-body routing rule in a single pass.
tags: [uipath-data-fabric, smoke, records]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Before starting, load the uipath-data-fabric skill and follow its workflow.

  There is a "Tasks" entity with entity ID "task-001-ent".
  Fields: Title (STRING), Priority (INTEGER), Done (BOOLEAN).

  Do the following in order:
  1. Insert a single record using a JSON object body:
       { "Title": "Write tests", "Priority": 1, "Done": false }
  2. Batch-insert 2 more records in one command using a JSON array (2+ elements
     routes to the batch endpoint):
       - { "Title": "Review PR",  "Priority": 2, "Done": false }
       - { "Title": "Deploy",     "Priority": 3, "Done": false }
  3. Retrieve the single record from step 1 by ID using records get.
     Use placeholder record ID "id-single" since the CLI is offline.
  4. Query all records where Done = false. Use filterGroup syntax with
     logicalOperator and queryFilters.
  5. List the first page of all records with --limit 10.
  6. Update the record from step 1: set Done = true.
     Use placeholder record ID "id-single" in the "Id" field of the body.
  7. Batch-update the 2 records from step 2: set Done = true for each.
     Use placeholder IDs "id-2" and "id-3". Every object in the array must
     include "Id" — the CLI rejects any array element missing it.
  8. Delete the record from step 1 using records delete.
     Use placeholder record ID "id-single".

  Save a summary to report.json:
  {
    "commands_used": ["<list of uip df commands you ran in order>"],
    "single_insert_uses_object": true,
    "batch_insert_uses_array": true,
    "get_used_record_id": true,
    "query_filter": { ... the filterGroup JSON used ... },
    "pagination_method": "cursor",
    "single_update_body_has_id": true,
    "batch_update_all_have_id": true,
    "delete_attempted": true
  }

  Important:
  - The uip CLI is available but is NOT connected to a live Data Fabric tenant.
    Commands will fail with auth errors — that is expected.
    Run each command once, record the result in report.json, and move on.
    Do NOT retry or attempt to login.
  - Use --output json on every uip df command.
  - Pagination must use --limit and --cursor CLI flags, not body keys.
  - Every record in a batch update must include "Id".

success_criteria:
  - type: command_executed
    description: "Agent inserted a record"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved a record by ID with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+get\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried records using filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed records with --limit (cursor pagination)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*--limit'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated records (single and batch)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted a record with records delete"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+delete'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Query body uses filterGroup key"
    path: "report.json"
    includes:
      - "filterGroup"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Array routing, cursor pagination, Id in update bodies, and delete confirmed"
    path: "report.json"
    assertions:
      - expression: "batch_insert_uses_array"
        operator: equals
        expected: true
      - expression: "pagination_method"
        operator: equals
        expected: "cursor"
      - expression: "single_update_body_has_id"
        operator: equals
        expected: true
      - expression: "batch_update_all_have_id"
        operator: equals
        expected: true
      - expression: "delete_attempted"
        operator: equals
        expected: true
    weight: 3.0
    pass_threshold: 0.75
