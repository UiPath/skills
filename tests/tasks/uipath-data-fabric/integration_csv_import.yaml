task_id: skill-datafabric-integration-csv-import
description: >
  Integration test: agent performs a full CSV bulk import workflow against a
  live tenant — checks login, discovers or creates an entity, retrieves the
  schema to confirm exact field names (case-sensitive), creates a correctly
  formatted CSV (no system fields), runs the bulk import, then verifies results
  with records list. Tests the Discover → Act → Verify pattern for bulk data loading.
tags: [uipath-data-fabric, integration, records, import]

agent:
  type: claude-code

run_limits:
  turn_timeout: 600

initial_prompt: |
  Before starting, load the uipath-data-fabric skill and follow its workflow.

  The harness has pre-seeded an `CE_IntegrationInventory` entity (schema only,
  no records). Schema:
    - SKU (STRING, isRequired, isUnique, lengthLimit 30)
    - Quantity (INTEGER, isRequired, minValue 0)
    - UnitCost (DECIMAL, isRequired, minValue 0, decimalPrecision 2)
    - Available (BOOLEAN, isRequired, defaultValue true)
    - LastRestocked (DATE, optional)
  The harness resets the entity to zero records in post_run.

  1. Check login: run `uip login status --output json`. Do NOT re-login.

  2. Resolve the entity ID: list native-only entities and capture the ID of
     `CE_IntegrationInventory`.

  3. Get the entity schema using entities get to confirm the exact field
     names (case-sensitive) before creating the CSV.

  4. Create a file named inventory.csv with:
     - A header row using the exact field names from the schema.
     - 4 data rows of realistic inventory data with UNIQUE SKU values
       (`SKU` is isUnique-constrained).
     - Do NOT include system fields (Id, CreatedBy, CreateTime, UpdatedBy, UpdateTime).

  5. Run the bulk import: records import --file inventory.csv

  6. Verify the import: list records and check that rows were added.
     Note InsertedRecords and TotalRecords from the import response.

  Use --output json on every uip df command.
  CSV headers must match entity field names exactly — case-sensitive.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved entity schema before creating CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran records import with --file"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+import\s+.*--file'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified import results with records list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "inventory.csv was created"
    path: "inventory.csv"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "CSV uses exact case-sensitive field names as headers"
    path: "inventory.csv"
    includes:
      - "SKU"
      - "Quantity"
      - "UnitCost"
      - "Available"
      - "LastRestocked"
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "inventory.csv has at least 4 data rows (header + 4)"
    command: "awk 'END { exit (NR >= 5 ? 0 : 1) }' inventory.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "inventory.csv header row excludes system fields"
    command: "awk 'NR==1 && /(^|,)(Id|CreatedBy|CreateTime|UpdatedBy|UpdateTime)(,|$)/ { exit 1 }' inventory.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  # Schema-only seed: entity is created if missing, no records inserted.
  # The agent's job is to populate records via `records import` (CSV).
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_IntegrationInventory
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_inventory.schema.json
    timeout: 180
    fail_on_error: false

post_run:
  # Schema-only revert: wipes whatever the agent imported. No records to re-insert.
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_IntegrationInventory
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_inventory.schema.json
    timeout: 180
