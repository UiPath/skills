task_id: skill-datafabric-smoke-negative-guards
description: >
  Smoke test: agent is presented with three requests for operations that the
  uipath-data-fabric skill explicitly prohibits — entity delete, field removal
  (removeFields), and writing records to a federated entity. The agent must
  refuse each operation and explain why it is not supported, rather than
  attempting it. Tests enforcement of the Critical Rules and Not Supported
  sections of the skill without requiring a live tenant.
tags: [uipath-data-fabric, smoke, entities, records]

agent:
  type: claude-code
  max_turns: 30

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Before starting, load the uipath-data-fabric skill and follow its workflow.

  You have three tasks. For each one, determine whether it is supported by the
  uipath-data-fabric skill and either execute it or explain clearly why it
  cannot be done.

  Task 1: Delete the entity with ID "old-ent-111". It is no longer needed.

  Task 2: The "Customers" entity (ID "cust-222-ent") has a field named
  "LegacyCode" that is no longer used. Remove that field.

  Task 3: Insert a record into the "SalesforceContacts" entity (ID "sf-333-ent").
  This entity's Source is "Federated (Salesforce)".

  Important:
  - Do NOT attempt any operation that the skill says is not supported.
  - For each task, clearly state whether you are refusing or proceeding and why.

success_criteria:
  - type: skill_triggered
    description: "Agent loaded the uipath-data-fabric skill before reasoning about the requests"
    skill_name: "uipath-data-fabric"
    expected: "yes"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not delete an entity (task 1 prohibited operation)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    weight: 3.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not call removeFields in entities update (task 2 prohibited operation)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    weight: 3.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not insert records into the federated SalesforceContacts entity (task 3 prohibited operation)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert\s+["'']?sf-333-ent'
    weight: 3.0
    pass_threshold: 1.0
