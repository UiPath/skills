task_id: skill-datafabric-integration-query-filters
description: >
  Integration test: agent constructs advanced records queries against a live
  tenant — AND filterGroup, OR filterGroup, nested filterGroups, sortOptions
  with isDescending, selectedFields projection, and cursor-based pagination
  using records query (no body). Creates test records first, runs 5 query
  scenarios, then deletes the test records. Tests the full query body schema
  and the no-body pagination path end-to-end.
tags: [uipath-data-fabric, integration, records, mode:operate, lifecycle:discover]
run_limits:
  turn_timeout: 600

initial_prompt: |
  1. Check login: run `uip login status --output json`. Do NOT re-login — use
     whatever tenant is currently active.

  It has three columns: code, value, and status. Please don't change
  anything — we just need a bunch of searches run on it.

  Run each of these searches and remember the answer:

  1) Active orders worth more than $300. Should be just ORD-002.
     Save the count as `and_query_count`.

  2) Orders that are Pending OR Closed. Should be ORD-001 and ORD-004
     (2 rows). Save as `or_query_count`.

  3) Either (Active AND worth more than $200) OR Pending. Should be
     ORD-001, ORD-002, ORD-003 (3 rows). Save as `nested_query_count`.

  4) Sort everything by value, highest first — tell me the top row's
     value. Save as `sort_first_value` (should be 750.0).

  5) Return just the Code column for every row — confirm value and
     status are nowhere in the response. Save
     `projection_value_absent` and `projection_status_absent`.

  6) Page through all the rows two at a time, without any filter.
     Walk forward using next-page cursors until there are no more.
     Confirm you got 4 unique IDs with no duplicates. Save
     `pagination_total_ids` and `pagination_no_duplicates`.

  7) Find orders whose status is in the set {Pending, Active}. Should
     be ORD-001, ORD-002, ORD-003 (3 rows). Save as `in_query_count`.

  8) Count of orders grouped by status. Should give: Pending → 1,
     Active → 2, Closed → 1. Save as `agg_by_status` keyed by status.

  Paging should be controlled by command-line options (page size,
  next-page cursor) — never put paging fields inside the search body.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran filter queries with --body (AND, OR, nested, sort, projection)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query\s+.*--body'
    min_count: 4
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated with records query --limit (no body)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query\s+.*--limit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "End state: CE_IntegrationOrders has exactly 4 records (agent did not mutate the seed)"
    command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/assert_record_count.py --entity-name CE_IntegrationOrders --expected 4"
    timeout: 60
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 3
    weight: 2.5
    pass_threshold: 1.0

  # ---------------------------------------------------------------------
  # Filter body shape — enforces the supported keys and operator strings
  # documented in SKILL.md Critical Rule 16 and
  # references/records-query.md#filter-body-reference.
  # ---------------------------------------------------------------------

  - type: command_executed
    description: "Filter body uses the supported keys `queryFilters` and `fieldName`"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*"queryFilters")(?=.*"fieldName")'
    min_count: 3
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Filter body uses `queryFilters` (not `filters`) as the array key on filterGroup"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"filters"\s*:'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Filter body uses `fieldName` (not `field`) as the per-filter field key"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"field"\s*:\s*"[^"]*"\s*,\s*"operator"'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Operator uses the `=` symbol (not the JS/SQL alias `==`)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"operator"\s*:\s*"=="'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Operator uses the `=` symbol (not the named aliases `Equals` / `equals` / `eq`)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"operator"\s*:\s*"([Ee]quals?|eq)"'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used logicalOperator in filterGroup body (AND=0 / OR=1)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*logicalOperator'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used sortOptions with isDescending in query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*sortOptions'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used selectedFields projection in query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*selectedFields'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used `in` operator with valueList (step 9)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"operator"\s*:\s*"in".*valueList'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran an aggregate query with groupBy + aggregates (step 10)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*(?:aggregates.*groupBy|groupBy.*aggregates)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used COUNT aggregate function with an alias"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*"function"\s*:\s*"COUNT".*"alias"'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_IntegrationOrders
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_orders.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_orders.records.json
    timeout: 60
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_IntegrationOrders
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_orders.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_orders.records.json
    timeout: 120
