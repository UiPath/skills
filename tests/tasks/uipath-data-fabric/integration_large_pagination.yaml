task_id: skill-datafabric-integration-large-pagination
description: >
  Integration test: agent imports 500 records from a CSV into a live entity,
  traverses all pages using cursor-based pagination (limit=60), verifies no
  gap or duplicate record IDs across all 9 pages, jumps directly to a specific
  page using -o/--offset and confirms the offset-page subset matches the
  cursor-walked equivalent, then applies a filterGroup query with pagination
  (limit=60) to verify the 300-record Active=true subset across 5 pages.
  Covers large-dataset pagination stability, cursor continuity at scale, and
  offset-based page jumps.
tags: [uipath-data-fabric, integration, bulk-pagination]
run_limits:
  max_turns: 60
  turn_timeout: 600

pre_run:
  # 1. Stage helper scripts the agent uses for pagination assertions.
  - command: "cp $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/extract_page_ids.py $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/verify_pagination.py ."
    timeout: 10
    fail_on_error: true

  # 2. Schema-only seed: ensure CE_LargePaginationTest exists with the right
  #    schema, and wipe any leftover records from a prior run (the agent's
  #    job is to import 500 records via CSV; entity must start empty).
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_LargePaginationTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/large_pagination.schema.json
      --reset
    timeout: 300
    fail_on_error: false

initial_prompt: |
  Pass `--output json` on every `uip df` command.

  We need to stress-test how paging through a big list behaves. There's
  an empty list called `CE_LargePaginationTest` with three columns:
  a name (required, unique, no longer than 100 characters), a score
  (required whole number, never negative), and an Active flag (yes/no,
  required). Two little helper scripts are sitting in the working
  directory — please use them as-is, don't rewrite:
    - `./extract_page_ids.py` — pipe a page of results into it and it
      saves the IDs to a file and prints a small status line.
    - `./verify_pagination.py` — checks an IDs file against an
      expected count, looks for duplicates, or compares slices.

  First, generate `bulk_500.csv`:
    - header: `Name,Score,Active`
    - rows 1 through 300: `Record-NNN, N, true`
    - rows 301 through 500: `Record-NNN, N, false`

  Load it, then do three different walks through the data:

  1) Page through every record 60 at a time. Important — each page
     has to be its own separate command (looping inside one Python
     process doesn't count). Send each page's output through
     `./extract_page_ids.py --out walk_ids.txt --append`. Stop when
     there's no next page. You should see 9 pages and 500 unique
     IDs total. Verify with `./verify_pagination.py --mode walk
     --file walk_ids.txt --count 500`.

  2) Jump straight to records 181 through 240 in one shot, page size
     60, starting at position 180. (Position rounds down to the
     nearest page boundary — 180 + 60 lands you on records 181-240,
     which is page 4.) Save those IDs to `offset_page_ids.txt` (no
     paging needed — it's just this one page). Compare that slice
     against your walk with `./verify_pagination.py --mode offset
     --file offset_page_ids.txt --against walk_ids.txt --start 180
     --stop 240`. Never combine a position jump with paging on the
     same command.

  3) Page through just the Active = yes records, 60 at a time. Save
     IDs to `active_ids.txt`. You should see 5 pages and 300 IDs.
     Verify with `./verify_pagination.py --mode count --file
     active_ids.txt --count 300` — server filters before paging, so
     a simple count is enough.

  Don't delete the list — cleanup wipes the rows afterwards.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent imported 500 records from CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated through all records with records list --limit (at least 9 calls)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)\s+.*--limit'
    min_count: 9
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent jumped to a page using -o/--offset on records list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*(-o\s+\d+|--offset\s+\d+)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT combine --offset and --cursor on the same command"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)(?=[^\n]*--cursor)(?=[^\n]*(-o\s+\d+|--offset\s+\d+))'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried Active=true records with filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "bulk_500.csv was generated"
    path: "bulk_500.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "bulk_500.csv has exactly 500 data rows (header + 500)"
    command: "awk 'END { exit (NR == 501 ? 0 : 1) }' bulk_500.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "bulk_500.csv has the required header columns"
    path: "bulk_500.csv"
    includes:
      - "Name"
      - "Score"
      - "Active"
    weight: 1.5
    pass_threshold: 1.0

post_run:
  # Schema-only revert: wipe whatever the agent imported. Entity is
  # preserved across runs (brownfield); next pre_run is a no-op if the
  # schema is already correct.
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_LargePaginationTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/large_pagination.schema.json
    timeout: 300
