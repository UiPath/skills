task_id: skill-datafabric-e2e-expense-tracker
description: >
  E2E scenario: agent builds an expense tracker in Data Fabric — a parent
  Employee entity and a child Expense entity whose fields exercise every
  complex / constrained type (RELATIONSHIP to Employee, CHOICE_SET_SINGLE
  for category, optional CHOICE_SET_MULTIPLE for tags, a Receipt FILE field
  bound to the EntityAttachment storage entity, plus lengthLimit on
  STRING/MULTILINE_TEXT and decimalPrecision + minValue + maxValue on
  DECIMAL). Seeds 6 employees and 12 expenses, produces a department
  summary using filterGroup queries on both the relationship and choice
  fields, and confirms each field stores its expected value form (UUID for
  relationship, integer for choice). FILE upload via CLI is not supported,
  so the Receipt field is created but never written. Choice sets are
  authored only in the web UI — if none exists in the tenant, the agent
  records the gap and finishes the relationship + FILE + constraint
  workflow.
tags: [uipath-data-fabric, e2e, expense-tracker, complex-fields, mode:build, lifecycle:setup]

run_limits:
  max_turns: 60
  turn_timeout: 600

initial_prompt: |
  Finance needs a simple expense tracker in UiPath Data Fabric. Each
  expense gets submitted by an employee, has a category from a
  dropdown, can carry one or more tags, and has somewhere to attach a
  receipt. Load the uipath-data-fabric skill before starting and just
  build it — no need to pause for approval.

  We need an Employees list (call it `CE_E2EEmployee`):
    - A name — required, no longer than 200 characters
    - An email — has to be unique, no longer than 255 characters
    - A department — required, no longer than 100 characters

  And an Expenses list (call it `CE_E2EExpense`):
    - An amount in dollars — required, two decimal places, between $0
      and $100,000
    - Who submitted it — required, points to an employee (use the
      field name `submitter`)
    - A description — long text, up to 2000 characters
    - A receipt — somewhere we can attach a PDF later (use the field
      name `Receipt`)
    - A category — picked from a dropdown, IF the tenant has one
      configured
    - Tags — pick one or more from a dropdown, IF the tenant has a
      second one (it's fine to reuse the category dropdown for tags
      if only one exists)

  Dropdown lists can only be authored in the web UI — see what the
  tenant already has and pick the best fits. If a dropdown's name
  contains "Category", "Expense", or "Type", that's likely the
  category one; otherwise grab the first one. If there are none, skip
  the category and tags fields and note that in the report.

  Please don't name any field `Status`, `Order`, `Key`, `Type`, etc. —
  those names cause problems on the database side. Use more
  descriptive names.

  Seed some data:
    - 6 employees — 3 in Engineering and 3 in Sales — with realistic
      names and emails.
    - 12 expenses — 2 per employee, amounts ranging from $25 to $1200.
      Vary categories across expenses; on about half, add 1–2 tags.

  Then answer these for me (run fresh queries — don't reuse counts
  from earlier responses):
    - How many expenses does one specific employee have?
    - If we're using categories, how many expenses are in each one?
    - What's the total dollar amount of expenses submitted by the
      Engineering department? (Find the 3 Engineering employees
      first, then add up their expense amounts.)

  Open one expense back up and confirm the values stored correctly:
  the submitter should be stored as an employee ID (not the email),
  the category — if used — should be stored as a number (not the
  dropdown label), and tags — if used — should be stored as a list
  of numbers.

  When you're done, save `report.json`:

    {
      "category_choice_set_id": "<id-or-null>",
      "category_value_map": { "<Name>": <NumberId>, ... } | null,
      "tags_choice_set_id": "<id-or-null>",
      "tags_value_map":     { "<Name>": <NumberId>, ... } | null,
      "attachment_entity_id": "<id>",
      "attachment_name_field_id": "<id>",
      "parent_entity_id": "<id>",
      "child_entity_id":  "<id>",
      "employee_ids": [ ... 6 IDs ... ],
      "expense_ids":  [ ... 12 IDs ... ],
      "q_per_employee_count": <int>,
      "q_per_category": { "<Name>": <int>, ... } | null,
      "engineering_employee_ids": [ "<id>", "<id>", "<id>" ],
      "engineering_total_amount": <number>,
      "stored_submitter_is_uuid": true,
      "stored_category_is_integer": <bool|null>,
      "stored_tags_is_integer_array": <bool|null>
    }

  Couple of things to keep in mind:
    - Please don't try to upload an actual receipt file — uploads from
      the command line aren't working right now. The field just needs
      to exist.
    - Please don't create or change any dropdown lists.
    - Leave the lists and rows in place — I'll sweep them later.

success_criteria:
  - type: command_executed
    description: "Agent listed choice sets to discover available picklists"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the parent Employee entity"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*CE_E2EEmployee'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the child Expense entity with a RELATIONSHIP field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CE_E2EExpense)(?=.*RELATIONSHIP)(?=.*referenceEntityId)(?=.*referenceFieldId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied lengthLimit on STRING / MULTILINE_TEXT fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied decimalPrecision on the amount DECIMAL field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*decimalPrecision'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied minValue / maxValue on the amount DECIMAL field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the Receipt FILE field with EntityAttachment referenceEntityId / referenceFieldId binding"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create(?=.*CE_E2EExpense)(?=.*\"type\"\s*:\s*\"FILE\")(?=.*referenceEntityId)(?=.*referenceFieldId)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT define a field literally named `Status` (Rule 4 reserved keyword)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*\"fieldName\"\s*:\s*\"Status\"'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT attempt `uip df files upload` — the Receipt FILE field was newly created via CLI, so its referenceEntity is unwired and upload would fail with Relationship violation (see Not Supported)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+files\s+upload'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted employee records"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\"(Name|Email|Department)\"'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted expense records (either `--body` with inline `submitter` UUID, or `--file` with a JSON payload — the file-content shape is verified by report.json's stored_submitter_is_uuid assertion)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert\s+\S+\s+(?:--body[\s\S]*\"[Ss]ubmitter\"\s*:\s*\"[0-9a-fA-F-]{8,}|--file\s+\S+\.json)'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT write an email / non-UUID into the submitter relationship"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+(insert|update).*\"[Ss]ubmitter\"\s*:\s*\"[^\"]*@'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent filtered expenses by the relationship (submitter UUID)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*filterGroup)(?=.*\"fieldName\"\s*:\s*\"[Ss]ubmitter\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran a query / list against the Employee entity to find the Engineering employees"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(query|list)\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran a query / list against the Expense entity to compute the Engineering total"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified record shape with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+get\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT attempt to create / update / delete a choice set via the CLI"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+choice-sets\s+(create|update|delete)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT write a choice display label (string) into a choice field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+(insert|update).*\"category\"\s*:\s*\"[A-Za-z]'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json captured parent + child entity IDs and 6 employees + 12 expenses"
    path: "report.json"
    assertions:
      - expression: "parent_entity_id"
        operator: regex
        expected: "^[0-9a-fA-F-]{8,}"
      - expression: "child_entity_id"
        operator: regex
        expected: "^[0-9a-fA-F-]{8,}"
      - expression: "length(employee_ids)"
        operator: equals
        expected: 6
      - expression: "length(expense_ids)"
        operator: equals
        expected: 12
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Stored relationship value is a UUID (not a label / email)"
    path: "report.json"
    assertions:
      - expression: "stored_submitter_is_uuid"
        operator: equals
        expected: true
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Engineering aggregation resolved 3 employee UUIDs and a numeric total"
    path: "report.json"
    assertions:
      - expression: "length(engineering_employee_ids)"
        operator: equals
        expected: 3
      - expression: "engineering_total_amount"
        operator: gte
        expected: 0
    weight: 2.5
    pass_threshold: 1.0

pre_run:
  # Sweep leftover state from prior crashed runs. Child first, then parent.
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_E2EExpense"
    timeout: 60
    fail_on_error: false
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_E2EEmployee"
    timeout: 60
    fail_on_error: false

post_run:
  # Cleanup order matters: child (CE_E2EExpense) must be deleted BEFORE
  # parent (CE_E2EEmployee) because Expense has a RELATIONSHIP FK pointing
  # at Employee. CLI delete on Employee would otherwise fail with an FK
  # constraint.
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_E2EExpense"
    timeout: 60
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_E2EEmployee"
    timeout: 60
