task_id: skill-datafabric-integration-preseeded-entity
description: >
  Integration test: agent discovers CodeEvalTestEntity (auto-creating and
  seeding it with 20 records if missing), then exercises the full Discover
  workflow — introspect schema (7 fields), run 5 filterGroup queries with
  known expected counts (Active=true → 12, Score>7 → 6, Title="The Matrix"
  → 1, Title contains "Matrix" → 3), verify sort order (Score desc → 10.0
  first), paginate all 20 records, do a targeted Notes update and restore.
  Entity is never deleted.
tags: [uipath-data-fabric, integration, pre-seeded, discover]

run_limits:
  expected_turns: 32
  max_turns: 50
  turn_timeout: 600

initial_prompt: |
  Before starting, load the uipath-data-fabric skill and follow its workflow.

  The harness has pre-seeded `CodeEvalTestEntity` with the canonical 20
  records (see `_shared/seeds/codeeval_test_entity.records.json`). Schema:
  Title (STRING, isRequired, lengthLimit 200), Score (DECIMAL, minValue 0,
  maxValue 10, decimalPrecision 1), Active (BOOLEAN, isRequired,
  defaultValue true), ReleaseDate (DATE), Email (STRING, isRequired,
  isUnique, lengthLimit 100), Notes (MULTILINE_TEXT, lengthLimit 1000),
  Poster (FILE). The harness resets the entity to the canonical seed in
  post_run.

  Use --output json on every uip df command.

  1. Check login: run `uip login status --output json`. Do NOT re-login.

  2. Resolve the entity ID: list native-only entities and capture the ID of
     `CodeEvalTestEntity`. Do NOT create or seed it — the harness handles that.

  3. Retrieve the full schema with entities get.
     Confirm the entity has exactly 7 fields:
       Title (STRING), Score (DECIMAL), Active (BOOLEAN), ReleaseDate (DATE),
       Email (STRING), Notes (MULTILINE_TEXT), Poster (FILE).

  4. Run the following queries. Record the count of records returned by each.

     a. Active = true
        Expected: 12 records.

     b. Score > 7
        Expected: 6 records (7.5, 8.0, 8.5, 9.0, 9.5, 10.0).

     c. Title = "The Matrix" (exact equality)
        Expected: 1 record.

     d. Title contains "Matrix"
        Expected: 3 records.

     e. Score >= 7 AND Active = true  (AND logic: logicalOperator=0)
        Expected: 7 records (7.0, 7.5, 8.0, 8.5, 9.0, 9.5, 10.0 — all Active=true in seed data).

  5. Sort all records by Score descending.
     Confirm records[0].Score == 10.0 (the highest seed value).

  6. Paginate through ALL records with `uip df records list --limit 5`.
     Each page MUST be a separate `uip df records list` Bash invocation —
     subprocess loops inside a single Python call do not satisfy the
     per-page rule.

       Page 1 (no cursor):
         uip df records list <entity-id> --limit 5 --output json

       Subsequent pages: add `--cursor "<NextCursor from prior response>"`.
       Stop when `HasNextPage` is false. Expected: 4 pages (3 × 5 + 1 × 5
       = 20 records).

     Collect each page's record IDs and confirm total == 20 with no
     duplicates.

  7. Pick any one record returned by the Active=true query (step 4a).
     Update its Notes field to "test-annotation-by-agent".
     Verify the update with records get (confirm Notes == "test-annotation-by-agent").
     Then restore Notes to null (update with Notes: null).
     Verify the restore (confirm Notes == null).
     Save the record ID you modified.

  Do NOT delete any records. Do NOT delete the entity.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed entities to discover CodeEvalTestEntity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved entity schema with entities get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran multiple filterGroup queries"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 4
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated through records with --limit"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*--limit'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated a record and verified with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified updates with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+get'
    min_count: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 4
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used logicalOperator in AND filterGroup query (step 4e)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*logicalOperator'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CodeEvalTestEntity
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/codeeval_test_entity.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/codeeval_test_entity.records.json
    timeout: 240
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CodeEvalTestEntity
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/codeeval_test_entity.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/codeeval_test_entity.records.json
    timeout: 240
