task_id: skill-datafabric-smoke-csv-complex-drop
description: >
  Smoke test: agent uses the uipath-data-fabric skill to seed an entity whose
  schema includes complex field types (CHOICE_SET_SINGLE, CHOICE_SET_MULTIPLE,
  RELATIONSHIP). `records import` silently drops complex-field columns —
  verified server behavior in BulkUploadCSVHelper. The agent must use
  `records insert --file <json>` instead and must NOT put complex-field
  columns in a CSV file.
tags: [uipath-data-fabric, smoke, complex-fields, bulk-import]

run_limits:
  max_turns: 25

sandbox:
  driver: docker

initial_prompt: |
  Heads-up — I'm just sketching this out before I've actually logged in, so every command will error on auth. Don't worry about that, and please don't retry or try to log in — I just want to see the right steps in order.

  Could you load 3 expense rows into the Expense list (ID
  `exp-ent-001`)? Each expense has an amount, a description, a
  category picked from a dropdown (ID `cs-cat-001`), tags picked from
  a different dropdown (ID `cs-tags-001`), and a link back to a
  customer.

  The rows:
    R1 — amount 100, description "taxi",   category travel, tags travel + lodging, customer `c-uuid-A`
    R2 — amount 250, description "dinner", category meals,  tags meals,            customer `c-uuid-A`
    R3 — amount 400, description "hotel",  category lodging, tags lodging,         customer `c-uuid-B`

  One important thing — CSV files don't work for this list. CSV imports
  only handle plain-text and number columns; anything fancier
  (dropdowns, links to other rows, attachments, auto-numbers) gets
  silently dropped. The column header is accepted but the value comes
  through as empty with no warning. So please use the non-CSV bulk
  load path instead, which handles every column type.

  Do this:
    - Write the 3 rows out to a single file in the right format for a
      list with dropdowns and links — not a CSV.
    - Load the file.
    - Then write a short note in `decision.md` (one paragraph) saying
      which bulk-load command you picked and why — specifically
      calling out that CSV silently drops dropdown / link columns.

success_criteria:
  - type: command_executed
    description: "Agent used `records insert --file <json>` for the entity with complex fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert\s+exp-ent-001\s+.*--file\s+\S+\.json'
    min_count: 1
    weight: 3.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT call `records import` on an entity with complex fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+import\s+exp-ent-001'
    min_count: 0
    max_count: 0
    weight: 3.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT produce a .csv file or call records import with one (would silently drop complex fields)"
    tool_name: "Bash"
    command_pattern: '(uip\s+df\s+records\s+import\b.*\.csv|>\s*\S*\.csv\b|tee\s+\S*\.csv\b)'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "decision.md was written"
    path: "decision.md"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "decision.md cites the silent-drop reason and the `records insert` choice"
    path: "decision.md"
    includes:
      - "silent"
      - "records insert"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
