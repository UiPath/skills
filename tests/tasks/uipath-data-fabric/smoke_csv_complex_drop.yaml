task_id: skill-datafabric-smoke-csv-complex-drop
description: >
  Smoke test: agent uses the uipath-data-fabric skill to seed an entity whose
  schema includes complex field types (CHOICE_SET_SINGLE, CHOICE_SET_MULTIPLE,
  RELATIONSHIP). `records import` silently drops complex-field columns —
  verified server behavior in BulkUploadCSVHelper. The agent must use
  `records insert --file <json>` instead and must NOT put complex-field
  columns in a CSV file.
tags: [uipath-data-fabric, smoke, complex-fields, bulk-import, mode:build, lifecycle:setup]

run_limits:
  max_turns: 25


initial_prompt: |
  Could you load 3 expense rows into the Expense list called
  `CE_SmokeExpenses`? It has an amount column and a multi-select tags
  column (backed by a Travel / Meals / Lodging dropdown).

  The rows:
    R1 — amount 100, tags Travel + Lodging
    R2 — amount 250, tags Meals
    R3 — amount 400, tags Lodging

  Bulk-load all 3 rows in one go using whichever uip df bulk path is
  the right one for this list's column types. Write the file in
  whatever format your chosen command needs.

  When you're done, jot a short note in `decision.md` (one paragraph)
  saying which uip df command you used to load the rows and why it is
  the correct choice for a list shaped like this one.

success_criteria:
  - type: command_executed
    description: "Agent used `records insert --file <json>` for the entity with complex fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert\s+CE_SmokeExpenses\s+.*--file\s+\S+\.json'
    min_count: 1
    weight: 3.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT call `records import` on an entity with complex fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+import\s+CE_SmokeExpenses'
    min_count: 0
    max_count: 0
    weight: 3.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT produce a .csv file or call records import with one (would silently drop complex fields)"
    tool_name: "Bash"
    command_pattern: '(uip\s+df\s+records\s+import\b.*\.csv|>\s*\S*\.csv\b|tee\s+\S*\.csv\b)'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "decision.md was written"
    path: "decision.md"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "decision.md cites the silent-drop reason and the `records insert` choice"
    path: "decision.md"
    includes:
      - "silent"
      - "records insert"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_SmokeExpenses
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.records.json
    timeout: 180
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_SmokeExpenses
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.records.json
    timeout: 180
