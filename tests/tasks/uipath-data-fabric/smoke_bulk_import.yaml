task_id: skill-datafabric-smoke-bulk-import
description: >
  Smoke test: agent uses the uipath-data-fabric skill to bulk-import records
  from a CSV file. Tests that the skill teaches correct CSV format: header row
  must match exact entity field names (case-sensitive), system fields must be
  excluded, and records import --file is the correct command (not records insert).
tags: [uipath-data-fabric, smoke, records, import]

run_limits:
  max_turns: 30

initial_prompt: |
  Heads-up — I'm just sketching this out before I've actually logged in, so every command will error on auth. Don't worry about that, and please don't retry or try to log in — I just want to see the right steps in order.

  There is a "Products" entity with entity ID "prod-002-ent".
  Its fields are: ProductName (STRING), UnitPrice (DECIMAL), InStock (BOOLEAN).

  Take a quick look at the list's settings first so your CSV header
  matches the column names exactly (uppercase/lowercase matters).
  Don't include any of the auto-managed columns (Id, CreatedBy,
  CreateTime, UpdatedBy, UpdateTime) — those fill in on their own.

  Save the file as `products.csv` and load it.

success_criteria:
  - type: command_executed
    description: "Agent retrieved entity schema with entities get before creating CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran records import with --file flag"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+import\s+.*--file'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "products.csv was created"
    path: "products.csv"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "CSV uses correct case-sensitive field names as headers"
    path: "products.csv"
    includes:
      - "ProductName"
      - "UnitPrice"
      - "InStock"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_check
    description: "CSV does not include system fields (Id, CreatedBy, CreateTime, UpdatedBy, UpdateTime)"
    path: "products.csv"
    excludes:
      - "CreatedBy"
      - "CreateTime"
      - "UpdatedBy"
      - "UpdateTime"
    weight: 2.0
    pass_threshold: 1.0
