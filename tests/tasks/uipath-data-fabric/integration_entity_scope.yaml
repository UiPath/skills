task_id: skill-datafabric-integration-entity-scope
description: >
  Integration test: agent verifies entity scope behaviour against a live
  tenant — creates a tenant-level entity (default, no folder flag) and
  confirms it appears in entities list from any folder context; creates a
  folder-scoped entity and confirms it is absent when listing from a
  different folder; and attempts to create an entity with a non-existent
  folder ID and verifies the error. Covers S-SC-01 through S-SC-05.
tags: [uipath-data-fabric, integration, entity-scope]
run_limits:
  turn_timeout: 1200

initial_prompt: |
  Use --output json on every uip df command.

  First, see if the tenant has at least two folders. If it does,
  remember them as `folder_a_id` and `folder_b_id`. If there's only
  one folder, just note that — we'll skip the folder-isolation parts
  (record them as null).

  There's already a tenant-wide list called `CE_TenantScopeTest` with
  one required name column (no longer than 100 characters). Please
  don't recreate it.

  Walk through these and tell me, in each case, whether the list does
  or doesn't show up:
    - List everything without picking a folder. Does
      `CE_TenantScopeTest` show up?
    - List everything from folder A. Does `CE_TenantScopeTest` still
      show up there?
    - Make a new list called `CE_FolderScopeTest` (one name column)
      and put it specifically in folder A.
    - List everything from folder B. Does `CE_FolderScopeTest` show
      up there?
    - Try making one more list called `CE_FolderScopeTest_Invalid`
      using a fake folder ID like `00000000-0000-0000-0000-000000000000`.
      Just tell me what error comes back.

  Leave the lists in place — I'll clean them up myself later.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the folder-scoped entity (CE_FolderScopeTest) — only fires when the tenant has ≥2 folders; soft assertion since the prompt allows skipping this branch on single-folder tenants"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create\s+CE_FolderScopeTest'
    min_count: 1
    weight: 2.0
    pass_threshold: 0.0

  - type: command_executed
    description: "Agent must NOT recreate CE_TenantScopeTest (harness pre-seeds it)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create\s+CE_TenantScopeTest'
    min_count: 0
    max_count: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed entities at least twice (different scope contexts)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list'
    min_count: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entities create body (only fires when folder-scoped entity was created; soft on single-folder tenants)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 0.0

  - type: command_executed
    description: "Agent used --native-only flag when listing entities"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list.*--native-only'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --folder flag to test folder-scoped entity listing"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list.*--folder'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0

pre_run:
  # Schema-only seed for the tenant-level entity (brownfield, persistent).
  # No records are seeded — the test exercises scope visibility, not record CRUD.
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_TenantScopeTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/tenant_scope.schema.json
    timeout: 180
    fail_on_error: false

post_run:
  # 1. Revert the tenant entity to zero records (no-op in practice since the
  #    test doesn't insert records, but defensive).
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_TenantScopeTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/tenant_scope.schema.json
    timeout: 120

  # 2. Delete the per-run folder-scoped entity (greenfield) AND any
  #    CE_FolderScopeTest_* leftovers (e.g. CE_FolderScopeTest_Invalid from
  #    step 7 if it landed somewhere).
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_FolderScopeTest"
    timeout: 60
