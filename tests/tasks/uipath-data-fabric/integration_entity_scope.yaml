task_id: skill-datafabric-integration-entity-scope
description: >
  Integration test: agent verifies entity scope behaviour against a live
  tenant — creates a tenant-level entity (default, no folder flag) and
  confirms it appears in entities list from any folder context; creates a
  folder-scoped entity and confirms it is absent when listing from a
  different folder; and attempts to create an entity with a non-existent
  folder ID and verifies the error. Covers S-SC-01 through S-SC-05.
tags: [uipath-data-fabric, integration, entity-scope]

run_limits:
  expected_turns: 24
  turn_timeout: 600

initial_prompt: |
  Before starting, load the uipath-data-fabric skill and follow its workflow.

  Use --output json on every uip df command.

  1. Check login: run `uip login status --output json`. From the response
     note the active tenant ID. Also note at least two folder IDs if
     available (folder_a_id and folder_b_id). If the tenant has only one
     folder, record that limitation in the report and skip folder-isolation
     checks (mark them null).

  The harness has pre-seeded a tenant-level entity `CE_TenantScopeTest`
  (Name STRING isRequired lengthLimit 100). The harness wipes its records
  in post_run. Do NOT call `entities create` for this entity.

  The folder-scoped entity `CE_FolderScopeTest` is created by the agent
  each run and deleted by the harness in post_run via
  `cleanup_entities_by_name.py --name-prefix CE_FolderScopeTest`.

  2. Resolve the entity ID: list native-only entities and capture the ID of
     `CE_TenantScopeTest`.

  3. Run entities list (--native-only) without a folder flag. Confirm
     "CE_TenantScopeTest" appears in the response.

  4. If folder_a_id is available, run entities list with --folder <folder_a_id>.
     Confirm "CE_TenantScopeTest" still appears (tenant entities are visible
     from all folder contexts).

  5. If folder_a_id is available, create a folder-scoped entity
     `CE_FolderScopeTest` with field Name (STRING) scoped to folder_a_id.
     Save the entity ID.

  6. If both folder_a_id and folder_b_id are available, run:
       uip df entities list --native-only --folder <folder_b_id> --output json
     Confirm `CE_FolderScopeTest` does NOT appear (it is scoped to folder_a only).

  7. Attempt to create an entity named `CE_FolderScopeTest_Invalid` with a
     non-existent folder ID:
       uip df entities create CE_FolderScopeTest_Invalid --folder 00000000-0000-0000-0000-000000000000 --body '{"fields":[{"fieldName":"Name","type":"STRING"}]}' --output json
     Record the error response. The harness's post_run cleanup matches
     `CE_FolderScopeTest_*` so even if this somehow succeeded against a
     fallback folder, it would still be cleaned up.

  Do NOT delete entities yourself — the test harness handles cleanup.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the folder-scoped entity (CE_FolderScopeTest)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create\s+CE_FolderScopeTest'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT recreate CE_TenantScopeTest (harness pre-seeds it)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create\s+CE_TenantScopeTest'
    min_count: 0
    max_count: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed entities at least twice (different scope contexts)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list'
    min_count: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entities create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --native-only flag when listing entities"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list.*--native-only'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --folder flag to test folder-scoped entity listing"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list.*--folder'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0

pre_run:
  # Schema-only seed for the tenant-level entity (brownfield, persistent).
  # No records are seeded — the test exercises scope visibility, not record CRUD.
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_TenantScopeTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/tenant_scope.schema.json
    timeout: 180
    fail_on_error: false

post_run:
  # 1. Revert the tenant entity to zero records (no-op in practice since the
  #    test doesn't insert records, but defensive).
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_TenantScopeTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/tenant_scope.schema.json
    timeout: 120

  # 2. Delete the per-run folder-scoped entity (greenfield) AND any
  #    CE_FolderScopeTest_* leftovers (e.g. CE_FolderScopeTest_Invalid from
  #    step 7 if it landed somewhere).
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_FolderScopeTest"
    timeout: 60
