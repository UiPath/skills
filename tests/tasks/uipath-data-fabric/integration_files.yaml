task_id: skill-datafabric-integration-files
description: >
  Integration test: agent performs a complete file attachment lifecycle against a
  live tenant — checks login, creates or reuses an entity with a FILE-type field,
  inserts a record, uploads a file, downloads it back and verifies byte integrity
  via SHA-256 hash, uploads a second version to confirm overwrite, deletes the
  attachment, and verifies the field is empty post-delete. Covers the full files
  upload/download/delete workflow including overwrite semantics and byte integrity.
tags: [uipath-data-fabric, integration, files]
run_limits:
  turn_timeout: 600

initial_prompt: |
  Perform a complete file attachment lifecycle. Use --output json on every uip df command.

  Then:
    - Make a small local file called `original.txt` with the text
      "hello data fabric v1".
    - Attach it to that row's document field.
    - Pull it back down as `downloaded.txt` and confirm it came back
      exactly as it went up (a SHA-256 compare with `shasum -a 256`
      or Python's hashlib works).
    - Make another file `updated.txt` with the text "hello data fabric
      v2" and attach that to the same field — it should replace the
      first one.
    - Pull it down again as `verify_update.txt` and confirm it matches
      the new file, not the old one.
    - Remove the attachment, then try to download it one more time —
      that should fail. Just tell me what came back.

  Also — I've got a few odd files I want to try attaching, just to
  see what happens with each. For every one, try the upload and tell
  me what came back; don't retry or swap in something else:
    - Make an empty file `empty.txt` (zero bytes) and try to attach it.
      Note whether a zero-byte file is accepted.
    - Make a file with a unicode-and-emoji filename — `café-📎.txt` —
      with some text in it. Note whether the filename comes back intact.
    - Make a file whose name has a path-traversal sequence —
      `../../etc-passwd.txt` (just a normal text file, weird name).
      It should either get rejected or have the filename sanitized;
      tell me which.

  Save your observations to `report.json`:
    {
      "entity_id": "<list ID>",
      "record_id": "<row ID>",
      "empty_file_accepted": <true|false>,
      "unicode_filename_preserved": <true|false>,
      "traversal_filename_outcome": "<rejected|sanitized|<error>>"
    }

  Leave the list and its row in place — just remove the file
  attachment when you're done.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent looked up the seed record (records query / list / get)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(query|list|get)\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded file at least twice (v1 and v2 overwrite)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 2
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent downloaded file at least twice (after v1 and after v2)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+download\s+.*--destination'
    min_count: 2
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted the file attachment"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+files\s+delete\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted to upload the empty / unicode / traversal-named files (3 extra edge attempts)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 5
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json with the edge-case observations was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Empty file was created (zero-byte edge)"
    path: "empty.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Edge observations recorded as the right shape (booleans + traversal-outcome string)"
    command: 'python3 -c "import json,sys; d=json.load(open(''report.json'')); ok=(isinstance(d.get(''empty_file_accepted''),bool) and isinstance(d.get(''unicode_filename_preserved''),bool) and isinstance(d.get(''traversal_filename_outcome''),str)); sys.exit(0 if ok else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "original.txt was created"
    path: "original.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "downloaded.txt was created from download"
    path: "downloaded.txt"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "updated.txt (v2 source) was created"
    path: "updated.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "verify_update.txt (v2 download) was created"
    path: "verify_update.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "v1 byte integrity: downloaded.txt is identical to original.txt"
    command: "cmp -s original.txt downloaded.txt"
    timeout: 5
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "v2 byte integrity: verify_update.txt is identical to updated.txt"
    command: "cmp -s updated.txt verify_update.txt"
    timeout: 5
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_IntegrationAssets
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_assets.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_assets.records.json
    timeout: 180
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_IntegrationAssets
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_assets.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/integration_assets.records.json
    timeout: 180
