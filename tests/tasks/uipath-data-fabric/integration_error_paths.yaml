task_id: skill-datafabric-integration-error-paths
description: >
  Integration test: agent exercises all major negative paths for records,
  CSV import, and file operations against a live tenant — missing required
  field (R-C-08), unique constraint violation on insert and update (R-C-09,
  R-U-06), type mismatch on insert and update (R-C-10, R-U-07), update body
  missing Id (R-U-08), record not found on update and delete (R-U-05,
  R-D-04), CSV header mismatch (R-C-11), malformed CSV (R-C-12), file upload
  to non-FILE field (F-U-05), file upload with non-existent record (F-U-06),
  and file upload with missing local file (F-U-08). All commands are expected
  to fail; the test verifies the agent captures structured errors and does
  not retry or call the REST API directly.
tags: [uipath-data-fabric, integration, error-paths]
run_limits:
  max_turns: 50
  turn_timeout: 600

initial_prompt: |
  Use --output json on every uip df command.

  There's a list called `CE_ErrorPathsTest` already set up with two
  rows in it:
    - SEED-001, score 10, tag "tag-unique"
    - SEED-002, score 20, tag "tag-other"

  The list has three columns: `Code` (required, no longer than 50
  characters), `Score` (whole number), and `Tag` (unique, no longer
  than 50 characters). First find the IDs of those two rows by
  searching on Code — remember them as `seed_id` and `seed_id2`.

  Then please try each of these (they'll all fail, that's the point):

  Adding / changing / removing rows:
    - Try to add a new row that skips the Code (just Score = 5).
    - Try to add a row with Tag "tag-unique" — the first seed row
      already has that tag, so it should reject the duplicate.
    - Try to add a row with Score set to "not-a-number" (text where
      a number is expected).
    - Try to update a row without saying which row.
    - Try to update a row with the made-up ID "does-not-exist-aaa".
    - Try to update seed_id2 by changing its tag to "tag-unique" —
      same uniqueness problem.
    - Try to update seed_id by setting its Score to "bad-value".
    - Try to delete a made-up row "does-not-exist-bbb".

  Loading data from a file:
    - Make a file `wrong_headers.csv` with header "WrongField,Score"
      and one row "val,10". Try to load it.
    - Make a file `malformed.csv` with this exact content:
        Code,Score
        "unclosed-quote,5
      Try to load it.

  Attaching files (make a tiny `temp.txt` as the source):
    - Try to attach it to the Score column (Score isn't a file column).
    - Try to attach it to a made-up row ID "does-not-exist-ccc".
    - Try to attach a file that doesn't exist (`./no-such-file.bin`).

  Leave everything in place when you're done — I'll sweep it later.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted records insert (error scenarios — seed already pre-seeded)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 3
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent resolved seed records via records query (not via insert)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*Code'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted records update (error scenarios)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted records delete with non-existent ID"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+delete'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted CSV import (header mismatch and malformed)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted file upload (error scenarios)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_ErrorPathsTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/error_paths.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/error_paths.records.json
    timeout: 180
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_ErrorPathsTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/error_paths.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/error_paths.records.json
    timeout: 180
