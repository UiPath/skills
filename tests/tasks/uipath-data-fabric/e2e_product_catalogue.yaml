task_id: skill-datafabric-e2e-product-catalogue
description: >
  E2E scenario: agent builds a complete product catalogue in Data Fabric from
  scratch — designs the entity schema, bulk-imports 15 products via CSV,
  queries by category, updates pricing for specific products, marks items as
  out of stock, uploads a product image to the most expensive item, and
  produces a final inventory summary. Tests the full Discover → Act → Verify
  loop for a realistic e-commerce use case.
tags: [uipath-data-fabric, e2e, product-catalogue]

run_limits:
  max_turns: 50
  turn_timeout: 1200

initial_prompt: |
  Build an e-commerce product catalogue in UiPath Data Fabric.

  Make a list called `CE_ProductCatalogue` with these fields:
    - Product name
    - Category (Electronics, Clothing, or Home)
    - Price (decimal)
    - In stock (yes / no)
    - SKU
    - A poster image attachment (call this field `Poster`)

  Then bulk-load 15 products from a CSV file you generate
  (`products.csv`) — 5 per category. Leave the poster column out;
  images can't go in via CSV.

  Once the data is in, do a few quick things:
    - Show me just the Electronics — there should be exactly 5.
    - Bump the two most expensive products by 10% (across all
      categories), one at a time.
    - Mark the three cheapest as out of stock.
    - Make a placeholder `product_hero.jpg` locally and attach it to
      the single most expensive product.
    - Tell me the final tally: total products, how many are in stock,
      and how many are Electronics.

  When you're done, save `report.json`:
    {"entity_id": "<created-entity-id>"}

  Cleanup runs after using `report.json` — don't delete the list
  yourself.

success_criteria:
  - type: command_executed
    description: "Agent created the entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent imported products from CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried products by category"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated product records (price + stock status)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded product image"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entity create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "products.csv was generated"
    path: "products.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "products.csv has 15 data rows (header + 15)"
    command: "awk 'END { exit (NR == 16 ? 0 : 1) }' products.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "product_hero.jpg placeholder image was created"
    path: "product_hero.jpg"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was written so cleanup can delete the entity"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_ProductCatalogue"
    timeout: 60
    fail_on_error: false

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_ProductCatalogue"
    timeout: 60
