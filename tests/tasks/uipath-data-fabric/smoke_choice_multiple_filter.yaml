task_id: skill-datafabric-smoke-choice-multiple-filter
description: >
  Smoke test: agent uses the uipath-data-fabric skill to filter records on a
  CHOICE_SET_MULTIPLE field â€” picking `contains` for membership and the
  JSON-array string form of `=` for set equality, and avoiding the two known
  HTTP 400 failure modes (bare value with `=`, bracket value with `contains`).
  Verified server behavior â€” see references/records-query.md Â§
  "Filtering on Choice-Set Fields".
tags: [uipath-data-fabric, smoke, complex-fields, mode:operate, lifecycle:discover]

run_limits:
  max_turns: 25


initial_prompt: |
  Heads-up â€” I'm just sketching this out before I've actually logged in, so every command will error on auth. Don't worry about that, and please don't retry or try to log in â€” please run each step exactly once as a real Bash command so I can see the right shape.

  There is an Expense entity with entity ID "exp-ent-001".
  It has an `amount` column and a multi-select `tags` column backed by
  a dropdown (choice-set ID "cs-tags-001") whose options have NumberIds
  travel=1, meals=2, lodging=3.

  Could you run these four searches? One search per request, run each
  exactly once, don't retry:

    1. Find every expense tagged with travel.
    2. Find every expense whose tags are exactly {travel, lodging} and
       nothing else.
    3. Find every expense that's NOT tagged with meals.
    4. Show me how many expenses there are for each unique tag
       combination.

success_criteria:
  - type: command_executed
    description: "Task 1 â€” agent used `contains` with a bare NumberId string for membership (travel=1)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"contains\")(?=.*\"value\"\s*:\s*\"1\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 2 â€” agent used `=` with a JSON-array string for set equality (travel + lodging = [1, 3])"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"=\")(?=.*\"value\"\s*:\s*\"\[1,\s*3\]\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 3 â€” agent used `not contains` for negated membership"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"not contains\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 4 â€” agent used groupBy on tags with COUNT aggregate"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"groupBy\"\s*:\s*\[\s*\"tags\")(?=.*\"function\"\s*:\s*\"COUNT\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative â€” agent must NOT use `=` with a bare value on tags (HTTP 400)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*\"fieldName\"\s*:\s*\"tags\"\s*,\s*\"operator\"\s*:\s*\"=\"\s*,\s*\"value\"\s*:\s*\"\d+\"'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative â€” agent must NOT use `contains` with a bracketed value on tags (HTTP 400)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"contains\")(?=.*\"value\"\s*:\s*\"\[)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative â€” agent must NOT use unsupported operators on a CHOICE_SET_MULTIPLE field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"(in|not in|startswith|endswith|>|<|>=|<=)\")'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative â€” agent must NOT pass a display label (`travel`/`meals`/`lodging`) into a tags filter"
    tool_name: "Bash"
    command_pattern: '(?si)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"value\"\s*:\s*\"(travel|meals|lodging)\")'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0
