task_id: skill-datafabric-smoke-choice-multiple-filter
description: >
  Smoke test: agent uses the uipath-data-fabric skill to filter records on a
  CHOICE_SET_MULTIPLE field — picking `contains` for membership and the
  JSON-array string form of `=` for set equality, and avoiding the two known
  HTTP 400 failure modes (bare value with `=`, bracket value with `contains`).
  Verified server behavior — see references/records-query.md §
  "Filtering on Choice-Set Fields".
tags: [uipath-data-fabric, smoke, complex-fields]

run_limits:
  max_turns: 25


initial_prompt: |
  There's an Expense list called `CE_SmokeExpenses` already set up in
  the tenant. It has an amount column and a multi-select tags column
  backed by a dropdown — the dropdown options are Travel, Meals, and
  Lodging (plus a couple of others that don't matter for these searches).

  Could you run these four searches? One search per request — just
  run each one once, no retries:

    1. Find every expense tagged with Travel.
    2. Find every expense whose tags are exactly {Travel, Lodging}
       and nothing else.
    3. Find every expense that's NOT tagged with Meals.
    4. Show me how many expenses there are for each unique tag
       combination.

success_criteria:
  - type: command_executed
    description: "Task 1 — agent used `contains` with a bare NumberId string for membership (Travel=0)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"contains\")(?=.*\"value\"\s*:\s*\"0\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 2 — agent used `=` with a JSON-array string for set equality (Travel + Lodging = [0, 2])"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"=\")(?=.*\"value\"\s*:\s*\"\[0,\s*2\]\")'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 3 — agent used `not contains` for negated membership"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"not contains\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Task 4 — agent used groupBy on tags with COUNT aggregate"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"groupBy\"\s*:\s*\[\s*\"tags\")(?=.*\"function\"\s*:\s*\"COUNT\")'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT use `=` with a bare value on tags (HTTP 400)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*\"fieldName\"\s*:\s*\"tags\"\s*,\s*\"operator\"\s*:\s*\"=\"\s*,\s*\"value\"\s*:\s*\"\d+\"'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT use `contains` with a bracketed value on tags (HTTP 400)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"contains\")(?=.*\"value\"\s*:\s*\"\[)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT use unsupported operators on a CHOICE_SET_MULTIPLE field"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"operator\"\s*:\s*\"(in|not in|startswith|endswith|>|<|>=|<=)\")'
    min_count: 0
    max_count: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Negative — agent must NOT pass a display label (`Travel`/`Meals`/`Lodging`) into a tags filter"
    tool_name: "Bash"
    command_pattern: '(?si)uip\s+df\s+records\s+query(?=.*\"fieldName\"\s*:\s*\"tags\")(?=.*\"value\"\s*:\s*\"(travel|meals|lodging)\")'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

pre_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seed_entity.py
      --entity-name CE_SmokeExpenses
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.records.json
    timeout: 180
    fail_on_error: false

post_run:
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/revert_entity_to_seed.py
      --entity-name CE_SmokeExpenses
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/seeds/smoke_expenses.records.json
    timeout: 180
