task_id: skill-datafabric-smoke-entities
description: >
  Smoke test: agent uses the uipath-data-fabric skill to manage entity schemas
  offline — list native entities, create a new entity with typed fields (fieldName
  key, EntityFieldDataType strings) including advanced per-type constraints
  (lengthLimit, decimalPrecision, minValue / maxValue), retrieve a schema and
  identify field IDs from Fields[].ID, add new fields (addFields), and update an
  existing field's metadata and constraints (updateFields with id key). Tests
  all entity command syntax in a single pass.
tags: [uipath-data-fabric, smoke, entities]
run_limits:
  max_turns: 30

initial_prompt: |
  Heads-up — I'm just sketching this out before I've actually logged in, so every command will error on auth. Don't worry about that, and please don't retry or try to log in — I just want to see the right steps in order.

  There is an existing entity "Employees" with entity ID "ent-456-xyz".
  Fields: FirstName (STRING), LastName (STRING), HireDate (DATE).

  Could you help us with this:

    - First, show me what lists are already in the tenant.

    - Set up a new Departments list called `CE_SmokeDepartments` with
      these columns:
        - Department name — required, no longer than 100 characters
        - Head count — whole number, between 0 and 10,000
        - Budget — decimal, two places, between 0 and 999,999
        - Description — long text, up to 2000 characters

    - Read the Employees list's settings back so you have the column
      IDs handy.

    - Add a salary column to Employees: decimal, two places, never
      negative.

    - Rename the hire date column to "Date Hired" and make it required
      (use the column ID you just read from Employees' settings).

    - On the Departments list, bump the department-name length limit
      to 200 (use the column ID from the Departments settings you just
      created).

  Please don't try to remove any columns and don't delete any lists.

success_criteria:
  - type: command_executed
    description: "Agent listed native-only entities (--native-only required)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list\s+.*--native-only'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName (not name) in entity create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved entity schema with entities get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used addFields key in entities update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*addFields'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used updateFields with lowercase id key in entities update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*updateFields.*\"id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied lengthLimit on a STRING field in entities create"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied decimalPrecision on a DECIMAL field in entities create"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*decimalPrecision'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied minValue/maxValue on a numeric field in entities create"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent changed a field's lengthLimit via updateFields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*updateFields.*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0
