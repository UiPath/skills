task_id: skill-activation
description: >
  Skill activation eval: measures whether each of the 19 UiPath skills is
  invoked iff a user prompt warrants it. ONE agent run per row; per-skill
  confusion matrices (precision / recall / F1) are computed in parallel
  from the same traces by stacking 19 skill_triggered criteria.
tags: [activation, classification]

sandbox:
  driver: tempdir
  python: {}

# Each path injects expected_skill (the row's true label) into every row.
# negative.jsonl rows get expected_skill="" (negative for all 19 skills).
dataset:
  paths:
    - path: uipath-agents.jsonl
      fields: {expected_skill: uipath-agents}
    - path: uipath-coded-apps.jsonl
      fields: {expected_skill: uipath-coded-apps}
    - path: uipath-data-fabric.jsonl
      fields: {expected_skill: uipath-data-fabric}
    - path: uipath-diagnostics.jsonl
      fields: {expected_skill: uipath-diagnostics}
    - path: uipath-feedback.jsonl
      fields: {expected_skill: uipath-feedback}
    - path: uipath-gov-access-policy.jsonl
      fields: {expected_skill: uipath-gov-access-policy}
    - path: uipath-gov-aops-policy.jsonl
      fields: {expected_skill: uipath-gov-aops-policy}
    - path: uipath-human-in-the-loop.jsonl
      fields: {expected_skill: uipath-human-in-the-loop}
    - path: uipath-interact.jsonl
      fields: {expected_skill: uipath-interact}
    - path: uipath-maestro-case.jsonl
      fields: {expected_skill: uipath-maestro-case}
    - path: uipath-maestro-flow.jsonl
      fields: {expected_skill: uipath-maestro-flow}
    - path: uipath-planner.jsonl
      fields: {expected_skill: uipath-planner}
    - path: uipath-platform.jsonl
      fields: {expected_skill: uipath-platform}
    - path: uipath-review.jsonl
      fields: {expected_skill: uipath-review}
    - path: uipath-rpa.jsonl
      fields: {expected_skill: uipath-rpa}
    - path: uipath-rpa-legacy.jsonl
      fields: {expected_skill: uipath-rpa-legacy}
    - path: uipath-solution-design.jsonl
      fields: {expected_skill: uipath-solution-design}
    - path: uipath-tasks.jsonl
      fields: {expected_skill: uipath-tasks}
    - path: uipath-test.jsonl
      fields: {expected_skill: uipath-test}
    - path: negative.jsonl
      fields: {expected_skill: ""}

initial_prompt: "${row.prompt}"

# 19 skill_triggered criteria — one per skill. Each derives expected internally
# from `expected_skill == skill_name`. Heavy class imbalance (~50 yes / ~900 no
# per skill) means recall.yes is the meaningful gate; recall.no is trivially high.
success_criteria:
  - type: skill_triggered
    description: "uipath-agents activation"
    skill_name: uipath-agents
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
    description: "uipath-coded-apps activation"
    skill_name: uipath-coded-apps
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
    description: "uipath-data-fabric activation"
    skill_name: uipath-data-fabric
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
    description: "uipath-diagnostics activation"
    skill_name: uipath-diagnostics
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
    description: "uipath-feedback activation"
    skill_name: uipath-feedback
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
