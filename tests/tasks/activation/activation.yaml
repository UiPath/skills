task_id: uipath-maestro-flow-activation
description: >
  Skill activation eval: measures whether the uipath-maestro-flow skill is
  invoked iff a user prompt warrants it. Scored as a binary classifier with
  precision / recall / F1 over a labeled prompt dataset.
tags: [uipath-maestro-flow, activation, classification]

sandbox:
  driver: tempdir
  python: {}

# Multi-source dataset: each <skill>.jsonl + negative.jsonl is loaded directly.
# The `fields` block injects per-file labels (should_trigger) into every row,
# so the framework computes the merged dataset and we don't need a build script.
# When scoring uipath-maestro-flow, only its own jsonl is positive; every
# other skill's file plus negative.jsonl is a negative.
dataset:
  paths:
    - path: uipath-maestro-flow.jsonl
      fields: {should_trigger: "yes"}
    - path: negative.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-agents.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-coded-apps.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-data-fabric.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-diagnostics.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-feedback.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-gov-access-policy.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-gov-aops-policy.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-human-in-the-loop.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-interact.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-maestro-case.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-planner.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-platform.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-review.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-rpa.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-rpa-legacy.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-solution-design.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-tasks.jsonl
      fields: {should_trigger: "no"}
    - path: uipath-test.jsonl
      fields: {should_trigger: "no"}

initial_prompt: "${row.prompt}"

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-maestro-flow Skill iff should_trigger=yes for row ${row.id}"
    expected: "${row.should_trigger}"
    # Filter to the specific skill we're measuring. Without this, the criterion
    # counts ANY Skill invocation as a positive, leaking signal across skills.
    skill_name: uipath-maestro-flow
    # Suite-level gates over the full dataset (50 yes, ~896 no across all
    # skill files). Recall.no will be very high by construction since most
    # prompts are negatives; recall.yes is the harder metric.
    suite_thresholds:
      accuracy: 0.75
      recall.yes: 0.70
      recall.no: 0.70
