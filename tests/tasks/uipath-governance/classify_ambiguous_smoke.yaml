task_id: skill-gov-classify-ambiguous-smoke
description: >
  Smoke test: agent receives the canonical ambiguous governance prompt
  ("Block ChatGPT for my finance team") which fits both Branch A (AOps
  AI Trust Layer product policy) and Branch B (Access ToolUsePolicy).
  Per Critical Rules #1-#3, the agent must render the disambiguation
  question and NOT run any create/update before classification is settled.
  Validates the skill's core routing spine.

  Known limitation: an idle agent that does nothing also passes the
  negative guards. This is acceptable — silently creating a wrong-branch
  policy is the failure mode being tested.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is that the
  agent does NOT skip disambiguation.
tags: [uipath-governance, smoke, mode:diagnose, lifecycle:discover]

run_limits:
  expected_turns: 5

initial_prompt: |
  Block ChatGPT for my finance team using Studio.

  Important:
  - The `uip` CLI is available but is NOT connected to a live governance
    tenant in this environment. Commands will fail with auth errors — that
    is expected.
    Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.
    HOWEVER: if you are unsure which governance layer to use (AOps product
    policy vs Access tool-use policy), you SHOULD ask to clarify — that
    is the correct behavior per the skill's rules.

success_criteria:
  - type: skill_triggered
    description: "Agent loaded the uipath-governance skill"
    skill_name: "uipath-governance"
    expected_skill: "uipath-governance"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must NOT create an AOps policy before disambiguation"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+create\b'
    weight: 3.0

  - type: command_not_executed
    description: "Agent must NOT create an Access policy before disambiguation"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+access-policy\s+create\b'
    weight: 3.0

  - type: command_not_executed
    description: "Agent must NOT update any policy before disambiguation"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+.*(?:create|update)\b'
    weight: 2.0
