task_id: skill-governance-compliance-full-apply-e2e-live
description: >
  Live e2e: full ISO 42001 posture improvement lifecycle against a real tenant.
  Agent must discover current posture, apply missing settings if gaps exist, and
  deliver a structured compliance summary.

  Core mutations (state enable) are mandatory. pre_run cleanup guarantees the
  pack starts disabled, so state enable is always required. A post-hoc
  run_command verifies the mutation actually landed on the tenant.

  Requires UIPATH_CLI_ENABLE_ENV_AUTH + UIPATH_CLI_AUTH_TOKEN + org/tenant env vars.
tags: [uipath-governance, e2e, mode:operate, lifecycle:setup, feature:compliance, live]

sandbox:
  python: {}

pre_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-governance'',''compliance-pack'',''cleanup_compliance_pack.py''))"'
    timeout: 120

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-governance'',''compliance-pack'',''cleanup_compliance_pack.py''))"'
    timeout: 120

run_limits:
  max_turns: 40
  turn_timeout: 900

initial_prompt: |
  Get my tenant aligned to ISO 42001. Analyze current posture gaps,
  apply any missing settings, and confirm the changes took effect.

  Save all CLI output to output.txt. Save a summary to report.json with
  the pack name and whether apply was performed.

  Important:
  - Always pass --output json.
  - Do NOT prompt for confirmation — automated run.
  - The CLI IS connected to a live tenant. Commands will succeed.

success_criteria:
  - type: skill_triggered
    description: "Agent activated the uipath-governance skill"
    skill_name: "uipath-governance"
    expected_skill: "uipath-governance"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent called state coverage to analyze posture"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+state\s+coverage\b'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent called state enable to apply missing settings"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+state\s+enable\b'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent called state get to verify post-apply state (advisory)"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+state\s+get\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent called catalog get for ISO 42001 (advisory)"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+catalog\s+get\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_not_executed
    description: "Full apply does NOT call aops-policy create (wrong path)"
    command_pattern: 'uip\s+gov\s+aops-policy\s+create'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "CLI output captured to output.txt"
    path: "output.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "CLI output contains evidence of live API response"
    command: 'grep -qE "Success|Result|totalCount|iso-42001" output.txt'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json created"
    path: "report.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "report.json references iso-42001"
    path: "report.json"
    includes:
      - "iso-42001"
    weight: 1.5
    pass_threshold: 1.0
