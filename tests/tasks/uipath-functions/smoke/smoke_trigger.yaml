task_id: skill-functions-python-smoke-trigger
description: >
  Smoke test: agent should trigger the uipath-functions skill when the user
  asks for a deterministic Python function with typed I/O that runs as a
  UiPath job. Fans out over several Python-Functions-signal prompts and grades
  the trigger RATE (recall.yes) rather than a single run, so LLM routing
  nondeterminism doesn't flake the gate. Verifies the skill fires on the
  Python Functions signal (no LLM reasoning) and is NOT routed to uipath-agents.
tags: [uipath-functions, smoke, mode:build, lifecycle:discover]

dataset:
  id_field: id
  rows:
    - id: invoice-validate
      prompt: |
        I need a deterministic Python function (typed input/output, no LLM) that
        validates incoming invoice data — takes an invoice number, vendor name,
        total amount, and currency, and returns whether it's valid plus a list
        of validation errors, packaged so I can run it as a UiPath job. Which
        UiPath skill should I use and what's the project layout? Just outline
        it, don't build.
    - id: csv-transform
      prompt: |
        I want a deterministic Python function (no LLM) that takes a CSV of
        orders, dedupes rows by order id, and returns the cleaned rows with a
        typed output model, packaged so I can run it as a UiPath job. Which
        UiPath skill should I use and what's the project layout? Don't create
        files yet.
    - id: api-custom-auth
      prompt: |
        I want a deterministic Python function with typed Input/Output models
        (no LLM, no agent) that I can package and run as a UiPath job. Inside
        it, I'll call a third-party REST API with a custom HMAC auth header and
        map the response into the typed output fields. Which UiPath skill should
        I use and what's the project layout? Just outline it, don't build.

initial_prompt: "${row.prompt}"

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-functions skill"
    skill_name: "uipath-functions"
    expected_skill: "uipath-functions"
    weight: 3.0
    # Rate-based gate across the rows above: tolerates LLM routing
    # nondeterminism by requiring the skill to fire on >=2/3 of rows rather
    # than failing on a single unlucky run (the n=1 brittleness). 0.66 < 2/3
    # (0.667), so 2 of 3 rows triggering passes; only <=1/3 fails.
    suite_thresholds: {recall.yes: 0.66}
