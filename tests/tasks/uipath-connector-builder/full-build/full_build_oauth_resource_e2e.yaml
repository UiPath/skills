task_id: skill-connector-builder-e2e-oauth-resource
description: >
  E2E test: full authoring loop for a REST connector — scaffold, configure
  OAuth2 authorization-code auth, add a CRUD activity, and validate until
  green. Exercises init → auth → activity create → validate.
tags: [uipath-connector-builder, e2e, mode:build, lifecycle:generate, connector]

run_limits:
  expected_turns: 14
  max_turns: 50
  task_timeout: 900
  turn_timeout: 600

initial_prompt: |
  Build a new UiPath Integration Service connector on disk for "Acme CRM"
  (REST + JSON API at https://api.acmecrm.example).

  Build it in a folder named `connector` (pass `--connector-dir ./connector`).

  Requirements:
  - OAuth 2.0 authorization-code auth. Authorize URL
    https://api.acmecrm.example/oauth/authorize, token URL
    https://api.acmecrm.example/oauth/token, scope "read write".
  - One resource `contacts` at vendor path /v1/contacts supporting
    GET, GETBYID, POST, PATCH, DELETE, primary key `id`.

  Validate the connector and fix anything `validate` reports.
  Not complete until `validate` reports no Errors.

  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between
  planning and implementation. Before starting, load the
  uipath-connector-builder skill and follow its workflow.

success_criteria:
  - type: skill_triggered
    description: "The connector-builder skill was loaded"
    skill_name: "uipath-connector-builder"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the connector"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+connectors\s+builder\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent configured OAuth2 via auth set"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+connectors\s+builder\s+auth\s+set\s+.*oauth2'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the contacts activity"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+connectors\s+builder\s+activity\s+create'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the connector (validate is the primary success bar)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+connectors\s+builder\s+validate'
    min_count: 1
    weight: 6.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent parses CLI output with --output json"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "`validate` passes (exit 0 = no Errors) on the built connector"
    command: "uip is connectors builder validate --connector-dir ./connector --output json"
    timeout: 60
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
