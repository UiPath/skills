task_id: skill-hitl-smoke-inline-hitl-wiring
description: >
  Smoke test: agent builds a multi-node LeaveRequest flow with an inline
  quickform HITL node (uipath.human-in-the-loop), wires the completed handle
  to a decision node that branches on the HITL output field, and validates.
  Verifies the agent uses the correct node type (not a variant) and the
  correct $vars.<nodeId>.output.<fieldId> runtime path in the decision.
tags: [uipath-human-in-the-loop, uipath-maestro-flow, smoke, lifecycle:generate, shape:multi-node, node:hitl]

sandbox: {}

run_limits:
  expected_turns: 10
  max_turns: 30
  turn_timeout: 600

initial_prompt: |
  Build a UiPath Flow named "LeaveRequest" with this structure:

  1. Manual trigger
  2. HITL node — manager reviews leave request:
       - Reviewer sees (read-only): employee name, number of days
       - Reviewer fills in: approved (boolean)
       - Outcomes: Approve (primary), Reject
  3. Decision node — branches on the reviewer's approved field from the HITL output
  4. true branch  → Script node that logs "Leave approved" → End
  5. false branch → Script node that logs "Leave rejected" → End

  Use the inline quickform HITL node (uipath.human-in-the-loop).
  Wire: Trigger → HITL →|completed| Decision → both branches → Script → End

  The Decision node condition must reference the HITL output using the
  correct runtime variable path ($vars.<nodeId>.output.<fieldName>).

  Validate the flow after building.

success_criteria:
  - type: file_exists
    description: "Flow file was created at the expected path"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow uses the inline HITL node type, not a variant"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    includes:
      - '"type": "uipath.human-in-the-loop"'
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow exposes Approve and Reject outcomes"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    includes:
      - "Approve"
      - "Reject"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Decision node references HITL output via $vars.<nodeId>.output.<fieldId>"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    pattern: '\$vars\.[A-Za-z0-9_-]+\.output\.[A-Za-z0-9_-]+'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran flow validate during the session"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP|bun run start)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow validates cleanly"
    command: "uip maestro flow validate LeaveRequest/LeaveRequest/LeaveRequest.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
