task_id: skill-hitl-e2e-ai-escalation-brownfield
# NOTE: "e2e" here means authoring end-to-end (brownfield JSON flow editing).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to insert HITL nodes into existing flows.
description: >
  Authoring E2E golden scenario (brown field): agent reads an existing
  classification flow and inserts a HITL escalation node on the low-confidence
  path. Real business use case. Full Discover -> Plan -> Build -> Verify loop.
  Does not deploy or run the flow.
tags: [uipath-human-in-the-loop, e2e, brown-field, escalation, ai-agent]

agent:
  type: claude-code

run_limits:
  max_turns: 60
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I have an existing complaint classification flow. Set it up as follows:

  1. Create the solution:
     uip solution new ComplaintTriage

  2. Create the flow project inside the solution:
     (run inside the ComplaintTriage directory)
     uip flow init ComplaintTriage

  3. Edit ComplaintTriage/ComplaintTriage/ComplaintTriage.flow to add these
     nodes and wire them:
     - Script node id "aiClassify" (label: "AI Classifier") connected after
       the trigger. Script: // AI classifies complaint; sets confidence
     - Script node id "routeHigh" (label: "Route High Priority") — wire from
       aiClassify's success port. Script: console.log('routing high priority'); return {};
     - Script node id "routeLow" (label: "Route Standard") — wire from
       aiClassify's success port. Script: console.log('routing standard'); return {};

  When the AI classifier confidence is below 80%, a human reviewer must
  make the final routing decision before the complaint is acted on.
  Insert a HITL node (type: uipath.human-in-the-loop) in the appropriate
  place, wire it, and validate the flow using:
    uip flow validate ComplaintTriage/ComplaintTriage/ComplaintTriage.flow --output json

success_criteria:
  - type: file_contains
    description: "HITL node is present in the flow file"
    path: "ComplaintTriage/ComplaintTriage/ComplaintTriage.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Completed handle is wired in the flow file"
    path: "ComplaintTriage/ComplaintTriage/ComplaintTriage.flow"
    includes:
      - '"completed"'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "uip flow validate passes"
    command: "uip flow validate ComplaintTriage/ComplaintTriage/ComplaintTriage.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
