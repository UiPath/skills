task_id: skill-hitl-smoke-neg-automated
description: >
  Negative smoke test: agent must NOT recommend HITL when the user
  explicitly requests a fully automated flow with no human review. Verifies
  the skill does not produce false positives.
tags: [uipath-human-in-the-loop, smoke]

run_limits:
  expected_turns: 2

initial_prompt: |
  Our automated invoice pipeline handles all invoices from a single verified
  supplier (AcmeCorp) with fixed pricing and pre-approved budgets. Every
  invoice follows the same template: extract 5 fixed fields, validate against
  PO numbers, post to SAP. There are no exceptions and no edge cases — the
  business has signed off on full automation with no human review steps for
  this supplier.

success_criteria:
  - type: llm_judge
    description: "Agent response does not recommend adding a human review or HITL step"
    include_agent_output: true
    prompt: |
      The user described a fully automated invoice pipeline with no exceptions and
      no human review steps. The business has signed off on full automation.

      Score 1.0 if the agent's response does NOT recommend adding a Human-in-the-Loop
      node, human review step, or manual approval checkpoint — correctly recognising
      that HITL is not appropriate here.
      Score 0.5 if the agent mostly agrees with full automation but hedges with an
      optional suggestion to add human review.
      Score 0.0 if the agent recommends or builds a HITL node or human review step.
    weight: 3.0
    pass_threshold: 0.8
