task_id: skill-hitl-smoke-writeback
description: >
  Smoke test: agent should proactively detect a write-back validation
  pattern when the user describes an AI agent writing to a system of record
  WITHOUT explicitly asking for HITL. Verifies proactive recommendation.
tags: [uipath-human-in-the-loop, smoke]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Build a UiPath Flow where an AI agent reads incomplete SAP purchase orders,
  enriches the missing vendor and cost-center fields using company data, and
  writes the corrected records back to SAP.

  Analyze whether this flow needs any human checkpoints.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-human-in-the-loop skill"
    skill_name: "uipath-human-in-the-loop"
    expected: "yes"
    weight: 3.0
    pass_threshold: 1.0
