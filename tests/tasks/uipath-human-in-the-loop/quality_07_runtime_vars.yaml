task_id: skill-hitl-quality-runtime-vars
description: >
  Quality test: after adding a HITL node, agent must wire a downstream
  script node that correctly references $vars.<NodeId>.result and
  $vars.<NodeId>.status. Tests G1 and G2.
tags: [uipath-human-in-the-loop, integration, runtime-variables]

agent:
  type: claude-code
  max_turns: 50

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a flow called "ReviewAndRoute" with:
  1. A manual trigger
  2. A HITL node (label: "Review Decision")
  3. A script node after HITL that reads the human's decision and logs it

  The script node must use the HITL runtime variables to access the result.
  Wire the completed handle to the script node. Validate the flow.

  Save results to report.json — use the actual node ID that was generated:
  {
    "hitl_node_id": "<the actual id of the HITL node>",
    "result_variable": "$vars.<hitl_node_id>.result",
    "status_variable": "$vars.<hitl_node_id>.status",
    "validation_passed": true
  }

success_criteria:
  - type: file_contains
    description: "HITL node with specified ID is present in the flow file"
    path: "ReviewAndRoute/ReviewAndRoute/ReviewAndRoute.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "report.json references a $vars result variable"
    path: "report.json"
    includes:
      - "$vars."
      - ".result"
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "report.json references a $vars status variable"
    path: "report.json"
    includes:
      - "$vars."
      - ".status"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json shows validation passed"
    path: "report.json"
    assertions:
      - expression: "validation_passed"
        operator: equals
        expected: true
    weight: 1.5
    pass_threshold: 1.0
