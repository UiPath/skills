task_id: skill-hitl-e2e-multi-hitl-brownfield
# NOTE: "e2e" here means authoring end-to-end (brownfield JSON flow editing).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to insert multiple HITL nodes.
description: >
  Authoring E2E golden scenario (brown field, complex): agent reads an existing
  HR onboarding flow and inserts TWO separate HITL checkpoints — before document
  validation and before IT provisioning. Tests multi-node insertion and full
  validation of the authored .flow file. Does not deploy or run the flow.
tags: [uipath-human-in-the-loop, e2e, brown-field, multi-hitl, hr-onboarding]

agent:
  type: claude-code

run_limits:
  max_turns: 70
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I have an HR onboarding flow. Set it up as follows:

  1. Create the solution:
     uip solution new HROnboarding

  2. Create the flow project inside the solution:
     (run inside the HROnboarding directory)
     uip maestro flow init HROnboarding

  3. Edit HROnboarding/HROnboarding/HROnboarding.flow to wire these script
     nodes in sequence after the manual trigger:
     - id "fetchDocs" (label: "Fetch Documents") — script: // fetch submitted docs
     - id "validateDocs" (label: "Validate Documents") — script: // validate doc completeness
     - id "provisionIT" (label: "Provision IT Access") — script: // create accounts
     - id "sendWelcome" (label: "Send Welcome Email") — script: // send welcome
     Wire: trigger → fetchDocs → validateDocs → provisionIT → sendWelcome

  Add human validation at TWO points:
  1. Before document validation — an HR officer must review submitted documents
  2. Before IT provisioning — a manager must approve IT access

  Wire the completed handles for both HITL nodes to their respective downstream
  steps. Validate the full flow after both nodes are added using:
    uip maestro flow validate HROnboarding/HROnboarding/HROnboarding.flow --output json

success_criteria:
  - type: file_contains
    description: "HITL node(s) present in the flow file"
    path: "HROnboarding/HROnboarding/HROnboarding.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Flow contains at least 2 HITL nodes"
    command: "[ $(grep -c '\"uipath.human-in-the-loop\"' HROnboarding/HROnboarding/HROnboarding.flow) -ge 2 ]"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Completed handles wired in the flow file"
    path: "HROnboarding/HROnboarding/HROnboarding.flow"
    includes:
      - '"completed"'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow after all changes"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip flow validate passes"
    command: "uip maestro flow validate HROnboarding/HROnboarding/HROnboarding.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
