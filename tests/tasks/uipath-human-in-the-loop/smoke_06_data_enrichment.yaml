task_id: skill-hitl-smoke-data-enrichment
description: >
  Smoke test: agent should detect a data enrichment pattern where a
  human must fill in incomplete extracted data before the flow continues.
tags: [uipath-human-in-the-loop, smoke]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  OCR extracted invoice data from a PDF but several fields are blank —
  vendor code, cost center, and PO number are missing. Route incomplete
  records to a human to fill in the missing data before the invoice is
  posted to the accounting system.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-human-in-the-loop skill"
    skill_name: "uipath-human-in-the-loop"
    expected: "yes"
    weight: 3.0
    pass_threshold: 1.0
