task_id: skill-agents-bindings-sync
description: >
  Skill-guided evaluation: agent uses the uipath-agents bindings skill to scan
  all Python files in a project (including helper modules), resolve module-level
  constants, and produce a correct bindings.json. Tests that the skill teaches
  scanning beyond main.py and constant resolution.
tags: [uipath-agents, smoke, coded, bindings]

run_limits:
  expected_turns: 15

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/coded/_fixtures/bindings_sync/invoice-processor/. ."
    timeout: 10

initial_prompt: |
  I have a UiPath coded agent project in the current directory. It has more than
  one Python module — a main graph plus a helper module — and its bindings.json
  is currently empty.

  Set up the project, then sync bindings.json so it reflects every resource call
  across every Python file in the project, not just the main entry point.

  Do NOT create any report file — just update bindings.json.

success_criteria:
  - type: file_exists
    description: "bindings.json exists"
    path: "bindings.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "bindings.json is valid JSON"
    command: "python -c \"import json; json.load(open('bindings.json'))\""
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "bindings.json contains all three resource types"
    path: "bindings.json"
    includes:
      - '"process"'
      - '"bucket"'
      - '"asset"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Process binding has correct resolved name"
    path: "bindings.json"
    includes:
      - "data-scraper"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Bucket binding has correct resolved constant value"
    path: "bindings.json"
    includes:
      - "invoice-data"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Asset binding has correct name and folder"
    path: "bindings.json"
    includes:
      - "api-key"
      - "Shared"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Resources are bound to the entrypoint"
    path: "bindings.json"
    includes:
      - "aaa11111-2222-3333-4444-555566667777"
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "bindings.json has exactly 3 resources"
    path: "bindings.json"
    assertions:
      - expression: "length(resources)"
        operator: equals
        expected: 3
    weight: 2.0
    pass_threshold: 1.0
