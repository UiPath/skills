task_id: skill-agent-guardrail-coded-validate
description: >
  Coded guardrail validation/fix flow. SimpleCodedAgent is seeded with no
  guardrails. The user asks the skill to first add a deliberately misconfigured
  user-prompt-attacks decorator (placed above @tool def lookup_account_info —
  user_prompt_attacks is LLM-scope only), then validate, then fix the misuse
  by moving the @guardrail above the create_llm() factory instead. Verifies
  the catalog/list/SDK docs were consulted, the misuse is gone after the fix,
  the user_prompt_attacks guardrail now decorates the LLM factory, and graph.py
  still parses.
tags: [uipath-agents, e2e, coded, mode:build, guardrail]

agent:
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch"]

sandbox:
  template_sources:
    - type: template_dir
      path: ../_fixtures/SimpleCodedAgent

initial_prompt: |
  I have a coded LangGraph agent in graph.py for customer support. I tried
  to protect it from prompt-injection / adversarial inputs by adding a
  user-prompt-attacks guardrail, and I put it on the `lookup_account_info`
  tool — but it doesn't seem to be doing anything and I'm not sure I wired
  it up correctly.

  Can you work out whether it's set up right for this kind of guardrail,
  and fix it if it isn't? Check what the guardrail catalog and the UiPath
  Python SDK docs say about where this guardrail is allowed to run. Make
  sure graph.py still parses when you're done.

  Do NOT publish, upload, or deploy. Do NOT ask for approval, confirmation, or
  feedback. Do NOT pause between planning and implementation. Complete the
  entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent fetched the guardrail catalog"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+catalog'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrails list"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the UiPath Python SDK guardrail docs"
    tool_name: "WebFetch"
    command_pattern: 'uipath\.github\.io/uipath-python/.*guardrails'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "user_prompt_attacks guardrail moved off @tool and onto LLM factory; graph.py parses"
    command: "python3 $TASK_DIR/check_validate.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

run_limits:
  task_timeout: 1800
  max_turns: 40
  turn_timeout: 1200
