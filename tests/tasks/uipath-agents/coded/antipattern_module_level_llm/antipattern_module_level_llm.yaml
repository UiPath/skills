task_id: skill-agent-coded-antipattern-module-level-llm
description: >
  Negative test for Coded Critical Rule C4 — LLM clients must be
  instantiated lazily, never at module level. The prompt seeds a
  LangGraph `main.py` with `llm = UiPathChat(...)` at column zero,
  and the skill must drive the agent to refactor the construction
  inside a node body before `uip codedagent init` is run.
tags: [uipath-agents, smoke, coded, lifecycle:edit, feature:antipattern]

run_limits:
  expected_turns: 9
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/coded/antipattern_module_level_llm/_fixtures/legacy-classifier ."
    timeout: 10

initial_prompt: |
  I just ported an existing LangGraph agent into UiPath. The project
  is on disk under `legacy-classifier/` (pyproject.toml, main.py,
  langgraph.json).

  It has a UiPath coded-agent anti-pattern: `main.py` constructs the
  LLM client at module level (`llm = UiPathChat(...)` at column zero).
  Review the project and fix that in place — move the LLM client
  construction inside the node body so it isn't instantiated at import
  time. The graph must still compile and `graph` must remain exported.

  Do NOT publish, upload, or deploy. Do NOT pause between planning
  and implementation. Complete end-to-end in a single pass.

success_criteria:
  - type: file_exists
    description: "main.py exists under legacy-classifier/"
    path: "legacy-classifier/main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "No module-level UiPath* construction; graph still exports `graph`"
    command: "python3 $TASK_DIR/check_antipattern_module_level_llm.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
