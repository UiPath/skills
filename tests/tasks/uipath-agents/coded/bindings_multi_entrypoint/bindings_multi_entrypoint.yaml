task_id: skill-agents-bindings-multi-entrypoint
description: >
  Bindings sync over a project with two entrypoints. Per the
  bindings-reference Step 4, when `entry-points.json` has multiple
  entrypoints the resolver must either ask which entrypoint each
  resource binds to (`AskUserQuestion`) or leave the entrypoint
  field off the binding. The check accepts any consistent outcome —
  the load-bearing assertion is that no binding ends up with a
  fabricated `EntryPointUniqueId` that doesn't match either real
  entrypoint.
tags: [uipath-agents, e2e, coded, lifecycle:generate, feature:bindings]

run_limits:
  expected_turns: 13
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/coded/bindings_multi_entrypoint/_fixtures/multi-ep/. ."
    timeout: 10

initial_prompt: |
  I have a UiPath coded agent project in the current directory. Its
  `entry-points.json` declares two entrypoints (`main` and `report`),
  each file makes one SDK resource call, and `bindings.json` is
  currently empty.

  Sync `bindings.json` so it reflects every resource call across the
  project. Two entrypoints exist; the bindings reference allows either
  binding each resource to a chosen entrypoint or leaving the
  entrypoint field off the resource entirely. Whatever you choose,
  every entrypoint id you write must match one of the two real
  entrypoints in `entry-points.json`.

  Do NOT publish, upload, or deploy. Do NOT pause between planning
  and implementation. Complete end-to-end in a single pass.

success_criteria:
  - type: file_exists
    description: "bindings.json exists"
    path: "bindings.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Two bindings; any EntryPointUniqueId references a real entrypoint"
    command: "python3 $TASK_DIR/check_bindings_multi_entrypoint.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
