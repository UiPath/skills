task_id: skill-agent-coded-antipattern-wrong-sdk-import
description: >
  Negative test for Coded Critical Rule C4 (correct SDK import path)
  — `from uipath import UiPath` is wrong and raises `ImportError`
  at module-import time. The correct path is `from uipath.platform
  import UiPath`. The skill must drive the agent to fix the import.
tags: [uipath-agents, smoke, coded, lifecycle:edit, feature:antipattern, mode:build]

run_limits:
  expected_turns: 8
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/coded/antipattern_wrong_sdk_import/_fixtures/bad-import ."
    timeout: 10

initial_prompt: |
  I have an existing UiPath coded agent project at `bad-import/`
  (pyproject.toml + main.py) that I'm trying to run.

  Review it for UiPath coded-agent anti-patterns and fix them in
  place. main.py uses `from uipath import UiPath` — that import
  path does not exist and raises `ImportError` at module-import
  time. Fix the import. The agent should still call
  `sdk.assets.retrieve_async` with the same arguments.

  Do NOT publish, upload, or deploy. Do NOT pause between planning
  and implementation. Complete end-to-end in a single pass.

success_criteria:
  - type: file_exists
    description: "main.py exists under bad-import/"
    path: "bad-import/main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "main.py imports UiPath from uipath.platform; no `from uipath import UiPath`"
    command: "python3 $TASK_DIR/check_antipattern_wrong_sdk_import.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
