task_id: skill-agent-guardrail-coded-prompt-injection-decorator
description: >
  Decorator-style prompt injection guardrail for a coded agent. A simple LangGraph
  customer support agent is seeded with no guardrails. The agent already has a
  create_llm() factory function. Use the skill to add a prompt injection detection
  guardrail using the decorator style at LLM scope. Verifies that the guardrails
  @guardrail with PromptInjectionValidator is placed above the LLM factory.
tags: [uipath-agents, e2e, coded]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../../skills/uipath-agents/fixtures/SimpleCodedAgent

initial_prompt: |
  I have a coded LangGraph agent in graph.py. It handles customer support questions.
  The LLM is created in a create_llm() factory function. I want to add a prompt
  injection detection guardrail using the decorator style at LLM scope — adversarial
  inputs should be blocked before they reach the LLM.

  Do NOT publish, upload, or deploy. Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation. Complete the entire task
  end-to-end in a single pass.

success_criteria:
  - type: run_command
    description: "Prompt injection decorator guardrail correctly added to graph.py"
    command: "python3 $TASK_DIR/check_guardrail_coded_prompt_injection_decorator.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
