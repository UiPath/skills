task_id: skill-agent-guardrail-recommend-all
description: >
  Guardrail recommendation (all scopes): scaffold a low-code Web Research Briefing Agent
  (web search, web summary, Slack post, A_Plus_B source-counter tools) with no guardrails,
  then use the skill to recommend and add appropriate guardrails from the catalog. Verifies
  that catalog and guardrails list are fetched, at least 2 guardrails are added, and the
  added guardrails include Llm-scoped protection (prompt injection or user prompt attacks)
  and post-execution content protection (harmful content or intellectual property).
tags: [uipath-agents, e2e, low-code]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "WebBriefSol" containing a low-code agent "WebResearchAgent"
  with the following configuration:
  - System prompt: "You are a web research assistant. Research topics from the web and
    post briefing summaries to Slack. Always cite the number of sources used."
  - Tools: web_search (built-in), web_summary (built-in), Slack_PostMessage (Integration
    Service), A_Plus_B (Orchestrator process for adding source counts)
  - No guardrails initially

  After creating the agent, analyze it and recommend which guardrails should be added
  based on the catalog. Then add all recommended guardrails and validate.

  Do NOT publish, upload, or deploy. Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation. Complete the entire task end-to-end
  in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrail catalog"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+catalog'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrails list"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the agent"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "WebResearchAgent/agent.json was created"
    path: "WebBriefSol/WebResearchAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "At least 2 guardrails added including Llm-scoped and content-safety guardrails"
    command: "python3 $TASK_DIR/check_guardrail_recommend_all.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
