task_id: skill-agent-guardrail-discovery
description: >
  Guardrail validator discovery via CLI. Smoke test: scaffold a
  standalone low-code agent and use `uip agent guardrails list` to
  discover available validators before adding a built-in guardrail.
  Verifies the agent uses the discovery command instead of hardcoding
  validator assumptions.
tags: [uipath-agents, smoke, low-code]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: starter_files
      files:
        - path: "bin/uip"
          content: |
            #!/usr/bin/env bash
            # Wrapper that mocks "uip agent guardrails list" for offline/CI use.
            # All other commands pass through to the real uip binary.
            SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
            REAL_UIP="$(PATH="${PATH//"$SCRIPT_DIR:"/}" command -v uip)"
            if [ -z "$REAL_UIP" ]; then
              echo "uip not found on PATH" >&2; exit 1
            fi
            case "$*" in
              *agent*guardrails*list*)
                cat <<'MOCK'
            {
              "Status": "Succeeded",
              "Data": [
                {
                  "Status": "Available",
                  "Validator": "pii_detection",
                  "AllowedScopes": ["Agent", "Llm", "Tool"],
                  "GuardrailStages": {
                    "Agent": ["PreExecution", "PostExecution"],
                    "Llm": ["PreExecution", "PostExecution"],
                    "Tool": ["PreExecution", "PostExecution"]
                  },
                  "Parameters": [
                    {"Type": "enum-list", "Id": "entities", "Required": false},
                    {"Type": "map-enum", "Id": "entityThresholds", "Required": false}
                  ]
                },
                {
                  "Status": "Available",
                  "Validator": "prompt_injection",
                  "AllowedScopes": ["Llm"],
                  "GuardrailStages": {
                    "Llm": ["PreExecution"]
                  },
                  "Parameters": [
                    {"Type": "number", "Id": "threshold", "Required": false}
                  ]
                },
                {
                  "Status": "Available",
                  "Validator": "harmful_content",
                  "AllowedScopes": ["Agent", "Llm", "Tool"],
                  "GuardrailStages": {
                    "Agent": ["PreExecution", "PostExecution"],
                    "Llm": ["PreExecution", "PostExecution"],
                    "Tool": ["PreExecution", "PostExecution"]
                  },
                  "Parameters": [
                    {"Type": "enum-list", "Id": "harmfulContentEntities", "Required": false},
                    {"Type": "map-enum", "Id": "harmfulContentEntityThresholds", "Required": false}
                  ]
                },
                {
                  "Status": "Unauthorised",
                  "Validator": "intellectual_property",
                  "AllowedScopes": ["Llm", "Agent"],
                  "GuardrailStages": {
                    "Llm": ["PostExecution"],
                    "Agent": ["PostExecution"]
                  },
                  "Parameters": [
                    {"Type": "enum-list", "Id": "ipEntities", "Required": false}
                  ]
                },
                {
                  "Status": "Available",
                  "Validator": "user_prompt_attacks",
                  "AllowedScopes": ["Llm"],
                  "GuardrailStages": {
                    "Llm": ["PreExecution"]
                  },
                  "Parameters": []
                }
              ]
            }
            MOCK
                exit 0
                ;;
              *)
                exec "$REAL_UIP" "$@"
                ;;
            esac
        - path: "CLAUDE.md"
          content: |
            Run `chmod +x bin/uip && export PATH="$PWD/bin:$PATH"` before
            any `uip` commands. The local `bin/uip` wrapper provides offline
            guardrail discovery support.

initial_prompt: |
  IMPORTANT FIRST STEP: Run `chmod +x bin/uip && export PATH="$PWD/bin:$PATH"`
  before any `uip` commands. The local `bin/uip` wrapper provides offline
  guardrail discovery support — without it `uip agent guardrails list` will fail.

  Create a UiPath solution "DiscoverSol" containing a low-code agent
  "DiscoverAgent". Then discover what guardrail validators are available
  using the CLI and add any built-in validator guardrail to the agent
  based on the discovery results. Use a block action.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip agent guardrails list to discover validators"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 5.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "DiscoverAgent/agent.json was created"
    path: "DiscoverSol/DiscoverAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "DiscoverSol/DiscoverAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Agent.json contains at least one builtInValidator guardrail"
    command: "python3 $TASK_DIR/check_guardrail_discovery.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
