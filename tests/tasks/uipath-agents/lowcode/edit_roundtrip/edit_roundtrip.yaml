task_id: skill-agent-edit-roundtrip
description: >
  Skill-guided evaluation: EDIT a pre-existing, already-valid low-code
  agent — add a second required input field, update the user message
  template + contentTokens, re-sync entry-points.json, and re-validate.
  The fixture ships a validated v1 GreetSol solution (GreeterAgent:
  name→greeting), so every graded refresh/validate is unambiguously the
  post-edit roundtrip and the agent cannot collapse create+edit into
  one pass. Exercises Critical Rules 2 (refresh+validate after edits),
  4 (schema sync), 5 (`{{input.X}}` syntax), and 6 (contentTokens in
  sync) on incremental edits — none of which are covered by
  create-from-scratch tests.
tags: [uipath-agents, smoke, mode:build, lifecycle:generate, low-code]

run_limits:
  expected_turns: 12
  max_turns: 60
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/lowcode/edit_roundtrip/_fixtures/GreetSol ."
    timeout: 10

initial_prompt: |
  Your working directory contains a solution "GreetSol" with an existing
  low-code agent "GreeterAgent" that takes a required `name` (string) and
  returns a `greeting` (string).

  Update the agent so it also takes a required `language` (string), and
  have its greeting to the user use both the name and the language.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  # Brownfield: the solution ships in the fixture.
  - type: command_not_executed
    description: "Agent did NOT re-initialize the pre-existing solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    exclude_pattern: '--help'
    weight: 1.0
    pass_threshold: 1.0

  # Brownfield: GreeterAgent ships in the fixture.
  - type: command_not_executed
    description: "Agent did NOT re-scaffold the existing GreeterAgent project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    exclude_pattern: '--help'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip agent refresh after the edit (Critical Rule 2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip agent validate after the edit (Critical Rule 2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Final state: both inputs in schema, schema synced, user message inlines both placeholders with matching contentTokens"
    command: "python3 $TASK_DIR/check_edit_roundtrip.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
