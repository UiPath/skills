task_id: skill-agents-context-grounding-scaffold-workflow
description: >
  Integration test: agent scaffolds the `uip context-grounding` command
  sequence to stand up a searchable index, writing it to a runbook script
  WITHOUT executing it (no tenant mutation, no cleanup needed). Validates the
  documented lifecycle — create (bucket-backed) → ingest (separate step, since
  create does NOT ingest) → retrieve to poll last_ingestion_status → search —
  by checking the script's contents. Graded on artifact content, so it does
  not depend on a live tenant, auth, or async ingestion.
tags: [uipath-agents, integration, mode:build, lifecycle:generate, context-grounding]

run_limits:
  expected_turns: 10

initial_prompt: |
  Write a shell script `provision-index.sh` containing the exact UiPath CLI
  commands to stand up a searchable context-grounding index named "support-kb"
  in the "Shared" folder, backed by the storage bucket named "SupportDocs",
  and then run a semantic search against it for "refund policy".

  The script must drive everything through the `uip context-grounding` CLI and
  cover the full lifecycle: the index is not searchable until ingestion has
  completed, so include the ingestion step and a readiness poll on the index's
  status before the search. Use machine-readable JSON output wherever the
  script needs to read status programmatically.

  Only WRITE the script — do NOT execute any index create/ingest/delete
  commands against the tenant. Do NOT ask for approval or pause between steps.
  Before starting, load the uipath-agents skill and follow its
  context-grounding CLI workflow.

success_criteria:
  - type: file_exists
    description: "Agent wrote the provisioning script"
    path: "provision-index.sh"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Script creates the index from a bucket source"
    path: "provision-index.sh"
    includes:
      - "context-grounding create"
      - "--bucket-source"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Script triggers ingestion separately (create does not ingest)"
    path: "provision-index.sh"
    includes:
      - "context-grounding ingest"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Script polls index status with retrieve before searching"
    path: "provision-index.sh"
    includes:
      - "context-grounding retrieve"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Script searches the index"
    path: "provision-index.sh"
    includes:
      - "context-grounding search"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Script requests JSON output so status can be parsed"
    path: "provision-index.sh"
    includes:
      - "--output json"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent scaffolded the commands rather than mutating the tenant"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+context-grounding\s+(create|ingest|delete)\b'
    weight: 2.0
    pass_threshold: 1.0
