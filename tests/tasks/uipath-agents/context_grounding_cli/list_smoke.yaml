task_id: skill-agents-context-grounding-list
description: >
  Smoke test: agent should trigger the uipath-agents skill and use the
  `uip context-grounding list` CLI to enumerate context-grounding indexes
  in a folder. Verifies the skill teaches the index-management CLI surface
  (not just the index-as-agent-resource path) and that the agent reaches
  for `--output json` on a read-only listing.
tags: [uipath-agents, smoke, mode:operate, lifecycle:discover, context-grounding]

run_limits:
  expected_turns: 5

initial_prompt: |
  Using the UiPath CLI, show me every context-grounding index that exists in
  the "Shared" folder of my tenant. I want the raw machine-readable output so
  I can parse it. Do not create or modify anything — just list them.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-agents skill"
    skill_name: "uipath-agents"
    expected: "yes"
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed indexes with uip context-grounding list"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+context-grounding\s+list\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent requested JSON output with --output json"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+context-grounding\s+list\b.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
