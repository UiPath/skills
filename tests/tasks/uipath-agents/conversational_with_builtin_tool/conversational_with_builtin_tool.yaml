task_id: skill-agent-conversational-with-builtin-tool
description: >
  Positive integration test. Builds a conversational agent that uses a
  built-in tool (`analyze-attachments`). Verifies the skill teaches:
  conversational scaffold + 7-field fixup + built-in tool wiring
  together. Built-in tools use `type: "internal"` with
  `properties.toolType: "<kebab-id>"` and need no solution-level files
  (per Critical Rules 20-21). Test passes when the agent produces a
  validatable conversational project containing a properly-shaped
  built-in tool resource.
tags: [uipath-agents, integration, mode:build, low-code, conversational, tool, built-in]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200
  max_turns: 50

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Build a low-code conversational (multi-turn chat) agent named
  "DocAgent" inside a UiPath solution named "DocSol". The agent helps
  users analyze uploaded files — users attach a document or image and
  ask questions about its content (extract key points, summarize,
  describe an image, etc.).

  Add the built-in Analyze Attachments tool so the agent has a way to
  read and process file contents.

  This is a conversational (multi-turn chat) agent — not an autonomous
  single-turn agent.

  Validate the agent successfully at the end.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire build end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new/init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(new|init)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "DocAgent/agent.json was created"
    path: "DocSol/DocAgent/agent.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "agent.json has conversational shape — isConversational true + engine conversational-v1"
    path: "DocSol/DocAgent/agent.json"
    assertions:
      - expression: "metadata.isConversational"
        operator: "equals"
        expected: true
      - expression: "settings.engine"
        operator: "equals"
        expected: "conversational-v1"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Built-in analyze-attachments tool is correctly wired (type: internal + properties.toolType)"
    command: "python3 $TASK_DIR/check_builtin_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
