task_id: skill-agent-guardrail-coded-deterministic-smoke
description: >
  Smoke test: skill routes to guardrails-coded.md and the agent adds a
  deterministic guardrail blocking inputs containing "secret". Verifies
  key structural elements without requiring backend connectivity.
tags: [uipath-agents, smoke, coded]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 300

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../../skills/uipath-agents/fixtures/SimpleCodedAgent

initial_prompt: |
  I have a coded LangGraph agent in graph.py with a lookup_account_info tool.
  I want to add a deterministic guardrail that blocks the tool whenever the
  customer_id input contains the word "secret". Use a block action.

  Do NOT publish, upload, or deploy. Do NOT ask for approval, confirmation,
  or feedback. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: run_command
    description: "Deterministic guardrail class present (middleware or decorator style)"
    command: "grep -qE 'UiPathDeterministicGuardrailMiddleware|CustomValidator' graph.py"
    timeout: 10
    expected_exit_code: 0
    weight: 4.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Rule checks for 'secret' keyword"
    path: "graph.py"
    includes:
      - "secret"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "BlockAction used"
    path: "graph.py"
    includes:
      - "BlockAction"
    weight: 2.0
    pass_threshold: 1.0
