task_id: skill-agent-inline-external-apiworkflow-tool
description: >
  Add API workflow tool (inline agent, external resource). End-to-end
  test: scaffold a flow project with an inline low-code agent that
  calls an EXTERNAL API workflow deployed in Orchestrator (not inside
  this solution). Verifies the tool resource.json under the inline
  agent's UUID subdirectory uses `type: "api"`, `location: "external"`,
  real `folderPath`, and that a `uipath.agent.resource.tool.*` flow
  node is wired to the autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, low-code, inline, tool, external, flow-integration]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "QuoteFlowSol" containing a flow project
  "QuoteFlow". The flow should use an inline low-code agent that
  calls an EXTERNAL API workflow called "GetLatestQuote" deployed in
  the Orchestrator "Shared" folder (not inside this solution). Wire
  the API workflow as a tool on the inline agent.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added a flow node"
    tool_name: "Bash"
    command_pattern: 'uip\s+flow\s+node\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "QuoteFlowSol/QuoteFlow/QuoteFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline external API workflow tool: resource.json shape (location=external) + flow node + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_external_apiworkflow_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
