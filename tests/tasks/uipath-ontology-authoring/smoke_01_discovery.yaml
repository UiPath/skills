task_id: skill-ontology-authoring-smoke-discovery
description: >
  Smoke test: asking to author an ontology over Data Fabric entities triggers
  the uipath-ontology-authoring skill and starts the folder-first discovery —
  checking login status, then listing folders — before any entity work.
tags: [uipath-ontology-authoring, smoke]

initial_prompt: |
  I want to author an ontology and R2RML mappings from my UiPath Data Fabric
  entities. Get started: load the uipath-ontology-authoring skill and follow its
  workflow to discover what is available before asking me anything else.

success_criteria:
  - type: command_executed
    description: "Checked login/session status first (Phase 0)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed folders for folder-first selection (Phase 1)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(or\s+)?folders\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
