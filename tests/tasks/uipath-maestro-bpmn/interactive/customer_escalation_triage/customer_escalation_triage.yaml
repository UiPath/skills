task_id: skill-bpmn-interactive-customer-escalation-triage
description: >
  Path-to-GA interactive BPMN evaluation based on a real customer-escalation
  scenario. The agent must progressively elicit and reconfirm a changing
  contract, then author a registry-derived executable process with a
  normalization script, an embedded assessment subprocess, an error
  end/boundary path, visible decision gateways, a sequential multi-instance
  attachment activity, and a three-workstream parallel fan-out. Independent
  graders validate, pack, and execute ten hidden cloud cases.
tags: [uipath-maestro-bpmn, e2e, mode:build, lifecycle:generate, shape:multi-node, node:decision, node:subflow, node:loop, feature:registry, feature:transform, feature:escalation, feature:conversational, path-to-ga]

run_limits:
  expected_turns: 100
  max_turns: 180
  turn_timeout: 2400
  task_timeout: 7200

agent:
  # allowed_tools uses replace semantics. Preserve normal authoring tools and
  # add structured questions for the simulated requirements interview.
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion"]

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../../../skills/uipath-maestro-bpmn

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-bpmn/interactive/customer_escalation_triage/cleanup_debug_solutions.py"
    timeout: 300

# Pure simulation mode: the simulator creates the opening request and reveals
# the contract progressively. Nothing below is present in the coding agent's
# initial prompt.
simulation:
  enabled: true
  persona: |
    You are a support-operations process architect. You understand escalation
    policy, auditability, human handoffs, and BPMN concepts such as subprocesses,
    boundary errors, and parallel work, but you do not know UiPath XML,
    expression syntax, registry payloads, or CLI details. Speak in business and
    process-design language. Require the coding agent to discover the technical
    implementation from the UiPath Maestro BPMN skill and live registry.
  goal: |
    Obtain one local, package-complete UiPath Maestro BPMN Process Orchestration
    project named CustomerEscalationTriage. It represents an inbound customer
    escalation spanning customer resolution, classification, Jira intent,
    per-attachment storage intent, Slack notification, and acknowledgement.
    External systems are intent-only because this portable evaluation has no
    stable connector credentials.

    The process inputs are customerTier:string, crmMatchCount:integer,
    serviceState:string, workaroundAvailable:boolean,
    duplicateIssueKey:string, attachments:array, agentOutputValid:boolean,
    jiraAvailable:boolean, autoSendEnabled:boolean, businessImpact:string, and
    correlationId:string. Its named outputs are route:string, severity:string,
    engineeringNeeded:boolean, jiraAction:string, attachmentAction:string,
    slackAction:string, responseMode:string, caseKey:string,
    lastAttachmentName:string, and failureReason:string.

    Before business routing, one explicit normalization/contract step must:
    compare customerTier and serviceState case-insensitively, trim
    duplicateIssueKey, and preserve correlationId exactly as caseKey. This step
    may transform data but must not decide route, severity, failureReason, or
    downstream actions. The decision policy must remain visible in gateways.

    Apply validation in this precedence order. Zero CRM matches routes to
    ManualReview with severity Unclassified and failureReason CrmNotFound.
    More than one CRM match routes to ManualReview/Unclassified with
    CrmAmbiguous. A single match followed by invalid agent output routes to
    ManualReview/Unclassified with InvalidAgentOutput. Otherwise classify
    severity: Sev1 is an Enterprise customer whose service is Unavailable with
    no workaround; Sev2 is any other Unavailable or Degraded service; Available
    is Sev3. Engineering is needed for Sev1/Sev2.

    With no validation failure, a non-empty trimmed duplicateIssueKey routes to
    ExistingIssue; otherwise Sev1/Sev2 routes to NewEscalation and Sev3 to
    Informational. A Sev1/Sev2 that needs a new or updated Jira action while
    Jira is unavailable is a technical JiraUnavailable failure: route to
    ManualReview, retain classified severity and engineeringNeeded, and surface
    it through an error end inside the assessment phase and a matching
    interrupting boundary error path. It must not be modeled as an ordinary
    successful business branch.

    The validation, classification, and success routing decisions form one
    visibly bounded embedded assessment subprocess. Its internal decisions must
    remain visible. Outside that phase, every outcome fans into exactly three
    parallel workstreams and rejoins once: Jira intent, attachment intent, and
    one communication intent branch owning both Slack and acknowledgement.

    jiraAction is UpdateExisting for ExistingIssue, CreateIssue for a new
    Sev1/Sev2, otherwise NoAction. attachmentAction is HoldForReview on manual
    review, SaveToDrive for a non-manual case with attachments, otherwise
    NoAttachments. Non-manual attachments must be processed one at a time in
    input order through a sequential multi-instance activity. That activity
    must read the current iterator item and leave lastAttachmentName equal to
    the final attachment; otherwise lastAttachmentName is the empty string.
    slackAction is PostAlert for non-manual Sev1/Sev2 and NoAlert otherwise.
    responseMode is Send only for Informational when autoSendEnabled is true;
    every other acknowledgement is Draft. failureReason is empty on success.
    businessImpact is contextual only and must not affect a decision.

    The agent must retrieve and save the exact live registry responses for both
    BPMN.ScriptTask and BPMN.Variables under
    CustomerEscalationTriage/registry-evidence/, use those templates rather than
    inventing UiPath payloads, include full BPMN DI and project metadata, pass
    the bundled validator, and pack successfully. It must not upload, publish,
    run, or debug the process; hidden execution belongs to the grader.
  constraints:
    - "Open naturally with the project name and the broad email-to-resolution/classification/Jira/attachments/Slack/acknowledgement problem. Say that policy, data, and failure semantics are incomplete and ask the agent to interview you before building. Reveal no variable names or detailed rules in the opening."
    - "Progressive disclosure is mandatory. In one reply, answer at most two coherent requirement areas even if the agent asks a long questionnaire. Explicitly say which asked areas still need a follow-up, without revealing their answers."
    - "Do not accept implementation after a single agent question turn. Require at least three substantive question-and-answer rounds covering data, policy, process structure, and execution boundaries."
    - "Reveal the typed input/output contract only after the agent explicitly asks for names, directions, and primitive/container types."
    - "When asked about normalization early, reveal only case-insensitive customerTier/serviceState comparisons and exact correlation pass-through. Say the duplicate-key convention is still awaiting stakeholder confirmation."
    - "When asked about validation, reveal the ordered CRM/agent precedence and exact failure tokens. When asked about classification and routing, reveal the severity and successful route policies plus the Jira eligibility nuance."
    - "When asked how the process should communicate its design, require one visible assessment phase, visible gateways rather than an opaque calculation, a technical Jira error leaving that phase through a matching error boundary, and exactly three downstream parallel workstreams."
    - "Reject any design playback that proposes more than one ScriptTask, maps or initializes any business/downstream output other than caseKey from that ScriptTask (including empty failureReason or lastAttachmentName defaults), puts policy in a ScriptTask, or moves downstream Jira/attachment/communication decisions into opaque scripts. Approval requires exactly one normalization-only ScriptTask; all other output assignments must remain visible through exclusive gateways and Variables tasks."
    - "Before approving a playback, audit the JiraUnavailable guard explicitly. Reject route-only proxies such as ExistingIssue-or-NewEscalation because ExistingIssue can be Sev3. The technical error must require jiraAvailable=false AND classified severity Sev1 or Sev2, while retaining that severity and engineeringNeeded."
    - "When asked about attachments or collection behavior, reveal that attachments is an array, non-manual items are handled sequentially in input order, the current item must be consumed, and lastAttachmentName records the final processed item."
    - "When asked about integrations or lifecycle boundaries, state that all external systems are intent-only, exact ScriptTask and Variables registry responses must be retained under CustomerEscalationTriage/registry-evidence/, and the grader alone owns run/debug/cleanup."
    - "Before authoring, require the agent to summarize the complete contract and intended topology for confirmation. On its first otherwise-complete summary, introduce the stakeholder correction that whitespace-only duplicateIssueKey counts as empty and must therefore follow the no-duplicate route. Ask the agent to update its plan."
    - "Treat the playback as a design review, not a courtesy. Compare every stated guard, assignment, token, and path to the goal and reject any omission or contradiction before approval; identify only the concrete discrepancies and ask for a corrected playback."
    - "Only after the agent incorporates the whitespace correction, uses exactly one normalization-only ScriptTask, preserves every routing and action decision in visible gateways and Variables tasks, states the exact severity-qualified JiraUnavailable guard, and asks again for confirmation, respond with the exact phrase DESIGN APPROVED and permit authoring."
    - "If the agent writes project files before DESIGN APPROVED, reject the work and do not compensate by dumping missing requirements."
    - "If the agent asks how to encode XML, expressions, mappings, iterator syntax, or registry payloads, restate the business/process outcome and direct it to the BPMN skill and live registry. Never provide implementation snippets, node ids, or a reference graph."
    - "If asked for upload, publish, run, or debug permission, decline."
    - "Before accepting completion, ask the agent to confirm independent local validation, packing, two saved registry responses, and that it did not execute the BPMN."
    - "Keep replies concise and in character. Emit the stop token only after every revealed requirement is addressed and the agent reports successful local validation and packing."
  max_turns: 20

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-maestro-bpmn skill"
    skill_name: "uipath-maestro-bpmn"
    expected_skill: "uipath-maestro-bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: agent_judge
    description: "Agent conducted a progressive requirements interview and incorporated the late correction before implementation"
    prompt: |
      Grade only the observable interaction trajectory. Return score 1.0 only
      when all conditions hold:
      1. Before creating or editing project artifacts, the agent completed at
         least three substantive question rounds covering the typed contract
         and normalization; validation/severity/routing/downstream policy;
         visible subprocess/error/parallel/multi-instance semantics; and the
         registry/no-live-connector/no-debug boundary.
      2. The agent summarized the complete contract and topology for approval,
         including exactly one normalization-only ScriptTask, visible policy
         decisions, and a JiraUnavailable guard requiring both
         jiraAvailable=false and classified severity Sev1/Sev2 (not merely a
         route proxy).
      3. The simulated user then introduced the whitespace-only duplicate-key
         correction; the agent explicitly incorporated it, updated its plan,
         and obtained the exact DESIGN APPROVED response before implementation.
      4. It did not guess an unasked category, rely on volunteered requirements,
         or begin authoring and repair the interview afterward.
      Registry discovery and other read-only inspection are not implementation;
      project file creation or modification is. Return 0.0 for any missing
      condition. Do not grade artifact correctness or agent self-reports.
    include_dialog: true
    include_agent_output: false
    include_tool_calls: false
    include_reference: false
    max_dialog_chars: 50000
    max_turns: 3
    turn_timeout: 600
    agent:
      type: claude-code
      allowed_tools: []
    weight: 4.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent left BPMN cloud execution and mutation to the grader"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP|\$\{?UIP\}?)\s+maestro\s+bpmn\s+(debug|process\s+run|upload|publish|deploy)'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "CustomerEscalationTriage BPMN source was created"
    path: "CustomerEscalationTriage/CustomerEscalationTriage.bpmn"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Exact BPMN.Variables registry response was retained"
    path: "CustomerEscalationTriage/registry-evidence/BPMN.Variables.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Exact BPMN.ScriptTask registry response was retained"
    path: "CustomerEscalationTriage/registry-evidence/BPMN.ScriptTask.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Artifact uses registry-derived ScriptTask and Variables payloads plus a real subprocess, boundary error, visible decisions, sequential attachment loop, and three-way parallel region"
    command: "python3 $TASK_DIR/check_customer_escalation_structure.py"
    timeout: 45
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

  - type: run_command
    description: "Bundled validator independently accepts the generated BPMN"
    command: "npm install --silent --prefix validator && node validator/validate-bpmn.mjs CustomerEscalationTriage/CustomerEscalationTriage.bpmn"
    timeout: 180
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Project independently packs into a non-empty process-orchestration package with consistent metadata"
    command: "python3 $TASK_DIR/check_customer_escalation_package.py"
    timeout: 180
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Ten hidden cloud debug cases exactly satisfy precedence, normalization, error-boundary outcomes, sequential attachment evidence, parallel intents, typed outputs, and correlation"
    command: "python3 $TASK_DIR/check_customer_escalation_runtime.py"
    timeout: 2400
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
