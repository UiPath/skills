task_id: skill-bpmn-remove-node
description: >
  Remove the autoApprove script task from the existing OrderTriage BPMN and
  rewire the routeByRisk gateway's default branch straight to the end event.
  Exercises deleting a node, reconnecting the orphaned edges, and pruning the
  removed node's diagram shape/edges without leaving dangling references.
tags: [uipath-maestro-bpmn, integration, "mode:build", "lifecycle:edit", "shape:multi-node"]

run_limits:
  expected_turns: 12
  max_turns: 25

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../../../skills/uipath-maestro-bpmn
    - type: template_dir
      path: ../templates/initial_bpmn

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  The existing file `OrderTriage.bpmn` runs: start -> classifyOrder (script) ->
  routeByRisk (exclusive gateway) -> flagForReview / autoApprove -> end.

  Remove the `autoApprove` script task entirely. The gateway's default branch
  must now lead directly to the end event instead. Reconnect the sequence flows,
  keep `routeByRisk` an exclusive gateway with a default branch, and prune the
  removed node's BPMNShape and any orphaned BPMNEdge so no diagram element points
  at a deleted id. Preserve every other node, id, and the flagForReview branch.

  Validate the file with an explicit Bash command before finishing — a
  well-formed-XML parse, e.g.:
  `python3 -c "import xml.etree.ElementTree as ET; ET.parse('OrderTriage.bpmn')"`.

  Do NOT upload, publish, deploy, debug, run, or pack anything. Do NOT ask for
  approval, confirmation, or feedback. Do NOT pause between planning and
  implementation. Make the complete edit end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran an explicit well-formed-XML validation on the edited BPMN"
    tool_name: "Bash"
    command_pattern: 'python3?\s+-c\s+[\s\S]*ET\.parse\([\s\S]*OrderTriage\.bpmn'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Edited BPMN source is present"
    path: "OrderTriage.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "autoApprove removed, gateway default rewired to end, no dangling refs or orphan DI"
    command: "python3 $TASK_DIR/check_remove_node.py"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
