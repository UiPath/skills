task_id: skill-bpmn-contract-variant-wrappers
description: >
  Registry wrapper-coverage eval: agent authors public-safe Maestro BPMN
  nodes for a spread of registry extension types (Orchestrator, A2A, queue,
  business-rule, call-activity, message-event, wait-event), filling each
  type's registry xmlTemplate so every node lands on the correct registry
  bpmnElement.
tags: [uipath-maestro-bpmn, integration, lifecycle:generate, contract:xml, node:service-task, node:call-activity, connector]

run_limits:
  expected_turns: 20
  max_turns: 90
  turn_timeout: 1200
initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  Create a local BPMN project named "ContractVariantsBpmn".
  Use synthetic placeholder resource names only. Do not include tenant URLs,
  folder keys, connection IDs, queue IDs, release keys, real process names, or
  real user names.

  Author each node below by filling that type's registry xmlTemplate
  (`uip maestro bpmn registry get <type> --output json`) — do not hand-write any
  `uipath:*` element. Each node's BPMN element must be the type's registry
  `bpmnElement`. The BPMN must manually start, visit each node, and end:
  - `Orchestrator.StartAgentJob` (serviceTask).
  - `A2A.AgentExecution` (serviceTask).
  - `Orchestrator.ExecuteApiWorkflowAsync` (serviceTask).
  - `Orchestrator.BusinessRules` (businessRuleTask).
  - `Orchestrator.CreateQueueItem` (sendTask).
  - `Orchestrator.CreateAndWaitForQueueItem` (serviceTask).
  - `Orchestrator.StartAgenticProcess` (callActivity).
  - `Orchestrator.StartAgenticProcessAsync` (callActivity).
  - `Orchestrator.StartCaseMgmtProcess` (callActivity).
  - `Orchestrator.StartCaseMgmtProcessAsync` (callActivity).
  - `Intsvc.WaitForEvent` (receiveTask); keep connector details placeholder-safe
    and do not hand-author private connection metadata.
  - `Maestro.SendMessageEvent` (intermediateThrowEvent); keep the message name
    and payload synthetic.
  - `Maestro.CaseManagerGuardrails` (serviceTask).
  - `Maestro.CaseRulesEvaluator` (serviceTask).

  Bind process/queue-backed nodes from each template's `bindingInfo` using only
  synthetic placeholder values; never fabricate a real GUID. Generate BPMN DI
  for every visible node and sequence flow. Do not upload, publish, deploy,
  debug, or run the process.

success_criteria:
  - type: file_exists
    description: "BPMN source was created"
    path: "ContractVariantsBpmn/ContractVariantsBpmn.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Contract variant wrappers use the documented BPMN element types"
    command: "python3 $TASK_DIR/check_contract_variant_wrappers.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
