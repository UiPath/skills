task_id: skill-bpmn-hitl-multi-outcome-routing
description: >
  Smoke test (ported from flow hitl/smoke_03): agent routes an Actions.HITL
  user task's outcome through an exclusive gateway into three distinct paths
  (approve / reject / escalate), with conditioned branches plus a default and a
  BPMN diagram.
tags: [uipath-maestro-bpmn, smoke, "mode:build", "lifecycle:generate", "shape:multi-node", "node:hitl", "node:decision", "feature:approval-gate"]

run_limits:
  expected_turns: 24
  max_turns: 90

initial_prompt: |
  Create a local BPMN project named "LeaveRequestBpmn" with this process:

  1. Manual start.
  2. HITL user task — a manager reviews a leave request (read-only: employee
     name, number of days). Capture the manager's decision as an output of the
     HITL activity bound to a process variable.
  3. Exclusive gateway that routes on the manager's decision into three distinct
     downstream paths: approve, reject, and escalate — each leading to its own
     step and end.

  Requirements:
  - Model the review as a `bpmn:userTask` using the documented `Actions.HITL`
    `uipath:activity` shell from the registry template. Do not hand-author the
    uipath:* payload from prose.
  - The exclusive gateway must have three outgoing branches to three distinct
    targets: two conditioned branches whose conditions reference the HITL output
    variable, plus exactly one default branch.
  - Use synthetic placeholder resource names only.
  - Include BPMN DI for every visible node and sequence flow.
  - Do not upload, publish, deploy, debug, or run the process. Do not pause for
    approval, confirmation, or feedback.

success_criteria:
  - type: file_exists
    description: "BPMN source was created"
    path: "LeaveRequestBpmn/LeaveRequestBpmn.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "HITL modeled with the documented Actions.HITL activity type"
    path: "LeaveRequestBpmn/LeaveRequestBpmn.bpmn"
    includes:
      - "Actions.HITL"
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "HITL outcome routed through an exclusive gateway into three distinct paths"
    command: "python3 $TASK_DIR/check_smoke_multi_outcome_routing.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
