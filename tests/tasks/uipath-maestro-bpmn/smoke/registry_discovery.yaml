task_id: skill-bpmn-registry-discovery
description: >
  Skill-guided evaluation: agent uses the uipath-maestro-bpmn skill to discover
  Maestro BPMN extension types via the registry CLI (pull, list/search, get)
  before authoring anything. Tests that the skill teaches the registry-driven
  discovery loop instead of hand-authoring uipath:* XML from prose.
tags: [uipath-maestro-bpmn, smoke, registry]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I want to author a UiPath Maestro BPMN process that starts an RPA job and
  waits for an internal message. Before authoring anything, load and follow the
  uipath-maestro-bpmn skill and use the registry to discover the right
  extension types and their templates.

  Save your findings to registry_report.json with at minimum:
    {
      "extension_types_found": ["<relevant extension types>"],
      "commands_used": ["<the uip maestro bpmn registry commands you ran>"],
      "rpa_job_type": "<the extension type for starting an RPA job>",
      "receive_message_type": "<the extension type for receiving an internal message>",
      "rpa_job_has_xml_template": true
    }

  Important:
  - The `uip` CLI is already available in the environment.
  - Use `--output json` on all uip commands.
  - Do not author the BPMN yet — just discover and report. Do not upload,
    publish, deploy, debug, run, or pack anything.

success_criteria:
  - type: command_executed
    description: "Agent pulled the registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+bpmn\s+registry\s+pull'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed or searched registry extension types"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+bpmn\s+registry\s+(list|search)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched a template with registry get"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+bpmn\s+registry\s+get'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on registry commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+bpmn\s+registry\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "registry_report.json exists"
    path: "registry_report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Report identifies the RPA-job and receive-message extension types"
    path: "registry_report.json"
    assertions:
      - expression: "rpa_job_type"
        operator: "contains"
        expected: "Orchestrator.StartJob"
      - expression: "receive_message_type"
        operator: "contains"
        expected: "Maestro.ReceiveMessageEvent"
    weight: 2.0
    pass_threshold: 1.0
