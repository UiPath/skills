task_id: skill-bpmn-script-task-map
description: >
  Skill-guided evaluation: agent uses the uipath-maestro-bpmn skill to author a
  Jint-safe script task that runs a map operation (uppercasing a field over a
  collection). Script tasks are how BPMN processes reshape data. Authoring only —
  no cloud effects.
tags: [uipath-maestro-bpmn, smoke, "mode:build", "lifecycle:generate", "shape:single-node", "node:script"]

run_limits:
  expected_turns: 20
  max_turns: 55

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../../../skills/uipath-maestro-bpmn

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  Author a single Maestro BPMN file `ScriptTaskMapDemo.bpmn` in the working
  directory with the shape: start -> scriptTask -> end. The script task maps a
  small static collection of people, uppercasing each `name` field.

  Requirements:
  - The scriptTask sets scriptFormat="JavaScript" and uipath:scriptVersion v3,
    and its Jint-safe JavaScript uses a map operation (e.g. Array.prototype.map)
    with an uppercase operation. No Node.js/browser/network/filesystem APIs.
  - Map a declared input (the collection) into the script and map the resulting
    result to a declared output variable, per the skill's BPMN.ScriptTask
    contract; do not hand-author uipath:* XML from prose.
  - Include a bpmndi:BPMNDiagram with a BPMNShape for every node and a BPMNEdge
    for every sequence flow.
  - Validate the file locally before finishing by running
    `uip maestro bpmn validate <file>` (or a well-formed-XML parse if the CLI
    is unavailable).

  Do NOT upload, publish, deploy, debug, run, or pack anything. Do NOT ask for
  approval, confirmation, or feedback, and do NOT pause between planning and
  implementation. Build the complete file end-to-end in a single pass.

success_criteria:
  - type: file_exists
    description: "BPMN source was authored"
    path: "ScriptTaskMapDemo.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "BPMN file has a diagram and a JavaScript script task"
    path: "ScriptTaskMapDemo.bpmn"
    includes:
      - "bpmndi:BPMNDiagram"
      - "scriptTask"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "BPMN has a Jint-safe scriptTask (v3, mapped I/O) implementing a map/uppercase operation, with full DI"
    command: "python3 $TASK_DIR/check_script_task_map.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
