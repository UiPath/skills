task_id: skill-troubleshoot-rpa-serverless-robot-units
description: >
  UiPath diagnostic agent must diagnose why the InvoiceParse serverless job in
  the Cloud Robots folder could not start. Grades skill_triggered + llm_judge
  against RESOLUTION.md.

tags: [uipath-troubleshoot, orchestrator, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoiceParse automation in the Cloud Robots folder won't start anymore —
  it goes straight to Faulted without ever running. It runs as a serverless
  cloud robot. This started today and now every run fails. Why, and how do I
  fix it?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing InvoiceParse automation.
    You know it runs as a serverless cloud robot in the Cloud Robots folder.
    You are not a deep platform expert and you trust the agent's investigation.
  goal: |
    Let the agent complete its investigation and tell you the root cause and
    the fix. Approve any scope expansion or clarification it requests.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks for the job key, say you don't have it handy but it is the failing InvoiceParse in the Cloud Robots folder — ask it to look the job up. Do NOT invent a key."
    - "If the agent asks whether anything changed recently, say you're not sure — usage has been growing but you don't manage licensing."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings from the evidence it already gathered."
    - "Never invent or provide new factual data beyond your initial report and the answers above. Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 8
