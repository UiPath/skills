task_id: skill-troubleshoot-rpa-executor-service-disconnect
description: >
  UiPath diagnostic agent must diagnose why one NightlyPost unattended run in
  the Batch Ops folder faulted mid-run on host BATCH-BOT-02 while other runs
  succeed. Grades skill_triggered + llm_judge against RESOLUTION.md.

tags: [uipath-troubleshoot, orchestrator, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My NightlyPost process in the Batch Ops folder faulted on last night's
  scheduled run on BATCH-BOT-02 — it had been running for about a minute and
  then died. The previous nights ran fine on the same machine. Why did this
  run fail and what should I do?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failed NightlyPost run. You know
    it runs unattended on BATCH-BOT-02 as service account UIPATH\SVC_BATCH on a
    nightly schedule, and previous nights ran fine. You are not a deep platform
    expert and you trust the agent's investigation.
  goal: |
    Let the agent complete its investigation and tell you the root cause and
    the fix. Approve any scope expansion or clarification it requests.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks for the job key, say you don't have it handy but it is the failed NightlyPost run in the Batch Ops folder — ask it to look the job up. Do NOT invent a key."
    - "If the agent asks whether prior runs succeeded, confirm yes — the previous nights ran fine on the same machine."
    - "If the agent asks whether the robot credentials are valid, say as far as you know yes — nothing changed with the account."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings from the evidence it already gathered."
    - "Never invent or provide new factual data beyond your initial report and the answers above. Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 8
