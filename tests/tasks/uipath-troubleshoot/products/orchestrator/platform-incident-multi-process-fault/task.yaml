task_id: skill-troubleshoot-platform-incident-multi-process-fault
description: >
  UiPath diagnostic agent must diagnose a burst of job failures that
  span MULTIPLE unrelated processes across MULTIPLE folders in a
  tight window (~08:12-08:17), each with an infrastructure-flavored
  error (503 Service Unavailable, "Could not obtain the user token
  from Orchestrator"). The correct diagnosis is a UiPath PLATFORM
  INCIDENT, not a bug in any one automation: the agent must
  recognize the cross-folder fan-out fingerprint (five distinct
  processes, three folders, one 5-minute window, Orchestrator-side
  infra errors), recommend correlating with status.uipath.com /
  the customer-portal known-issues, and advise monitor + rerun after
  recovery + report via the customer portal — NOT debugging the
  individual automations. Per the platform-incident-correlation
  playbook.

tags: [uipath-troubleshoot, orchestrator, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  A whole bunch of my automations failed around 08:15 this morning —
  it's not just one process, different jobs in several different
  folders all died around the same time, and I don't know which
  folder to point you at. The source for one of them (NightlyBilling)
  is in the current working directory. Can you figure out what
  happened?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the widespread morning
    failures. You are waiting for the diagnostic agent to finish and
    trust its expertise. You only know what you wrote in your initial
    report — many automations in several folders failed around 08:15.
    You do not have admin access to the status page or the customer
    portal and cannot check platform status yourself.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks which folder to investigate, say you don't know — it's widespread across several folders, so look across all of them."
    - "If the agent asks whether to expand investigation scope (orchestrator, licensing, integration-service), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
