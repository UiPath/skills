task_id: skill-troubleshoot-workstation-in-use-slot-overallocation
description: >
  UiPath diagnostic agent must diagnose PolicyRenewalWorker
  unattended jobs that fault ~1s after start during the morning
  peak with "Could not start executor. The workstation is in use
  by another user." The root cause is machine-template slot
  over-allocation (job-faulted-session-console-contention playbook,
  branch 3): the ClaimsRuntimeTemplate exposes 4 unattended runtime
  slots but the single host MOCK-HOST seats only 2 concurrent RDP
  sessions, so the 3rd concurrent dispatch is refused. The agent
  must NOT diagnose logon failure (credential is valid), session-
  creation timeout (two sessions were created fine), console
  contention (LoginToConsole=false), or single-interactive-job-per-
  user (the concurrent jobs belong to other accounts). The fix is to
  reduce the template's slot count to match the host's concurrent-
  session capacity and rerun.

tags: [uipath-troubleshoot, orchestrator, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  Some of my PolicyRenewalWorker jobs fault the instant they start
  during our busy morning window (roughly 09:00–09:30), but other
  jobs on the same machine run fine at the exact same time. Nothing
  changed in the process. The project source is in the current
  working directory and the process runs in the ClaimsProcessing
  folder. Can you find out why the failing runs die at startup?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the intermittently failing
    process. You are waiting for the diagnostic agent to finish its
    investigation and trust its expertise. You only know what you
    wrote in your initial report — the failures cluster in the
    morning peak and other jobs on the same machine succeed at the
    same time. You do not have RDP/host access and cannot inspect
    the machine template yourself.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, machines, robots, licensing, system), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
