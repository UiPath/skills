task_id: skill-troubleshoot-job-output-too-large
description: >
  UiPath diagnostic agent must diagnose an InvoiceExtractor
  unattended job that faults at the very end with "Could not
  retrieve the result of the job execution. This might be because a
  message was too large to process." The workflow completed (traces
  show every activity Succeeded); the failure is at result hand-back
  because the process returns a large DataTable (Out_AllInvoices,
  ~184k rows) as an OutputArgument that exceeds the result-message
  limit. The agent must recognize this is an output-argument size
  problem (not a workflow-logic fault) and recommend returning a
  reference (Storage Bucket / queue / Data Fabric) instead of the
  bulk payload, per the job-output-too-large playbook.

tags: [uipath-troubleshoot, orchestrator, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoiceExtractor job in the FinanceOps folder faults right at
  the end of every run, even though the extraction itself seems to
  work. Can
  you find out why it fails at the finish and how to fix it?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing InvoiceExtractor
    job. You are waiting for the diagnostic agent to finish and trust
    its expertise. You only know what you wrote in your initial
    report — the extraction seems to work but the job faults at the
    end. You are not sure what an output argument is.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, traces, activity-packages, rpa), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
