task_id: skill-troubleshoot-rpa-console-conflict-hd
description: >
  UiPath diagnostic agent must diagnose why the ClaimsIntake unattended job in
  the HD Automations folder faulted at start on the high-density host
  HD-BOT-POOL. Grades skill_triggered + llm_judge against RESOLUTION.md.

tags: [uipath-troubleshoot, orchestrator, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  We run several ClaimsIntake jobs in parallel on our high-density robot host
  HD-BOT-POOL (folder HD Automations). Some of them fault the instant they
  start — they never run — while others on the same host succeed. Why are the
  parallel ones failing and how do I fix it?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing ClaimsIntake jobs. You
    run them on a high-density (HD) robot pool host HD-BOT-POOL with several
    robot users, and you expect several to run at once. You are not a deep
    platform expert and you trust the agent's investigation.
  goal: |
    Let the agent complete its investigation and tell you the root cause and
    the fix. Approve any scope expansion or clarification it requests.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks for the job key, say you don't have it handy but it is the failing ClaimsIntake in the HD Automations folder — ask it to look the job up. Do NOT invent a key."
    - "If the agent asks whether this is a high-density setup, confirm yes — multiple robot users share HD-BOT-POOL and you want them to run concurrently."
    - "If the agent asks whether the robot credentials are valid, say as far as you know yes — nothing changed with the accounts."
    - "If the agent asks about the robots' Login to Console setting, say you're not sure and ask it to advise. Do NOT invent a value."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings from the evidence it already gathered."
    - "Never invent or provide new factual data beyond your initial report and the answers above. Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 8
