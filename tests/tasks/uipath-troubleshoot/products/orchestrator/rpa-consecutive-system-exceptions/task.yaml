task_id: skill-troubleshoot-consecutive-system-exceptions
description: >
  UiPath diagnostic agent must diagnose an OrderReconciliation
  REFramework job that faults with "The maximum number of
  consecutive system exceptions was reached. Consecutive retry
  number: 5." The abort message is a SYMPTOM — the agent must not
  stop there or merely suggest raising the threshold. The real root
  cause, recoverable from logs/traces, is a SelectorNotFoundException
  on the "Click Submit" activity recurring on every transaction (the
  order-portal UI changed). The fix is to repair the selector
  (re-indicate / Object Repository / add anchor) so transactions
  stop throwing, per the job-consecutive-system-exceptions playbook —
  raising MaxConsecutiveSystemExceptions only delays the abort.

tags: [uipath-troubleshoot, orchestrator, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My OrderReconciliation process in the OpsAutomation folder aborted
  this morning with a "maximum number of consecutive system
  exceptions was reached" error. The project source is in the
  current working directory. What actually caused it and how do I
  stop it happening again?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the aborted
    OrderReconciliation run. You are waiting for the diagnostic agent
    to finish and trust its expertise. You only know what you wrote
    in your initial report — it aborted on "maximum consecutive
    system exceptions". You do not know why each transaction failed.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, traces, ui-automation, rpa), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
