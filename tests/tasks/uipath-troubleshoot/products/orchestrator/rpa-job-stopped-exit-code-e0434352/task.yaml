task_id: skill-troubleshoot-job-stopped-exit-code-e0434352
description: >
  UiPath diagnostic agent must diagnose a ReportCompiler unattended
  job that faults with "System.Exception: Job stopped with an
  unexpected exit code: 0xE0434352". The raw code is a symptom, not
  the cause: 0xE0434352 is the CLR unhandled-managed-exception code.
  The agent must NOT stop at the code or merely suggest a rerun — it
  must recover the REAL exception from job traces
  (System.Collections.Generic.KeyNotFoundException — "the given key
  'EMEA-NORTH' was not present in the dictionary" at the "Lookup
  region total" Assign, unhandled, escaping to the process
  boundary). The fix is to guard the dictionary lookup, add
  top-level exception handling so the real error is logged instead
  of collapsing to an OS code, and upgrade the old robot (23.4.0)
  that reports raw codes. This is the job-stopped-generic-exit-code
  playbook (0xE0434352 branch) — distinct from the 0x40010004
  external-kill playbook.

tags: [uipath-troubleshoot, orchestrator, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ReportCompiler nightly job faulted in Orchestrator with
  "Job stopped with an unexpected exit code: 0xE0434352". It had
  been running fine for months and nothing obvious changed. It
  runs in the ReportingOps folder. What actually went wrong, and
  how do I fix it so it stops happening?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing nightly job.
    You are waiting for the diagnostic agent to finish and trust its
    expertise. You only know what you wrote in your initial report —
    the job faulted with exit code 0xE0434352 and had been fine
    before. You do not know what the code means and cannot read the
    robot host yourself.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, traces, runtime-exceptions, machines), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
