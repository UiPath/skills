task_id: skill-troubleshoot-llm-gateway-byo-routing-policy-blocked
description: >
  Faithful replay of an LLM Gateway BYO routing investigation where the BYO
  configuration is enabled and the IS connection is healthy, but the effective
  AI Trust Layer policy blocks the BYO model/provider. Covers the current
  `uip gov aops-policy deployed-policy get` command shape.
tags: [uipath-troubleshoot, llm-gateway, agents, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 24
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs:
    - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Agents LLM calls are bypassing our BYO Azure OpenAI routing and using the platform default model.
  The failing trace ID is dddddddddddddddddddddddddddddddd. Diagnose why BYO routing is being bypassed.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the answer identifies the same root cause and uses the
      current governance command:

        1.0  Same root cause and fix, including BYO config, trace evidence, and `uip gov aops-policy deployed-policy get`.
        0.8  Same root cause; governance command is omitted but no stale command is recommended.
        0.5  Adjacent BYO/connection cause but misses policy.
        0.2  Recognized LLM Gateway only.
        0.0  Misdiagnosed, blocked, or recommends the removed resolve-style governance command.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported BYO model routing being bypassed.
  goal: |
    Let the agent complete its troubleshooting flow and provide a final diagnosis.
  constraints:
    - "If the agent asks whether to expand investigation scope, answer yes."
    - "If the agent asks for project source, say source is not available and to proceed from trace and tenant configuration evidence."
    - "Keep replies short and do not invent new facts."
  max_turns: 6
