task_id: skill-troubleshoot-agent-context-grounding-index-not-found
description: >
  Faithful replay of an Agents runtime failure where a context grounding tool
  call faults because the configured index no longer exists in the deployment
  folder. The scenario exercises the trace-first Agents playbook and the
  current refresh/validate/solution upload lifecycle.
tags: [uipath-troubleshoot, agents, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 24
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs:
    - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My deployed SupportAgent run failed with trace ID aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa.
  The local solution source is under process/SupportSolution.
  Diagnose the root cause and tell me exactly what to change. Do not run mutating repair commands; provide the commands I should run.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the answer identifies the same root cause and recommends
      the same current Agents lifecycle guidance:

        1.0  Same root cause and same fix, including trace evidence, resource.json, context-grounding, refresh/validate, solution resources refresh, and solution upload.
        0.8  Same root cause; fix is right area but misses one lifecycle command.
        0.5  Adjacent cause, missing the index/resource.json link.
        0.2  Recognized an agent context failure only.
        0.0  Misdiagnosed, blocked, or recommends deprecated agent context/publish/run commands.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing agent run. You want a
    diagnosis and a safe remediation plan, not direct changes to production.
  goal: |
    Let the agent complete its troubleshooting flow and approve read-only
    investigation steps.
  constraints:
    - "If the agent asks where the source code is, say it is under process/SupportSolution."
    - "If the agent asks whether it can run mutating repair commands, say no and ask for the commands instead."
    - "If the agent asks whether to expand investigation scope, answer yes."
    - "Keep replies short and do not invent new facts."
  max_turns: 6
