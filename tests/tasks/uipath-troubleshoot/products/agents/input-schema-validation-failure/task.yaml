task_id: skill-troubleshoot-agent-input-schema-validation-failure
description: >
  Faithful replay of an Agents invocation failure where the caller payload is
  rejected by the agent input schema. The scenario covers trace-first diagnosis
  and presents local reproduction with uip agent debug instead of deprecated
  run/input commands.
tags: [uipath-troubleshoot, agents, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 22
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs:
    - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My IntakeAgent invocation failed with trace ID bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb.
  Diagnose the failure and show the corrected local debug command. Do not run live debug or change files.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who owns the failing agent invocation.
  goal: |
    Let the agent diagnose the problem and provide a corrected local
    reproduction command.
  constraints:
    - "If the agent asks where the source code is, say it is under process/IntakeSolution."
    - "If the agent asks whether it can edit files, say no."
    - "If the agent asks whether it can run uip agent debug, say no and ask it to provide the command instead."
    - "If the agent asks whether to expand investigation scope, answer yes."
    - "Keep replies short and do not invent new facts."
  max_turns: 6
