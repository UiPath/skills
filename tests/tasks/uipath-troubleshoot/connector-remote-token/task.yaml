task_id: skill-troubleshoot-connector-remote-token
description: >
  Faithful replay of an Integration Service connector-trigger failure. A
  ConnectorTriggerActivity faults with UiPath.Ipc.RemoteException wrapping
  "Could not obtain access token. (invalid_grant)". The agent runs the
  uipath-troubleshoot skill against a uip CLI mock whose responses carry the
  verbatim telemetry signature; it must unwrap the RemoteException to the inner
  auth cause. Success = the agent reaches the same root cause as RESOLUTION.md.
tags: [uipath-troubleshoot, integration-service, rpa, e2e, faithful-replay]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 30
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from the Shared folder fail?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as the authoritative ground truth.

      The user's request was:
        "why did my last job from the Shared folder fail?"

      Grade ONLY on what the agent presented to the user (its final response)
      and the tool-call summary. Do NOT grade on the shape or content of files
      under `.local/investigations/`.

      (a) FAULT — the job faulted because a `ConnectorTriggerActivity`
          ("Workday: New Invoice (sample)") threw `UiPath.Ipc.RemoteException`
          wrapping the inner message `Could not obtain access token.
          (invalid_grant)`. The agent must UNWRAP the RemoteException to that
          inner message — not stop at the generic IPC wrapper.

      (b) CAUSE — the Integration Service connection's OAuth token cannot be
          refreshed (`invalid_grant`: refresh token expired / revoked / the
          authorizing user lost access). An authentication-state problem on the
          connection.
          MUST NOT attribute the cause to: a generic network / transport / IPC
          crash; a UiPath platform outage; a missing or *disabled* connection
          (`DAP-GE-3005`); a `DAP-RT` operation error; or a workflow-logic bug.

      (c) RESOLUTION — re-authenticate the connection (re-authorize the app in
          the external service first if access was revoked).

      SCORING RUBRIC:
        1.0  Unwraps the RemoteException to the `invalid_grant` / cannot-obtain-
             token cause (a + b) AND recommends re-authenticating the connection
             (c). No misattribution per the MUST NOT list.
        0.8  Identifies the token/auth-refresh cause and a re-authenticate fix
             but omits the `invalid_grant` detail or that it's the unwrapped
             inner message; no misattribution.
        0.5  Identifies it as an authentication / connection issue but does not
             unwrap to the token-refresh (`invalid_grant`) cause, OR gives the
             cause without an actionable fix.
        0.2  Stops at "RemoteException" / a generic IPC or network failure
             without reaching the auth cause, OR proposes no credible fix.
        0.0  Misdiagnosed (network outage, disabled connection, operation error,
             workflow bug as the primary cause) or got blocked.

      Penalize fabrication: invented connections, permissions, or workflow
      internals not present in the evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing job. You are waiting for
    the troubleshooting agent to finish and trust its expertise. You only have
    the information in your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification it requests so
    the investigation reaches a final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, tell it the source is not available and to proceed best-effort from the Orchestrator job evidence."
    - "If the agent asks whether to expand investigation scope (e.g. integration-service, orchestrator, runtime-exceptions), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
