task_id: skill-troubleshoot-connector-runtime-notfound
description: >
  Faithful replay of an Integration Service connector-activity failure. A
  ConnectorActivity faults with RuntimeException DAP-RT-1101 after the external
  service returns HTTP 404 (NotFound). The agent runs the uipath-troubleshoot
  skill against a uip CLI mock whose responses carry the verbatim telemetry
  signature. Success = the agent reaches the same root cause as RESOLUTION.md.
tags: [uipath-troubleshoot, integration-service, rpa, e2e, faithful-replay]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 28
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from the Shared folder fail?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as the authoritative ground truth.

      The user's request was:
        "why did my last job from the Shared folder fail?"

      Grade ONLY on what the agent presented to the user (its final response)
      and the tool-call summary. Do NOT grade on the shape or content of files
      under `.local/investigations/`.

      (a) FAULT — the job faulted because a `ConnectorActivity`
          ("Salesforce: Get Record") threw
          `UiPath.IntegrationService.Activities.Runtime.Exceptions.RuntimeException`
          with error code `DAP-RT-1101` / `Status code: NotFound`.

      (b) CAUSE — the connector operation reached the external service, which
          returned HTTP 404 because the referenced record (RecordId
          "001XX0000 ABCDEF") does not exist — an operation/input-level error.
          MUST NOT attribute the cause to: a disabled / invalid / no-access
          connection (`DAP-GE-*`); expired credentials or auth; an IPC /
          RemoteException; or a UiPath platform outage. The connection resolved
          and the service explicitly answered NotFound.

      (c) RESOLUTION — correct the record identifier / verify the record exists
          in the external service (and optionally guard for the not-found case).

      SCORING RUBRIC:
        1.0  Names the RuntimeException / DAP-RT-1101 NotFound operation-level
             cause (a + b) — the referenced record doesn't exist — AND
             recommends correcting/validating the record ID (c). No
             misattribution per the MUST NOT list.
        0.8  Identifies the operation-returned-NotFound cause and a fix but omits
             the DAP-RT-1101 code or the specific record ID; no misattribution.
        0.5  Identifies that the connector OPERATION failed (not the connection)
             but does not establish it is a NotFound / missing-record case, or
             gives the cause without an actionable fix.
        0.2  Recognizes an Integration Service failure but misframes it as a
             connection/auth problem OR proposes no credible fix.
        0.0  Misdiagnosed (disabled/invalid connection, auth, workflow bug, or
             platform outage as the primary cause) or got blocked.

      Penalize fabrication: invented connections, permissions, or workflow
      internals not present in the evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing job. You are waiting for
    the troubleshooting agent to finish and trust its expertise. You only have
    the information in your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification it requests so
    the investigation reaches a final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, tell it the source is not available and to proceed best-effort from the Orchestrator job evidence."
    - "If the agent asks whether to expand investigation scope (e.g. integration-service, orchestrator, runtime-exceptions), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
