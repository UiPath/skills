task_id: skill-troubleshoot-python-pipe-broken-missing-module
description: >
  UiPath troubleshoot agent must diagnose a Python Scope failure where
  Invoke Python Method faults with `Pipe is broken`
  (UiPath.Python.RemoteException wrapping System.IO.IOException). The
  UiPath.Python.Activities package runs Python out-of-process over an IPC
  pipe; the invoked script parse_invoice.py imports pandas, which is
  installed in the developer's IDE interpreter but NOT in the robot's
  Python 3.11 interpreter that Python Scope resolves. The Python host dies
  on ModuleNotFoundError and the pipe breaks — UiPath hides the real
  Python error. The decisive evidence is the script's `import pandas` line
  plus the "runs in my IDE" framing, NOT the job log. Agent must match the
  python-activities/playbooks/invoke-python-method-pipe-is-broken.md
  playbook, identify the missing-module-in-robot-interpreter root cause,
  and recommend installing the dependency into the scope's interpreter and
  reproducing the real traceback standalone.

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, invoke-python-method, pipe-is-broken, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  An unattended Orchestrator job for our `PythonInvoiceParser` process just
  faulted. The error in the output is:

  `UiPath.Python.RemoteException wrapping System.IO.IOException: Pipe is broken: "Invoke Python Method: extract_total"`

  Faulted job key: aa111111-7777-bbbb-cccc-ddddeeeeffff. The weird part is
  the exact same Python script runs perfectly when I run it in VS Code on my
  dev machine — it only breaks on the robot. What is going on and how do I
  fix it?

  The project source for the failing process is at ./PythonInvoiceParser/ in
  the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the invoke-python-method-pipe-is-broken playbook AND identified that the out-of-process Python host died on a missing third-party module (pandas) absent from the robot's interpreter, recommending installing it into the scope's interpreter / reproducing standalone"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "An unattended Orchestrator job for our PythonInvoiceParser process
         just faulted with `UiPath.Python.RemoteException wrapping
         System.IO.IOException: Pipe is broken: "Invoke Python Method:
         extract_total"`. Faulted job key
         aa111111-7777-bbbb-cccc-ddddeeeeffff. The exact same Python script
         runs perfectly in VS Code on my dev machine — it only breaks on the
         robot. What is going on and how do I fix it?"

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/python-activities/playbooks/invoke-python-method-pipe-is-broken.md
        because the signature is `Pipe is broken` /
        `RemoteException wrapping System.IO.IOException` at Invoke Python
        Method — the out-of-process-Python-host-died family.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - UiPath.Python.Activities runs Python out-of-process over an IPC
            pipe. `Pipe is broken` means the Python host process died, not a
            UiPath-side bug.
          - The script `parse_invoice.py` does `import pandas` (visible in
            process/parse_invoice.py). The robot's interpreter (the one
            Python Scope `Path=C:\Program Files\Python311` resolves) does
            not have pandas, so the host raises ModuleNotFoundError and
            exits — breaking the pipe.
          - UiPath does NOT surface the underlying Python error; the job log
            shows only the broken pipe. So the decisive evidence is the
            `import pandas` line in the script PLUS the "runs in my IDE"
            framing (the IDE uses a different interpreter that has pandas) —
            NOT the job log.
          - The scope opened and the script loaded successfully, so this is
            NOT a "path is not valid" or engine-init/architecture failure.

        The reference fix:
          - Install the missing module into the EXACT interpreter the scope
            resolves on the robot host:
            `"C:\Program Files\Python311\python.exe" -m pip install pandas`
            (for the robot user, or into a venv the scope points at) — NOT
            into the dev's IDE environment.
          - Diagnose first by reproducing standalone from the robot
            interpreter (`...\python.exe parse_invoice.py`) to reveal the
            hidden ModuleNotFoundError.
          - Prevention: requirements.txt installed into the robot
            interpreter; wrap the Python in try/except to surface real
            errors.

      SCORING RUBRIC:

        1.0  Agent matched the pipe-is-broken playbook AND converged on the
             missing-module-in-the-robot-interpreter root cause (explained
             the out-of-process pipe model, named `import pandas` from the
             script source as the trigger, recognized "runs in my IDE" = a
             different interpreter, and recommended installing pandas into
             the SCOPE's interpreter / reproducing standalone).
        0.8  Both dimensions largely correct: matched the playbook and
             identified the dead-host / missing-dependency cause, but did
             not pin it to the `import pandas` source line OR did not steer
             the install to the robot's specific interpreter.
        0.5  Only one dimension correct: matched the playbook but guessed a
             different host-death cause with no support; OR identified a
             Python dependency/environment problem without matching the
             specific playbook.
        0.2  Agent recognized the pipe broke / host died but neither matched
             the playbook nor identified the interpreter/dependency cause
             (e.g. blamed a generic "UiPath bug" or told the user to just
             upgrade the package).
        0.0  Agent confidently picked a wrong root cause (e.g. claimed the
             Python path is invalid, or an x86/x64 mismatch, with no
             evidence); got blocked; or failed.

      Be substance-focused. The out-of-process pipe model + the `import
      pandas` source line + "different interpreter on dev vs robot" is the
      decisive chain. Penalize agents that treat `Pipe is broken` as the
      root cause itself rather than a symptom of the host dying, and
      penalize agents that tell the user to pip install on the DEV machine
      instead of the robot's interpreter.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}
