task_id: skill-troubleshoot-python-loadscript-toplevel-exception
description: >
  UiPath troubleshooting agent must diagnose a Load Python Script failure caused
  by module-level (top-level) code that raises at import time: order_import.py
  has a `DEFAULT_DISCOUNT = 100 / 0` statement at module scope, so when Load
  Python Script executes the module body to bind its functions, the load faults
  with "Error loading the python script" wrapping a ZeroDivisionError before any
  function runs. Success = agent matches the load-script-failures playbook,
  identifies a script load / top-level-exception failure (L2b, NOT engine init /
  ModuleNotFoundError), AND recommends moving the executable code into a function
  or behind `if __name__ == "__main__":`, without fabricating host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, python-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My PyOrderImport process faults in Orchestrator on every run. The folder
  is "Order Processing". It runs a Python script through a Python Scope and
  dies right away with something about "Error loading the python script".
  The same script runs fine when I run it in my editor.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator. If the answer
  needs evidence from the host itself, give me the exact things to check on
  the host the next time I'm in front of it; I'll do them and come back with
  the result. Do not stall waiting for host data - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched load-script-failures, identified a top-level-exception script-load failure (L2b), and recommended guarding the module-level code"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My PyOrderImport process faults in Orchestrator on every run (folder
         'Order Processing'). It runs a Python script through a Python Scope and
         dies right away with 'Error loading the python script'. The same script
         runs fine in my editor. I'm not on the Robot host, only Orchestrator."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/python-activities/playbooks/load-script-failures.md
        and the specific sub-case is L2b (script load / compile / top-level
        exception): Load Python Script executes the module body to bind its
        functions, so module-level code that raises aborts the load with
        "Error loading the python script" / "One or more errors occurred".

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - order_import.py has a module-level statement `DEFAULT_DISCOUNT = 100 / 0`
            that raises ZeroDivisionError at import time.
          - Load Python Script runs the module body (to bind functions), so the
            top-level statement executes at load and faults before import_orders
            is ever invoked.
          - The engine initialized fine (logs show "Python engine initialized")
            and there is no ModuleNotFoundError - this is NOT L1 engine-init and
            NOT a missing-package (L2a) case.
          - "Runs fine in my editor" is a red herring: the editor may run a
            different entry path, but the module-level crash still occurs on load.
        The reference fix is:
          - Move the executable module-level code into a function, OR guard it
            with `if __name__ == "__main__":`, so importing the module (which is
            what Load Python Script does) does not execute it. Remove/repair the
            divide-by-zero.

      DIMENSION C -- No fabricated host actions
        The user is off-host. The agent may hand over a verification step (run
        the script with the scope's interpreter to see the traceback) but must
        NOT claim to have edited the script on the robot or run host commands.

      SCORING RUBRIC:
        1.0  Matched load-script-failures, identified a top-level / module-scope
             exception at load (L2b) as the cause, AND recommended moving the
             code into a function or behind `if __name__ == "__main__":`.
        0.8  Correct playbook and load-time-exception cause, but the fix is vague
             (e.g. "fix the script error" without naming the function / __main__
             guard).
        0.5  Recognized a Python-script load problem but attributed it to engine
             init (L1), a missing module (L2a), or invoke-time logic instead of
             top-level code at load.
        0.2  Surfaced the error string to the user without diagnosis.
        0.0  Wrong cause (engine init / bitness / library path / ModuleNotFound /
             workflow wiring), or fabricated a host action.

      Penalize concluding engine-init (L1) or ModuleNotFoundError (L2a) -- the
      evidence (engine initialized, divide-by-zero traceback at module level)
      rules those out.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing PyOrderImport process.
    You wrote the Python script and left a configuration line at the top of
    the module. You are away from the robot host and only have Orchestrator
    access. You trust the agent and want a diagnosis or a host check list.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, python-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked what runs at the top of the script, say there is a configuration line at module level that you added."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
