task_id: skill-troubleshoot-healing-agent-disabled-no-consumption
description: >
  Faithful replay of a real uipath-troubleshoot investigation. A user asks
  whether the Healing Agent ran on their last job in folder Shared, whether
  it consumed any AI units/credits, and what the healing-agent log line
  means. Ground truth: HA was disabled for the job (AutopilotForRobots
  Enabled=false/HealingEnabled=false), the "Healing agent is disabled for
  the current job." Info log is a benign config-read, the healing-data
  archive is an empty 22-byte ZIP, and zero units were consumed. The job
  itself faulted on an unrelated UI Automation NodeNotFoundException.
  Success = the agent reaches the same conclusion as RESOLUTION.md.
tags: [uipath-troubleshoot, e2e, faithful-replay, healing-agent, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 2400
  max_turns: 60
  turn_timeout: 1800

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  Investigate my last job in Orchestrator folder Shared — it faulted. I also see a Healing Agent log line on that job and I'm worried: was the Healing Agent actually engaged on this run, did it consume any AI units / credits, and what does that log line actually mean?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's final answer reaches the same conclusion as RESOLUTION.md: HA did not run, consumed nothing, the log line is informational"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md). Grade ONLY the agent's
      final user-facing answer (and the tool calls it relied on) — do NOT
      grade internal bookkeeping files. The user asked three things about
      the last job in folder Shared: did Healing Agent run, did it consume
      any AI units/credits, and what does the healing-agent log line mean.

      DIMENSION A -- Healing Agent did NOT run
        The agent must conclude HA was disabled / did not engage for this
        job. Supporting evidence it should cite from the mocked CLI:
        AutopilotForRobots Enabled=false and HealingEnabled=false on the
        job, and/or the empty (22-byte) healing-data archive. Concluding
        that HA *did* run is wrong.

      DIMENSION B -- Zero consumption
        The agent must state that NO AI units / credits / AI Trust Layer
        were consumed, because HA never engaged (units are charged only on
        a successful heal/recommendation). Claiming or implying any
        consumption is wrong.

      DIMENSION C -- The log line is informational
        The agent must explain that "Healing agent is disabled for the
        current job." is a benign informational config-read that appears
        regardless of HA state and carries no cost — NOT evidence that HA
        ran. (Recognizing this as the healing-agent-orch-issues
        config-read log surface is the expected reasoning, but grade the
        explanation in the answer, not any file.)

      ALSO ACCEPTABLE (not required for full marks): the agent notes the
      job actually faulted on an unrelated UI Automation
      NodeNotFoundException (selector/target not found), and that enabling
      HA in future would also require provisioning the HA add-on
      (Allowed.AgentService=0).

      DISQUALIFIERS (cap score at 0.3 if any present):
        - Claims HA ran or consumed units/credits for this job.
        - Treats the line as the "No available license / Agentic units"
          error (a different signal not present here).
        - Recommends removing/disabling VerifyOptions / Verify Execution.

      SCORING RUBRIC (single score):
        1.0  All three dimensions correct (HA didn't run, zero consumption,
             log line is informational), clearly stated to the user.
        0.8  All three correct but one is vague or under-explained.
        0.6  Two of three correct (e.g., says HA didn't run + zero
             consumption but doesn't explain the log line).
        0.4  Only one dimension correct.
        0.2  Recognized HA was involved but gave a wrong/again-ambiguous
             answer.
        0.0  Wrong conclusion, or a disqualifier applies, or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the flow faithful to the
# original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the question. You are
    waiting for the troubleshooting agent to finish its investigation and
    trust its expertise. You only have the information you wrote in your
    initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final answer.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks which job in folder Shared you mean, say it's the most recent one — you don't have the key."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
