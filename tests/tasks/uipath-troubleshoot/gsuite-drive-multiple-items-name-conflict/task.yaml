task_id: skill-troubleshooting-gsuite-drive-multiple-items-name-conflict
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose responses
  are the verbatim, scrubbed sub-agent outputs from the real session
  (.local/investigations/raw/*.json). The most-recent Faulted job in folder
  Shared (GSuite_DriveNameConflict, job 6c8b1949-2603-437d-86a6-6b82b989fd6a)
  ran a single GSuite Create Folder activity that threw
  "Multiple items with the name dupe-folder found in the specified folder."
  Success = the agent reaches the same root cause as RESOLUTION.md: the
  destination already held more than one item named dupe-folder, so the
  activity's ConflictResolution could not resolve to a single item — a
  name-ambiguity conflict, NOT a 404/resource-not-found, connection/auth,
  invalid-range, or transient failure.
tags: [uipath-troubleshoot, e2e, faulted-jobs, faithful-replay, rpa]

# Inherits from experiments/default.yaml: model, permission_mode, plugins
# ($SKILLS_REPO_PATH), ignore_patterns. Only the fields below are overrides
# specific to this scenario. This scenario is CLI-driven — the root cause is
# fully contained in `or jobs get` Info, so there is no process/ snapshot.

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from folder Shared fail?
  (The user is logged in to UiPath alpha cloud via the uip CLI.)

success_criteria:
  # Binary tool-invocation check: confirms the right skill ran at all.
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  # Single comprehensive check graded on the agent's FINAL RESPONSE only
  # (include_tool_calls: false) against the authoritative RESOLUTION.md.
  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md: multiple Drive items named dupe-folder made the Create Folder name-resolution ambiguous"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: false
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md from the real investigation that troubleshot this exact
      failing job. Treat it as the authoritative ground truth. Grade ONLY the
      agent's final response to the user — not its tool calls or intermediate
      files.

      The user's request was:
        "why did my last job from folder Shared fail?"

      The agent had to find the most-recent Faulted job in folder Shared and
      diagnose it from evidence. Grade three dimensions together:

      DIMENSION A -- FAULT
        Identifies the most-recent Faulted job in folder Shared:
        job 6c8b1949-2603-437d-86a6-6b82b989fd6a, process
        GSuite_DriveNameConflict, failing in the GSuite "Create Folder"
        activity (UiPath.GSuite.Activities.CreateFolderConnections).

      DIMENSION B -- CAUSE
        The destination folder ALREADY CONTAINS MORE THAN ONE item named
        `dupe-folder`, so the activity's ConflictResolution (UseExisting)
        could not resolve the name to a single item and threw:
        "Multiple items with the name dupe-folder found in the specified
        folder." This is a NAME-AMBIGUITY conflict raised synchronously by
        the activity; the connection authenticated and the parent folder
        resolved fine.

        MUST-NOT-ATTRIBUTE list. Attributing the fault to ANY of these is
        WRONG and caps the score at 0.0 for the cause:
          - an HTTP 404 / resource-not-found
          - an invalid/inaccessible connection or auth failure
          - a null/empty or unparseable range
          - a Sheets "sheet name already exists" conflict (different activity)
          - rate limiting / HTTP 429 / throttling
          - a transient 5xx / Google server error
          - a per-request timeout

      DIMENSION C -- RESOLUTION
        Make the name resolvable to a single item: remove or rename the
        duplicate `dupe-folder` item(s) so the name is unique, OR target the
        item by its Drive ID instead of by name, OR use a ConflictResolution
        that does not require a single existing match (e.g. AddSeparate or
        Rename). NOT a connection fix, NOT a range/file-id-not-found fix,
        NOT a retry.

      ANTI-FABRICATION: penalize invented connection IDs, invented 404s,
      invented quota/scope settings, or any claim of an outage. The
      connections are Enabled and valid; the only fault is the name-ambiguity
      conflict on dupe-folder.

      SCORING RUBRIC (single score):
        1.0  Correct job (names 6c8b1949 / GSuite_DriveNameConflict, GSuite
             Create Folder) AND multiple-same-name-items cause (names
             "Multiple items with the name ... found" or duplicate-name
             ambiguity) AND correct fix direction (dedupe/rename, target by
             Drive ID, or change ConflictResolution).
        0.7  Cause is right (multiple items named dupe-folder / name
             ambiguity) but the fix is vague, or the agent did not clearly
             name the specific job.
        0.5  Identified the GSuite / Google Drive Create Folder surface but
             not the multiple-items cause, or proposed the wrong fix.
        0.2  Recognized a failure but the wrong domain.
        0.0  Wrong cause — especially attributing to anything on the
             MUST-NOT-ATTRIBUTE list — or no conclusion.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Override experiments/default.yaml's 600s limit -- the multi-agent troubleshooting
# skill (triage -> hypothesis-generator -> tester -> presenter) routinely takes
# 10-20 minutes when sub-agents run sequentially.
