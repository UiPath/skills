task_id: skill-troubleshoot-job-pending-stale-dispatch
description: >
  UiPath diagnostic agent must diagnose a job stuck in `Pending` state in
  Orchestrator from a vague user report (no job key supplied). The
  dispatch-time PendingReasons (TemplateNoHostsAvailable +
  DynamicJobConnectedMachinesInvalid +
  DynamicJobConnectedMachinesWindowsRobotVersionInvalid) are a stale
  snapshot — at dispatch no host was connected, but a runtime is now
  connected to danVM, the slot is licensed and idle, the robot account has
  Windows credentials, and the Assistant is in Service Mode. The agent must
  discover the job, read the evidence, resist two traps (reading
  `Used == Allowed` as license exhaustion; reading "none connected to this
  folder" as a folder-assignment gap), match `job-pending-stale-dispatch`,
  and recommend stop + re-trigger so Orchestrator re-evaluates eligibility.
tags: [uipath-troubleshoot, e2e, faithful-replay, orchestrator, pending-job, stale-dispatch]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]
  max_turns: 60
  turn_timeout: 3600

run_limits:
  task_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  Why won't my pending job in the Shared folder start? It's been stuck in
  Pending for over an hour and never runs.

  Can you use the uipath-troubleshoot skill to figure out what's wrong and
  what I need to do to get it running?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's presented resolution reaches the same root cause + fix as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario — treat it as authoritative ground
      truth. Grade ONLY what the agent PRESENTED to the user (its final
      response) plus the tool-call summary. Do NOT grade on internal
      `.local/investigations/` files.

      What the user reported (cold, verbatim): a job in the Shared folder is
      stuck in Pending for over an hour and won't start. The user supplied
      NOTHING else up front — no job key, no process or machine name, no
      mode, credential, or license details. The agent had to DISCOVER the job
      (list Pending jobs in the Shared folder → exactly one: ERN), read its
      `PendingReasons`, and check the machine, license, and job history via
      the `uip` CLI. Two facts no CLI exposes — that the robot is in Service
      Mode and the robot account has a saved Windows credential — the agent
      can only get by ASKING the user (who confirms both when asked) or by
      reasoning that the connected Unattended runtime implies them. Do NOT
      penalize the agent for stating Service Mode / credential as confirmed
      (it asked) or as a reasonable assumption from the connected runtime.

      The evidence the mocked tenant returns:
        - Exactly one Pending job in Shared: `0f9d854e-...` (process ERN,
          Unattended, entry point Google.xaml).
        - `PendingReasons.ErrorCodes`: TemplateNoHostsAvailable,
          DynamicJobConnectedMachinesInvalid,
          DynamicJobConnectedMachinesWindowsRobotVersionInvalid — with text
          "…there is none connected to this folder".
        - `JobHistory`: a single original Pending entry, no re-evaluation.
        - `machines list`: danVM has `robotVersions` populated (1 connected
          runtime, v26.0.193) and `unattendedSlots: 1`.
        - `licenses info`: Unattended `Used = 1`, `Allowed = 1`.
        - No other Unattended job is Running.

      DIMENSION A — Correct root cause (in the presented answer)
        The reference root cause is **stale dispatch-time PendingReasons**:
        the no-host-family codes are a frozen snapshot from when the job was
        first dispatched (no connected host at that moment). Orchestrator
        does NOT re-evaluate them while the job stays Pending, even though
        danVM now has a connected, licensed, idle runtime. The agent should
        support this by citing: connected runtime present, JobHistory has
        only the original entry, and the license slot is held by danVM's own
        idle runtime (not a competing job).

      DIMENSION B — Correct fix (in the presented answer)
        The authoritative fix is **stop the Pending job and re-trigger the
        ERN process** so a fresh dispatch performs a new eligibility check.

      PENALIZE — these are the two known wrong turns this scenario is
      designed to catch. Treat either as a primary-cause misdiagnosis:
        - Concluding the danVM template is "not assigned to the Shared
          folder" / "must be added to the folder's machine list" as the root
          cause. This is an unverifiable inference from the PendingReasons
          wording — no `uip` command confirms folder→template assignment, and
          a connected runtime + stale codes indicate stale-dispatch.
        - Concluding the Unattended license is "exhausted" / "no free slot"
          as the blocker. `Used == Allowed` here is danVM's own idle runtime
          holding its slot, not a competing consumer.
      Also penalize: claiming a missing credential, Attended/User mode, or
      recommending re-install / re-license / unrelated remediations.

      SCORING RUBRIC (single score):
        1.0  Final answer names the stale dispatch-time / frozen-snapshot
             root cause AND leads with stop + re-trigger as the fix, AND does
             not assert the folder-assignment or license-exhaustion misreads
             as the cause.
        0.7  Leads with stop + re-trigger in the right (dispatch) family but
             frames the cause loosely (e.g. "no host was available at
             dispatch, just re-trigger") without the explicit stale-snapshot
             framing; any folder/license point appears only as a ruled-out
             aside, not the primary cause.
        0.4  Identifies the job is Pending on a host/dispatch issue and is
             partially right, but leads with a wrong primary cause OR omits
             the stop + re-trigger fix.
        0.0  Leads with folder-not-assigned or license-exhaustion as the root
             cause, claims credential/mode problems, or fails to give an
             actionable cause + fix.

      Reward substance over schema. Return JSON:
      {"score": <float>, "rationale": "<one sentence on cause + fix + any trap hit>"}

# Multi-turn user simulator. The diagnostic skill may ask clarifying
# questions; the simulator answers in character so the run completes without a
# human. It NEVER volunteers data the user didn't report and never supplies the
# job key or license counts — those must be discovered via the `uip` CLI.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the stuck Pending job in the Shared
    folder. You are not a deep platform expert, but you know your own setup
    when asked: it's the ERN process on an unattended robot on the danVM
    machine, the robot is signed in / connected, it's in Service Mode, the
    robot account has its Windows credentials saved, and it had been running
    fine before. You trust the agent's investigation and just want it running
    again.
  goal: |
    Let the agent complete its investigation and tell you the root cause and
    the fix. Approve any scope expansion or clarification it requests.
  constraints:
    - "If the agent asks whether to expand investigation scope (e.g. into orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks for the job key or which job to look at, say you don't have the key handy but it is the ONLY Pending job in the Shared folder — ask it to look the job up. Do NOT invent a key."
    - "If the agent asks whether the robot/Assistant on danVM is in Service Mode (Machine Key) vs Attended/User Mode, answer: Service Mode / Unattended."
    - "If the agent asks whether the danVM robot account has a Windows credential, answer: Yes, it's saved."
    - "If the agent asks about Unattended license counts, say you're not sure of the exact numbers and ask it to check in Orchestrator — do NOT guess or state a number."
    - "If the agent asks how to proceed when some data is missing, tell it to proceed with best-effort findings from the evidence it already gathered."
    - "Never volunteer new factual data beyond what is in your initial report and the answers above. Keep replies short (one sentence)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 10
