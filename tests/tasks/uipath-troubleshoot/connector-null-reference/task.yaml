task_id: skill-troubleshoot-connector-null-reference
description: >
  Faithful replay of an Integration Service connector-output failure. A For Each
  enumerates a connector query result that returned null, throwing
  System.NullReferenceException. The agent runs the uipath-troubleshoot skill
  against a uip CLI mock; it must read the stack frame to identify the
  null connector-output enumeration. Success = same root cause as RESOLUTION.md.
tags: [uipath-troubleshoot, integration-service, rpa, e2e, faithful-replay]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 30
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from the Shared folder fail?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as the authoritative ground truth.

      The user's request was:
        "why did my last job from the Shared folder fail?"

      Grade ONLY on what the agent presented to the user (its final response)
      and the tool-call summary. Do NOT grade on the shape or content of files
      under `.local/investigations/`.

      (a) FAULT — the job faulted with `System.NullReferenceException` at a
          `For Each` activity ("For Each contact") in ContactImport.xaml; the
          stack shows `ForEach\`1` specialized on an Integration Service
          connector output type (`...SWEntities.*_executeQuery_List`).

      (b) CAUSE — the `For Each` iterates the result of a connector query
          operation that returned null (no rows / null body) instead of an empty
          collection, and the workflow dereferences it without a null/empty
          guard. (NRE is opaque — the agent must use the stack frame to reach
          the connector-output-enumeration cause.)
          MUST NOT attribute the cause to: a disabled / invalid / no-access
          connection (`DAP-GE-*`); an auth / token (`invalid_grant`) failure; a
          `DAP-RT` connector-operation error; or an IPC `RemoteException`. The
          connector call did not error.

      (c) RESOLUTION — guard the connector output for null/empty before the
          `For Each` (or map the connector result to the iterated variable).

      SCORING RUBRIC:
        1.0  Identifies the NRE at the `For Each` AND that it is enumerating a
             null Integration Service connector query output (a + b), AND
             recommends a null/empty guard (c). No misattribution.
        0.8  Identifies the NRE-while-enumerating-a-null-collection cause and a
             guard fix but does not specifically tie the null collection to the
             connector query output; no misattribution.
        0.5  Identifies the NRE at the `For Each` / a null collection but gives
             no connector context and no actionable guard fix, OR proposes a
             guard without identifying what was null.
        0.2  Recognizes the NullReferenceException surface but neither localizes
             it to the `For Each` / null collection nor proposes a credible fix.
        0.0  Misdiagnosed (blamed a connection / auth / operation error / IPC) or
             got blocked.

      Penalize fabrication: invented upstream values, connections, or workflow
      internals not present in the evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing job. You are waiting for
    the troubleshooting agent to finish and trust its expertise. You only have
    the information in your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification it requests so
    the investigation reaches a final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, tell it the source is not available and to proceed best-effort from the Orchestrator job evidence."
    - "If the agent asks whether to expand investigation scope (e.g. integration-service, orchestrator, runtime-exceptions), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
