task_id: skill-troubleshoot-connector-general-disabled
description: >
  Faithful replay of an Integration Service connector-activity failure. A
  ConnectorHttpActivity faults with GeneralException DAP-GE-3005 (connection
  disabled). The agent runs the uipath-troubleshoot skill against a uip CLI
  mock whose responses carry the verbatim telemetry signature. Success = the
  agent reaches the same root cause as RESOLUTION.md.
tags: [uipath-troubleshoot, integration-service, rpa, e2e, faithful-replay]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 30
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from the Shared folder fail?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as the authoritative ground truth.

      The user's request was:
        "why did my last job from the Shared folder fail?"

      Grade ONLY on what the agent presented to the user (its final response)
      and the tool-call summary. Do NOT grade on the shape or content of files
      under `.local/investigations/`.

      (a) FAULT — the job faulted because an Integration Service connector
          activity (`Salesforce: HTTP Request`, a ConnectorHttpActivity) threw
          `UiPath.IntegrationService.Activities.Runtime.Exceptions.GeneralException`
          with error code `DAP-GE-3005` during connection resolution.

      (b) CAUSE — the connection used by the activity
          (`c4d8f0a2-...`, "Salesforce - Production") is in a DISABLED state, so
          the IS runtime fails to resolve it before any external API call.
          MUST NOT attribute the cause to: a missing / invalid / no-access
          connection or a missing `Connections.View` permission (that is
          `DAP-GE-3000`, a different code); expired credentials alone; a
          workflow-logic bug, bad input, or the external Salesforce API.

      (c) RESOLUTION — re-enable the connection (Integration Service UI or
          `uip is connections edit <id>`), re-authenticating first if it
          auto-disabled.

      SCORING RUBRIC:
        1.0  Names the GeneralException / DAP-GE-3005 disabled-connection cause
             (a + b) AND recommends re-enabling the connection (c). Does not
             misattribute per the MUST NOT list.
        0.8  Identifies the disabled-connection cause and a re-enable fix but
             omits the DAP-GE-3005 code or minor detail; no misattribution.
        0.5  Identifies that an Integration Service connection is the failing
             surface but does not establish it is *disabled* (e.g. says only
             "connection problem" or conflates it with invalid/no-access), or
             gives the cause without any actionable fix.
        0.2  Recognizes the GeneralException surface but neither establishes the
             disabled state nor proposes a credible fix.
        0.0  Misdiagnosed (workflow bug, bad input, external API, permissions /
             invalid connection as the primary cause) or got blocked.

      Penalize fabrication: invented assets, permissions, or workflow internals
      not present in the evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing job. You are waiting for
    the troubleshooting agent to finish and trust its expertise. You only have
    the information in your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification it requests so
    the investigation reaches a final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, tell it the source is not available and to proceed best-effort from the Orchestrator job evidence."
    - "If the agent asks whether to expand investigation scope (e.g. integration-service, orchestrator, runtime-exceptions), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
