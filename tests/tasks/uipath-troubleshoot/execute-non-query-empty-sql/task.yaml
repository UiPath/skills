task_id: skill-troubleshoot-execute-non-query-empty-sql
description: >
  UiPath diagnostic agent must diagnose an Execute Non Query failure
  where the activity's Sql property is bound to an expression/variable
  that resolves to an empty string at runtime (the upstream Assign
  builds it from an empty DataRow / DataTable, falling back to ""). The
  database, connection, driver, and SQL syntax are all fine — ADO.NET
  refuses to run a command with no text and throws "CommandText
  property has not been initialized". The agent must identify the empty
  /unset Sql as the failing layer and recommend ensuring Sql resolves
  to a valid non-empty statement (log it, then fix the upstream
  assignment / variable scope) — matching Branch 3 of the Execute Non
  Query failures playbook.

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, database-activities, execute-non-query, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ConfigSyncProcess process is faulting in Orchestrator on every
  run. Can you investigate?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the execute-non-query-failures playbook (Branch 3) AND identified the empty/unset Sql as the failing layer"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt
      is the RESOLUTION.md for this scenario. Treat it as the
      authoritative ground truth.

      The user's request was:
        "My ConfigSyncProcess process is faulting in Orchestrator on
         every run."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/database-activities/playbooks/execute-non-query-failures.md
        specifically **Branch 3 — Empty `Sql`**, because the runtime
        error
          "CommandText property has not been initialized"
        is the verbatim signature of that branch (ADO.NET refuses to
        execute a command whose CommandText is blank).

        Evidence sources (in priority order):
          1. The agent's final response -- it should name the
             execute-non-query-failures playbook / Branch 3.
          2. The agent's tool-call summary -- a Read on a file under
             references/activity-packages/database-activities/playbooks/.
        Grade only what the agent presented (final response + tool
        calls); do NOT inspect internal investigation state.

        Acceptable / non-penalized: the agent may also Read the
        neighboring execute-query-failures or connect-to-database
        playbooks while ruling them out. Exploration is normal.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The `Execute Non Query` (ExecuteNonQuery) activity in
            Main.xaml has `Sql="[sqlText]"` — an expression bound to a
            variable, not a literal statement.
          - `sqlText` resolves to an empty string at runtime: the
            upstream Assign builds it from
            `dt_Config.Rows[0]["UpdateStatement"]` only when the table
            has rows, falling back to `""`; `dt_Config` is empty, so
            `sqlText` stays blank.
          - ADO.NET refuses to execute a command with no CommandText
            and throws "CommandText property has not been initialized"
            (wrapped as "A database error occurred").
        The reference fix:
          - Ensure the `Sql` expression resolves to a valid non-empty
            statement before the activity runs.
          - Log the resolved Sql immediately before the activity to
            confirm (the logs already show `SQL: ''`), and guard
            against an empty value.
          - Fix the upstream assignment / variable scope that left
            `sqlText` blank (populate `dt_Config`, correct ordering and
            scope).

        Evidence sources (in priority order):
          1. The agent's final response -- it should name the error
             "CommandText property has not been initialized" and the
             empty/unset Sql, and rule out the wrong causes (NOT a SQL
             syntax error, NOT an output-parameter size issue, NOT a
             driver-load failure, NOT a null connection, NOT the wrong
             activity, NOT a database outage).
          2. The agent's tool-call summary and any evidence it cites
             from the job logs (the resolved `SQL: ''`) / Main.xaml.
        Grade only what the agent presented; do NOT inspect internal
        investigation state.

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched execute-non-query-failures Branch 3 AND
             identified the empty/unset Sql as the failing layer.
             Conclusion must (a) name the error "CommandText property
             has not been initialized" / empty Sql, (b) cite the
             empty resolved SQL in the logs and/or the expression-bound
             `Sql` in source, and (c) recommend ensuring Sql resolves
             non-empty (log + fix the upstream assignment / scope) —
             not changing the database, driver, or connection.
        0.8  Both partial: e.g., correct playbook but conclusion names
             the failure as "empty SQL" without citing the resolved
             empty value or the upstream cause; or correct conclusion
             but matched the database-activities overview rather than
             the specific execute-non-query Branch 3.
        0.5  Only one dimension correct.
        0.2  Recognized the surface (Execute Non Query / database
             activity failed) but landed on the WRONG cause — a SQL
             syntax error, an output-parameter size issue, a
             driver-not-loaded failure, a null connection, the wrong
             activity, or a database outage. Cap any such answer at
             0.2.
        0.0  Misdiagnosed entirely or got blocked.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, database-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
