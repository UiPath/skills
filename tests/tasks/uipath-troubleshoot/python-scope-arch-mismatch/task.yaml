task_id: skill-troubleshoot-python-scope-arch-mismatch
description: >
  UiPath troubleshoot agent must diagnose a Python Scope engine-init failure
  where the scope faults at open with `One or more errors occurred. (Error
  initializing the Python engine)` and an inner BadImageFormatException
  (0x8007000B). The Python Scope `Target` is set to x86 but the Python 3.11
  install on the robot host is 64-bit; a 64-bit interpreter cannot load into
  a 32-bit host. The script uses only the standard library, ruling out a
  missing-module cause, and the error is engine-init (not "path is not
  valid"). The decisive evidence is Target=x86 in Main.xaml plus the user's
  statement that the install is 64-bit, plus the BadImageFormat HRESULT.
  Agent must match the
  python-activities/playbooks/python-scope-architecture-version-mismatch.md
  playbook, identify the bitness mismatch, and recommend setting Target to
  x64.

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, python-scope, architecture-mismatch, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  Our `PythonDataCruncher` unattended job fails right at the Python Scope
  with:

  `Python Scope: One or more errors occurred. (Error initializing the Python engine)`

  Faulted job key: cc333333-7777-bbbb-cccc-ddddeeeeffff. The robot machine has
  Python 3.11 (64-bit) installed and the script is plain standard-library
  Python — nothing fancy. Why won't the Python engine start, and how do I fix
  it?

  The project source for the failing process is at ./PythonDataCruncher/ in
  the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the architecture/version-mismatch playbook AND identified that Python Scope Target=x86 conflicts with the 64-bit Python install (BadImageFormatException), recommending Target be set to x64"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "Our PythonDataCruncher unattended job fails right at the Python
         Scope with `Python Scope: One or more errors occurred. (Error
         initializing the Python engine)`. Faulted job key
         cc333333-7777-bbbb-cccc-ddddeeeeffff. The robot machine has Python
         3.11 (64-bit) installed and the script is plain standard-library
         Python. Why won't the Python engine start, and how do I fix it?"

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/python-activities/playbooks/python-scope-architecture-version-mismatch.md
        because the signature is `One or more errors occurred` /
        `Error initializing the Python engine` (with a BadImageFormat inner
        error) at Python Scope open.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The Python Scope `Target` property is x86 (32-bit), but the
            interpreter at C:\Program Files\Python311 is 64-bit (the user
            states a 64-bit install). A 64-bit interpreter cannot load into
            a 32-bit host, so engine init fails.
          - The inner exception is BadImageFormatException (0x8007000B) — the
            canonical 32/64-bit load-mismatch signature.
          - The script (crunch.py) uses only the standard library, so this
            is NOT a missing-module / pipe failure; and the error is
            engine-init, NOT "path is not valid", so Path is fine. Target=x86
            is the only setting inconsistent with a 64-bit install.

        The reference fix:
          - Set the Python Scope `Target` from x86 to x64 to match the
            64-bit install. (Or, if 32-bit is genuinely required, install a
            32-bit Python and keep x86 — both sides must agree.)
          - Confirm interpreter bitness via
            `python.exe -c "import struct; print(struct.calcsize('P')*8)"`.

      SCORING RUBRIC:

        1.0  Agent matched the architecture/version-mismatch playbook AND
             identified the x86-vs-64-bit bitness mismatch (cited Target=x86
             from Main.xaml against the 64-bit install, recognized the
             BadImageFormat signal), and recommended setting Target to x64.
        0.8  Both dimensions largely correct: matched the playbook and
             identified a bitness/Target mismatch, but did not cite Target=x86
             from the source OR did not give the explicit x64 fix.
        0.5  Only one dimension correct: matched the playbook but proposed a
             different engine-init fix (e.g. only "install .NET runtime" or
             "reinstall Python") without the bitness insight; OR identified
             the bitness mismatch without matching the specific playbook.
        0.2  Agent recognized an engine-init / config problem but neither
             matched the playbook nor identified the Target/bitness mismatch.
        0.0  Agent confidently picked a wrong root cause (e.g. missing
             module / Pipe is broken, or invalid Python path) with no
             evidence; got blocked; or failed.

      Be substance-focused. The decisive chain is Target=x86 (source) +
      64-bit install (user) + BadImageFormatException => bitness mismatch,
      fixed by Target=x64. A standard-library-only script rules out the
      missing-module cause. Penalize agents that blame a missing module or an
      invalid path here.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}
