task_id: skill-troubleshoot-no-host-pending
description: >
  Faithful replay of a real UiPath troubleshooting investigation. A job is
  stuck in Pending in the Shared folder with host-family
  PendingReasons.ErrorCodes (TemplateNoHostsAvailable +
  DynamicJobConnectedMachinesInvalid +
  DynamicJobConnectedMachinesWindowsRobotVersionInvalid), error text
  "...there is none connected to this folder". The eligible machine
  template (DanLaptopNew, Default scope) has NO connected runtime
  (robotVersions empty) and the Unattended license slot is free — so no
  host is available to run the job. The agent must match
  job-pending-no-host.md (NOT job-pending-stale-dispatch.md, NOT
  robot-credentials.md) and recommend connecting/assigning a machine to the
  folder's template. Re-triggering will NOT help because there is no host
  to accept the job.
tags: [uipath-troubleshoot, e2e, faithful-replay, orchestrator, pending-job, no-host]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 3600
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  why my last job from folder Shared doesn't start?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's presented resolution reaches the same root cause + fix as RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The attached RESOLUTION.md is the authoritative
      ground truth. Grade ONLY what the agent PRESENTED to the user (its
      final response) plus the tool-call summary. Do NOT grade on internal
      .local/investigations/ files.

      What the user reported (cold, verbatim): "why my last job from folder
      Shared doesn't start?" — no job key, no process name, no machine,
      credential, or license details. The agent had to DISCOVER the job by
      listing Pending jobs in the Shared folder and read its
      PendingReasons + machine + license + history via the uip CLI.

      The evidence the mocked tenant returns:
        - Exactly one Pending job in Shared: cb00355c-... (process
          NewBlankTask, Unattended, created 2026-05-28T08:48:18Z).
        - PendingReasons.ErrorCodes: host-family ["TemplateNoHostsAvailable",
          "DynamicJobConnectedMachinesInvalid",
          "DynamicJobConnectedMachinesWindowsRobotVersionInvalid"] with
          error text "...there is none connected to this folder".
        - JobHistory: single original Pending entry — the job never started.
        - machines list (all-fields): the only Default-scope template
          DanLaptopNew reports robotVersions EMPTY — NO runtime is connected
          to it. (Other templates are Serverless / PersonalWorkspace scope,
          not eligible for this Default-scope folder job.)
        - licenses info: Unattended Allowed=1, Used=0, IsExpired=false —
          entitlement provisioned and the slot is FREE. License is not the
          blocker.
        - Running Unattended jobs in Shared: zero.

      DIMENSION A — Correct root cause (in the presented answer)
        The reference root cause is a genuine **no available host**: no robot
        runtime is connected to the machine template that serves the Shared
        folder (DanLaptopNew has empty robotVersions), so there is no host to
        accept the Unattended job and it stays Pending. The host-family
        PendingReasons reflect reality. The agent should cite the empty
        robotVersions (no connected runtime), and note the slot is free and
        there is no competing job — i.e. the blocker is the missing host, not
        license or credentials.

      DIMENSION B — Correct fix (in the presented answer)
        The authoritative fix is to **make a host available to the Shared
        folder's template**: connect/sign a robot into a machine on the
        DanLaptopNew template, or assign a machine template that already has
        a connected host to the folder. Any phrasing of "no machine is
        connected/assigned — connect or assign one" is correct.

      PENALIZE — these are wrong turns for THIS scenario:
        - Concluding it is a stale dispatch-time snapshot and recommending
          "stop + re-trigger" as the fix. There is NO connected runtime
          (robotVersions is empty), so a fresh dispatch finds no host and
          lands back in Pending — re-trigger does not resolve it.
        - Concluding the Unattended license is "exhausted" / "no free slot"
          (Used=0, Allowed=1 — the slot is free).
        - Concluding RobotNoMatchingUsernames / wrong machine credentials —
          that code is NOT in PendingReasons for this job.
        - Asserting a specific Assistant-signed-out / Robot-Service-stopped /
          network fault on a named host as the CONFIRMED cause. The CLI shows
          only that no runtime is connected, not why. (Recommending "connect
          / sign a robot in" as the remediation is correct; stating a
          specific sub-cause as fact is not supported by the evidence.)
        - Recommending re-installing the robot, re-licensing, or other
          unrelated remediations.

      SCORING RUBRIC (single score):
        1.0  Final answer names "no host/runtime connected to the folder's
             template" (no machine available) as the root cause AND leads
             with connect/assign a machine to the folder as the fix, AND
             does not assert stale-dispatch/re-trigger, license-exhaustion,
             or credential misreads as cause.
        0.7  Identifies no-host correctly and recommends connecting/assigning
             a host, but frames the cause loosely OR also floats re-trigger
             as a co-equal fix.
        0.4  Identifies the job is Pending on a host issue but leads with a
             wrong primary cause OR omits the connect/assign-a-host fix.
        0.0  Leads with stale-dispatch/re-trigger, license-exhaustion, or
             credential-mismatch as the root cause, or fails to give an
             actionable cause + fix.

      Reward substance over schema. Return JSON:
      {"score": <float>, "rationale": "<one sentence on cause + fix + any trap hit>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the stuck Pending job in the
    Shared folder. You know your own setup when asked: it's the
    NewBlankTask process meant to run unattended on the DanLaptopNew
    machine, and the robot account has Windows credentials saved. You are
    NOT sure whether a robot is actually connected to that machine / folder
    right now, and you are not a deep platform expert. You trust the
    agent's investigation.
  goal: |
    Let the agent complete its investigation and tell you the root cause
    and the fix. Approve any scope expansion or clarification it requests.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes."
    - "If the agent asks for the job key, say you don't have it handy but it is the ONLY Pending job in the Shared folder — ask it to look the job up. Do NOT invent a key."
    - "If the agent asks whether a robot / machine is currently connected, say you are not sure and ask it to check in Orchestrator — do NOT claim one is connected."
    - "If the agent asks whether the robot account has Windows credentials saved, answer: Yes, credentials are saved."
    - "If the agent asks about license counts, say you are not sure of the exact numbers and ask it to check in Orchestrator — do NOT guess a number."
    - "If the agent asks how to proceed when some data is missing, tell it to proceed with best-effort findings from the evidence it already gathered."
    - "Never volunteer new factual data beyond your initial report and the answers above. Keep replies short (one sentence)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 10
