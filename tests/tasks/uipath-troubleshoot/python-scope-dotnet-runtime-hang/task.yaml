task_id: skill-troubleshoot-python-scope-dotnet-runtime-hang
description: >
  UiPath troubleshooting agent must diagnose a Python Scope that hangs with no
  error: a Windows-target project on UiPath.Python.Activities 1.10.0 runs on a
  robot host missing the .NET Desktop Runtime, so the Python host process never
  becomes ready and the job stalls until it is stopped on the max-execution
  timeout - with no Python traceback and no engine-init error. Success = agent
  matches the python-scope-hang-dotnet-runtime playbook, identifies the missing
  .NET Desktop Runtime on a Windows-target project (NOT a bitness / Library-path
  / script bug), AND recommends installing the .NET Desktop Runtime 6.0 (x64) or
  switching the project to Windows-Legacy (handing over the Event Viewer /
  `dotnet --list-runtimes` host check), without fabricating host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, python-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My PyScoreModel process hangs in Orchestrator on every run. The folder is
  "ML Pipelines". It uses a Python Scope, but instead of finishing it just
  sits there doing nothing for about 15 minutes and then gets stopped. There's
  no real error in the output - it never even seems to start my script. We
  recently rebuilt this on a new unattended robot.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator. If the answer
  needs evidence from the host itself, give me the exact things to check on
  the host the next time I'm in front of it; I'll do them and come back with
  the result. Do not stall waiting for host data - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched python-scope-hang-dotnet-runtime, identified the missing .NET Desktop Runtime on a Windows-target project, and recommended installing it / switching to Windows-Legacy"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My PyScoreModel process hangs in Orchestrator on every run (folder 'ML
         Pipelines'). It uses a Python Scope but sits doing nothing for ~15
         minutes then gets stopped. No real error in the output; it never starts
         my script. We recently rebuilt this on a new unattended robot. I'm not
         on the Robot host, only Orchestrator."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/python-activities/playbooks/python-scope-hang-dotnet-runtime.md
        because the signature is a Python Scope that HANGS with NO error (the
        host process never becomes ready; the job is stopped on the max-execution
        timeout with no Python traceback and no engine-init exception) - distinct
        from the engine-init *error* family.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The project targets the Windows framework (project.json
            targetFramework = "Windows") on UiPath.Python.Activities 1.10.0
            (>= v1.9.0).
          - On that combination the Python host process runs on the .NET Desktop
            Runtime. The new robot host is missing the .NET Desktop Runtime, so
            the host never starts and the scope hangs until the job is killed -
            with no Python error (the scope config is otherwise valid: Path,
            LibraryPath python311.dll, and Target x64 all consistent).
          - This is NOT a bitness mismatch, NOT a Library-path error, NOT a
            ModuleNotFoundError, and NOT a script bug (the script never ran).
        The reference fix is:
          - Install the .NET Desktop Runtime 6.0 (x64) (.NET 8 also supported) on
            the robot host, OR switch the project target framework to
            Windows-Legacy (which does not need the .NET Desktop Runtime).
          - Because the user is off-host, hand over the host checks: OS Event
            Viewer (Windows Logs -> Application) for a .NET Runtime activation
            error, and `dotnet --list-runtimes` for Microsoft.WindowsDesktop.App 6.

      DIMENSION C -- No fabricated host actions
        The agent must hand over the host checks / fix and must NOT claim to have
        installed the runtime, edited the project on the robot, or run host
        commands itself.

      SCORING RUBRIC:
        1.0  Matched python-scope-hang-dotnet-runtime, identified a missing .NET
             Desktop Runtime on a Windows-target (v1.9.0+) project as the cause of
             the hang, AND recommended installing the .NET Desktop Runtime 6.0
             (x64) OR switching to Windows-Legacy (ideally with the Event Viewer /
             dotnet --list-runtimes host check). No fabricated host actions.
        0.8  Correct playbook and missing-runtime cause, but the fix is vague
             (e.g. "install the runtime" without naming .NET Desktop Runtime 6.0 /
             the Windows-Legacy alternative).
        0.5  Recognized a hang / host-not-starting problem but did not tie it to
             the .NET Desktop Runtime / Windows target framework (e.g. blamed a
             generic timeout, network, or "increase the timeout").
        0.2  Surfaced the hang to the user without diagnosis.
        0.0  Wrong cause (bitness, Library path, ModuleNotFound, script logic,
             workflow wiring), or fabricated a host action.

      Penalize concluding a bitness / Library-path / script bug -- the scope
      config is valid and no script ran; the discriminator is the HANG (no error)
      on a Windows-target v1.9.0+ project, which points at the .NET Desktop
      Runtime.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the hanging PyScoreModel process. Your
    team recently rebuilt the automation on a new unattended robot. You are away
    from the robot host and only have Orchestrator access.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, python-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether the .NET Desktop Runtime is installed on the new robot, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "If asked about the target framework, say the project was built with the default Windows target framework."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
