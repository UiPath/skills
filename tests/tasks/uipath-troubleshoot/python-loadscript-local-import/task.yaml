task_id: skill-troubleshoot-python-loadscript-local-import
description: >
  UiPath troubleshooting agent must diagnose a Load Python Script failure where a
  sibling local import fails: ledger_sync.py does `import ledger_utils` (a local
  module that exists in the same scripts/ folder), but the Python Scope has no
  WorkingFolder set, so the import resolves against the robot's package directory
  and faults at load with ModuleNotFoundError: No module named 'ledger_utils'.
  Success = agent matches the load-script-failures playbook, recognizes this as a
  LOCAL sibling-module import resolved against the wrong WorkingFolder (L2c, NOT a
  missing third-party pip package), AND recommends setting WorkingFolder to the
  script's folder, without fabricating host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, python-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My PyLedgerSync process faults in Orchestrator on every run. The folder is
  "Finance Sync". It runs a Python script through a Python Scope and dies at
  load with "No module named 'ledger_utils'". But ledger_utils.py is right
  there next to my main script - I can see it in the project.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator. If the answer
  needs evidence from the host itself, give me the exact things to check on
  the host the next time I'm in front of it; I'll do them and come back with
  the result. Do not stall waiting for host data - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched load-script-failures, recognized a local sibling-import / WorkingFolder failure (L2c, not a pip-package miss), and recommended setting WorkingFolder"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My PyLedgerSync process faults in Orchestrator on every run (folder
         'Finance Sync'). It dies at load with 'No module named ledger_utils'.
         But ledger_utils.py is right there next to my main script. I'm not on
         the Robot host, only Orchestrator."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/python-activities/playbooks/load-script-failures.md
        and the specific sub-case is L2c (unresolved local import): the script
        imports a sibling .py that is not found because WorkingFolder does not
        point at the script's folder, so the relative import path resolves wrong.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - ledger_sync.py does `import ledger_utils`, a LOCAL module that EXISTS
            in the same scripts/ folder (ledger_utils.py is in the project).
          - The Python Scope has NO WorkingFolder set, so the interpreter's CWD /
            import path is the robot's package directory, not scripts/, and the
            sibling import is not found -> ModuleNotFoundError at load.
          - This is NOT a missing third-party package (L2a): the module is a local
            file present in the repo, so the fix is path/WorkingFolder, NOT pip.
        The reference fix is:
          - Set the Python Scope WorkingFolder to the script's folder (scripts/)
            so sibling imports resolve. (Equivalently, restructure so the import
            path includes the script's directory.) Do NOT pip install anything.

      DIMENSION C -- No fabricated host actions
        The user is off-host. The agent may hand over a check but must NOT claim
        to have edited the project on the robot or run host commands.

      SCORING RUBRIC:
        1.0  Matched load-script-failures, recognized a LOCAL sibling-module
             import failing because WorkingFolder is not the script's folder
             (L2c), AND recommended setting WorkingFolder to the script folder
             (explicitly NOT pip-installing a package).
        0.8  Correct playbook and WorkingFolder cause, but the fix is vague (e.g.
             "fix the path" without naming WorkingFolder / the script folder).
        0.5  Recognized a ModuleNotFoundError but treated it as a missing
             third-party package (recommended pip install) instead of a local
             import / WorkingFolder issue.
        0.2  Surfaced the ModuleNotFoundError to the user without diagnosis.
        0.0  Wrong cause (engine init / bitness / syntax / workflow wiring), or
             fabricated a host action.

      The decisive discriminator: ledger_utils is a LOCAL sibling file present in
      the project, so the fix is WorkingFolder, not pip install. Penalize a
      pip-install recommendation.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing PyLedgerSync process.
    Your main script imports a helper module that sits in the same folder. You
    are away from the robot host and only have Orchestrator access.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, python-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether ledger_utils is a third-party package or your own file, say it is your own helper file in the same scripts folder."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
