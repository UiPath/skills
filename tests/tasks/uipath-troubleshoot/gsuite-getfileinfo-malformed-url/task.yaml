task_id: skill-troubleshooting-gsuite-getfileinfo-malformed-url
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose responses
  are the verbatim, scrubbed sub-agent outputs from the real session
  (.local/investigations/raw/*.json). The most-recent Faulted job in folder
  Shared (GSuite_GetFileInfoMalformedUrl, job
  0e3938d5-e2b0-480b-99d5-bcaf0e9123d6) ran a single legacy GSuite Get File Info
  activity that threw a CLIENT-SIDE input error before any Google Drive API
  call: the File ID was a malformed Drive URL with no extractable object id
  ("System.ArgumentOutOfRangeException: Could not extract an object Id from the
  Url 'https://drive.google.com/file/d/'. (Parameter 'uri')"). Success = the
  agent reaches the same root cause as RESOLUTION.md: a client-side malformed
  URL / unparseable file id, NOT a Google API / 404 / connection / auth /
  outage / transient failure.
tags: [uipath-troubleshoot, e2e, faulted-jobs, faithful-replay, rpa]

# Inherits from experiments/default.yaml: model, permission_mode, plugins
# ($SKILLS_REPO_PATH), ignore_patterns. Only the fields below are overrides
# specific to this scenario. This scenario is CLI-driven — the root cause is
# fully contained in `or jobs get` Info, so there is no process/ snapshot.

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from folder Shared fail?
  (The user is logged in to UiPath alpha cloud via the uip CLI.)

success_criteria:
  # Binary tool-invocation check: confirms the right skill ran at all.
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  # Single comprehensive check graded on the agent's FINAL RESPONSE only
  # (include_tool_calls: false) against the authoritative RESOLUTION.md.
  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md: a client-side malformed-URL / unparseable file id on legacy GSuite Get File Info"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: false
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md from the real investigation that troubleshot this exact
      failing job. Treat it as the authoritative ground truth. Grade ONLY the
      agent's final response to the user — not its tool calls or intermediate
      files.

      The user's request was:
        "why did my last job from folder Shared fail?"

      The agent had to find the most-recent Faulted job in folder Shared and
      diagnose it from evidence. Grade three dimensions together:

      DIMENSION A -- FAULT
        Identifies the most-recent Faulted job in folder Shared:
        job 0e3938d5-e2b0-480b-99d5-bcaf0e9123d6, process
        GSuite_GetFileInfoMalformedUrl, failing in the legacy GSuite "Get File
        Info" activity (UiPath.GSuite.Activities.GetFileInfo).

      DIMENSION B -- CAUSE
        CLIENT-SIDE input validation. The activity threw BEFORE any call
        reached Google Drive (no HTTP status, no Google API round-trip)
        because the File ID input was a MALFORMED Drive URL with no extractable
        object id: "System.ArgumentOutOfRangeException: Could not extract an
        object Id from the Url 'https://drive.google.com/file/d/'. (Parameter
        'uri')", thrown from CloudObjectIdentifier.FromUrl /
        CreateFromUrlOrId inside GetFileInfo.ExecuteAsync. The URL is truncated
        — it ends at /file/d/ with no <FILE_ID> segment. This is a
        workflow-input problem (a bad/truncated URL or id fed to the activity),
        not a Google / connectivity / auth / resource problem. Equivalent
        phrasings count (unparseable file id, no id segment in the URL, bad
        Drive link).

        MUST-NOT-ATTRIBUTE list. Attributing the fault to ANY of these is
        WRONG and caps the score at 0.0 for the cause:
          - a Google API / HTTP error
          - HTTP 404 / resource-not-found / file-not-found (the file does not
            exist) — the activity never queried Drive, so this is NOT a
            missing-file 404
          - expired or invalid credentials / connection broken
          - an invalid or disabled connection
          - Integration Service outage / IS down
          - rate limiting / HTTP 429 / throttling
          - a transient 5xx / Google server error
          - a per-request timeout

      DIMENSION C -- RESOLUTION
        Supply a valid Drive file id, or a well-formed Drive URL that contains
        the <FILE_ID> segment, to the Get File Info File ID input; OR fix the
        upstream expression/variable feeding that input so it is never a
        truncated/malformed URL before the activity runs. NOT a connection
        re-auth, NOT a Google-side / file-sharing fix, NOT a transient retry,
        NOT an outage workaround.

      ANTI-FABRICATION: penalize invented connection IDs, invented Google
      errors, invented policies/quota/scope settings, or any claim of an
      outage. The connections are Enabled and valid; the only fault is a
      client-side malformed-URL argument.

      SCORING RUBRIC (single score):
        1.0  Correct job (names 0e3938d5 / GSuite_GetFileInfoMalformedUrl,
             GSuite Get File Info) AND client-side malformed-URL / unparseable
             file-id cause (names the "Could not extract an object Id from the
             Url" error, thrown before any Google API call) AND correct input
             fix (supply a valid id / well-formed URL or fix the upstream
             expression).
        0.7  Cause is right (client-side malformed/unparseable URL) but the fix
             is vague, or the agent did not clearly name the specific job.
        0.5  Identified the GSuite / Drive surface but gave no malformed-URL
             cause, or proposed the wrong fix (e.g. a connection/auth fix).
        0.2  Recognized a failure but the wrong domain.
        0.0  Wrong cause — especially attributing to anything on the
             MUST-NOT-ATTRIBUTE list (a Google/HTTP/404/auth/connection/outage
             issue) — or no conclusion.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Override experiments/default.yaml's 600s limit -- the multi-agent troubleshooting
# skill (triage -> hypothesis-generator -> tester -> presenter) routinely takes
# 10-20 minutes when sub-agents run sequentially.
