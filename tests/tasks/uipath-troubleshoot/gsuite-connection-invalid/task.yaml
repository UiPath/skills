task_id: skill-troubleshooting-gsuite-connection-invalid
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose responses
  are the verbatim, scrubbed sub-agent outputs from the real session
  (.local/investigations/raw/*.json). The most-recent Faulted job in folder
  Shared (GSuite_ConnectionInvalid, job 4e00b4ca-b35b-4457-bb12-74f270d20cb0)
  ran a single GSuite Download File activity that referenced an Integration
  Service connection (00000000-1111-2222-3333-444444444444) that could not be
  resolved or authorized, faulting at OAuth token acquisition BEFORE any Google
  Drive call ("Connection [...] is invalid or you do not have access to it" /
  ConnectionHttpException). Success = the agent reaches the same root cause as
  RESOLUTION.md: an Integration Service connection-resolution/authorization
  failure, NOT a Drive 404, bad input, rate-limit, transient, or timeout.
tags: [uipath-troubleshoot, e2e, faulted-jobs, faithful-replay, rpa, integration-service]

# Inherits from experiments/default.yaml: model, permission_mode, plugins
# ($SKILLS_REPO_PATH), ignore_patterns. Only the fields below are overrides
# specific to this scenario. This scenario is CLI-driven — the root cause is
# fully contained in `or jobs get` Info, so there is no process/ snapshot.

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from folder Shared fail?
  (The user is logged in to UiPath alpha cloud via the uip CLI.)

success_criteria:
  # Binary tool-invocation check: confirms the right skill ran at all.
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  # Single comprehensive check graded on the agent's FINAL RESPONSE only
  # (include_tool_calls: false) against the authoritative RESOLUTION.md.
  - type: llm_judge
    description: "Agent reached the same root cause as RESOLUTION.md: an Integration Service connection-resolution/authorization failure (connection invalid or inaccessible), not a Drive/file or transient failure"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: false
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md from the real investigation that troubleshot this exact
      failing job. Treat it as the authoritative ground truth. Grade ONLY the
      agent's final response to the user — not its tool calls or intermediate
      files.

      The user's request was:
        "why did my last job from folder Shared fail?"

      The agent had to find the most-recent Faulted job in folder Shared and
      diagnose it from evidence. Grade three dimensions together:

      DIMENSION A -- FAULT
        Identifies the most-recent Faulted job in folder Shared:
        job 4e00b4ca-b35b-4457-bb12-74f270d20cb0, process
        GSuite_ConnectionInvalid, failing in the GSuite "Download File"
        activity (UiPath.GSuite.Activities.DownloadFileConnections).

      DIMENSION B -- CAUSE
        An Integration Service CONNECTION-layer failure: the activity
        referenced a connection (00000000-1111-2222-3333-444444444444) that is
        invalid or not accessible to the running identity. The exception is
        "Connection [...] is invalid or you do not have access to it"
        (GSuiteException / ConnectionHttpException), thrown at OAuth token
        acquisition (ConnectionClient.GetAccessToken) BEFORE any Google Drive
        API call. The job dispatched and started normally, then faulted on
        connection resolution/authorization.

        MUST-NOT-ATTRIBUTE list. Attributing the fault to ANY of these is
        WRONG and caps the score at 0.0 for the cause:
          - a Drive HTTP 404 / file-not-found
          - a null/empty or otherwise invalid activity input
          - rate limiting / HTTP 429 / throttling
          - a transient 5xx / Google server error
          - a per-request timeout
          - a Google API data error

      DIMENSION C -- RESOLUTION
        Point the activity at a valid, accessible GSuite connection in the
        runner's folder — re-select or create the Google connection in the
        project, or correct the connection binding / folder permission so the
        running identity can use it. NOT a file-id fix, NOT an activity-input
        fix, NOT a transient retry.

      ANTI-FABRICATION: penalize invented file IDs, invented Google errors,
      any claim of an outage, or asserting that the referenced connection
      exists. The bogus connection id is not present in the connection list;
      the real GSuite connections are Enabled but are not the one the activity
      referenced.

      SCORING RUBRIC (single score):
        1.0  Correct job (names 4e00b4ca / GSuite_ConnectionInvalid, GSuite
             Download File) AND connection-invalid/inaccessible cause (names
             the connection id or "invalid or you do not have access to it" /
             ConnectionHttpException) AND correct fix direction (re-point to a
             valid/accessible connection or fix the binding/permission).
        0.7  Cause is right (connection invalid/inaccessible) but the fix is
             vague, or the agent did not clearly name the specific job.
        0.5  Identified the GSuite / Integration Service surface but did not
             land on a connection-invalid cause, or proposed the wrong fix.
        0.2  Recognized a failure but the wrong domain.
        0.0  Wrong cause — especially attributing to anything on the
             MUST-NOT-ATTRIBUTE list — or no conclusion.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Override experiments/default.yaml's 600s limit -- the multi-agent troubleshooting
# skill (triage -> hypothesis-generator -> tester -> presenter) routinely takes
# 10-20 minutes when sub-agents run sequentially.
