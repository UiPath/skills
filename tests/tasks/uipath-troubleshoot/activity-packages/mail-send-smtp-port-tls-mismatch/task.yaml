task_id: skill-troubleshoot-send-smtp-port-tls-mismatch
description: >
  UiPath troubleshooting agent must diagnose a Send SMTP Mail Message
  failure where Port=465 is paired with SecureConnection=StartTls; 465
  expects implicit SSL, so the STARTTLS negotiation fails and the socket
  is forcibly closed (SmtpException wrapping a SocketException). Success =
  agent identifies the port/transport-security mismatch (Branch 3 of
  send-smtp-mail-failures) and prescribes the correct pairing (587 +
  StartTls, or 465 + SSL), NOT an auth/relay fix, a server-outage
  conclusion, or disabling SecureConnection.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My WeeklyReportDispatcher process runs unattended and is faulting in
  Orchestrator on every run. It hangs for a bit and then fails with
  "System.Net.Mail.SmtpException: Failure sending mail ... An existing
  connection was forcibly closed by the remote host". The folder is
  "RPA Production". The mail server and account are correct. Why does it
  keep failing and how do I fix it?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing process.
    WeeklyReportDispatcher runs unattended on a schedule. You trust the
    agent's expertise and are waiting for its diagnosis. You only know
    what you wrote in your initial report — the connection-forcibly-closed
    SmtpException on every run, and that the server and account are correct.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks where the project source / XAML is, answer with the current working directory: respond exactly `.` (a single dot)."
    - "If the agent asks whether to expand investigation scope (any new product domain), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data beyond your initial report — you only know the SmtpException (connection forcibly closed) on every run and that the server/account are correct. EXCEPTION: the project source path is a real fact and may be shared (`.`)."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
