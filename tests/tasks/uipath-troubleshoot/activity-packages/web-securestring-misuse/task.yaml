task_id: skill-troubleshoot-web-securestring-misuse
description: >
  UiPath troubleshooting agent must diagnose why the TicketApiClient project
  won't publish — UiPath Studio's Workflow Analyzer blocks it with ST-SEC-009
  ("SecureString Misusage", Error) at design time; it has never run (no jobs)
  — and whether the user's proposed WebAPI package-upgrade fix is correct.
  Grades skill_triggered + llm_judge against RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My TicketApiClient project won't publish — UiPath Studio's Workflow Analyzer
  blocks it with "ST-SEC-009: SecureString Misusage" (Error) on the sequence
  around my HTTP Request activity. It has never run; this only happens at
  design time in the analyzer.

  A forum post claims upgrading UiPath.WebAPI.Activities to 2.3.0+ adds native
  secure parameter handling and clears this — is that right? Why is this being
  flagged, and what's the actual fix? The project is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath developer whose TicketApiClient project fails Workflow
    Analyzer validation with "ST-SEC-009: SecureString Misusage" (Error) on
    the sequence around the HTTP Request activity. It has never run. You have
    read a forum post claiming a WebAPI package upgrade fixes it and want to
    know whether that is true and what the real fix is.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings from the project source and to hand you the fix at the end."
    - "If the agent looks for Orchestrator jobs or runtime logs, remind it the process has never run - it fails at design time in the Workflow Analyzer."
    - "If asked, confirm the finding is ST-SEC-009 at Error severity and that it blocks publish, at design time, before any execution."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
