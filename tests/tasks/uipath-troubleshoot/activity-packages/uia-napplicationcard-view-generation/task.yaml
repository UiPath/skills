task_id: skill-troubleshoot-uia-napplicationcard-view-generation
description: >
  Faithful replay of a UiPath troubleshooting investigation. The agent runs
  the uipath-troubleshoot skill against a project and
  a uip CLI mock. Success = the agent reaches the same root cause as
  RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  I opened this project in Studio this morning and one of the workflows won't
  render anymore. The design canvas shows a broken activity and the Output
  panel says:

    Could not generate view for NApplicationCard
    Object reference not set to an instance of an object.

  It opened fine last week. Nothing about my automation changed. Can you
  investigate why?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_dialog: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath developer who hit this Studio rendering error. You are
    waiting for the troubleshooting agent to finish its investigation and trust
    its expertise. You only have the information you wrote in your initial
    report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks where the project source / XAML is, answer with the current working directory: respond exactly `.` (a single dot)."
    - "Never invent or provide new factual data beyond your initial report — you don't know any other details. EXCEPTION: the project source path is a real fact about your setup and may be shared (`.`)."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
