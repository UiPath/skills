task_id: skill-troubleshoot-web-webapi-version-mismatch
description: >
  UiPath troubleshooting agent must diagnose why the OrderStatusSync project
  throws System.MissingMethodException ("Method not found: 'Void
  UiPath.Web.Activities...'") at design time in UiPath Studio 2021.10 — it has
  never run in Orchestrator (no jobs). Grades skill_triggered + llm_judge
  against RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My OrderStatusSync process suddenly won't open in UiPath Studio. Opening it
  — or clicking Configure on the HTTP Request activity's wizard — throws
  "System.MissingMethodException: Method not found: 'Void
  UiPath.Web.Activities...'" and the HTTP Request activity shows an error. It
  has never run in Orchestrator; this only happens at design time, in UiPath
  Studio 2021.10.

  Why is this happening, and how do I fix it? The project is in the current
  working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath developer whose Web Activities process throws
    System.MissingMethodException ("Method not found: 'Void
    UiPath.Web.Activities...'") when you open or validate it in Studio, or
    click Configure on the HTTP Request wizard. It has never run. You are on
    UiPath Studio 2021.10. You trust the agent and want a diagnosis plus the
    fix.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings from the project source and to hand you the fix at the end."
    - "If the agent looks for Orchestrator jobs or runtime logs, remind it the process has never run - it fails when you open or validate it in Studio."
    - "If asked, confirm you are on UiPath Studio 2021.10 and that the error appears at design time (opening / validating the workflow or the HTTP Request wizard), before any execution."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
