task_id: skill-troubleshoot-workflowevents-handle-app-request-null-reference
description: >
  Faithful replay of a UiPath troubleshooting investigation. The agent runs
  the uipath-troubleshoot skill against a uip CLI mock whose responses are
  verbatim-shaped CLI outputs. A workflow invoked by a UiPath App faulted at
  the internal HandleAppRequest activity (UiPath.WorkflowEvents.Activities)
  with System.NullReferenceException — "Object reference not set to an
  instance of an object." The fault is a null dereference INSIDE the
  App-invoked workflow (ProcessRequest.xaml): the io_Records DataTable input
  the App did not bind was Nothing when .Rows was accessed. HandleAppRequest
  is internal Apps machinery that runs the invoked workflow and returns its
  result, so the NRE originates in the workflow / a missing input argument,
  NOT in the WorkflowEvents package and NOT in the SignalR channel (no
  transport phrase). Span attributes (HandleAppRequest running
  ProcessRequest.xaml; the faulting Assign frame) pin the cause to the
  invoked workflow. Success = the agent reaches the same root cause as
  RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, e2e, faithful-replay, mode:diagnose, workflowevents-activities]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from folder Shared has failed?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing job.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, say you do not have the project source on this machine and ask it to proceed with the platform evidence (job details, logs, traces)."
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator, runtime-exceptions), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
