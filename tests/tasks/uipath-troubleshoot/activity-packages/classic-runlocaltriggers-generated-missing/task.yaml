task_id: skill-troubleshoot-classic-runlocaltriggers-generated-missing
description: >
  Runtime fault of a trigger-based attended automation: the job Faults ~2s
  after start because Run Local Triggers cannot load its auto-generated trigger
  workflow (.local\generated\Triggers.Generated.xaml is missing — the .local
  design-time cache was not present when the package was built). The Error log
  is deliberately generic ("the invoked workflow could not be loaded / a
  referenced workflow file was not found" at RunLocalTriggers.Execute) and does
  NOT name the file, so the diagnosis cannot be one-shot from the log: the agent
  must combine the faulting activity, the project source (Run Local Triggers
  present, no .local generated workflow), and playbook knowledge, and resist the
  Invoke-Workflow-File red herring. Correct fix: regenerate the workflow by
  opening/rebuilding the project in Studio and republishing (align
  Studio/Assistant versions if the fault followed an upgrade) — NOT hand-create
  the file. Grades the conclusion (skill_triggered + llm_judge against
  RESOLUTION.md), not the trajectory.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  python: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  # Prepend ./m to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My OrderEntryAssistant attended automation in folder Operations fails right
  after it starts — it is supposed to start some local triggers and then wait,
  but it errors out within a couple of seconds instead. Why does it fault on
  startup?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
