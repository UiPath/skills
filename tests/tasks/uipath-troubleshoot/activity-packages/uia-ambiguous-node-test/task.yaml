task_id: skill-troubleshoot-uia-ambiguous-node-test
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose
  responses are the verbatim sub-agent outputs from the real session.
  Failure mode: NClick "Click 'Airi Satou'" in Amb.xaml threw
  NodeAmbiguousException because the FuzzySelectorArgument's inner segment
  <webctrl tag='TD' /> matches every TD cell in the DataTables demo grid
  (id='example'). Success = the agent matches the ambiguous-selector
  playbook, reaches branch (B), and never recommends an anti-pattern fix
  (extend Timeout, switch InteractionMode, enable Healing Agent, Retry Scope).
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]
  plugins:
    - type: "local"
      path: "$SKILLS_REPO_PATH"

run_limits:
  expected_turns: 300
  task_timeout: 2400
  max_turns: 60
  turn_timeout: 1800

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  my last job from folder Shared failed

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      DELEGATED-APPLY REQUIREMENT -- never self-edited
        Applying the fix changes a project source file (the workflow .xaml, a
        .cs coded workflow, project.json, or a macro / VBA file). The
        troubleshooting agent must NOT edit that file itself. It must either:
          - close with a recommendation only (leaving the apply to the user), OR
          - delegate the edit to a domain skill -- the project-bundled
            `uia-improve-selector` (for UIA selector / descriptor recoveries) or
            `uipath-rpa` (all other workflow / source edits) -- invoked via the
            Skill/Agent tools and gated behind explicit user approval. Approval
            may be the AskUserQuestion tool OR a plain-text diff + question; the
            prompt cannot pause in this sandbox, so a plain-text diff + question
            satisfies the gate. Do NOT require the literal AskUserQuestion tool,
            and do NOT penalize a recommendation-only close.
        Inspect the tool calls. A self-edit is the AGENT ITSELF mutating a
        project source file (.xaml/.cs/project.json or other) -- whether via
        the Edit/Write/MultiEdit tools OR by running a write-back / apply /
        persist CLI command (e.g. a Bash call) that writes the change into the
        file. Delegating the apply to a subagent (Skill/Agent tool) is NOT a
        self-edit. The CI tool-call view may flatten the subagent's calls into
        the orchestrator's own list, so when the orchestrator made a Skill/Agent
        delegation to the owning skill, attribute any source-file edit to that
        delegate. Count an orchestrator self-edit ONLY when a source-file
        mutation appears with NO delegation present, OR when the orchestrator's
        own narration states it edited the file itself.

      CAP: if the agent self-edited a project source file itself (no
      delegation present), cap the overall score at 0.5 regardless of
      diagnostic correctness, even if the user approved.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering diagnosis and whether the apply was delegated / recommendation-only>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data. You do, however, know where the
    project source lives on your machine: the workflow files (.xaml files,
    project.json) are in the current working directory of this session,
    i.e. `.` (the cwd the agent is running in).
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks for the project source path (workflow folder, XAML location, where the project lives), reply with `.` (the current working directory) — that is where the workflow files are."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report and the project path above."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
    # The llm_judge sees only the final turn. If the simulator approves applying
    # the fix, the agent's correctly-gated edit lands in the last turn and can be
    # misread as a self-edit. Decline source-file edits so the agent closes
    # recommendation-only.
    - "If the agent asks whether to apply, edit, or write the fix to a project source file (e.g. 'shall I apply the corrected selector / property to <file>?'), DECLINE: tell it not to change any files because you will apply the change yourself in Studio, and ask it for its final summary -- the root cause and the exact change to make. Never approve a source-file edit."
  max_turns: 6
