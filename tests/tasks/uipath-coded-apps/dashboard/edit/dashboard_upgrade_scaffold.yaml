task_id: uipath-coded-apps-dashboard-upgrade-scaffold
description: >
  Scaffold UPGRADE. A compiler-managed dashboard is stamped with an older
  scaffold version than the shipped kit (seeded drift), so any edit emits
  UPGRADE_AVAILABLE. The agent must refresh it via a lone UPGRADE edit-intent
  op (incremental-editor.md): the script pre-warms deps, regenerates every
  widget from the persisted intentMetric + on-disk metric modules, revalidates
  (Stage A + tsc), and re-stamps state.versions.scaffold to the current kit
  version — preserving intent.json and src/metrics. Closes the
  previously-untested UPGRADE op (REBUILD's mechanism is exercised
  indirectly via rebuildAllWidgets). Integration-tier: the upgrade runs a
  full dependency install + typecheck — nightly at 200 turns.
tags: [uipath-coded-apps, integration, dashboard, mode:build, lifecycle:generate]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  node: {}

pre_run:
  # Seed lives in _shared/seed_upgrade.sh (bash -c wrapper: cmd.exe passes the
  # quoted string through, bash expands $SKILLS_REPO_PATH — portable across
  # the Linux CI runner and local Windows runs).
  - command: 'bash -c "bash \"$SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/seed_upgrade.sh\""'
    timeout: 120
    fail_on_error: true

# Reclaim the upgrade's node_modules before artifact preservation (the UPGRADE
# op pre-warms a full dependency install).
post_run:
  # Tenant hygiene: delete the External App this run created, if any — matches
  # the clientId(s) in the sandbox against `external-apps list` and deletes
  # only those. Best-effort, always exits 0 (_shared/cleanup_external_apps.mjs).
  - command: 'bash -c "node \"$SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/cleanup_external_apps.mjs\""'
    timeout: 60
  - command: 'find . -maxdepth 5 -type d \( -name node_modules -o -name .npm-prefix \) -prune -exec rm -rf {} +'
    timeout: 180

initial_prompt: |
  The dashboard project in ./ops-dash was generated by an older version of
  the dashboard scaffold. Bring it up to the current scaffold, keeping its
  metrics unchanged, and make sure it validates cleanly afterwards.

  This is a non-interactive automated test — there is NO user to consult.
  Treat the upgrade as approved and run it through to completion in this
  same session: do NOT stop to ask a question.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-coded-apps skill"
    skill_name: "uipath-coded-apps"
    expected_skill: "uipath-coded-apps"
    weight: 1.0
    pass_threshold: 1.0

  # The durable outcome: state re-stamped to the shipped kit's version
  # (read from the extracted kit itself, so this never goes stale).
  - type: run_command
    description: "state.versions.scaffold now equals the current kit version (upgrade re-stamped)"
    command: "node -e \"const s=require('./ops-dash/.dashboard/state.json'); const k=require('./ops-dash/_gen/starter-kit.json'); process.exit(s.versions && s.versions.scaffold===k.version ? 0 : 1)\""
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # The refresh went through the sanctioned lone UPGRADE op.
  - type: run_command
    description: "An edit intent with an UPGRADE op exists"
    command: "sh -c 'grep -rq --include=*intent*.json UPGRADE ops-dash'"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # Metrics preserved + project still a valid compiler-model dashboard.
  - type: run_command
    description: "Project still has its metric module + regenerated widget (no fnBody regression)"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-metrics 1 --min-widgets 1 --forbid-substr fnBody
    timeout: 30
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0
