task_id: skill-deeprag-coded-smoke-trigger
description: >
  Smoke test: agent should trigger the uipath-deeprag-coded skill when
  the user asks to summarize / synthesize across PDF or TXT documents
  from a Python coded agent (LangGraph). Verifies the skill fires for
  the Python-coded-agent + PDF/TXT signal pair.
tags: [uipath-deeprag-coded, smoke, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I have a Python coded-agent project (`pyproject.toml` with uipath +
  uipath-langchain, plus `langgraph.json`). I want it to receive a PDF
  attachment at runtime and produce a single grounded summary with
  citations. Tell me which skill applies and outline the durable-interrupt
  pipeline. Do NOT scaffold any files.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-deeprag-coded skill"
    expected_skill: "uipath-deeprag-coded"
    expected: "yes"
    weight: 3.0
    pass_threshold: 1.0
