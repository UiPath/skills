task_id: skill-platform-solution-deploy-e2e
description: >
  E2E (Confluence S10): agent publishes the committed e2e-stub solution .zip
  and deploys it. Final state: a deploy with the expected name exists on the
  tenant, and a folder containing a process has been provisioned.
tags: [uipath-platform, e2e, mode:build, lifecycle:setup, solution]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=deploy-round-trip python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_init.py"
    timeout: 30

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 300

initial_prompt: |
  Use the `uipath-platform` skill.

  `seed.json` provides `uuid8`.

  Goal: leave the tenant with a solution deployment named
  `e2e-deploy-<uuid8>` provisioning a folder named `e2e-deploy-folder-<uuid8>`
  under `Shared/`. The folder must contain a process from the e2e-stub
  package. Source `.zip`:
  `$SKILLS_REPO_PATH/tests/fixtures/packages/e2e-stub-1.0.0.zip`

  Append a manifest record for cleanup:
  `{"kind": "deploy", "key": "e2e-deploy-<uuid8>"}`

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: run_command
    description: "Tenant state: deploy present in list; folder + process exist"
    command: "python3 $TASK_DIR/check_deploy_round_trip.py"
    timeout: 60
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
