task_id: skill-platform-solution-deploy-e2e
description: >
  E2E solution deploy round-trip (Confluence S10): pack → publish → deploy run
  → poll deploy status to terminal → activate → uninstall. Slowest test by
  far; gated behind PLATFORM_E2E_SLOW=1.
tags: [uipath-platform, e2e, mode:build, lifecycle:setup, solution, slow]
skip: true
# Blocked: tests/fixtures/solutions/minimal/e2e-minimal.uipx has an empty
# Projects array, which `uip solution pack` rejects. To unblock:
#  1. Add at least one project to the fixture (see solutions/minimal/README.md).
#  2. Optionally gate behind PLATFORM_E2E_SLOW=1 in the runner (~5-10 min).
#  3. Flip skip→false.

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "TASK_ID=deploy-round-trip python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/seed_solution_fixture.py"
    timeout: 60

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/_shared/cleanup_platform_resources.py"
    timeout: 300

initial_prompt: |
  Use the `uipath-platform` skill. Read `seed.json` for `solution_dir`.

  Steps (use `--output json`):
  1. `solution pack <solution_dir> ./packed.zip` → `pack.json`.
  2. `solution publish ./packed.zip` → `publish.json`. Capture PackageKey/PackageVersion.
  3. `solution deploy run --name <uuid8>-deploy --package-name <name> --package-version <ver> --folder-name <uuid8>-deploy-folder --parent-folder-path Shared --skip-activate` → `deploy_run.json`. Capture deploy id.
  4. Append manifest entry for deploy + solution-package.
  5. Poll `solution deploy status <deploy-id>` every 30s up to 10 min, save final to `deploy_status_terminal.json`.
  6. `solution deploy list` → `deploy_list.json` (must include this deploy).
  7. `solution deploy activate <name>` → `activate.json`.
  8. `solution deploy uninstall <name>` → `uninstall.json`.

success_criteria:
  - type: command_executed
    description: "Agent walked pack → publish → deploy → activate → uninstall"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(pack|publish|deploy\s+(run|activate|uninstall))'
    min_count: 5
    weight: 2.0
    pass_threshold: 1.0
