task_id: skill-solution-project-remove
description: >
  Integration test: agent uses the uipath-solution skill to unregister one
  project from a solution that has two, via `uip solution projects remove`,
  leaving exactly one registered. Covers the remove surface (and the
  manifest ↔ solution-folder consistency rule) that no current test
  exercises. Runs entirely in the sandbox tempdir — no tenant interaction.

  Ground truth verified against references/develop-solution.md: `project
  remove` REFUSES to remove the last remaining project (a valid solution
  must keep >=1), so the test removes one of two and asserts one remains —
  NOT an empty manifest, which the CLI forbids by design.
tags: [uipath-solution, integration, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 16

initial_prompt: |
  I over-populated a UiPath solution and want to drop one project.

  1. Create a new UiPath solution called "TidyDemo" and register TWO
     projects into it.
  2. Then unregister ONE of those two projects from the solution.
  3. Confirm the solution has exactly one project registered afterwards.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*TidyDemo'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent registered projects (set-up) via uip solution projects add (or import)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+projects?\s+(add|import)\b(?!\s+--help)'
    min_count: 2
    weight: 1.0
    pass_threshold: 0.0  # advisory: `uip rpa init --location <solution-dir>` (and init inside a solution) auto-registers projects (CLI #2470), so explicit `projects add` is optional. Registration is outcome-checked by the json_check below plus the successful `projects remove` (which refuses to drop the last project — ending at 1 proves it started at 2). Mirrors uipath-agents/coded/coded_in_flow_e2e.yaml.

  - type: command_executed
    description: "Agent unregistered a project via uip solution projects remove"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+projects?\s+remove\b(?!\s+--help)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Manifest has exactly one project after removing one of two"
    path: "TidyDemo/TidyDemo.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: equals
        expected: 1
    weight: 2.0
    pass_threshold: 1.0
