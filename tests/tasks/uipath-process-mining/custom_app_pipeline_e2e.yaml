task_id: skill-pm-custom-app-pipeline-e2e
description: >
  End-to-end test: build a Process Mining app from a flat event-log CSV
  using the uipath.custom template — create the app, upload the data,
  ingest it, and inspect the dbt transformations. Exercises the core
  pipeline the skill teaches (create → upload → ingest → transform) and
  its fixed ordering.

  Command-construction only — no live tenant. Commands fail with auth
  errors; what matters is that the agent picks uipath.custom for a flat
  log and sequences the pipeline commands with correct namespaces/flags.
tags: [uipath-process-mining, e2e, mode:build, lifecycle:setup, custom, pipeline]

run_limits:
  expected_turns: 10
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  I have a flat event-log CSV at ./events.csv (columns: Case_ID, Activity,
  Timestamp). Build a UiPath Process Mining app from it end to end: pick the
  right template, create the app, upload the data, ingest it, and then show
  me the dbt transformation files so I can review them. Use the
  uipath-process-mining skill and follow its workflow.

  Important:
  - The `uip` CLI is available but is not connected to a live tenant.
    Commands WILL fail with auth errors — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:

  - type: skill_triggered
    description: "Agent activated the uipath-process-mining skill"
    skill_name: "uipath-process-mining"
    expected_skill: "uipath-process-mining"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created an app from the uipath.custom template (correct template for a flat log)"
    tool_name: "Bash"
    command_pattern: 'uip\s+pm\s+apps\s+create\b.*--type\s+uipath\.custom'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded the event-log data file"
    tool_name: "Bash"
    command_pattern: 'uip\s+pm\s+files\s+upload\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent triggered an ingestion of the uploaded data"
    tool_name: "Bash"
    command_pattern: 'uip\s+pm\s+ingestions\s+create\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inspected the dbt transformations (list or get)"
    tool_name: "Bash"
    command_pattern: 'uip\s+pm\s+transformations\s+(list|get)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
