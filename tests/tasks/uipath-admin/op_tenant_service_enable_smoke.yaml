task_id: skill-admin-op-tenant-service-enable-smoke
description: >
  Operate smoke: agent enables a service on a tenant. Tests the
  list-available → add workflow and post-state verification per
  Rule 22.

  Command-construction only — no live tenant available.
tags: [uipath-admin, smoke, mode:operate, oms, tenant, services]

run_limits:
  expected_turns: 6

initial_prompt: |
  Enable the Document Understanding service on tenant
  "aaaaaaaa-1111-2222-3333-444444444444".

  Important:
  - The `uip` CLI is available but the `admin` subcommand may not be
    installed and/or the CLI is not connected to a live tenant.
    Commands WILL fail — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT try to install tools,
    do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent added or enabled the service on the tenant with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+tenants\s+services\s+(add|enable)\b.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
