task_id: skill-admin-authz-assignment-lifecycle-org-e2e
description: >
  End-to-end test: full lifecycle of an Organization-scope role
  assignment using an existing built-in role. Resolves the current
  user, finds an Org-scope built-in role, creates the assignment,
  verifies via `assignments list`, deletes the assignment, verifies
  removal.

  Validates: `--identity-id` / `--identity-type User` (NOT
  `--principal-*`), Org-scope path auto-fill, cleanup at end of test.
  Uses an existing built-in role — no new role created.

  Command-construction only — no live tenant available.
tags: [uipath-admin, e2e, mode:build, authz, assignment-lifecycle, scope:organization]

run_limits:
  expected_turns: 16
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  Give my own account the built-in organization-level role "Insights
  Dashboard Viewer", confirm it's actually assigned to me, then take it
  back off again and confirm it's gone.

  Important:
  - The `uip` CLI is available but is not connected to a live tenant.
    Commands WILL fail with auth errors — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: skill_triggered
    description: "Agent activated the uipath-admin skill"
    skill_name: "uipath-admin"
    expected_skill: "uipath-admin"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent resolved the current user (advisory — codex may skip)"
    tool_name: "Bash"
    command_pattern: 'uip\s+(?:login\s+status|admin\s+users\s+list)'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent listed roles to discover a built-in one (advisory — codex may skip)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+list\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent created the assignment with --role-id, --identity-id, --identity-type User"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+assignments\s+create(?=[\s\S]*--role-id\s)(?=[\s\S]*--identity-id\s)(?=[\s\S]*--identity-type\s+User\b)[\s\S]*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent cleaned up via `roles assignments delete`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+assignments\s+delete\s+\S+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified via `assignments list` (at least once)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+assignments\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

post_run:
  - command: 'CLEANUP_ASSIGNMENT_ROLE="Insights Dashboard Viewer" CLEANUP_ASSIGNMENT_SCOPE="Organization" python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_assignment.py''))"'
    timeout: 30
