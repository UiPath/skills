task_id: skill-admin-audit-events-pagination-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to query
  audit events with a bounded time window and a >200 limit, exercising
  the skill's pagination rule. The CLI tool paginates internally for
  --limit > 200 (server-side maxCount cap), so the agent should pass
  --limit, NOT roll its own cursor loop with --before / --before-id.

  Platform note: commands fail with auth errors in this environment;
  what matters is the agent's CLI invocation pattern.
tags: [uipath-admin, smoke, mode:diagnose, audit, pagination]

run_limits:
  expected_turns: 4

initial_prompt: |
  I'm doing a compliance review — I need the 500 most recent tenant
  Admin audit events from the last 30 days.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant events` with both --from-date and --to-date ISO 8601 bounds"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--from-date\s+\S+.*--to-date\s+\S+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent passed --limit 500 (or any value > 200) — single call, not a manual loop"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--limit\s+(?:[2-9]\d{2,}|[1-9]\d{3,})'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran `uip admin audit tenant events` (advisory, non-gating)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events'
    min_count: 1
    weight: 1.0
    # Non-gating: `--output json` is the CLI default, so omitting it is harmless. Reports
    # Rule-3 adherence (score 1/0) but pass_threshold 0 keeps a benign miss from failing the task.
    pass_threshold: 0
