task_id: skill-admin-identity-create-external-app-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to create
  an external OAuth2 app with scopes. Tests correct --scope flag usage
  (Critical Rule #6).

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable.
tags: [uipath-admin, smoke, create]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new external app named "CI Pipeline" with scopes for Folders
  and Jobs access in my UiPath organization. I need Client ID and Secret
  for a CI/CD pipeline.

  Save a summary to report.json in the current working directory with
  at minimum:
    {
      "app_name": "CI Pipeline",
      "create_command": "<the exact uip admin external-apps create command>",
      "scopes_used": ["<list of scopes passed to --scope>"],
      "commands_attempted": ["<list of all uip commands you attempted>"]
    }

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant
    in this environment. Commands will fail with auth errors — that
    is expected. Run each command once, record the result in
    report.json, and move on. Do NOT retry or attempt to login.
  - Use --output json on every uip admin command.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran external-apps create"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+create'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included --scope with OR.* scopes"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+create\s+.*--scope\s+"?OR\.'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "report.json references correct CLI namespace"
    path: "report.json"
    includes:
      - "uip admin"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json records correct app name"
    path: "report.json"
    assertions:
      - expression: "app_name"
        operator: equals
        expected: "CI Pipeline"
      - expression: "length(scopes_used)"
        operator: gte
        expected: 1
    weight: 1.5
    pass_threshold: 0.75
