task_id: skill-admin-identity-federated-credentials-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to
  create a federated credential for GitHub Actions OIDC on an
  external app. Tests correct subcommand path and required flags.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable.
tags: [uipath-admin, smoke, create]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Set up workload identity federation for our "CI Pipeline" external
  app (client ID: ci-pipeline-app) so GitHub Actions in repo
  myorg/myrepo (main branch) can authenticate without a client secret.

  Important:
  - The `uip` CLI is available but the `admin` subcommand may not be
    installed and/or the CLI is not connected to a live tenant.
    Commands WILL fail — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT try to install tools,
    do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran federated-credentials create with required flags"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+federated-credentials\s+create\s+.*--issuer'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included --subject with repo reference"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+federated-credentials\s+create\s+.*--subject'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
