task_id: skill-admin-authz-role-lifecycle-org-e2e
description: >
  End-to-end test: full CRUD lifecycle (create, get, update, delete) of an
  Organization-scope custom role carrying the Access Policy read permission
  (`AUTHZ.CONDITIONALACCESSPOLICY.READ`). Lists org-scope permissions to
  discover it, creates with `--scope Organization`, updates, verifies via
  `roles get`, then deletes and verifies removal.

  Validates: `--scope Organization`, the `roles update` step, actions.json
  uses permission `name` strings (not UUIDs), positional id on
  get/update/delete, cleanup at end of test.
tags: [uipath-admin, e2e, mode:build, authz, role-lifecycle, scope:organization]

run_limits:
  expected_turns: 13
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  I need an org-scope read-only role named "AccessPolicyViewer_clie2e"
  that grants only read access to the organization's Access Policies
  (the Conditional Access Policy "Read" permission).

  Create it, then change its description and confirm the change stuck,
  and finally remove it again so we don't leave it behind — confirm
  it's gone.

  Important:
  - The `uip` CLI is available but is not connected to a live tenant.
    Commands WILL fail with auth errors — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: skill_triggered
    description: "Agent activated the uipath-admin skill"
    skill_name: "uipath-admin"
    expected_skill: "uipath-admin"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed Organization-scope permissions (advisory — codex may skip)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+permissions\s+list\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent created the role with --scope Organization and --name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create(?=[\s\S]*--scope\s+Organization\b)(?=[\s\S]*--name\s)[\s\S]*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated the role via `roles update`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+update\s+\S+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified via `roles get` (advisory — codex may skip)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+get\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent cleaned up by calling `roles delete`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+delete\s+\S+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified via `roles get` or `roles list` (at least once)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+(?:get|list)\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must NOT pass --tenant-id on an Organization-scope role"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create[\s\S]*--scope\s+Organization\b[\s\S]*--tenant-id'
    weight: 1.0

  - type: command_not_executed
    description: "Agent must NOT use --scope Folder (invalid for role creation)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create[\s\S]*--scope\s+Folder\b'
    weight: 1.0

post_run:
  - command: 'CLEANUP_ROLE_NAME="AccessPolicyViewer_clie2e" python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_role.py''))"'
    timeout: 30
