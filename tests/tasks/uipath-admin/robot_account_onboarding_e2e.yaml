task_id: skill-admin-identity-robot-onboarding
description: >
  End-to-end test: agent performs a full robot account onboarding flow.
  Creates a robot account, creates an external app with OAuth2 credentials,
  and adds the robot to a group. Validates the agent follows the multi-step
  onboarding workflow from the skill's onboarding-workflows reference.
tags: [uipath-admin, e2e, lifecycle:generate, identity, onboarding]
max_iterations: 2

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 40
  turn_timeout: 600
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I need to onboard a new unattended robot for invoice processing.
  Please complete the full robot account onboarding:

  1. Create a robot account named "invoice-processor" with display name
     "Invoice Processing Robot"
  2. Create an external app named "invoice-processor-credentials" with
     scopes for Folders, Assets, Queues, and Jobs
  3. List available groups and add the robot account to an appropriate group

  Use --output json on all commands. Save the Client ID and Secret from
  the external app creation.

  Do NOT ask for approval, confirmation, or feedback.
  Complete the entire task end-to-end in a single pass.

success_criteria:
  # Step 0: Auth check
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Step 1: Create robot account
  - type: command_executed
    description: "Agent listed existing robot accounts (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+robot-accounts\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created robot account with correct name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+robot-accounts\s+create\s+.*invoice-processor'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Step 2: Create external app with credentials
  - type: command_executed
    description: "Agent created external app with scopes"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+external-apps\s+create\s+.*--scope'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "External app scopes include OR.Folders"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+external-apps\s+create\s+.*OR\.Folders'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Step 3: Group assignment
  - type: command_executed
    description: "Agent listed groups to discover available roles"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added robot to a group"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+add-members'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Cross-cutting: --output json usage
  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0
