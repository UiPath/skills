task_id: skill-admin-identity-robot-onboarding
description: >
  End-to-end test: agent performs a robot account onboarding flow.
  Creates a robot account, assigns it to a group for role-based access,
  and verifies the setup. Validates the agent follows the multi-step
  onboarding workflow from the skill's onboarding-workflows reference.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable.
tags: [uipath-admin, e2e, onboarding]
max_iterations: 2

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 40
  turn_timeout: 600
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I need to onboard a new unattended robot for invoice processing.
  Please complete the robot account onboarding:

  1. Create a robot account named "invoice-processor" with display name
     "Invoice Processing Robot"
  2. List available groups and add the robot account to an appropriate group

  Save a summary to report.json with at minimum:
    {
      "robot_name": "invoice-processor",
      "commands_attempted": ["<list of all uip commands>"],
      "steps_completed": ["create_robot", "assign_group"]
    }

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant
    in this environment. Commands will fail with auth errors — that
    is expected. Run each command once, record the result in
    report.json, and move on. Do NOT retry or attempt to login.
  - Use --output json on every uip admin command.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  # Step 0: Auth check
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Step 1: Create robot account
  - type: command_executed
    description: "Agent listed existing robot accounts (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created robot account with correct name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+create\s+.*invoice-processor'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Step 2: Group assignment
  - type: command_executed
    description: "Agent listed groups to discover available roles"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added robot to a group"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+add-members'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Artifact validation
  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json records correct robot name"
    path: "report.json"
    assertions:
      - expression: "robot_name"
        operator: equals
        expected: "invoice-processor"
      - expression: "length(commands_attempted)"
        operator: gte
        expected: 3
    weight: 1.5
    pass_threshold: 0.75

  # Cross-cutting: --output json usage
  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0
