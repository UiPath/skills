task_id: skill-admin-identity-list-users
description: >
  Smoke test: agent uses the uipath-admin skill to list identity users.
  Validates the agent checks login status, resolves the organization ID,
  and runs the correct uip admin identity users list command with
  --output json and --organization flags.
tags: [uipath-admin, smoke, lifecycle:discover, identity]

agent:
  type: claude-code
  max_turns: 20

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List all users in my UiPath organization using the identity CLI.
  Use --output json on all commands.

  Do NOT ask for approval, confirmation, or feedback.
  Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent checked login status first"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran users list with --organization and --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+users\s+list\s+.*--organization'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on identity commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
