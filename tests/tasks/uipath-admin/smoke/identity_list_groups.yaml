task_id: skill-admin-identity-list-groups
description: >
  Smoke test: agent uses the uipath-admin skill to list identity groups.
  Validates the agent resolves the organization ID and runs the correct
  groups list command.
tags: [uipath-admin, smoke, lifecycle:discover, identity]

agent:
  type: claude-code
  max_turns: 20

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Show me all groups in my UiPath Identity Server.
  Use --output json on all commands.

  Do NOT ask for approval, confirmation, or feedback.
  Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran groups list with --organization"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+list\s+.*--organization'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
