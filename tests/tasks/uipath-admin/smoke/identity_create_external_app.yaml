task_id: skill-admin-identity-create-external-app
description: >
  Smoke test: agent uses the uipath-admin skill to create an external app
  with OAuth2 scopes. Validates the agent uses the correct command with
  --scope and --organization flags, and warns about saving the secret.
tags: [uipath-admin, smoke, lifecycle:generate, identity]

agent:
  type: claude-code
  max_turns: 25

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new external app named "CI Pipeline" with scopes for Folders
  and Jobs access in my UiPath organization. I need Client ID and Secret
  for a CI/CD pipeline.
  Use --output json on all commands.

  Do NOT ask for approval, confirmation, or feedback.
  Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran external-apps create with --organization and --scope"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+external-apps\s+create\s+.*--organization'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included --scope with Orchestrator scopes"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+external-apps\s+create\s+.*--scope\s+"?OR\.'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
