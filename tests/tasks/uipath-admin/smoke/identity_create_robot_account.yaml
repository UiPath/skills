task_id: skill-admin-identity-create-robot-account
description: >
  Smoke test: agent uses the uipath-admin skill to create a robot account.
  Validates the agent lists existing robot accounts first (discover before
  create), then runs the create command with correct flags.
tags: [uipath-admin, smoke, lifecycle:generate, identity]

agent:
  type: claude-code
  max_turns: 25

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new robot account named "invoice-bot" with display name
  "Invoice Processing Bot" in my UiPath organization.
  Use --output json on all commands.

  Do NOT ask for approval, confirmation, or feedback.
  Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed robot accounts first (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+robot-accounts\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran robot-accounts create with name and --organization"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+robot-accounts\s+create\s+.*--organization'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included --display-name flag"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+robot-accounts\s+create\s+.*--display-name'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on identity commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
