task_id: skill-admin-identity-group-membership
description: >
  End-to-end test: agent manages group membership. Creates a custom group,
  discovers users, adds members, verifies membership, then removes a member.
  Tests the full group lifecycle and the critical rule about using user IDs
  (not usernames) for membership operations.
tags: [uipath-admin, e2e, lifecycle:generate, lifecycle:edit, identity]
max_iterations: 2

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 40
  turn_timeout: 600
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Perform the following group management tasks in my UiPath organization:

  1. Create a new group called "Invoice Processing Team"
  2. List users in the organization to find available members
  3. Add the first two users from the list to the new group
  4. Verify the group membership by listing group members
  5. Remove the second user from the group

  Use --output json on all commands.

  Do NOT ask for approval, confirmation, or feedback.
  Complete the entire task end-to-end in a single pass.

success_criteria:
  # Auth
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Create group
  - type: command_executed
    description: "Agent listed existing groups first (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the group"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+create\s+.*Invoice.Processing.Team'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Discover users
  - type: command_executed
    description: "Agent listed users to resolve IDs"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+users\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Add members
  - type: command_executed
    description: "Agent added members with --user-ids"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+add-members\s+.*--user-ids'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Verify membership
  - type: command_executed
    description: "Agent verified membership via get-members"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+get-members'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Remove member
  - type: command_executed
    description: "Agent removed a member with --user-ids"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+groups\s+remove-members\s+.*--user-ids'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Cross-cutting
  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+identity\s+.*--output\s+json'
    min_count: 5
    weight: 1.0
    pass_threshold: 1.0
