task_id: skill-admin-identity-list-robot-accounts-smoke
description: >
  Smoke test: agent uses the uipath-admin skill to list robot accounts.
  Tests correct CLI namespace and verifies the CLI returns a
  successful JSON response.
tags: [uipath-admin, smoke, list]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List all robot accounts in my UiPath organization.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran robot-accounts list with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list\s+.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip admin robot-accounts list returns Success with RobotAccountList code"
    command: "uip admin robot-accounts list --output json 2>&1 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d['Result']=='Success' and d['Code']=='RobotAccountList', f'Got {d}'; print('OK')\""
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
