task_id: skill-admin-identity-list-robot-accounts-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to list
  robot accounts. Tests correct CLI namespace and flag usage.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable.
tags: [uipath-admin, smoke, list]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List all robot accounts in my UiPath organization.

  Save a summary to report.json in the current working directory with
  at minimum:
    {
      "command_used": "<the exact uip admin robot-accounts command>",
      "commands_attempted": ["<list of all uip commands you attempted>"]
    }

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant
    in this environment. Commands will fail with auth errors — that
    is expected. Run each command once, record the result in
    report.json, and move on. Do NOT retry or attempt to login.
  - Use --output json on every uip admin command.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent checked login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran robot-accounts list"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "report.json references correct CLI namespace"
    path: "report.json"
    includes:
      - "uip admin"
    weight: 1.5
    pass_threshold: 1.0
