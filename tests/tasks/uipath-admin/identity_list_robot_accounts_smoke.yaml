task_id: skill-admin-identity-list-robot-accounts-smoke
description: >
  Smoke test: agent uses the uipath-admin skill to list robot accounts.
  Tests correct CLI namespace and verifies the CLI returns a
  successful JSON response with robot account data.
tags: [uipath-admin, smoke, list]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List all robot accounts in my UiPath organization.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran robot-accounts list with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list\s+.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "CLI returns Success with RobotAccountList code and valid array"
    command: "python3 $TASK_DIR/../_shared/check_robot_accounts_list.py"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
