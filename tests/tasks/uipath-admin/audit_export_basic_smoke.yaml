task_id: skill-admin-audit-export-basic-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to run
  a minimal `export` against a small window. Validates the three
  required flags (`--from-date`, `--to-date`, `--output-path`) and
  that the agent picks a reasonable output path inside the working
  directory.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is correct
  command invocation with correct flags.
tags: [uipath-admin, smoke, mode:operate, audit, export]

run_limits:
  expected_turns: 5

initial_prompt: |
  Can you export all of yesterday's tenant Admin audit events as JSON files so
  I can archive them? Save them in a folder called audit-yesterday.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant export` with --from-date, --to-date, AND --output-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+export\b.*--from-date\s+\S+.*--to-date\s+\S+.*--output-path\s+\S+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent's export targeted the requested ./audit-yesterday folder (json default; no .zip/.csv extension)"
    tool_name: "Bash"
    # Match the audit-yesterday folder path; the negative lookahead rejects a .zip/.csv
    # file (the retired ZIP shape) so this confirms the json-folder default is used.
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+export\b.*--output-path\s+\S*audit-yesterday(?![\w.])'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
