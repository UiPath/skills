task_id: skill-admin-audit-login-history-e2e
description: >
  End-to-end test: agent runs Investigation 2 from
  audit-workflow-guide.md ("login history for user X") at ORG scope —
  cross-tenant / IdP-level login activity. Sequence is: list `org
  sources` to find the User Login type GUID (Identity →
  Authentication → User Login), then query `org events` scoped to
  that user inside a bounded window. Validates the agent goes through
  the sources-discovery → user-filtered-events chain at org scope
  rather than blanket scanning all events.

  Command-construction only — no live tenant available for
  side-effect verification.
tags: [uipath-admin, e2e, mode:diagnose, audit, investigation, login-history, scope-org]
max_iterations: 2

initial_prompt: |
  Using the organization Admin audit trail (sign-in history), show me login attempts for jane.doe@example.com over the last month.

  This is an automated run — do not stop to ask me for confirmation. If the user
  cannot be resolved in this org, follow the skill's documented fallback (query the
  User Login type over the date window and note the result is approximate) rather
  than pausing to ask which user I meant.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip admin audit org sources` to discover the User Login type GUID"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+org\s+sources\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attempted user resolution (via `uip admin users list --search <email>` for actorId lookup, or passed --user-id/--search on the org events call directly)"
    tool_name: "Bash"
    command_pattern: '(?:uip\s+admin\s+audit\s+org\s+events\b(?=.*(?:--user-id\s+\S+|--search\s+\S+)))|(?:uip\s+admin\s+users\s+list\b.*--search\s+\S+)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent kept a bounded time window via --from-date/--to-date on the org events call"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+org\s+events\b(?=.*--from-date\s+\S+)(?=.*--to-date\s+\S+)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

run_limits:
  expected_turns: 14
  max_turns: 40
  turn_timeout: 600
