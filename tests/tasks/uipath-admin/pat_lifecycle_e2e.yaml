task_id: skill-admin-pat-lifecycle-e2e
description: >
  End-to-end test: agent manages the full PAT lifecycle. Creates a
  personal access token with scopes and expiration, lists tokens to
  verify, then revokes it.
tags: [uipath-admin, e2e, lifecycle:generate, lifecycle:edit]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  max_turns: 40
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a personal access token described as "e2e-test-pat" with
  read access to Folders, expiring 2027-06-01. Then list my tokens
  to confirm it exists, and revoke it.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent created PAT with --description, --scopes, --expiration"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+pat\s+create\s+.*--description'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed PATs to verify"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+pat\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent revoked the PAT"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+pat\s+revoke'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "PAT 'e2e-test-pat' was created (may already be revoked)"
    command: "python3 $TASK_DIR/../_shared/check_pat_created.py"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $TASK_DIR/../_shared/cleanup_pat.py"
    timeout: 30
