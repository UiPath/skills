task_id: skill-admin-authz-role-lifecycle-tenant-global-e2e
description: >
  End-to-end test: full CRUD lifecycle (create, update, get, delete) of a
  TenantGlobal-shape custom role — a reusable template assignable in every
  tenant of the org — carrying the "Administration Page" View permission
  (`CENTRALIZEDACCESS.ADMINISTRATIONPAGE.VIEW`, a Tenant-shape Centralized
  Access permission). Discovers the permission via `permissions list`,
  creates with `--scope TenantGlobal` (no `--tenant-id`), updates the role,
  verifies via `roles get`, then deletes and confirms removal.

  Validates: `--scope TenantGlobal` on a Tenant-shape permission, the
  `roles update` step, absence of `--tenant-id` (TenantGlobal is not bound
  to one tenant), no `--service centralizedaccess` (the CLI rejects it —
  Centralized Access is the no-`--service` umbrella), no `--scope
  Organization` (the permission is Tenant-shape, not org-wide).

  A post_run safety net (`cleanup_role.py`) deletes the role by id so an
  incomplete run leaves no orphan template on the tenant.
tags: [uipath-admin, e2e, mode:build, authz, role-lifecycle, scope:tenant-global]

run_limits:
  expected_turns: 18
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  Set up a reusable read-only role template called
  "AdminPageViewerGlobal_clie2e" that can be assigned in every tenant of
  our organization — a template not bound to any single tenant. It should
  grant view-only access to the Administration page (read-only
  admin-page access, nothing else).

  Create it, then update its description to note it is read-only and
  confirm the change, and finally remove it and confirm it's gone.

  Important:
  - The `uip` CLI is available but is not connected to a live tenant.
    Commands WILL fail with auth errors — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: skill_triggered
    description: "Agent activated the uipath-admin skill"
    skill_name: "uipath-admin"
    expected_skill: "uipath-admin"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed Tenant-shape permissions to discover the Administration Page permission (advisory — codex may skip)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+permissions\s+list\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent created the role with --scope TenantGlobal and --name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create(?=[\s\S]*--scope\s+TenantGlobal\b)(?=[\s\S]*--name\s)[\s\S]*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated the role via `roles update`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+update\s+\S+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified the updated role via `roles get` (advisory — codex may skip)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+get\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 0

  - type: command_executed
    description: "Agent cleaned up by calling `roles delete`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+delete\s+\S+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified via `roles get` or `roles list` (at least once)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+(?:get|list)\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must NOT pass --tenant-id (TenantGlobal is not bound to one tenant)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create\s+.*--scope\s+TenantGlobal\b.*--tenant-id'
    weight: 1.5

  - type: command_not_executed
    description: "Agent must NOT pass --service centralizedaccess (CLI rejects it; Centralized Access is the no---service umbrella)"
    tool_name: "Bash"
    command_pattern: '--service\s+centralizedaccess\b'
    weight: 1.5

  - type: command_not_executed
    description: "Agent must NOT create the role with --scope Organization (the Administration Page permission is Tenant-shape)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create\s+.*--scope\s+Organization\b'
    weight: 1.0

post_run:
  - command: 'CLEANUP_ROLE_NAME="AdminPageViewerGlobal_clie2e" python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_role.py''))"'
    timeout: 30
