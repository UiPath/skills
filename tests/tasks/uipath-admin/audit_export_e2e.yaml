task_id: skill-admin-audit-export-e2e
description: >
  End-to-end skill-guided evaluation: agent uses the uipath-admin skill
  to drive a complete investigation — discover sources, query events
  in a window, then export the same window as day-wise JSON files.
  Validates the full sources → events → export chain plus the export's
  required --from-date / --to-date / --output-path flags.

  Platform note: commands fail with auth errors in this environment.
  E2e tests still validate the CLI invocation surface — the agent must
  produce the right command sequence with the right flags.
tags: [uipath-admin, e2e, mode:operate, audit, export]
max_iterations: 2

initial_prompt: |
  I'm doing a security review of this tenant and want the last 7 days of
  Admin audit history. Show me what audit event sources are being captured, let
  me see the most recent events for context, and export the whole week as
  JSON files for offline review into a folder called audit-last-7d.

success_criteria:
  # 1. sources discovery happened first
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant sources` (discovery before query)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+sources'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # 2. events query with a bounded window
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant events` with --from-date and --to-date ISO bounds"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--from-date\s+\S+.*--to-date\s+\S+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # 3. export with both required bounds AND --output-path
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant export` with --from-date, --to-date, AND --output-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+export\b.*--from-date\s+\S+.*--to-date\s+\S+.*--output-path\s+\S+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  # 4. export written to the requested folder (json default; no .zip/.csv extension)
  - type: command_executed
    description: "Agent's export targeted the ./audit-last-7d folder"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+export\b.*--output-path\s+\S*audit-last-7d(?![\w.])'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

run_limits:
  expected_turns: 6
  max_turns: 40
  turn_timeout: 600
