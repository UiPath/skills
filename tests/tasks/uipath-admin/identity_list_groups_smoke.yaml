task_id: skill-admin-identity-list-groups-smoke
description: >
  Smoke test: agent uses the uipath-admin skill to list groups.
  Tests correct CLI namespace, --output json, and verifies
  the CLI returns a successful JSON response with group data.
tags: [uipath-admin, smoke, list]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Show me all groups in my UiPath organization.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran groups list with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+list\s+.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "CLI returns Success with GroupList code and valid array"
    command: "python3 $TASK_DIR/../_shared/check_groups_list.py"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
