task_id: skill-admin-identity-list-users-smoke
description: >
  Smoke test: agent uses the uipath-admin skill to list identity users.
  Tests correct CLI namespace, --output json convention, and verifies
  the CLI returns a successful JSON response with user data.
tags: [uipath-admin, smoke, list]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List all users in my UiPath organization.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran users list with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+users\s+list\s+.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "CLI returns Success with UserList code and valid array"
    command: "python3 $TASK_DIR/../_shared/check_users_list.py"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
