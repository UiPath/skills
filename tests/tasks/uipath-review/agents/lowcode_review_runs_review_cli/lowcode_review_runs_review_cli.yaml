task_id: skill-review-agents-lowcode-runs-review-cli
description: >
  Delegation check of the CLI-first review contract on a low-code agent.
  pre_run scaffolds a minimal agent then DELETES entry-points.json so
  `uip agent validate` has a concrete structural finding to surface. The
  reviewer must classify the project, run `uip agent validate` and
  `uip agent review --output json` (Step 2.5a) — gracefully recording the
  review CLI as skipped if that subcommand is unavailable — stay read-only,
  read the judgment catalog, and produce a report. (Asserting a specific
  CLI-emitted rule_id such as LOWCODE_ENTRY_POINTS_MISSING is deferred until
  `uip agent review` ships in the installed CLI; the delegation contract is
  what this test pins down.)
tags: [uipath-review, smoke, mode:diagnose, lifecycle:discover]

run_limits:
  turn_timeout: 1200
  task_timeout: 1500
  max_turns: 40

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-review/agents/lowcode_review_runs_review_cli/inject_missing_entry_points.py"
    timeout: 30

initial_prompt: |
  A low-code UiPath agent project exists at `ReviewSol/SampleAgent`
  inside the solution `ReviewSol`. Review the agent project and produce
  a structured review report with Critical / Warning / Info findings.

  This is a read-only review. Do NOT modify, create, or delete any
  files inside `ReviewSol/`. Do NOT scaffold a new project. Do NOT
  ask for approval, confirmation, or feedback.

  Important — produce the review in TWO places, identical content:

  1. As the chat output (the normal review surface), AND
  2. Save the SAME report to a file at `./_review_report.md` at the
     sandbox root (NOT inside `ReviewSol/`).

  Writing the file copy first, before producing the chat report, is
  encouraged — that way the file persists even if the chat response is
  cut off. The file is the source of truth the test harness will check.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_executed
    description: "Mandatory validation: uip agent validate ran (Critical Rule 2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Ran the review CLI first (Step 2.5a): uip agent review --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+review'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Used --output json on the review CLI"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+review.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "A non-trivial review report was produced"
    command: "python3 $TASK_DIR/check_lowcode_review_runs_review_cli.py"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
