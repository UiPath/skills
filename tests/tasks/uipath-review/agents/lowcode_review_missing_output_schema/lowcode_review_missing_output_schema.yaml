task_id: skill-review-agents-lowcode-missing-output-schema
description: >
  Smoke test for uipath-review on a low-code agent project with an
  injected MISSING_OUTPUT_SCHEMA violation. pre_run scaffolds a
  minimal agent (non-conversational by default) then strips
  entry-points.json.entryPoints[0].output.properties to {} —
  downstream consumers cannot bind to the agent's output. The reviewer
  must cite `MISSING_OUTPUT_SCHEMA` (error, schema category — the
  non-conversational variant; `MISSING_OUTPUT_SCHEMA_CONVERSATIONAL`
  is the warning sibling for conversational agents).
tags: [uipath-review, smoke, mode:diagnose]

run_limits:
  turn_timeout: 1200
  task_timeout: 1500
  max_turns: 40

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-review/agents/lowcode_review_missing_output_schema/inject_missing_output_schema.py"
    timeout: 30

initial_prompt: |
  A low-code UiPath agent project exists at `ReviewSol/SampleAgent`
  inside the solution `ReviewSol`. Review the agent project and produce
  a structured review report with Critical / Warning / Info findings.

  This is a read-only review. Do NOT modify, create, or delete any
  files inside `ReviewSol/`. Do NOT scaffold a new project. Do NOT
  ask for approval, confirmation, or feedback.

  Important — produce the review in TWO places, identical content:

  1. As the chat output (the normal review surface), AND
  2. Save the SAME report to a file at `./_review_report.md` at the
     sandbox root (NOT inside `ReviewSol/`).

  Writing the file copy first, before producing the chat report, is
  encouraged — that way the file persists even if the chat response is
  cut off. The file is the source of truth the test harness will check.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_executed
    description: "Mandatory validation: uip agent validate ran (Critical Rule 2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consulted the low-code rule catalog (agents-lowcode-rules.md)"
    tool_name: "Read"
    command_pattern: 'agents-lowcode-rules\.md'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consulted the common agent rule catalog (agents-common-rules.md)"
    tool_name: "Read"
    command_pattern: 'agents-common-rules\.md'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Review report applies the catalog: cites MISSING_OUTPUT_SCHEMA on outputSchema; no invented rule_ids"
    command: "python3 $TASK_DIR/check_lowcode_review_missing_output_schema.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
