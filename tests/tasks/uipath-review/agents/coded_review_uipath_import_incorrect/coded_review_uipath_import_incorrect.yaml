task_id: skill-review-agents-coded-uipath-import-incorrect
description: >
  Smoke test for uipath-review on a CODED agent with an injected
  UIPATH_IMPORT_INCORRECT violation. pre_run writes a minimal FUNCTION
  coded agent then adds `from uipath import UiPath` to main.py (the
  correct import is `from uipath.platform import UiPath`). The reviewer
  must cite `UIPATH_IMPORT_INCORRECT` (error severity, code category)
  via the inline Grep detection method.
tags: [uipath-review, smoke, mode:diagnose]

run_limits:
  turn_timeout: 1200
  task_timeout: 1500
  max_turns: 40

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-review/agents/coded_review_uipath_import_incorrect/inject_uipath_import_incorrect.py"
    timeout: 60

initial_prompt: |
  A UiPath coded agent project exists at `CodedAgent` in the current
  directory. Review the agent project and produce a structured review
  report with Critical / Warning / Info findings.

  Before doing anything else, load the `uipath-review` skill and follow
  its review workflow (discover, classify, run validation, apply the
  rule catalog, produce the report).

  This is a read-only review. Do NOT modify, create, or delete any
  files inside `CodedAgent/`. Do NOT scaffold a new project. Do NOT
  ask for approval, confirmation, or feedback.

  Important — produce the review in TWO places, identical content:

  1. As the chat output (the normal review surface), AND
  2. Save the SAME report to a file at `./_review_report.md` at the
     sandbox root (NOT inside `CodedAgent/`).

  Writing the file copy first, before producing the chat report, is
  encouraged — that way the file persists even if the chat response is
  cut off. The file is the source of truth the test harness will check.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside CodedAgent/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*CodedAgent'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside CodedAgent/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*CodedAgent'
    weight: 3.0

  - type: command_executed
    description: "Agent consulted the coded rule catalog (agents-coded-rules.md)"
    tool_name: "Read"
    command_pattern: 'agents-coded-rules\.md'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consulted the common agent rule catalog (agents-common-rules.md)"
    tool_name: "Read"
    command_pattern: 'agents-common-rules\.md'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Review report applies the catalog: cites UIPATH_IMPORT_INCORRECT in main.py; no invented rule_ids"
    command: "python3 $TASK_DIR/check_coded_review_uipath_import_incorrect.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
