task_id: skill-review-rpa-performance-datatable
description: >
  Judgment test for uipath-review on an RPA (XAML) project with performance
  anti-patterns: a nested For Each Row over two DataTables (O(n*m) — quadratic
  matching that should be a Join / lookup dictionary), a Log Message inside the
  inner loop (excessive logging in a tight loop), and a hardcoded 30-second
  Delay used to wait for a downstream system instead of a dynamic wait. The
  reviewer must read the XAML and flag at least the nested-loop performance
  issue or the hardcoded Delay (ST-DBP-026 / ST-PRR-004 / UI-DBP-013 or prose).

  Platform note: `uip rpa validate/build/analyze` require Windows and may not
  run on Linux CI — those CLI checks are advisory. The defects are caught by
  reading the workflow, which is platform-independent.
tags: [uipath-review, smoke, mode:diagnose, lifecycle:discover]

run_limits:
  turn_timeout: 1200
  task_timeout: 1500
  max_turns: 40

sandbox:
  driver: tempdir
  template_sources:
    - type: template_dir
      path: fixture

initial_prompt: |
  A UiPath RPA project exists at `PerfBot` in the current directory.
  Review it for quality and performance issues, focusing on data handling and
  efficiency, and produce a structured review report with Critical / Warning /
  Info findings.

  Use the `uipath-review` skill to perform this review.

  This is a read-only review. Do NOT modify, create, or delete any files
  inside `PerfBot/`. Do NOT run the automation. Do NOT ask for approval,
  confirmation, or feedback.

  Produce the review in TWO places, identical content:
    1. As the chat output (the normal review surface), AND
    2. Saved to a file at `./_review_report.md` at the sandbox root
       (NOT inside `PerfBot/`).

  Writing the file copy first, before the chat report, is encouraged — the
  file is the source of truth the test harness will check.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside PerfBot/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*PerfBot'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside PerfBot/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*PerfBot'
    weight: 3.0

  - type: command_executed
    description: "Advisory: uip rpa validate/build/analyze ran (Critical Rule 2) — recorded, not gating"
    tool_name: "Bash"
    command_pattern: 'uip\s+rpa\s+(validate|build|analyze)'
    min_count: 1
    weight: 2.0
    pass_threshold: 0

  - type: run_command
    description: "Report flags the nested-loop performance issue or the hardcoded Delay"
    command: "python3 $TASK_DIR/check_performance_datatable.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
