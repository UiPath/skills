task_id: skill-review-rpa-selector-brittle
description: >
  Judgment test for uipath-review on a REAL desktop UI-automation project
  (based on a live UiPath demo that drives Studio via Use Application +
  Type Into). The primary Type Into targets have been made brittle: the
  selectors are position-based idx-only ctrl chains (&lt;ctrl idx='3' /&gt;...)
  instead of the stable automationid the capture originally used. The reviewer
  must read the XAML and flag the selector fragility (UI-REL-001 large idx /
  UI-DBP-030 forbidden/positional selector, or equivalent prose) at Warning+
  severity.

  Platform note: `uip rpa validate/build/analyze` require Windows Studio Helm
  and may not run on Linux CI — those CLI checks are advisory. Selector
  fragility is caught by reading the workflow, which is platform-independent.
tags: [uipath-review, smoke, mode:diagnose, lifecycle:discover]

run_limits:
  turn_timeout: 1800
  task_timeout: 2100
  max_turns: 40

sandbox:
  template_sources:
    - type: template_dir
      path: fixture

initial_prompt: |
  A UiPath RPA project exists at `BrittleBot` in the current directory.
  Review it for quality and best-practice issues, focusing on the UI
  automation, and produce a structured review report with Critical /
  Warning / Info findings.

  Use the `uipath-review` skill to perform this review.

  This is a read-only review. Do NOT modify, create, or delete any files
  inside `BrittleBot/`. Do NOT run the automation. Do NOT ask for approval,
  confirmation, or feedback.

  Produce the review in TWO places, identical content:
    1. As the chat output (the normal review surface), AND
    2. Saved to a file at `./_review_report.md` at the sandbox root
       (NOT inside `BrittleBot/`).

  Writing the file copy first, before the chat report, is encouraged — the
  file is the source of truth the test harness will check.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside BrittleBot/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*BrittleBot'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside BrittleBot/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*BrittleBot'
    weight: 3.0

  - type: command_executed
    description: "Advisory: uip rpa validate/build/analyze ran (Critical Rule 2) — recorded, not gating"
    tool_name: "Bash"
    command_pattern: 'uip\s+rpa\s+(validate|build|analyze)'
    min_count: 1
    weight: 2.0
    pass_threshold: 0

  - type: run_command
    description: "Review report identifies the brittle/position-based selector + hardcoded URL"
    command: "python3 $TASK_DIR/check_selector_brittle.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
