# skip:true, tenant-gated. CONFIRMED available for RPA/Studio (2026-06-16):
# `uip is activities list uipath-uipath-testmanager` lists these activities; coded path uses
# UiPath.IntegrationService.Activities. Coded (.cs) workflow on purpose: builds
# headless cross-platform. Flip skip:false once codereval has a TM connection.
task_id: skill-rpa-testmanager-execution-results
description: >
  Coverage (RPA connector): agent uses the uipath-rpa skill to build a coded
  (.cs) workflow that uses the UiPath Test Manager Integration Service connector
  (uipath-uipath-testmanager) for the execution and results group via UiPath.IntegrationService.Activities,
  then builds it clean. Drives `uip is` discovery -> coded IS connector calls ->
  `uip rpa build`/`get-errors`. Graded on discovery + build + the project
  referencing the connector and each object.
tags: [uipath-rpa, e2e, mode:build, lifecycle:generate, connector, uipath-uipath-testmanager, feature:connections]
skip: true

run_limits:
  task_timeout: 2400
  max_turns: 140
  turn_timeout: 1200

initial_prompt: |
  Build a UiPath coded automation (a .cs coded workflow) that uses the UiPath Test Manager Integration Service connector to exercise the full operation set — perform each of these:

  - Get a test execution
  - Delete a test execution
  - Get the test case logs of a test execution
  - Get a test case log
  - Get robot logs
  - Get assertions
  - Download an assertion
  - Get test steps
  - Get test step logs

  The task is not complete until the project builds with no errors.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent loaded the uipath-rpa skill"
    tool_name: "Skill"
    command_pattern: "uipath-rpa"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the TM connector on the `uip is` surface"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+is\s+(connectors\s+list|resources\s+(describe|list)|activities\s+list|connections\s+list)[\s\S]{0,200}?uipath-uipath-testmanager'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent built / error-checked the project (`uip rpa build` or `uip rpa get-errors`)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+rpa\s+(build|get-errors)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Coded project references the TM connector and each execution and results object (8)"
    command: 'grep -rqsF "uipath-uipath-testmanager" . && for o in TestExecution GetTestCaseLogsOfTestExecution TestCaseLog GetRobotLogs GetAssertions DownloadAssertion GetTestSteps GetTestStepLogs; do grep -rqsF "$o" --include="*.cs" . || { echo "missing $o"; exit 1; }; done'
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
