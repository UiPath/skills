# PROTOTYPE ‚Äî data-grounded on the RPA (coded) surface. skip:true.
# Agent builds a coded (.cs) workflow that creates a Test Case via the TM IS
# connector (UiPath.IntegrationService.Activities), reads it back, and RUNS it
# (`uip rpa run`) to produce the retrieved value ‚Äî then records the round-trip.
# Needs the codereval TM connection + the RPA runtime + the agent reliably
# authoring multi-activity coded connector calls (today unreliable, hence skip:true).
# Reusable data-grounded pattern for RPA; flip skip:false when it reliably runs.
task_id: skill-rpa-testmanager-crud-grounded
description: >
  Data-grounded (RPA coded): agent builds a coded workflow that creates a Test
  Case via the uipath-uipath-testmanager connector with a unique seeded name,
  reads it back, runs it, and records the round-trip. Graded on discovery/build/run
  AND on retrieved == created (real data through the connector, executed).
tags: [uipath-rpa, e2e, mode:build, lifecycle:generate, connector, uipath-uipath-testmanager, feature:connections]
skip: true

run_limits:
  task_timeout: 2400
  max_turns: 120
  turn_timeout: 1200

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-rpa/connector/testmanager_crud_grounded/seed.py"
    timeout: 30

initial_prompt: |
  Before starting, load the uipath-rpa skill and follow its workflow.

  Read seed.json ‚Äî it has a unique `name` and a `project_key`. Build a UiPath coded
  automation (a `.cs` coded workflow) that uses the UiPath Test Manager Integration
  Service connector (UiPath.IntegrationService.Activities) to:
  1. Create a Test Case named exactly that `name` under that project.
  2. Read it back by the created id.
  3. Write `result.json` with `created_name` (the seeded name), `retrieved_name`
     (the name read back), and `id` (the created id).

  Discover the connector/connection on the `uip is` surface. Build the project
  (`uip rpa build` / `get-errors`), then run it (`uip rpa run`) so the create and
  read actually execute.

  Do NOT ask for approval. Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent loaded the uipath-rpa skill"
    tool_name: "Skill"
    command_pattern: "uipath-rpa"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the TM connector on the `uip is` surface"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+is\s+(connectors\s+list|resources\s+(describe|list)|activities\s+list|connections\s+list)[\s\S]{0,200}?uipath-uipath-testmanager'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent built the project (`uip rpa build` / `get-errors`)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+rpa\s+(build|get-errors)'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran the project (`uip rpa run`)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+rpa\s+run'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Data-grounded: retrieved name == created (seeded) name ‚Äî real data round-tripped through the executed coded workflow"
    command: "python3 $TASK_DIR/check.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
