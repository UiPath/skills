task_id: skill-rpa-uia-google-search
description: >
  Skill-guided evaluation: agent uses the uipath-rpa skill to build a standard
  (XAML, VB.NET) UiPath project that drives a web browser — opening google.com,
  typing a query, and clicking the search button via Use Application/Browser,
  Type Into, and Click UIA activities with pre-known selectors. Validates the
  full XAML surface the skill teaches: project.json with VisualBasic expression
  language, ApplicationCard / TypeInto / Click activity XML, and the
  `uip rpa get-errors` compile gate.
tags: [uipath-rpa, smoke, uia, xaml]

# Standard XAML + UIA activities. First `uip rpa` call restores packages
# (incl. UIAutomation) + spins up Helm — 60–90s cold start. `get-errors`
# on a XAML workflow with UIA activities can run another ~45s. Budget
# accordingly.
task_timeout: 1800
agent:
  type: claude-code
  # Bumped from 40 → 60: CI run 24903966636 hit error_max_turns at 40 on
  # this task after spending many turns on `uip rpa create-project`
  # auth-retry loops. Prompt now tells the agent to hand-author
  # project.json directly, but give turn headroom for the XAML
  # discovery/edit cycles regardless.
  max_turns: 60
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

# Per-task reviewer prompt contextualizing the CI auth caveat so the
# reviewer doesn't dock for auth-gated command exit codes.
llm_reviewer:
  enabled: true
  model: claude-sonnet-4-6
  temperature: 0.0
  max_tokens: 600
  prompt: |
    Evaluate whether the agent built a correct standard (XAML, VB.NET)
    UiPath RPA project for this CI task.

    CI environment caveat: this sandbox has NO UiPath sign-in. Any
    `uip rpa` subcommand that requires Helm/Studio auth (create-project,
    get-errors) will exit non-zero with "HelmFeatureNotAvailableException".
    The task explicitly tells the agent to hand-author project.json and
    treat get-errors exit 1 as expected — so do NOT penalize the agent
    for either. The compile gate is `uip rpa build` (auth-free).

    Focus scoring on:
    - GoogleSearch/project.json exists with `"expressionLanguage":
      "VisualBasic"` and UIA activity packages declared.
    - GoogleSearch/Main.xaml is a well-formed VB.NET Sequence wrapping
      ApplicationCard (Use Application/Browser) around TypeInto + Click,
      with the three pre-known selectors (chrome.exe + google.com URL,
      textarea name='q', input name='btnK').
    - Main.xaml references "UiPath automation" as the query.
    - `uip rpa build` exited 0 (the one mandatory CI compile gate).
    - report.json accurately reflects activities + commands used.

    Reply terse, developer-style. Score 1.0 if correct; lower only for
    real issues (malformed XAML, wrong activities, wrong selectors,
    build failure). Ignore auth-gated command exit codes.

initial_prompt: |
  Build a standard UiPath RPA project called "GoogleSearch" (XAML-based,
  VisualBasic expression language) that automates a simple web search:
  open google.com in Chrome, type a query into the search box, and
  click the search button.

  Deliverables, all under ./GoogleSearch:
  1. project.json with `"expressionLanguage": "VisualBasic"` and any
     activity packages needed for UI Automation.
  2. Main.xaml — a Sequence that uses Use Application/Browser
     (ApplicationCard) wrapping Type Into + Click, targeting:
       * URL:     https://www.google.com
       * Browser: chrome.exe
       * Query:   UiPath automation
     Use these selectors directly (wrap in angle brackets when placed
     in XAML, do NOT call `uip rpa indicate`):
       App:    html app='chrome.exe' url='https://www.google.com'
       Input:  webctrl tag='textarea' name='q'
       Button: webctrl tag='input' name='btnK' type='submit'

  CI environment note — IMPORTANT: this sandbox has NO UiPath sign-in
  configured. Any `uip rpa` subcommand that needs Studio/Helm auth will
  return "HelmFeatureNotAvailableException (sign-in required)" and exit
  non-zero. This affects `uip rpa create-project`, `uip rpa get-errors`,
  `uip rpa get-default-activity-xaml`, and related Helm-backed tools.
  Do NOT retry those commands when they hit the auth error. Do NOT run
  `uip login` (no creds to sign in with). Do NOT pass `--use-studio`.
  Instead:
    * Hand-author the project scaffolding directly — do NOT call
      `uip rpa create-project`:
        - `GoogleSearch/project.json` — set `"expressionLanguage":
          "VisualBasic"` and declare UiPath.UIAutomation.Activities in
          `dependencies`. Follow the skill's project.json reference.
        - `GoogleSearch/project.uiproj` — required by `uip rpa build`.
          Minimal shape:
            {
              "Name": "GoogleSearch",
              "ProjectType": "Process",
              "Description": "Google search smoke test",
              "MainFile": "Main.xaml"
            }
    * For the ApplicationCard / TypeInto / Click XAML, consult the
      skill's reference files directly (no CLI needed):
        references/ui-automation-guide.md
        references/uia-configure-target-workflows.md
        references/uia-multi-step-flows.md
        references/xaml/xaml-basics-and-rules.md
      Do NOT try `uip rpa get-default-activity-xaml` — it hits the
      Helm auth wall in this sandbox and wastes turns.
    * Treat `uip rpa get-errors`' exit 1 as expected and move on — its
      exit code is NOT the CI compile gate.

  Validation — run these two commands in this order:

  1. `uip rpa build "$PWD/GoogleSearch" --output json`
     (the PROJECT_DIR is positional, NOT `--project-dir`; use the
     absolute path — relative paths like `./GoogleSearch` hit a
     path-resolution bug that duplicates the leaf directory.)
     This is the AUTHORITATIVE compile gate in CI. It does NOT need
     Studio/Helm auth and must exit 0 before you declare the task done.
     Fix every XAML error it surfaces and rerun until it's clean. This
     is mandatory — not optional.

  2. `uip rpa get-errors --file-path Main.xaml --project-dir ./GoogleSearch --output json`
     The skill-canonical validation step — call it once for skill
     fidelity, record the exit code, then move on. Its failure due to
     auth is expected and does not block completion. Do NOT try to
     work around the auth error (no `uip login`, no `--use-studio`).

  Save a summary to report.json at the sandbox root:
    {
      "project_name": "GoogleSearch",
      "expression_language": "VisualBasic",
      "activities_used": ["<activity class names you emitted in XAML>"],
      "commands_used": ["<uip commands you ran, full with flags>"],
      "get_errors_exit_code": <exit code from the final get-errors call>,
      "build_exit_code": <exit code from the final uip rpa build call — must be 0>
    }

  Important:
  - The `uip` CLI and the `rpa` tool are already available in the environment.
  - Use `--output json` on any uip commands you run.
  - Do NOT pass `--use-studio` (Studio Desktop is not running interactively).

success_criteria:
  - type: file_exists
    description: "project.json was created"
    path: "GoogleSearch/project.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json targets VisualBasic"
    path: "GoogleSearch/project.json"
    includes:
      - "VisualBasic"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml workflow was created"
    path: "GoogleSearch/Main.xaml"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml contains the ApplicationCard/TypeInto/Click UIA activities"
    path: "GoogleSearch/Main.xaml"
    includes:
      - "ApplicationCard"
      - "TypeInto"
      - "Click"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml targets google.com with the expected query and selectors"
    path: "GoogleSearch/Main.xaml"
    includes:
      - "google.com"
      - "UiPath automation"
      - "btnK"
    weight: 1.5
    pass_threshold: 1.0

  # Skill-fidelity signal: the skill teaches `uip rpa get-errors` as
  # the canonical validation step, so require the agent to call it.
  # We do NOT gate on its exit code — Helm/Studio auth isn't wired up
  # in CI, so get-errors legitimately exits non-zero even when the XAML
  # is well-formed.
  - type: command_executed
    description: "Agent ran uip rpa get-errors on Main.xaml (skill-canonical validation)"
    tool_name: "Bash"
    command_pattern: 'uip\s+rpa\s+get-errors.*Main\.xaml'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Hard compile gate: `uip rpa build` doesn't need Helm/Studio auth,
  # so in CI it's the authoritative "does this project compile" check.
  # Require it to have returned success.
  - type: command_executed
    description: "Agent ran uip rpa build successfully (compile gate)"
    tool_name: "Bash"
    command_pattern: 'uip\s+rpa\s+build'
    min_count: 1
    require_success: true
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 0.5
    pass_threshold: 1.0

  - type: json_check
    description: "report.json confirms VisualBasic + a clean compile + the activities used"
    path: "report.json"
    assertions:
      - expression: "project_name"
        operator: equals
        expected: "GoogleSearch"
      - expression: "expression_language"
        operator: equals
        expected: "VisualBasic"
      # build is the hard compile signal; get-errors is best-effort in
      # CI (Helm auth may be absent) so we don't assert on its exit code.
      - expression: "build_exit_code"
        operator: equals
        expected: 0
      - expression: "length(commands_used)"
        operator: gte
        expected: 2
      - expression: "length(activities_used)"
        operator: gte
        expected: 2
    weight: 1.5
    pass_threshold: 0.8
