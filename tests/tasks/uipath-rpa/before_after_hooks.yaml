task_id: skill-rpa-before-after-hooks
description: >
  Skill-guided evaluation: agent uses the uipath-rpa skill to set up shared
  Before/After hooks for a test project. Tests whether the skill teaches the
  partial class CodedWorkflow pattern (not the old base class pattern).
tags: [uipath-rpa, smoke, coded, hooks]

# RPA tasks that invoke `uip rpa get-errors` pay a 30–60s Helm spin-up
# per call. Experiment defaults (300s turn / 20 turns) are too tight for
# the full generate-then-validate flow.
task_timeout: 1200
agent:
  type: claude-code
  max_turns: 40
  turn_timeout: 900

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I have a UiPath coded test project called "LoginTests" with several test
  case files. I need shared setup and teardown logic that runs before and
  after every test case — opening and closing the browser.

  The project already exists at ./LoginTests with a project.json.
  Focus on generating the correct files, then validate with the CLI.

  Requirements:
  - Set up shared Before/After hooks that apply to ALL test cases
  - Use the recommended pattern from the skill (partial class, not base class)
  - Include browser open in Before and browser close in After
  - Create one example test case (TestLoginSuccess.cs) that benefits from the hooks
  - Run `uip rpa get-errors --project-dir ./LoginTests --output json` after
    generating files, to verify the project compiles. The command may take
    30–60s because Studio Helm spins up. Do NOT skip this step.

  Save a summary to report.json:
    {
      "hooks_file": "<filename of the hooks file>",
      "hooks_pattern": "<'partial_class' or 'base_class'>",
      "hooks_class_declaration": "<the class declaration line>",
      "test_case_file": "<filename of the test case>",
      "test_case_inherits_from": "<base class of the test case>",
      "get_errors_exit_code": <exit code from `uip rpa get-errors`>
    }

  Important:
  - The `uip` CLI and the `rpa` tool are already available in the environment.
  - Use `--output json` on any uip commands you run.
  - Do NOT pass `--use-studio` (Studio Desktop is not running interactively).

success_criteria:
  - type: file_exists
    description: "Hooks file was created in the project"
    path: "LoginTests/CodedWorkflowHooks.cs"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Hooks file uses partial class CodedWorkflow with IBeforeAfterRun"
    path: "LoginTests/CodedWorkflowHooks.cs"
    includes:
      - "partial class CodedWorkflow"
      - "IBeforeAfterRun"
      - "Before("
      - "After("
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Example test case was created"
    path: "LoginTests/TestLoginSuccess.cs"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Test case inherits from CodedWorkflow (not CodedWorkflowBase)"
    path: "LoginTests/TestLoginSuccess.cs"
    includes:
      - "CodedWorkflow"
      - "[TestCase]"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json confirms partial class pattern was used"
    path: "report.json"
    assertions:
      - expression: "hooks_pattern"
        operator: equals
        expected: "partial_class"
      - expression: "hooks_class_declaration"
        operator: contains
        expected: "partial class CodedWorkflow"
    weight: 2.0
    pass_threshold: 1.0

  # The reviewer needs to see that the agent actually validated the
  # project via the CLI — not just produced plausible-looking files.
  - type: command_executed
    description: "Agent ran uip rpa get-errors to validate the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+rpa\s+get-errors'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
