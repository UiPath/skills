task_id: skill-rpa-execution-map-greenfield
description: >
  Turn-budget gate for the execution-map + pattern-card workflow: a greenfield
  cross-platform XAML text-file automation must scaffold, batch-author from the
  pattern card (ReadTextFile / AppendLine / LogMessage are all card-covered, so
  no per-activity discovery is needed), and pass the validate+build gate within
  a hard 10-turn cap. Comparable pre-map task (skill-rpa-xaml-test-case)
  budgets 36-40 turns; this task fails if the skill regresses to per-activity
  discovery or validate-after-every-activity loops.
tags: [uipath-rpa, smoke, mode:build]

run_limits:
  expected_turns: 6
  max_turns: 10
  turn_timeout: 900

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Build a UiPath XAML automation called "TextReport": read data/orders.txt
  (create that input file with a few sample order lines inside the project
  first), append a "processed" marker line to it, and log the file contents.
  The project must target cross-platform (Portable); Studio Desktop is not
  available. The task is not complete until per-file `uip rpa validate`
  passes for the workflow AND `uip rpa build` passes for the project.
  Use --output json on any uip commands you run.

success_criteria:
  - type: command_executed
    description: "Project scaffolded via init with an explicit Portable target framework"
    command_pattern: 'uip\s+rpa\s+init\s+.*--target-framework\s+"?Portable"?'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Workflow file exists"
    path: "TextReport/Main.xaml"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Workflow authored with the card-covered activities (read, append, log)"
    path: "TextReport/Main.xaml"
    includes:
      - "ReadTextFile"
      - "AppendLine"
      - "LogMessage"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Per-file validate gate ran"
    command_pattern: 'uip\s+rpa\s+validate\s+.*--file-path'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Project build gate ran"
    command_pattern: 'uip\s+rpa\s+build\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Project actually compiles — independent build re-run exits 0 (primary validation; a garbage workflow that merely contains the expected strings fails here)"
    command: "uip rpa build TextReport --output json"
    weight: 3.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "No per-activity starter-XAML discovery — every activity in this task is card-covered, so get-default-xaml indicates the pattern card was bypassed"
    command_pattern: 'uip\s+rpa\s+activities\s+get-default-xaml'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "JSON output discipline on uip calls"
    command_pattern: 'uip\s+rpa\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
