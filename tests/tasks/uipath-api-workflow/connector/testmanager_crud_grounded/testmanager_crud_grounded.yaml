# PROTOTYPE — data-grounded on the API Workflow surface. skip:true.
# Unlike the IS CLI (which executes create/get directly), here the agent must
# BUILD a create->get data-flow workflow AND RUN it (`uip api-workflow run`) to
# produce the retrieved value — then record the round-trip. Needs the codereval
# TM connection + the agent reliably authoring multi-activity data flow (today it
# does not, hence skip:true). This is the reusable data-grounded pattern for the
# workflow surfaces; flip skip:false when the agent reliably builds+runs it.
task_id: skill-api-workflow-testmanager-crud-grounded
description: >
  Data-grounded (API Workflow): agent authors an API Workflow that creates a Test
  Case via the uipath-uipath-testmanager connector with a unique seeded name, gets
  it back by id, and responds with the retrieved name; runs the workflow; records
  the round-trip. Graded on the discovery/build/run flow AND on retrieved == created
  (real data through the connector, executed — not just authored).
tags: [uipath-api-workflow, e2e, mode:build, lifecycle:generate, connector, uipath-uipath-testmanager, feature:registry, feature:connections]
skip: true

sandbox:
  python: {}

run_limits:
  task_timeout: 2400
  max_turns: 120
  turn_timeout: 1200

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-api-workflow/connector/testmanager_crud_grounded/seed.py"
    timeout: 30

initial_prompt: |
  Before starting, load the uipath-api-workflow skill and follow its workflow.

  Read seed.json — it has a unique `name` and a `project_key`. Build a UiPath API
  Workflow at Workflow.json that uses the UiPath Test Manager connector to:
  1. Create a Test Case named exactly that `name` under that project.
  2. Get that test case back by the created id.
  3. Respond with the retrieved test case name.

  Discover the activities via the registry (resolve + stub), wire the connection,
  and validate. Then RUN it: `uip api-workflow run ./Workflow.json --output json`.
  From the run output, write `result.json` with `created_name` (the seeded name),
  `retrieved_name` (the name the workflow returned), and `id` (the created id).

  Do NOT ask for approval. Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Discovered connector activities via the registry"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+resolve\s'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Stubbed connector activities with a connection id (create + get)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+stub[\s\S]+?--connection-id'
    min_count: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Validated the workflow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+validate'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Ran the workflow (`uip api-workflow run`)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+run'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Workflow.json was created"
    path: "Workflow.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Data-grounded: retrieved name == created (seeded) name — real data round-tripped through the executed workflow"
    command: "python3 $TASK_DIR/check.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
