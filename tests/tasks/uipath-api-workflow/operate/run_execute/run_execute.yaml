task_id: skill-api-workflow-operate-run-execute
description: >
  Operate (execute) a pre-seeded, already-valid API workflow — the score->grade
  evaluator in ./Workflow.json — for two inputs and report the grade each returns.
  mode:operate: the artifact is correct; the graded behavior is running it via
  `uip api-workflow run` and getting the right output, NOT authoring or repairing.
  Complements the build-mode authoring tasks and the diagnose-mode repair tasks
  with the third scorecard mode (running live). Graded on side effects: the agent
  invoked the runner, and the runs produce PASS (score 85) and FAIL (score 40).
tags: [uipath-api-workflow, integration, mode:operate, lifecycle:discover]

sandbox:
  python: {}

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-api-workflow/operate/run_execute/seed_valid_workflow.py"
    timeout: 30

initial_prompt: |
  The API workflow in ./Workflow.json is a score->grade evaluator: it takes a
  numeric `score` input and returns a `grade` of "PASS" (score >= 60) or "FAIL".
  It is already valid — do not rewrite it.

  Execute it locally for score 85 and again for score 40, and report the grade
  each run returns.

  Do NOT ask for approval or confirmation.

success_criteria:
  - type: file_exists
    description: "Workflow.json still present (agent operated the seeded file, did not delete it)"
    path: "Workflow.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent executed the workflow with the local runner (the operate action)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+run'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral: running with score 85 returns PASS"
    command: 'uip api-workflow run ./Workflow.json --no-auth --input-arguments ''{"score":85}'' --output json | grep -q ''"PASS"'''
    timeout: 60
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Behavioral: running with score 40 returns FAIL"
    command: 'uip api-workflow run ./Workflow.json --no-auth --input-arguments ''{"score":40}'' --output json | grep -q ''"FAIL"'''
    timeout: 60
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

run_limits:
  expected_turns: 6
  max_turns: 20
