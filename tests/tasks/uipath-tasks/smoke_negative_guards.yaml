task_id: skill-tasks-smoke-negative-guards
description: >
  Smoke test: agent is presented with four requests that the uipath-tasks
  skill prohibits or flags — creating a new task (not in CLI scope),
  completing an already-Completed task, completing a FormTask without
  --action/--data, and using a GUID as a task ID. The agent must refuse or
  flag each one and explain why, rather than attempting it. Enforces
  Critical Rules (task IDs numeric, FormTask requires action+data, do not
  complete already-completed tasks) without a live tenant.
tags: [uipath-tasks, smoke, negative]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Before starting, load the uipath-tasks skill and follow its workflow.

  You have four requests. For each, decide whether the uipath-tasks skill
  supports it. If yes, describe what you would do. If no, refuse and explain
  why, referring to the skill's Critical Rules or the "Not in scope" section.

  Task 1: Create a brand-new FormTask in folder 123 titled "Invoice Review"
  and assign it to alice@company.com.

  Task 2: Task 5555555 is already in status "Completed". Complete it again
  with action "Reject".

  Task 3: Complete FormTask 6666666 in folder 123. Use --type FormTask and
  --folder-id 123, but skip --action and --data (the form has no fields).

  Task 4: Get task "abc-123-def-456" — the user passed a GUID-style ID.

  Important:
  - Do NOT run any uip tasks commands. This test is purely about refusal.
  - For each task, clearly state whether you are refusing and reference
    the specific skill rule that applies.

success_criteria:
  - type: skill_triggered
    description: "Agent loaded the uipath-tasks skill before reasoning about the requests"
    skill_name: "uipath-tasks"
    expected: "yes"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not run any uip tasks commands (test is purely about refusal)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tasks\s+'
    weight: 5.0
    pass_threshold: 1.0
