task_id: skill-flow-init-validate
description: >
  Skill-guided evaluation: agent uses a flow skill (uipath-flow or
  uipath-maestro-flow) to create a new UiPath Flow project and validate it.
  Tests whether the skill teaches correct CLI usage for project creation.
tags: [uipath-flow, smoke, init, validate]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new UiPath Flow project called "WeatherAlert" and make sure it
  validates successfully.

  Save a summary of what you did to report.json with at minimum:
    {
      "project_name": "WeatherAlert",
      "commands_used": ["<list of uip commands you ran>"],
      "validation_passed": true
    }

  Important:
  - The `uip` CLI is already available in the environment.
  - Do not run `uip flow debug` — just validate locally.

success_criteria:
  # --- Core: must init and validate ---
  - type: command_executed
    description: "Agent initialized a Flow project with uip flow init"
    tool_name: "Bash"
    command_pattern: 'uip\s+flow\s+init'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the .flow file"
    tool_name: "Bash"
    command_pattern: 'uip\s+flow\s+validate'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Optional: solution wrapper (bonus, not required) ---
  - type: command_executed
    description: "Agent created a solution with uip solution new (optional)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 0.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent linked flow project to solution (optional)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+project\s+add'
    min_count: 1
    weight: 0.5
    pass_threshold: 1.0

  # --- Output checks ---
  - type: file_exists
    description: "Flow file was created"
    path: "WeatherAlert/WeatherAlert.flow"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json has correct structure and values"
    path: "report.json"
    assertions:
      - expression: "project_name"
        operator: equals
        expected: "WeatherAlert"
      - expression: "validation_passed"
        operator: equals
        expected: true
      - expression: "length(commands_used)"
        operator: gte
        expected: 2
    weight: 2.0
    pass_threshold: 0.75
