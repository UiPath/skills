task_id: skill-flow-paginated-reference-lookup
description: >
  Build a Flow with a Slack `Send Message to Channel` node targeting the
  `simple` channel. The channel lives on a later page of the `is-sandboxes`
  curated_channels list, so resolving the Slack channel id forces the agent
  to paginate `uip is resources run list`. Triggered by the `resources.md`
  read-before-call rule added in #1059 (ENGCE-58198) — old behavior was to
  abandon pagination after page 1 and bail to AskUserQuestion.
tags:
  - uipath-maestro-flow
  - integration
  - e2e
  - mode:build
  - lifecycle:generate
  - shape:multi-node
  - connector
  - uipath-salesforce-slack
  - feature:records

run_limits:
  expected_turns: 30
  task_timeout: 1200
  max_turns: 80
  turn_timeout: 900

initial_prompt: |
  Create a new Flow project called "SlackPaginationTest" with a manual
  trigger. It should send a Slack message saying "hello from coder-eval"
  to the channel named `simple` using Slack's "Send Message to Channel"
  activity.
  For Slack, use the connection name `is-sandboxes`.
  The Slack activity requires the channel ID, not the display name. Before
  configuring the node, resolve `simple` by paginating
  `uip is resources run list "uipath-salesforce-slack" "curated_channels"`
  with the `is-sandboxes` connection until you find the channel. If the first
  page has `Data.Pagination.HasMore: "true"`, call the same command again with
  `--query "nextPage=<Data.Pagination.NextPageToken>"`. Configure
  `bodyParameters.channel` with the resolved channel ID, not the literal string
  `simple`.
  The checker expects the canonical solution/project layout exactly at
  `SlackPaginationTest/SlackPaginationTest/SlackPaginationTest.flow`, so create
  a solution named `SlackPaginationTest` first and initialize the Flow project
  inside it. Do not use the CLI auto-created `SlackPaginationTestSolution`
  layout.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip is resources run list ... curated_channels`; the separate nextPage criterion proves pagination advanced"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+list\s+"?uipath-salesforce-slack"?\s+"?curated_channels'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used `nextPage=<token>` to advance pagination at least once"
    tool_name: "Bash"
    command_pattern: 'nextPage='
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran `uip maestro flow validate` on the generated flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file exists at the canonical solution path"
    path: "SlackPaginationTest/SlackPaginationTest/SlackPaginationTest.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow wires the Slack send-message-to-channel node with the resolved Slack id for channel `simple` (C083AN4E61E)"
    path: "SlackPaginationTest/SlackPaginationTest/SlackPaginationTest.flow"
    includes:
      - 'uipath.connector.uipath-salesforce-slack.send-message-to-channel'
      - '"C083AN4E61E"'
    weight: 3.0
    pass_threshold: 1.0
