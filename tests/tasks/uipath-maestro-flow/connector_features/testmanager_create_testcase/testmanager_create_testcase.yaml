# tenant-gated, skip:true. CONFIRMED AVAILABLE (2026-06-15, org testmanagerdev /
# TestManagerDevTenant). The first-party connector IS in the Maestro Flow node
# manifest — but ONLY after refreshing it: `uip maestro flow registry pull`
# ("Synced fresh nodes") then `uip maestro flow registry search uipath-uipath-testmanager`
# returns 72 nodes, including uipath.connector.uipath-uipath-testmanager.create-test-case.
# A stale manifest returns 0 — the agent MUST run `registry pull` before searching.
# Same manifest backs Maestro BPMN, so the connector is available there too.
# Validated against testmanagerdev: agent ran registry pull → registry get
# uipath.connector.uipath-uipath-testmanager.create-test-case (real connection) →
# node add → flow validate, and produced TestCaseCreator/.../*.flow referencing
# the connector node. Graded on those agent actions + the produced .flow shape
# (no grader-side `uip` re-run, no live debug/mutation). Flip skip:false once the
# connector + an Enabled connection exist in the CI eval tenant (codereval).
task_id: skill-flow-testmanager-create-testcase
description: >
  E2E (connector): agent uses the uipath-maestro-flow skill to build a Maestro
  Flow that creates a Test Case in Test Manager via the
  `uipath-uipath-testmanager` Integration Service connector node. Exercises the
  stale-manifest-safe discovery flow (`registry pull` → `registry search`/`get`),
  adding the Test Manager connector node, binding its connection, and
  `maestro flow validate`. Graded on the agent's discovery/build commands plus the
  produced `.flow` referencing the connector node type.
tags: [uipath-maestro-flow, e2e, mode:build, lifecycle:generate, shape:multi-node, connector, uipath-uipath-testmanager, feature:test-case, feature:connections]
skip: true

run_limits:
  task_timeout: 2400
  max_turns: 120
  turn_timeout: 1200

initial_prompt: |
  Before starting, load the uipath-maestro-flow skill and follow its workflow.

  Build a Maestro Flow "TestCaseCreator" (inside a solution of the same name)
  that creates a Test Case in UiPath Test Manager via the Test Manager
  Integration Service connector node.

  - Trigger inputs: `testCaseName` (string), `projectId` (string).
  - Discover and wire the Test Manager connector node and its connection — do
    not mock it. You are logged in to the tenant that hosts the connection.
  - Output: `createdTestCaseId` (string).

  The task is not complete until `uip maestro flow validate` passes for the flow.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent refreshed the node manifest before searching (`uip maestro flow registry pull`) — avoids the stale-manifest trap where TM nodes return 0"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+maestro\s+flow\s+registry\s+pull'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the connector node (`uip maestro flow registry search`/`get`)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+maestro\s+flow\s+registry\s+(search|get)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added a connector node to the flow (`uip maestro flow node add`) — the specific node type is verified against the produced .flow below"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+maestro\s+flow\s+node\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow (`uip maestro flow validate`)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+maestro\s+flow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Produced .flow references the Test Manager connector node (uipath.connector.uipath-uipath-testmanager.*)"
    command: "grep -rl 'uipath-uipath-testmanager' --include='*.flow' ."
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
