task_id: skill-flow-datafabric-smoke-query
description: >
  Smoke: QueryEntityRecordsCurated shape coverage against FlowCodeEvalEntity.
  Three CEQL filter queries (BOOLEAN, DECIMAL, STRING) + two ordered pages
  via cursor pagination + one active-only descending page. Read-only.
tags: [uipath-maestro-flow, smoke, mode:build, lifecycle:generate, connector, uipath-uipath-dataservice, ceql, pagination, ipe]

run_limits:
  turn_timeout: 1500
  task_timeout: 2400

pre_run:
  - command: 'python3 "$SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/connector_features/datafabric_connector/ensure_entity.py" "$SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/connector_features/datafabric_connector/flow_code_eval_entity.entity.json"'
    timeout: 60

initial_prompt: |
  Build a Flow against FlowCodeEvalEntity that runs these six read-only
  QueryEntityRecordsCurated calls — do NOT modify any records:

  Filter queries (SQL-symbol operators only — do not use enum-style names
  like `Equals`):
  1. queryExpression: `active = true`
  2. queryExpression: `score >= 8.5`
  3. queryExpression: `title = 'The Matrix'`

  Sort + cursor pagination:
  4. First 5 records sorted by score ascending (limit=5). Save the cursor.
  5. Next page using that cursor with the same sort and limit.
  6. Active records sorted by score descending, limit=4.

  The Flow is not complete until `uip maestro flow validate` passes.

success_criteria:
  - type: command_executed
    description: "Query Entity Records nodes added"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+maestro\s+flow\s+node\s+add\s+\S+\s+"?uipath\.connector\.uipath-uipath-dataservice\.query-entity-records'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Flow validated"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+maestro\s+flow\s+validate'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0
  - type: run_command
    description: "At least 3 Query nodes carry a queryExpression using SQL symbols (=, >=)"
    command: "python3 $TASK_DIR/check_smoke_query_filter.py"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Connector node shape matches connectorMethodInfo (endpoint template, parameter placement, JIT and FilterBuilder design-caches, required-param + default coverage)"
    command: 'python3 "$SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/check_connector_node_shape.py"'
    timeout: 90
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
