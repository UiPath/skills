task_id: skill-flow-init-validate
description: >
  Skill-guided evaluation: agent uses the uipath-maestro-flow skill to create
  a new UiPath Flow project inside a solution and validate it. Tests whether
  the skill teaches the CLI auto-solution workflow and validation usage.
tags: [uipath-maestro-flow, smoke, lifecycle:generate]

run_limits:
  expected_turns: 9

initial_prompt: |
  Create a new UiPath Flow project called "WeatherAlert" and make sure it
  validates successfully.

  A Flow project lives inside a solution, and the CLI creates/registers that
  solution automatically when you run `uip maestro flow init` outside an
  existing solution.

  The correct flow-file path is:
    WeatherAlertSolution/WeatherAlert/WeatherAlert.flow

  The task is NOT complete until `uip maestro flow validate` has passed for
  that exact file path.

  Important:
  - The `uip` CLI is already available in the environment.
  - Validate locally with `uip maestro flow validate`.

success_criteria:
  - type: command_executed
    description: "Agent initialized a Flow project with uip maestro flow init"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+init'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the .flow file"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "Flow project is registered in the parent solution .uipx"
    path: "WeatherAlertSolution/WeatherAlertSolution.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
      - expression: "length(Projects[?Type=='Flow'])"
        operator: "gte"
        expected: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created inside the solution"
    path: "WeatherAlertSolution/WeatherAlert/WeatherAlert.flow"
    weight: 1.5
    pass_threshold: 1.0
