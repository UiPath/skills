task_id: skill-flow-init-validate
description: >
  Skill-guided evaluation: agent uses the uipath-maestro-flow skill to create
  a new UiPath Flow project inside a solution and validate it. Tests whether
  the skill teaches the correct solution-first workflow and CLI usage.
tags: [uipath-maestro-flow, smoke, lifecycle-generate]

agent:
  type: claude-code
  max_turns: 12
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new UiPath Flow project called "WeatherAlert" inside a UiPath
  solution also called "WeatherAlert", then make sure the flow validates
  successfully.

  You must use the solution-first workflow:
  1. Create the solution with `uip solution new WeatherAlert --output json`.
  2. Create the Flow project inside that solution directory with `uip maestro flow init WeatherAlert --output json`.
  3. Validate `WeatherAlert/WeatherAlert/WeatherAlert.flow` with `uip maestro flow validate ... --output json`.

  Use the `uipath-maestro-flow` skill workflow. A Flow project MUST be created
  inside a solution:
  1. Create the solution first.
  2. Create the Flow project inside that solution.
  3. Link the project to the solution.

  The correct flow-file path is:
    WeatherAlert/WeatherAlert/WeatherAlert.flow

  The task is NOT complete until `uip maestro flow validate` has passed for
  that exact file path.

  **REQUIRED — before finishing, write report.json at the sandbox root** with
  at minimum:
    {
      "project_name": "WeatherAlert",
      "commands_used": ["<all uip commands you ran, including solution new, flow init, and validate>"],
      "validation_passed": true
    }

  Important:
  - The `uip` CLI is already available in the environment.
  - Do not run `uip maestro flow debug` — just validate locally.

success_criteria:
  - type: file_exists
    description: "Flow file was created inside the solution"
    path: "WeatherAlert/WeatherAlert/WeatherAlert.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Generated flow validates"
    command: "uip maestro flow validate WeatherAlert/WeatherAlert/WeatherAlert.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "report.json records the required command families"
    command: |
      python3 - <<'PY'
      import json
      from pathlib import Path

      report = json.loads(Path("report.json").read_text())
      commands = " \n ".join(str(command) for command in report.get("commands_used", []))
      required = [
          "uip solution new",
          "flow init",
          "flow validate",
          "--output json",
      ]
      missing = [item for item in required if item not in commands]
      assert not missing, {"missing": missing, "commands_used": report.get("commands_used", [])}
      print("OK")
      PY
    expected_stdout: "OK"
    stdout_match: contains
    weight: 4.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json has correct structure and values"
    path: "report.json"
    assertions:
      - expression: "project_name"
        operator: equals
        expected: "WeatherAlert"
      - expression: "validation_passed"
        operator: equals
        expected: true
      - expression: "length(commands_used)"
        operator: gte
        expected: 3
    weight: 2.0
    pass_threshold: 0.75
