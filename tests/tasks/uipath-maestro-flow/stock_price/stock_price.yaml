task_id: skill-flow-stock-price
description: >
  Create a UiPath Flow that fetches a stock quote from a public finance API
  using a managed HTTP node in manual auth mode, then branches on the response
  to populate either a success or error result. Exercises http.v2 manual
  auth, decision branching, and graceful error handling.
tags: [uipath-maestro-flow, e2e, generate, ootb, http]
max_iterations: 1

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath Flow project named "StockPrice" that fetches a stock quote
  from a public finance API and handles both the success and error cases,
  so that the same flow works whether the caller passes a valid ticker
  symbol or an invalid one.

  Inputs:
    - `symbol` (string) — e.g. "AAPL" (expected success) or "NOTAREALTICKER999"
      (expected failure)

  Output:
    - `result` (object) — populated by whichever branch ran, containing at
      least the symbol and either a numeric price on success or an error
      message on failure

  Use a managed HTTP node (`core.action.http.v2`) in manual auth mode — do
  NOT require an IS connection. Yahoo Finance's public chart endpoint works:
    https://query1.finance.yahoo.com/v8/finance/chart/{symbol}
  (interpolate `symbol` from the flow input.)

  Branch downstream on the response (status code or body contents — the v2
  HTTP node emits everything on a single `default` output port, so use a
  Decision or Switch node to split success vs error paths). Each branch runs
  a Script node that produces `result`, and both converge on End so the flow
  reaches `finalStatus: "Completed"` in both scenarios.

  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # ── Flow file validity ─────────────────────────────────────────────────
  - type: run_command
    description: "uip flow validate passes on the flow file"
    command: "uip flow validate StockPrice/StockPrice/StockPrice.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # ── Execution checks ──────────────────────────────────────────────────
  - type: run_command
    description: "Flow has http.v2 + branching; valid symbol returns a price, invalid symbol returns an error"
    command: "python3 $TASK_DIR/check_stock_price_flow.py"
    timeout: 600
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
