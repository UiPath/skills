task_id: skill-flow-billing-discrepancy-detector
description: >
  E2E greenfield: build a ~6-node Flow that queries ERP and CRM entities in
  parallel, merges, and computes an invoice overcharge; graded by validate plus
  one flow debug run against seeded tenant data.
tags: [uipath-maestro-flow, e2e, mode:build, lifecycle:execute, shape:multi-node, connector]

run_limits:
  max_turns: 120
  turn_timeout: 1200

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
    timeout: 90

initial_prompt: |
  Build a UiPath Flow "BillingDiscrepancyDetector" (in a solution of the same
  name) that checks a disputed invoice line against the contracted amount and
  pulls the customer's account tier.

  - Inputs: trigger variables `invoiceNumber` (string), `accountNumber`
    (string), `disputedLineNumber` (number), `disputedUnitPrice` (number),
    `disputedQuantity` (number).
  - Lookups (run in parallel against the existing Data Service connection, then
    merge):
      - `BillingDisputeERP` — all rows for `invoiceNumber`; each has a
        `lineNumber` and contracted `amount`.
      - `BillingDisputeCRM` — the account row for `accountNumber`; it has an
        `accountTier`.
  - Compute (script after the merge): invoiced = `disputedUnitPrice` x
    `disputedQuantity`; contracted = the `amount` of the ERP row whose
    `lineNumber` equals `disputedLineNumber`; `totalOvercharge` = invoiced minus
    contracted when positive, else 0; `discrepancyCount` = 1 when overcharge is
    positive, else 0.
  - Outputs: `totalOvercharge` (number), `discrepancyCount` (number),
    `matchedInvoiceNumber` (string, first ERP row), `accountTier` (string, from
    CRM).

  Validate, then debug once with:
    {"invoiceNumber": "MCS-2026-04872", "accountNumber": "ACCT-98201-NE",
     "disputedLineNumber": 5, "disputedUnitPrice": 300, "disputedQuantity": 14}
  saving the run's JSON to debug-output.json.

  Build, validate, and run the debug case end to end without stopping to ask me.

success_criteria:
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate BillingDiscrepancyDetector/BillingDiscrepancyDetector/BillingDiscrepancyDetector.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow computed overcharge=1610, count=1, invoice MCS-2026-04872, tier Enterprise at runtime"
    command: "python3 $TASK_DIR/check_billing_discrepancy_detector.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
