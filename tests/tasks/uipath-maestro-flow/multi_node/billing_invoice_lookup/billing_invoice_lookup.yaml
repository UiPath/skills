task_id: skill-flow-billing-invoice-lookup
description: >
  E2E (greenfield, execution-graded): build a Flow that takes a raw, possibly
  malformed invoice number, normalizes it (trim, uppercase, ensure the "MCS-"
  vendor prefix), and queries the existing BillingDisputeERP Data Fabric entity
  for the matching line items. Runs `uip maestro flow debug` against three
  malformed inputs and asserts each resolves to invoice MCS-2026-04872 with 8
  line items. Catches the runtime config bugs `flow validate` cannot see —
  broken query expression, wrong connection/folder key, normalization that
  drops malformed inputs — by executing the connector node for real against
  seeded tenant data.
tags: [uipath-maestro-flow, e2e, mode:build, lifecycle:execute, shape:multi-node, connector]

run_limits:
  max_turns: 120
  turn_timeout: 1200

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
    timeout: 90

initial_prompt: |
  Build a UiPath Flow that looks up the line items for a disputed invoice in our
  ERP system, tolerating messy invoice-number input.

  - Project: a Flow project called "BillingInvoiceLookup" in a solution of the
    same name.
  - Input: one trigger input variable `invoiceNumber` (string). Callers may pass
    it in any form — missing the "MCS-" vendor prefix, wrong casing, or with
    leading/trailing whitespace.
  - Lookup: query the existing `BillingDisputeERP` Data Fabric entity (its Data
    Service connection is already configured on this tenant) for all rows whose
    `invoiceNumber` equals the input. Before matching, normalize the input:
    trim whitespace, uppercase it, and prepend `MCS-` when that prefix is
    absent.
  - Output: expose two output variables on the flow:
      - `matchedInvoiceNumber` (string) — the `invoiceNumber` of the first
        returned row.
      - `lineItemCount` (number) — how many rows the query returned.

  Validate the flow, then debug it three times — once per malformed form — and
  save each run's JSON to the named file in the working directory:
    - inputs `{"invoiceNumber": "2026-04872"}`       → debug-prefix.json
    - inputs `{"invoiceNumber": "mcs-2026-04872"}`   → debug-casing.json
    - inputs `{"invoiceNumber": " MCS-2026-04872"}`  → debug-whitespace.json
  All three must resolve to invoice MCS-2026-04872 with 8 line items.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Use `--output json` on every uip command.
  Before starting, load the uipath-maestro-flow skill and follow its workflow.

success_criteria:
  - type: skill_triggered
    skill_name: "uipath-maestro-flow"
    expected_skill: "uipath-maestro-flow"
    description: "Agent invoked the uipath-maestro-flow skill"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched the registry for the Data Service connector"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list|get)\b[^\n]*(dataservice|data.?fabric|entity)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Flow file exists at the double-nested path"
    command: "test -f BillingInvoiceLookup/BillingInvoiceLookup/BillingInvoiceLookup.flow"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran flow debug to execute the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+debug'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "All three debug-output files were saved"
    command: "test -f debug-prefix.json && test -f debug-casing.json && test -f debug-whitespace.json"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "All three malformed inputs resolved to MCS-2026-04872 with 8 line items at runtime"
    command: "python3 $TASK_DIR/check_billing_invoice_lookup.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
