task_id: skill-flow-billing-invoice-lookup
description: >
  E2E greenfield: build a ~4-node Flow that normalizes a messy invoice number
  and queries the BillingDisputeERP Data Service entity; graded by validate plus
  three flow debug runs over malformed inputs.
tags: [uipath-maestro-flow, e2e, mode:build, lifecycle:execute, shape:multi-node, connector]

run_limits:
  max_turns: 120
  turn_timeout: 1200

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
    timeout: 90

initial_prompt: |
  Build a UiPath Flow "BillingInvoiceLookup" (in a solution of the same name)
  that looks up a disputed invoice's line items in ERP, tolerating messy input.

  - Input: trigger variable `invoiceNumber` (string). Callers may omit the
    "MCS-" prefix, use wrong casing, or add whitespace.
  - Normalize then query: trim, uppercase, prepend `MCS-` if absent, then query
    the existing `BillingDisputeERP` Data Service entity for rows matching that
    invoiceNumber.
  - Outputs: `matchedInvoiceNumber` (string, first row's invoiceNumber) and
    `lineItemCount` (number, rows returned).

  Validate, then debug three times, saving each run's JSON:
    {"invoiceNumber": "2026-04872"}      → debug-prefix.json
    {"invoiceNumber": "mcs-2026-04872"}  → debug-casing.json
    {"invoiceNumber": " MCS-2026-04872"} → debug-whitespace.json

  Build, validate, and run the debug cases end to end without stopping to ask me.

success_criteria:
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate BillingInvoiceLookup/BillingInvoiceLookup/BillingInvoiceLookup.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "All three malformed inputs resolved to MCS-2026-04872 with 8 line items at runtime"
    command: "python3 $TASK_DIR/check_billing_invoice_lookup.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
