task_id: skill-flow-billing-dispute-router
description: >
  E2E greenfield: build a ~3-node pure-control-flow Flow that routes a billing
  dispute to one of three outcomes via a switch on the disputed amount; graded
  by validate plus three flow debug runs, one per branch.
tags: [uipath-maestro-flow, e2e, mode:build, lifecycle:execute, shape:multi-node, node:switch]

run_limits:
  max_turns: 100
  turn_timeout: 1200

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
    timeout: 90

initial_prompt: |
  Build a UiPath Flow "BillingDisputeRouter" (in a solution of the same name)
  that routes a billing dispute by amount.

  - Inputs: trigger variables `disputedAmount` (number) and `disputeType`
    (string).
  - Routing: a switch on `disputedAmount` — > 5000 → "manager_review";
    <= 500 → "auto_resolve"; otherwise → "standard_review".
  - Output: `routingDecision` (string) carrying the chosen outcome.

  Validate the flow. Build it end to end without stopping to ask me.

success_criteria:
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate BillingDisputeRouter/BillingDisputeRouter/BillingDisputeRouter.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Check script debugs all three branches; each amount routes to the correct outcome"
    command: "python3 $TASK_DIR/check_billing_dispute_router.py"
    timeout: 600
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
