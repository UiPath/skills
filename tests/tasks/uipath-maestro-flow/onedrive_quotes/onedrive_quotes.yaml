task_id: skill-flow-onedrive-quotes
description: >
  Create a UiPath Flow that uses the OneDrive IS connector to locate a
  document named "quote.txt" inside the "Flow E2E Sandbox" folder and output
  its contents. Exercises connector discovery, connection binding, reference
  resolution, node configuration, and cloud debug execution.
tags: [uipath-maestro-flow, e2e, generate, connector]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath Flow project named "OneDriveQuotes" that reads the document
  "quote.txt" from the OneDrive folder "Flow E2E Sandbox"
  (https://uipath-my.sharepoint.com/personal/bai_li_uipath_com/Documents/Flow%20E2E%20Sandbox)
  and outputs its contents.

  Do NOT run flow debug — just validate the flow.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # ── Flow file validity ─────────────────────────────────────────────────
  - type: run_command
    description: "uip flow validate passes on the flow file"
    command: "uip flow validate OneDriveQuotes/OneDriveQuotes/OneDriveQuotes.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # ── End-to-end execution ────────────────────────────────────────────────
  - type: run_command
    description: "Flow debug runs successfully and output contains the quote.txt document body"
    command: "python3 $TASK_DIR/check_onedrive_quotes.py"
    timeout: 300
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
