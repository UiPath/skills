task_id: skill-flow-feet-inches
description: >
  Create a UiPath Flow that converts a value between feet and inches based on
  a direction input, using a Switch node to pick the conversion. Exercises
  switch branching, multi-case wiring, and branch convergence on End.
tags: [uipath-maestro-flow, e2e, generate, ootb]
max_iterations: 1

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath Flow project named "FeetInches" that converts a number
  between feet and inches.

  Inputs:
    - `value` (number) — the quantity to convert
    - `direction` (string) — "f2i" (feet to inches, multiply by 12) or
      "i2f" (inches to feet, divide by 12)

  Output:
    - `result` (number) — the converted value

  Use a Switch node on `direction` to pick the conversion; each case runs a
  Script node that produces `result`. Both cases must converge on an End node
  that maps `result` (do not use a merge node — only one switch case executes).

  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # ── Flow file validity ─────────────────────────────────────────────────
  - type: run_command
    description: "uip flow validate passes on the flow file"
    command: "uip flow validate FeetInches/FeetInches/FeetInches.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # ── Execution checks ──────────────────────────────────────────────────
  - type: run_command
    description: "Flow has a switch node; f2i and i2f inputs produce the correct converted value"
    command: "python3 $TASK_DIR/check_feet_inches_flow.py"
    timeout: 300
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
