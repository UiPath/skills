task_id: skill-flow-ixp-activation-listing
description: >
  IxP listing activation — user asks which IxP node types are available to add
  to a Maestro flow. Read-only Q&A, not a build task. The prompt is framed in
  flow-node terms ("which IxP node types … flow node registry") rather than
  "IxP models", which otherwise routes to the uipath-ixp (Document
  Understanding) skill instead of uipath-maestro-flow.

  Asserts the agent invoked the uipath-maestro-flow Skill and ran the IxP
  registry-search listing command (per references/plugins/ixp/impl.md —
  Listing Published Models). Also asserts the agent did NOT take the build
  path: no .flow file should be created for a listing question.

  Failure here is signal about routing (wrong skill) or the IxP plugin's
  Listing Published Models / Listing Available Models sections — do NOT relax
  assertions, tighten the copy.

tags: [uipath-maestro-flow, smoke, activation, ixp, listing]

dataset:
  rows:
    - id: ixp-models
      prompt: >-
        I'm planning a UiPath Maestro Flow and want to add an IxP step to it.
        Which IxP node types can I add — list what's available in the flow node
        registry. Just list them, don't build anything yet.

initial_prompt: |
  ${row.prompt}

  Important:
  - The `uip` CLI is already available.
  - Use `--output json` on all uip commands.

success_criteria:
  - type: skill_triggered
    skill_name: "uipath-maestro-flow"
    expected_skill: "uipath-maestro-flow"
    description: "Agent invoked the uipath-maestro-flow Skill"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched the registry for IxP node types (listing path)"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list)\b[^\n]*ixp'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Inverted check: a listing/Q&A task should NOT create a .flow file.
  # `! find ... | grep -q .` exits 0 when no .flow file is found (PASS)
  # and 1 when one exists (FAIL).
  - type: run_command
    description: "No .flow file was created (listing is read-only Q&A, not a build task)"
    command: '! find . -name "*.flow" -type f | grep -q .'
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

run_limits:
  max_turns: 20
  turn_timeout: 300
  task_timeout: 300
