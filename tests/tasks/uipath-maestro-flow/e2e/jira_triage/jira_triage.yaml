task_id: skill-flow-ipe-jira-triage
description: >
  E2E live Jira coverage of an input-driven triage flow — the hardest Jira shape
  in the suite. The agent builds ONE Flow whose manual trigger takes an
  escalation-priority INPUT, loops over a seeded batch of issues (one High /
  Medium / Low), creates each, and — only for the issues whose `priority` equals
  the input — escalates them: transition to In Progress (`status_id`), assign to
  `assignee_account_id`, and post the `escalated_comment`. Non-matching issues
  are left untouched. Grading runs the flow (`flow debug`) with the escalation
  input set to "Medium" (unknown to the agent) and re-reads the tenant: exactly
  the Medium issue must be In Progress + assigned + commented, and High/Low must
  be untouched. A flow that hardcodes a priority escalates the wrong issue and
  fails. The list order is shuffled and markers carry a unique per-run tag, so
  the outcome cannot be hardcoded. Every created issue is cleaned up in post_run.

  Tenant prerequisite: a `uipath-atlassian-jira` connection in folder
  `Shared/uipath-maestro-flow` (currently the single Jira connection there),
  reaching the `CE` / "Coder Eval" project (issue type Task). Targets (project,
  issue type, In-Progress transition id, assignee account id) live in the task's
  `jira_is.py`.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, node:loop, node:switch, node:decision, connector, e2e, uipath-atlassian-jira, ipe, feature:escalation, mode:build]

run_limits:
  expected_turns: 65
  task_timeout: 2100
  max_turns: 170
  turn_timeout: 900

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/e2e/jira_triage/seed_jira.py"
    timeout: 60

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/e2e/jira_triage/teardown_jira.py"
    timeout: 180

initial_prompt: |
  Create a new Flow project called "JiraTriage" with a manual trigger.

  The manual trigger must expose an INPUT for the escalation priority (a flow
  input variable — not a hardcoded constant). Its value is supplied at run time.

  Read `seed.json` in the current directory. It contains a list of `issues`
  (each with a `summary` and a `priority`), the `project_key` and `issuetype_id`
  to create issues under, a `status_id` (the "In Progress" transition), an
  `assignee_account_id`, and an `escalated_comment` body.

  Build a flow that loops over the `issues` list and, for EACH item:
    1. Creates a Jira issue with the item's `summary`, using the Atlassian Jira
       "Create Issue" activity (with `project_key` / `issuetype_id`).
    2. If the item's `priority` equals the escalation-priority INPUT, escalate
       the issue just created:
         - set its status using the "Update Issue Status" activity with
           `status_id`,
         - assign it using the "Update Issue Assignee" activity with
           `assignee_account_id`,
         - add a comment whose body is `escalated_comment`.
       Otherwise, leave the issue as created (do nothing further).

  Pass all summaries, ids, and the comment body verbatim from seed.json, and
  drive the branch off the input value (do not hardcode a priority).

  Use the Atlassian Jira connection available in the `Shared/uipath-maestro-flow`
  folder. If the Atlassian Jira connector isn't available in your registry, stop
  rather than falling back to a generic HTTP request.

  Validate the final flow file.

success_criteria:
  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "JiraTriage checks: input-driven loop+switch over the Jira connector; debug with input=Medium escalates exactly the Medium issue (In Progress + assigned + commented) and leaves High/Low untouched"
    command: "python3 $TASK_DIR/check_jira_triage.py"
    timeout: 700
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
