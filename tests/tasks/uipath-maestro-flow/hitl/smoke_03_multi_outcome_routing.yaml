task_id: skill-flow-hitl-smoke-multi-outcome-routing
description: >
  Smoke test: agent builds a flow where a Decision node reads the HITL
  reviewer's boolean field and routes to two separate downstream branches.
  Verifies both true and false edges of the Decision node are wired.
tags: [uipath-maestro-flow, smoke, lifecycle:generate, shape:multi-node, node:hitl]

agent:
  type: claude-code
  permission_mode: acceptEdits

run_limits:
  max_turns: 100
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Build a UiPath Flow named "LeaveRequest":

  1. Manual trigger
  2. Manager reviews leave request:
       - Reviewer sees (read-only): employee name, number of days
       - Reviewer fills in: approved (boolean — true means approved)
       - Outcomes: Approve (primary), Reject
  3. Route based on the reviewer's decision:
       - Approved → Script node that logs "Leave approved" → End
       - Not approved → Script node that logs "Leave rejected" → End

  Validate the flow after building.

success_criteria:
  - type: run_command
    description: "uip maestro flow validate passes"
    command: "uip maestro flow validate LeaveRequest/LeaveRequest/LeaveRequest.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow contains inline HITL node"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow contains a Decision node"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    includes:
      - '"core.logic.decision"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Decision node references HITL output variable"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    includes:
      - "$vars."
      - ".output"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Both Decision branches are wired (true and false handles present)"
    path: "LeaveRequest/LeaveRequest/LeaveRequest.flow"
    includes:
      - '"true"'
      - '"false"'
    weight: 2.0
    pass_threshold: 1.0

