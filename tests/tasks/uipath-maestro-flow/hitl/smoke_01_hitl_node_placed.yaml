task_id: skill-flow-hitl-smoke-node-placed
description: >
  Smoke test: agent builds a simple invoice approval flow containing an inline
  HITL node (uipath.human-in-the-loop.quick-form). Verifies the node is written directly
  into the .flow file as JSON and the flow validates.
tags: [uipath-maestro-flow, uipath-human-in-the-loop, smoke, lifecycle:generate, shape:single-node, node:hitl]

run_limits:
  expected_turns: 21
  max_turns: 80
  turn_timeout: 600
initial_prompt: |
  Build a UiPath Flow named "InvoiceApproval" that:
  1. Starts with a manual trigger
  2. Pauses for a finance manager to review and approve an invoice (human-in-the-loop)
  3. Ends after the review is complete

  The reviewer's form should be rendered inline — no separate deployed app.
  The node must show the reviewer: invoice ID and amount.
  The reviewer clicks Approve or Reject.

  Wire the flow to continue to an End node after the review is complete.

  Validate the flow after building it.

success_criteria:
  - type: run_command
    description: "Flow file was created"
    command: "test -n \"$(find . -name InvoiceApproval.flow -print -quit)\""
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow contains the inline HITL node type"
    command: "FLOW=$(find . -name InvoiceApproval.flow -print -quit); test -n \"$FLOW\" && grep -q '\"uipath.human-in-the-loop.quick-form\"' \"$FLOW\""
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0


  - type: run_command
    description: "uip flow validate passes"
    command: "FLOW=$(find . -name InvoiceApproval.flow -print -quit); test -n \"$FLOW\" && uip maestro flow validate \"$FLOW\" --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
