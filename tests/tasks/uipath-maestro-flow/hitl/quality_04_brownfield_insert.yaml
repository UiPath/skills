task_id: skill-flow-hitl-quality-brownfield-insert
description: >
  Quality test: agent inserts a HITL node into an existing flow without
  breaking the existing nodes or wiring. Tests that the agent can correctly
  remove an existing edge and re-wire it through a new HITL node.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, node:hitl]

agent:
  type: claude-code
  permission_mode: acceptEdits

run_limits:
  max_turns: 150
  turn_timeout: 900

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  You are working on an existing UiPath Flow named "ContractReview".

  Step 1 — Build the base flow:
  Create ContractReview as a 3-node flow:
    Manual Trigger → Script (id: "extractMeta", logs "Extracting contract metadata") → End

  Step 2 — Insert HITL into the existing flow:
  Between the extractMeta Script node and the End node, insert a HITL node
  where a legal reviewer approves the contract:
    - Reviewer sees (read-only): contract_id (text), contract_value (number)
    - Reviewer fills in: approved (boolean, required), legal_notes (text, optional)
    - Outcomes: Approve (primary), Reject

  After insertion the wiring must be:
    Trigger → extractMeta →|output| HITL →|completed| End

  The original extractMeta → End edge must be removed.
  The extractMeta → HITL edge and HITL → End edge must be added.

  Validate the flow after building.

success_criteria:
  - type: run_command
    description: "Flow validates and preserves brownfield HITL insertion invariants"
    command: "python3 $TASK_DIR/check_brownfield_insert.py"
    timeout: 30
    expected_exit_code: 0
    weight: 10.5
    pass_threshold: 1.0
