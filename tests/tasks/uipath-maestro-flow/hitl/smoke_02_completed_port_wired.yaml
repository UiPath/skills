task_id: skill-flow-hitl-smoke-completed-port
description: >
  Smoke test: agent wires the HITL node's `completed` output port (not the
  old `cancelled` or `timeout` ports). Verifies correct edge structure in
  a three-node approval flow.
tags: [uipath-maestro-flow, smoke, lifecycle:generate, shape:multi-node, node:hitl]

run_limits:
  expected_turns: 24
  max_turns: 105
  turn_timeout: 600

initial_prompt: |
  Build a UiPath Flow named "PurchaseApproval" with this structure:
    Manual Trigger -> HITL (manager approves purchase) -> Script (log approval) -> End

  The reviewer's form should be inline — rendered by Action Center.
  The HITL node shows the reviewer: purchase amount and vendor name.
  Outcomes: Approve and Reject.

  Wire the output of the HITL step to the Script node.
  The Script node logs: "Approval recorded."

  Validate the flow after building.

success_criteria:
  - type: file_exists
    description: "Flow file was created"
    path: "PurchaseApproval/PurchaseApproval/PurchaseApproval.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "HITL completed output port is wired on an edge (v1.0 'completed' or v1.1 'outcome-completed')"
    command: "grep -qE '\"sourcePort\"[[:space:]]*:[[:space:]]*\"(outcome-)?completed\"' PurchaseApproval/PurchaseApproval/PurchaseApproval.flow"
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Why grep the wired sourcePort and not file_contains '"completed"': the HITL
  # completed output port serializes differently by node version — v1.0 wires it
  # as `"sourcePort": "completed"`, v1.1 as `"sourcePort": "outcome-completed"`.
  # Version selection is non-deterministic (hardcoded versions were removed in
  # #1088; the agent pulls the version from the registry), so a literal
  # '"completed"' substring passes on a v1.0 build and fails on a v1.1 build —
  # the historical source of this task's flakiness. Anchoring on the sourcePort
  # handle with an optional `outcome-` prefix matches either version and, unlike
  # a bare substring, won't match a handle merely declared in the node manifest
  # or a "completed" status label. The validate step below catches malformed
  # edges. A prior excludes-only check for cancelled/timeout handles was removed
  # because manifest declarations can't be distinguished from wiring by substring.

  - type: run_command
    description: "uip maestro flow validate passes"
    command: "uip maestro flow validate PurchaseApproval/PurchaseApproval/PurchaseApproval.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

