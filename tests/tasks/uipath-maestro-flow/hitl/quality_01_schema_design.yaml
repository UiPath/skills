task_id: skill-flow-hitl-quality-schema-design
description: >
  Quality test: agent correctly maps a business description to a quickform
  schema — right field directions (input/output/inOut), correct outcomes,
  and priority. Tests C1 (field design) and C2 (outcome design).
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, node:hitl]

agent:
  type: claude-code
  permission_mode: acceptEdits

run_limits:
  max_turns: 75
  turn_timeout: 900

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Build a UiPath Flow named "VendorPOReview" for purchase order review:

  - A manual trigger starts the flow
  - A script node fetches PO data (mock it — just set variables)
  - A human review step lets the procurement officer review the PO:
      - They can see (read-only): PO number, vendor name, total amount
      - They must fill in: their decision and optional notes
      - They click: Approve (primary) or Reject
  - Route based on the officer's decision:
      - Approved → Script node that logs "PO approved"
      - Rejected → End node

  Set the task priority to High.
  Validate the flow after building.

success_criteria:
  - type: run_command
    description: "uip flow validate passes"
    command: "uip maestro flow validate VendorPOReview/VendorPOReview/VendorPOReview.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "HITL node has input-direction fields (read-only context for reviewer)"
    path: "VendorPOReview/VendorPOReview/VendorPOReview.flow"
    includes:
      - '"direction": "input"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "HITL node has output-direction fields (reviewer fills in)"
    path: "VendorPOReview/VendorPOReview/VendorPOReview.flow"
    includes:
      - '"direction": "output"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow has Approve and Reject outcomes"
    path: "VendorPOReview/VendorPOReview/VendorPOReview.flow"
    includes:
      - "Approve"
      - "Reject"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Priority is set to High"
    path: "VendorPOReview/VendorPOReview/VendorPOReview.flow"
    includes:
      - '"High"'
    weight: 1.5
    pass_threshold: 1.0

