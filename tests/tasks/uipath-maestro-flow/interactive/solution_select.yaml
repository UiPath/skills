task_id: skill-flow-solution-select-ask
description: >
  Interactive-mode variant of init-validate. The working directory already
  contains two existing sibling solutions (SolarReports, TideTracker). When
  asked to create a new Flow project, the current CLI auto-creates/registers a
  parent solution for the new project instead of requiring a solution-selection
  dropdown. Grades that the agent does not silently adopt an unrelated sibling
  solution and that the flow still builds and validates afterward.
tags: [uipath-maestro-flow, smoke, mode:build, lifecycle:generate, simulation]

agent:
  # Add AskUserQuestion to the default tool set so the gate can actually fire.
  # allowed_tools uses replace strategy — restate the full default list.
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion"]

run_limits:
  # Simulation interleaves user+agent turns, so visible-turn count runs higher
  # than a single-shot task. Advisory only — max_turns (experiment) is the cap.
  expected_turns: 18

sandbox:
  template_sources:
    - type: template_dir
      path: fixtures/existing_solutions

# No initial_prompt — in simulation mode the simulator generates the opening
# user message from the persona and goal below. The user asks for a brand-new
# project named WeatherAlert, which keeps the auto-solution build path
# deterministic (WeatherAlertSolution/WeatherAlert/WeatherAlert.flow).
simulation:
  enabled: true
  persona: |
    You are a UiPath developer working in a directory that already holds a
    couple of unrelated solutions (SolarReports and TideTracker). You want a
    fresh, separate project for this new work and you trust the agent to
    drive the CLI.
  goal: |
    Get a new Flow project called WeatherAlert created and validated successfully.
  constraints:
    - "If the agent asks which solution the new Flow project should live in, do NOT pick SolarReports or TideTracker — choose the option that creates a new solution/project."
    - "If the agent asks for the project or solution name, answer exactly `WeatherAlert`."
    - "If asked any other clarifying question, pick the recommended / first sensible option and keep moving."
    - "Keep replies short — one sentence or a single chosen option."
    - "Never tell the agent to stop, skip validation, or reuse an existing solution."
  max_turns: 6

success_criteria:
  # ── Did NOT silently adopt an existing solution ────────────────────────
  - type: command_executed
    description: "Agent did not init the Flow project inside a pre-existing solution"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+init\b.*(SolarReports|TideTracker)'
    min_count: 0
    max_count: 0
    weight: 1.5
    pass_threshold: 1.0

  # ── Build still completes correctly after the interaction ──────────────
  - type: command_executed
    description: "Agent initialized a Flow project with uip maestro flow init"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the .flow file"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Flow file was created inside the new solution"
    command: "test -n \"$(find . -name WeatherAlert.flow -print -quit)\""
    timeout: 30
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0
