task_id: skill-flow-canary
description: >
  Infra-health canary. Pre-seeds a hand-authored Canary.flow that fans out to
  one node of each fragile plugin type (coded agent, lowcode agent, RPA, API
  workflow, Slack connector) and merges with a parallel gateway. Runs
  `uip flow debug` and verifies all five legs complete with expected outputs.
  If this task fails while other e2e tasks also fail, treat it as an infra
  issue (orchestrator / tenant / network); if it passes while other tasks
  fail, the skill or agent is the suspect.
tags: [uipath-maestro-flow, e2e, canary]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: "./template"

initial_prompt: |
  The Canary flow project is already present in the working directory. Do NOT
  edit it. Run `uip flow validate Canary/Canary.flow` once to confirm the file
  parses, then stop. Do not run flow debug — the harness will do that.

  Do NOT ask for approval, confirmation, or feedback.

success_criteria:
  # ── Flow file validity ─────────────────────────────────────────────────
  - type: run_command
    description: "uip flow validate passes on the canary flow file"
    command: "uip flow validate Canary/Canary.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # ── Execution checks ──────────────────────────────────────────────────
  - type: run_command
    description: "Canary flow debug completes with all 5 plugin legs healthy"
    command: "python3 $TASK_DIR/check_canary_flow.py"
    timeout: 900
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
