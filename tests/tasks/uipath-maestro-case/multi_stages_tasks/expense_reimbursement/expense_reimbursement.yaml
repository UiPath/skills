  # SDD - ExpenseReimbursement

  **Case Definition Blueprint** - Employee Expense Reimbursement Bug Bash

  Employee-submitted expenses flow through Submission, Manager Approval,
  Finance Approval, Payment, and then a terminal Approved, Rejected, or
  Withdrawn stage. The case is started by a record-created event on the
  case entity `expense_requests`. The companion data objects are
  `expense_documents` for receipts/supporting files and `expense_comments`
  for notes.

  > **External-resource fallback rule.** The sandbox may not have the Workday,
  > Outlook 365, Slack, SAP, ServiceNow, ERP RPA, child-case, or API workflow
  > resources used by this business scenario. When a referenced resource,
  > connector, connection, action app, process, RPA workflow, agent, API
  > workflow, or sub-case cannot be resolved, keep the correct task `type`,
  > write the skeleton task shape required by the uipath-maestro-case skill,
  > and do NOT fabricate taskTypeId, typeId, connectionId, name, folderPath,
  > inputs, or outputs. The task id is still used by conditions.
  >
  > If the record-created event trigger for `expense_requests` cannot be
  > resolved, write an event-trigger placeholder with serviceType
  > `Intsvc.EventTrigger`; do not silently downgrade to a manual trigger.

  Prepared date: 2026-06-24

  ## Section 1: Case Definition

  ### 1.1 Case Metadata
  | Property | Value |
  |---|---|
  | Case Name | ExpenseReimbursement |
  | Case Description | Handles the full lifecycle of an employee-submitted expense from submission through manager and finance approval to payment and close-out. |
  | Case Identifier | Prefix: EXP, Type: constant |
  | Priority | Choiceset: Low, Medium, High - Default: Medium |
  | Case-Level SLA | 15 min |
  | SLA Type | Default |

  ### 1.2 SLA Escalation
  | SLA Status | Threshold | Action |
  |---|---|---|
  | At Risk | 70 percent | Show at-risk state at 10 min 30 sec. |
  | Breached | 100 percent | Show breached state at 15 min. |

  ### 1.3 Triggers
  | Trigger Type | Source | Configuration | Initial Variable Mapping |
  |---|---|---|---|
  | event | UiPath Data Service / case entity record created | Record created in tenant entity `expense_requests`; display name `Expense request created`; object name `expense_requests` | response.expense_id -> expense_id; response.employee_name -> employee_name; response.employee_email -> employee_email; response.department -> department; response.expense_type -> expense_type; response.amount -> amount; response.currency -> currency; response.description -> description; response.receipt_url -> receipt_url; response.submitted_date -> submitted_date |

  ### 1.4 Case Completion Conditions
  | WHEN | IF | THEN | Marks Case Complete |
  |---|---|---|---|
  | required-stages-completed | - | Case marked complete when a terminal completed path finishes. | Yes |

  ### 1.4a Case Exit Conditions
  | WHEN | IF | THEN | Marks Case Complete |
  |---|---|---|---|
  | selected-stage-completed ("Withdrawn exited") | selected-stage: Withdrawn | Case exits without marking completed when the withdrawal terminal stage completes. | No |

  ### 1.5 Case Variables
  | Variable | Category | Type | Default | Description | Produced By | Consumed By |
  |---|---|---|---|---|---|---|
  | expense_id | In | string | - | Expense request identifier such as EXP-00501. | trigger:Expense request created | all stages |
  | employee_name | In | string | - | Employee full name. | trigger:Expense request created | notifications and reviews |
  | employee_email | In | string | - | Employee email address. | trigger:Expense request created | notifications |
  | department | In | string | - | Employee department. | trigger:Expense request created | policy and GL checks |
  | expense_type | In | string | - | Travel, Meals, Equipment, Software, or Other. | trigger:Expense request created | validation, categorization, fraud checks |
  | amount | In | float | - | Expense amount. | trigger:Expense request created | approvals, payment, GL |
  | currency | In | string | USD | Currency code. | trigger:Expense request created | validation, payment, GL |
  | description | In | string | - | Free-text justification. | trigger:Expense request created | categorization and approval emails |
  | receipt_url | In | string | - | Link to receipt attachment. | trigger:Expense request created | validation and categorization |
  | submitted_date | In | datetime | - | Submitted timestamp. | trigger:Expense request created | audit |
  | cost_center | Variable | string | - | Cost center returned by Workday enrichment. | Enrich Employee Details | finance and GL tasks |
  | manager_email | Variable | string | - | Manager email returned by Workday enrichment. | Enrich Employee Details | manager approval |
  | validation_result | Variable | string | - | pass/fail validation result. | Validate Expense Data | Submission completion notes |
  | manager_decision | Variable | string | - | approve, reject, return, or withdraw. | Manager Review | routing |
  | finance_decision | Variable | string | - | payment or rejected. | Finance Team Review | routing |
  | payment_reference | Variable | string | - | Payment voucher/reference id. | Process Reimbursement | payment confirmation and notifications |
  | payment_status | Variable | string | - | confirmed or failed. | Payment Confirmation | Approved/Rejected routing |
  | rejection_reason | Variable | string | - | Rejection reason. | Manager Review or Finance Team Review | Rejected stage |

  ## Section 2: Stages & Tasks

  ### Stage 1: Submission (`submission`)
  **Type:** Stage
  **Description:** Employee-submitted expense is validated, enriched, and categorized. Re-entered when the manager returns the expense for corrections.
  **Required for Case Completion:** Yes
  #### Stage Entry Conditions
  | WHEN | IF | Interrupting |
  |---|---|---|
  | case-entered | - | No |
  | selected-stage-exited ("Returned by Manager") | selected-stage: Manager Approval; conditionExpression: =js:vars.manager_decision === "return" | No |
  #### Stage Completion Conditions
  | WHEN | IF | Exit Type | Marks Stage Complete |
  |---|---|---|---|
  | required-tasks-completed | - | exit-only | Yes |
  #### Stage Exit Conditions
  | WHEN | IF | Exit Type | Exit-To Stage | Marks Stage Complete |
  |---|---|---|---|---|
  | selected-tasks-completed ("Employee withdraws") | selected-tasks: Withdraw Expense; conditionExpression: =js:vars.manager_decision === "withdraw" | exit-only | Withdrawn | No |
  **Stage SLA**
  | Rule | Count | Unit |
  |---|---|---|
  | Default | 3 | min |
  #### Tasks
  | # | Task ID | Task Name | Type | Required | Run Only Once | Persona | SLA |
  |---|---|---|---|---|---|---|---|
  | 1 | `submission.validateExpenseData` | Validate Expense Data | api-workflow | Yes | No | system | - |
  | 2 | `submission.enrichEmployeeDetails` | Enrich Employee Details | execute-connector-activity | Yes | Yes | system | - |
  | 3 | `submission.autoCategorizeExpense` | Auto-Categorize Expense | agent | No | No | system | - |
  | 4 | `submission.withdrawExpense` | Withdraw Expense | action | No | No | Employee | - |

