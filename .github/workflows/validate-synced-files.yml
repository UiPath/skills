name: Validate Synced Files

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-synced-files:
    runs-on: ubuntu-latest
    name: Validate synced-file copies match their sources
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (mikefarah v4)
        uses: mikefarah/yq@v4.44.3

      - name: Validate sync manifest
        run: bash scripts/validate-synced-files.sh
