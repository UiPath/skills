name: Daily Version Bump

on:
  schedule:
    - cron: '0 7 * * *' # every day at 07:00 UTC
  workflow_dispatch:
    inputs:
      assignees:
        description: 'Comma-separated GitHub usernames to assign to the PR'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for existing open bump PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --state open \
            --json number,url,headRefName \
            --jq '[.[] | select(.headRefName | startswith("auto/version-bump-"))] | .[0] // empty')

          if [ -n "$EXISTING" ]; then
            URL=$(echo "$EXISTING" | jq -r '.url')
            NUMBER=$(echo "$EXISTING" | jq -r '.number')
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Existing bump PR still open: #$NUMBER — $URL"
            {
              echo "## Skipped: version bump PR already open"
              echo ""
              echo "PR [#$NUMBER]($URL) is still open. Merge or close it before the next run."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        id: bump
        if: steps.check.outputs.exists != 'true'
        run: |
          PKG="package.json"

          # package.json is the single source of truth for the version.
          VERSION=$(jq -r '.version' "$PKG")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          # Bump package.json, then propagate to plugin.json, marketplace.json
          # and version-manifest.json via the sync script.
          jq --arg v "$NEW_VERSION" '.version = $v' "$PKG" > tmp.json && mv tmp.json "$PKG"
          node scripts/sync-version.mjs

          echo "old_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.check.outputs.exists != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          title: "chore: bump version from ${{ steps.bump.outputs.old_version }} to ${{ steps.bump.outputs.new_version }}"
          body: |
            Automated daily version bump.

            `${{ steps.bump.outputs.old_version }}` → `${{ steps.bump.outputs.new_version }}`

            Updated files:
            - `package.json` (source of truth)
            - `.claude-plugin/plugin.json`
            - `.claude-plugin/marketplace.json`
            - `version-manifest.json`
          branch: "auto/version-bump-${{ steps.bump.outputs.new_version }}"
          base: main
          assignees: ${{ github.event.inputs.assignees || 'gabrielavaduva,RaduAna-Maria'}}
