name: Daily Version Bump

on:
  schedule:
    - cron: '0 7 * * *' # every day at 07:00 UTC
  workflow_dispatch:
    inputs:
      assignees:
        description: 'Comma-separated GitHub usernames to assign to the PR'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed so the CHANGELOG step can read full git history

      - name: Bump version in plugin.json and marketplace.json
        id: bump
        run: |
          PLUGIN=".claude-plugin/plugin.json"
          MARKETPLACE=".claude-plugin/marketplace.json"

          # Read current version from plugin.json
          VERSION=$(jq -r '.version' "$PLUGIN")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          # Update plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' "$PLUGIN" > tmp.json && mv tmp.json "$PLUGIN"

          # Update marketplace.json (version is inside plugins[0])
          jq --arg v "$NEW_VERSION" '.plugins[0].version = $v' "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"

          echo "old_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepend new section to CHANGELOG.md
        run: |
          CHANGELOG="CHANGELOG.md"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          TODAY=$(date -u +%Y-%m-%d)

          # Collect PR-merge subjects since the last version bump commit, if any.
          # Falls back to the last 20 commit subjects if no previous bump is found.
          LAST_BUMP=$(git log --grep="chore: bump version to" --format=%H -n 1 || true)
          if [ -n "$LAST_BUMP" ]; then
            RANGE="${LAST_BUMP}..HEAD"
          else
            RANGE="HEAD~20..HEAD"
          fi

          ENTRIES=$(git log --no-merges --format='- %s' "$RANGE" 2>/dev/null \
            | grep -v '^- chore: bump version' \
            | head -50 || true)

          if [ -z "$ENTRIES" ]; then
            ENTRIES="- (no notable changes — update this section before merging)"
          fi

          # Build the new section in a temp file (multi-line, so avoid awk -v newline quirks)
          SECTION_FILE=$(mktemp)
          {
            printf '## [%s] - %s\n' "$NEW_VERSION" "$TODAY"
            printf '%s\n\n' "$ENTRIES"
          } > "$SECTION_FILE"

          if [ ! -f "$CHANGELOG" ]; then
            {
              printf '# Changelog\n\n'
              cat "$SECTION_FILE"
            } > "$CHANGELOG"
          else
            # Split existing CHANGELOG into "header (line 1)" + "rest", then
            # reassemble: header + blank line + new section + rest.
            HEADER=$(head -n 1 "$CHANGELOG")
            REST_FILE=$(mktemp)
            tail -n +2 "$CHANGELOG" > "$REST_FILE"
            {
              printf '%s\n\n' "$HEADER"
              cat "$SECTION_FILE"
              # Drop any leading blank line from the existing body so we don't double up
              sed '/./,$!d' "$REST_FILE"
            } > "$CHANGELOG.tmp"
            mv "$CHANGELOG.tmp" "$CHANGELOG"
            rm -f "$REST_FILE"
          fi
          rm -f "$SECTION_FILE"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          title: "chore: bump version from ${{ steps.bump.outputs.old_version }} to ${{ steps.bump.outputs.new_version }}"
          body: |
            Automated daily version bump.

            `${{ steps.bump.outputs.old_version }}` → `${{ steps.bump.outputs.new_version }}`

            Updated files:
            - `.claude-plugin/plugin.json`
            - `.claude-plugin/marketplace.json`
            - `CHANGELOG.md` (new section auto-generated from commit history — review and polish before merging)
          branch: "auto/version-bump-${{ steps.bump.outputs.new_version }}"
          base: main
          assignees: ${{ github.event.inputs.assignees || 'gabrielavaduva,RaduAna-Maria'}}
