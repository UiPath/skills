name: Sprint Release Cut

# Biweekly per-sprint release cut (skills side of the CLI↔skills lockstep,
# PILOT-5518). Runs Sunday 06:00 UTC — 6 hours BEFORE the CLI's own cut
# (12:00 UTC). Self-anchored and self-driven: it does NOT read the CLI
# version (skills lead, never follow).
#
# Model: `main` carries the line currently in development (M.N.0). On each
# release Sunday it:
#
#   1. cuts release/v<M.N> from main at the version ALREADY in main (M.N.0) —
#      the release branch matches main's current version, it is NOT bumped
#   2. publishes a PREVIEW (@uipath/skills@M.N.0-preview.<run>) to npm by
#      dispatching publish.yml (channel=preview) on the release branch. The
#      bot's own branch push can't trigger publish.yml (GITHUB_TOKEN recursion
#      guard), so the dispatch is explicit. Stable (`latest`) is NOT published
#      here — promote a line to stable MANUALLY (see docs/RELEASE.md)
#   3. opens a PR bumping main to the NEXT line (M.(N+1).0) so development
#      continues there while release/v<M.N> stabilizes
#
# No cross-repo secret is required, gated to the CLI's 14-day cadence (anchor
# below). The cli-repo side cuts itself, in lockstep, from the same anchor.

on:
  schedule:
    - cron: '0 6 * * 0' # Sunday 06:00 UTC — 6 h before the CLI cut (12:00 UTC)
  workflow_dispatch:
    inputs:
      minor_override:
        description: 'Line to cut as MAJOR.MINOR (e.g. 1.198) — skips the cadence gate; cuts exactly this line'
        required: false
        default: ''
      dry_run:
        description: 'Print the computed plan without pushing, publishing, or opening a PR'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

# GitHub cron runs in UTC and cannot express "every two Sundays" — fire every
# Sunday, then gate on the 14-day cadence anchor (mirrors UiPath/cli).
env:
  RELEASE_CADENCE_ANCHOR: "2026-06-14"

# Serialize cuts so a scheduled run and a manual dispatch can't race.
concurrency:
  group: release-line-updates
  cancel-in-progress: false

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Cadence gate and resolve lines
        id: target
        env:
          MINOR_OVERRIDE: ${{ github.event.inputs.minor_override }}
        run: |
          # The line to cut is the version ALREADY in main (see header). main is
          # advanced to the next line by the bump PR in the last step.
          CURRENT_LINE=$(jq -r '.version | split(".") | "\(.[0]).\(.[1])"' package.json)
          echo "current_line=$CURRENT_LINE" >> "$GITHUB_OUTPUT"

          if [ -n "$MINOR_OVERRIDE" ]; then
            if ! echo "$MINOR_OVERRIDE" | grep -Eq '^[0-9]+\.[0-9]+$'; then
              echo "::error::minor_override '$MINOR_OVERRIDE' is not MAJOR.MINOR."
              exit 1
            fi
            CUT_LINE="$MINOR_OVERRIDE"
            echo "Manual override -> cut $CUT_LINE (cadence gate skipped)."
          else
            # Biweekly cadence gate: act only on release Sundays (every 14 days
            # from the anchor). A manual run without an override also honors the
            # gate so a stray dispatch can't cut off-cadence.
            anchor_epoch=$(date -u -d "$RELEASE_CADENCE_ANCHOR" +%s)
            today_epoch=$(date -u -d "$(date -u +%Y-%m-%d)" +%s)
            days_since=$(( (today_epoch - anchor_epoch) / 86400 ))
            if [ "$days_since" -lt 0 ] || [ $(( days_since % 14 )) -ne 0 ]; then
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              {
                echo "## Skipped: off-cadence Sunday"
                echo ""
                echo "Release Sundays are every 14 days from \`$RELEASE_CADENCE_ANCHOR\`; today is +$days_since days. Use \`minor_override\` to cut anyway."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            # Cut main's CURRENT line — no +1 (that off-by-one skipped a line).
            CUT_LINE="$CURRENT_LINE"
          fi

          # The next line main advances to after the cut.
          CUT_MAJOR=$(echo "$CUT_LINE" | cut -d. -f1)
          CUT_MINOR=$(echo "$CUT_LINE" | cut -d. -f2)
          NEXT_LINE="$CUT_MAJOR.$((CUT_MINOR + 1))"

          echo "cut_line=$CUT_LINE" >> "$GITHUB_OUTPUT"
          echo "next_line=$NEXT_LINE" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"

          # Warn-only drift check (NO gate — skills lead, never follow). At cut
          # time the CLI's latest published minor should be exactly one behind
          # the line we cut. A gap in either direction means a skipped/extra cut
          # has drifted the lines apart — surface it (otherwise silent). Reads
          # public npm only — no token, no cross-repo coupling.
          CLI_LATEST=$(npm view @uipath/cli version 2>/dev/null || echo "")
          if [ -n "$CLI_LATEST" ]; then
            CLI_MINOR=$(echo "$CLI_LATEST" | cut -d. -f1-2)
            EXPECTED=$(echo "$CLI_MINOR" | awk -F. '{print $1"."$2+1}')
            if [ "$CUT_LINE" != "$EXPECTED" ]; then
              echo "::warning::Skills cut line $CUT_LINE is not CLI_latest+1 (CLI latest published is $CLI_LATEST, minor $CLI_MINOR) — the skills/CLI lines may have drifted. Realign with a minor_override dispatch (see docs/RELEASE.md)."
              {
                echo "## ⚠️ Possible skills/CLI line drift"
                echo ""
                echo "Cutting \`$CUT_LINE\`; the CLI's latest npm release is \`$CLI_LATEST\` (minor \`$CLI_MINOR\`), so the expected line is \`$EXPECTED\`. If unexpected, realign with a \`minor_override\` dispatch — see docs/RELEASE.md. (Proceeding regardless — warning, not a gate.)"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Dry run — print plan
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          {
            echo "## Dry run — planned sprint cut"
            echo ""
            echo "- current line (main): \`${{ steps.target.outputs.current_line }}\`"
            echo "- cut line: \`${{ steps.target.outputs.cut_line }}\` — branch \`release/v${{ steps.target.outputs.cut_line }}\` @ \`$(git rev-parse --short HEAD)\` at version \`${{ steps.target.outputs.cut_line }}.0\`"
            echo "- would publish: PREVIEW \`@uipath/skills@${{ steps.target.outputs.cut_line }}.0-preview.<run>\` to npm (dispatch publish.yml channel=preview from the release branch) — stable stays MANUAL"
            echo "- would open PR: bump \`main\` to \`${{ steps.target.outputs.next_line }}.0\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cut release branch
        id: cutbranch
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          LINE="${{ steps.target.outputs.cut_line }}"
          BRANCH="release/v$LINE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            # Branch already exists — a prior run cut it, or the bump PR hasn't
            # merged yet so a later cadence run re-targets the same line. It must
            # already carry this line's version (package.json == $LINE.0) —
            # resume idempotently. A different version is a genuine conflict.
            git fetch origin "$BRANCH"
            git checkout --detach FETCH_HEAD
            EXISTING_VERSION=$(node -p "require('./package.json').version")
            if [ "$EXISTING_VERSION" != "$LINE.0" ]; then
              echo "::error::$BRANCH already exists at version $EXISTING_VERSION (expected $LINE.0) — resolve manually."
              exit 1
            fi
            echo "$BRANCH already cut at $LINE.0 — resuming."
          else
            git checkout -b "$BRANCH"
            # main already carries $LINE.0 on the scheduled path, so this is
            # usually a no-op; an override targeting a different line sets it
            # here. Commit only if the version actually changed (no empty commit).
            npm version "$LINE.0" --no-git-tag-version --allow-same-version
            node scripts/sync-version.mjs
            git add package.json version-manifest.json .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json
            if git diff --cached --quiet; then
              echo "release branch matches main at $LINE.0 — no version commit needed."
            else
              git commit -m "chore(release): cut $LINE line"
            fi
            git push origin "HEAD:$BRANCH"
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish preview from the release branch
        id: publish
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LINE="${{ steps.target.outputs.cut_line }}"
          BRANCH="release/v$LINE"

          # The bot pushed $BRANCH with GITHUB_TOKEN, which GitHub's recursion
          # guard stops from triggering publish.yml's `push: release/v*` preview
          # job. Dispatch it explicitly (workflow_dispatch IS triggerable by
          # GITHUB_TOKEN) so the cut emits the line's first preview. publish.yml
          # checks out $BRANCH (package.json = $LINE.0), stamps
          # $LINE.0-preview.<run>, and publishes via OIDC + provenance.
          #
          # Stable (`latest`) is intentionally NOT published here — promote a
          # line to stable manually when it is ready (see docs/RELEASE.md).
          gh workflow run publish.yml --ref "$BRANCH" -f channel=preview
          echo "Dispatched publish.yml (channel=preview) from $BRANCH."

      - name: Open version-bump PR against main
        id: mainpr
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUT_LINE="${{ steps.target.outputs.cut_line }}"
          NEXT_LINE="${{ steps.target.outputs.next_line }}"
          PR_BRANCH="auto/sprint-bump-$NEXT_LINE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          EXISTING=$(gh pr list --state open --head "$PR_BRANCH" --json url --jq '.[0].url // empty')
          if [ -n "$EXISTING" ]; then
            echo "url=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "Bump PR already open: $EXISTING"
            exit 0
          fi

          # Branch from the current main tip and bump it to the NEXT line so
          # development continues there while release/v$CUT_LINE stabilizes.
          git fetch origin main
          git checkout -B "$PR_BRANCH" origin/main
          npm version "$NEXT_LINE.0" --no-git-tag-version --allow-same-version
          node scripts/sync-version.mjs
          git add package.json version-manifest.json .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "main already at $NEXT_LINE.0 — no bump PR needed."
            exit 0
          fi
          git commit -m "chore(release): bump main to $NEXT_LINE.0 after cutting $CUT_LINE"
          git push origin "HEAD:$PR_BRANCH"
          URL=$(gh pr create \
            --head "$PR_BRANCH" \
            --base main \
            --title "chore(release): bump main to $NEXT_LINE.0 (sprint cut)" \
            --body "Automated sprint release cut: \`release/v$CUT_LINE\` was cut from \`main\` at \`$CUT_LINE.0\` and a preview was published to npm. This PR advances \`main\` to the next line \`$NEXT_LINE.0\` so development continues there while \`release/v$CUT_LINE\` stabilizes. Stable \`$CUT_LINE.0\` is promoted manually — see docs/RELEASE.md.")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          {
            echo "## Sprint cut complete"
            echo ""
            echo "- cut line: \`${{ steps.target.outputs.cut_line }}\` (main was on this line)"
            echo "- \`release/v${{ steps.target.outputs.cut_line }}\` @ \`${{ steps.cutbranch.outputs.short_sha }}\`"
            echo "- published: PREVIEW of \`@uipath/skills@${{ steps.target.outputs.cut_line }}.0\` to npm (stable stays manual)"
            echo "- main bump PR (-> \`${{ steps.target.outputs.next_line }}.0\`): ${{ steps.mainpr.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
