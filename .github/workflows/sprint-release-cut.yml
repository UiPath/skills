name: Sprint Release Cut

# Biweekly per-sprint release cut (skills side of the CLI↔skills lockstep,
# PILOT-5518). Runs Sunday 06:00 UTC — 6 hours BEFORE the CLI's own cut
# (12:00 UTC). Self-anchored and self-driven: it does NOT read the CLI
# version (skills lead, never follow).
#
# Model: `main` carries the line currently in development (M.N.0). On each
# release Sunday it:
#
#   1. cuts release/v<M.N> from main at the version ALREADY in main (M.N.0) —
#      the release branch matches main's current version, it is NOT bumped
#   2. publishes a DEV build (GitHub Packages) AND a PREVIEW (npmjs) by
#      dispatching publish.yml twice on the release branch (channel=dev,
#      channel=preview) and WAITING for both to succeed. The bot's own branch
#      push can't trigger publish.yml (GITHUB_TOKEN recursion guard), so the
#      dispatches are explicit. Stable (`latest`) is NOT published here —
#      promote a line to stable MANUALLY (see docs/RELEASE.md)
#   3. pushes a commit bumping main to the NEXT line (M.(N+1).0) DIRECTLY to
#      main (no PR), only after step 2 succeeds, so development continues there
#      while release/v<M.N> stabilizes. main is protected — its protection must
#      allow the Actions identity to push (see docs/RELEASE.md § Repo setup)
#
# No cross-repo secret is required, gated to the CLI's 14-day cadence (anchor
# below). The cli-repo side cuts itself, in lockstep, from the same anchor.

on:
  schedule:
    - cron: '0 6 * * 0' # Sunday 06:00 UTC — 6 h before the CLI cut (12:00 UTC)
  workflow_dispatch:
    inputs:
      minor_override:
        description: 'Line to cut as MAJOR.MINOR (e.g. 1.198) — skips the cadence gate; cuts exactly this line'
        required: false
        default: ''
      dry_run:
        description: 'Print the computed plan without pushing, publishing, or opening a PR'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

# GitHub cron runs in UTC and cannot express "every two Sundays" — fire every
# Sunday, then gate on the 14-day cadence anchor (mirrors UiPath/cli).
env:
  RELEASE_CADENCE_ANCHOR: "2026-06-14"

# Serialize cuts so a scheduled run and a manual dispatch can't race.
concurrency:
  group: release-line-updates
  cancel-in-progress: false

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Cadence gate and resolve lines
        id: target
        env:
          MINOR_OVERRIDE: ${{ github.event.inputs.minor_override }}
        run: |
          # The line to cut is the version ALREADY in main (see header). main is
          # advanced to the next line by the bump PR in the last step.
          CURRENT_LINE=$(jq -r '.version | split(".") | "\(.[0]).\(.[1])"' package.json)
          echo "current_line=$CURRENT_LINE" >> "$GITHUB_OUTPUT"

          if [ -n "$MINOR_OVERRIDE" ]; then
            if ! echo "$MINOR_OVERRIDE" | grep -Eq '^[0-9]+\.[0-9]+$'; then
              echo "::error::minor_override '$MINOR_OVERRIDE' is not MAJOR.MINOR."
              exit 1
            fi
            CUT_LINE="$MINOR_OVERRIDE"
            echo "Manual override -> cut $CUT_LINE (cadence gate skipped)."
          else
            # Biweekly cadence gate: act only on release Sundays (every 14 days
            # from the anchor). A manual run without an override also honors the
            # gate so a stray dispatch can't cut off-cadence.
            anchor_epoch=$(date -u -d "$RELEASE_CADENCE_ANCHOR" +%s)
            today_epoch=$(date -u -d "$(date -u +%Y-%m-%d)" +%s)
            days_since=$(( (today_epoch - anchor_epoch) / 86400 ))
            if [ "$days_since" -lt 0 ] || [ $(( days_since % 14 )) -ne 0 ]; then
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              {
                echo "## Skipped: off-cadence Sunday"
                echo ""
                echo "Release Sundays are every 14 days from \`$RELEASE_CADENCE_ANCHOR\`; today is +$days_since days. Use \`minor_override\` to cut anyway."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            # Cut main's CURRENT line — no +1 (that off-by-one skipped a line).
            CUT_LINE="$CURRENT_LINE"
          fi

          # The next line main advances to after the cut.
          CUT_MAJOR=$(echo "$CUT_LINE" | cut -d. -f1)
          CUT_MINOR=$(echo "$CUT_LINE" | cut -d. -f2)
          NEXT_LINE="$CUT_MAJOR.$((CUT_MINOR + 1))"

          echo "cut_line=$CUT_LINE" >> "$GITHUB_OUTPUT"
          echo "next_line=$NEXT_LINE" >> "$GITHUB_OUTPUT"
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          # No CLI-drift warning here: the cut publishes a PREVIEW and stable is
          # promoted manually, so the preview line legitimately runs 1-2 minors
          # ahead of the CLI's published stable during the RC window. Line
          # alignment is a manual decision made at stable-promotion time.

      - name: Dry run — print plan
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          {
            echo "## Dry run — planned sprint cut"
            echo ""
            echo "- current line (main): \`${{ steps.target.outputs.current_line }}\`"
            echo "- cut line: \`${{ steps.target.outputs.cut_line }}\` — branch \`release/v${{ steps.target.outputs.cut_line }}\` @ \`$(git rev-parse --short HEAD)\` at version \`${{ steps.target.outputs.cut_line }}.0\`"
            echo "- would publish (and WAIT for success): DEV \`@uipath/skills@${{ steps.target.outputs.cut_line }}.0-dev.<run>\` to GitHub Packages AND PREVIEW \`@uipath/skills@${{ steps.target.outputs.cut_line }}.0-preview.<run>\` to npmjs (dispatch publish.yml channel=dev + channel=preview) — stable stays MANUAL"
            echo "- would then push bump directly to \`main\`: version -> \`${{ steps.target.outputs.next_line }}.0\` (only if both publishes succeeded)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cut release branch
        id: cutbranch
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          LINE="${{ steps.target.outputs.cut_line }}"
          BRANCH="release/v$LINE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            # Branch already exists — a prior run cut it, or main's bump didn't
            # land so a later cadence run re-targets the same line. It must
            # already carry this line's version (package.json == $LINE.0) —
            # resume idempotently. A different version is a genuine conflict.
            git fetch origin "$BRANCH"
            git checkout --detach FETCH_HEAD
            EXISTING_VERSION=$(node -p "require('./package.json').version")
            if [ "$EXISTING_VERSION" != "$LINE.0" ]; then
              echo "::error::$BRANCH already exists at version $EXISTING_VERSION (expected $LINE.0) — resolve manually."
              exit 1
            fi
            echo "$BRANCH already cut at $LINE.0 — resuming."
          else
            git checkout -b "$BRANCH"
            # main already carries $LINE.0 on the scheduled path, so this is
            # usually a no-op; an override targeting a different line sets it
            # here. Commit only if the version actually changed (no empty commit).
            npm version "$LINE.0" --no-git-tag-version --allow-same-version
            node scripts/sync-version.mjs
            git add package.json version-manifest.json .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json
            if git diff --cached --quiet; then
              echo "release branch matches main at $LINE.0 — no version commit needed."
            else
              git commit -m "chore(release): cut $LINE line"
            fi
            git push origin "HEAD:$BRANCH"
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Publish dev + preview from the release branch (wait for success)
        id: publish
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LINE="${{ steps.target.outputs.cut_line }}"
          BRANCH="release/v$LINE"

          # The bot pushed $BRANCH with GITHUB_TOKEN, which GitHub's recursion
          # guard stops from triggering publish.yml automatically — so dispatch
          # each channel explicitly and BLOCK on its result. `gh workflow run`
          # doesn't return the run id, so record the newest workflow_dispatch
          # run for this branch, dispatch, then poll for the new run id and
          # `gh run watch --exit-status` it (non-zero if the run failed). If a
          # publish fails, this step fails and the next step (main bump, gated
          # on success()) is skipped — main only advances on a clean publish.
          #   - channel=dev     -> $LINE.0-dev.<run>     on GitHub Packages
          #   - channel=preview -> $LINE.0-preview.<run> on npmjs (--provenance)
          # Stable (`latest`) is intentionally NOT published — promote a line
          # to stable manually when it is ready (see docs/RELEASE.md).
          dispatch_and_wait() {
            channel="$1"
            before=$(gh run list --workflow publish.yml --branch "$BRANCH" \
              --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
            echo "Dispatching publish.yml channel=$channel on $BRANCH..."
            gh workflow run publish.yml --ref "$BRANCH" -f channel="$channel"
            run_id=""
            for _ in $(seq 1 40); do
              sleep 6
              latest=$(gh run list --workflow publish.yml --branch "$BRANCH" \
                --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // 0')
              if [ "$latest" != "$before" ] && [ "$latest" != "0" ]; then
                run_id="$latest"; break
              fi
            done
            if [ -z "$run_id" ]; then
              echo "::error::Timed out finding the dispatched publish.yml run for channel=$channel."
              return 1
            fi
            echo "Watching publish.yml run $run_id (channel=$channel)..."
            gh run watch "$run_id" --exit-status --interval 15
          }

          dispatch_and_wait dev
          dispatch_and_wait preview
          echo "Both publishes ($LINE.0-dev / $LINE.0-preview) succeeded."

      - name: Bump main to the next line (push straight to main)
        id: mainbump
        # `success()` so this runs ONLY when the publish step above succeeded —
        # main advances only after a clean dev + preview publish.
        if: success() && steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set -euo pipefail
          CUT_LINE="${{ steps.target.outputs.cut_line }}"
          NEXT_LINE="${{ steps.target.outputs.next_line }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Push the bump straight to main (no PR). main is protected, so its
          # protection MUST allow the Actions identity to push (see
          # docs/RELEASE.md § Repo setup). Branch from the live main tip, bump,
          # and push; retry once if main advanced under us.
          git fetch origin main
          git checkout -B sprint-bump origin/main
          npm version "$NEXT_LINE.0" --no-git-tag-version --allow-same-version
          node scripts/sync-version.mjs
          git add package.json version-manifest.json .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "main already at $NEXT_LINE.0 — nothing to push."
            exit 0
          fi
          git commit -m "chore(release): bump main to $NEXT_LINE.0 after cutting $CUT_LINE"
          if ! git push origin HEAD:main; then
            echo "Push rejected (main advanced) — rebasing onto the new main and retrying once."
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
          echo "Pushed: main -> $NEXT_LINE.0"

      - name: Summary
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          {
            echo "## Sprint cut complete"
            echo ""
            echo "- cut line: \`${{ steps.target.outputs.cut_line }}\` (main was on this line)"
            echo "- \`release/v${{ steps.target.outputs.cut_line }}\` @ \`${{ steps.cutbranch.outputs.short_sha }}\`"
            echo "- published (waited for success): DEV (GitHub Packages) + PREVIEW (npmjs) of \`@uipath/skills@${{ steps.target.outputs.cut_line }}.0\` (stable stays manual)"
            echo "- main bumped: \`main\` pushed to \`${{ steps.target.outputs.next_line }}.0\`"
          } >> "$GITHUB_STEP_SUMMARY"
