name: Sprint Release Cut

# Sunday-evening per-sprint release cut (skills side of the CLI↔skills
# lockstep, PILOT-5518). Reads the canonical CLI version from the UiPath/cli
# repo's main package.json — NEVER from npmjs (@uipath/cli there is stale) —
# and, when the CLI minor advanced:
#
#   1. cuts release/v<minor> from main with package.json = M.N.0
#      (sync-version.mjs resets plugin/marketplace to M.N.0 too)
#   2. force-updates release/latest to the new branch (the marketplace
#      pointer — see docs/RELEASE.md, "Marketplace channel")
#   3. opens a PR against main with the same version bump
#
# The cli-repo-side bump is owned by the cli repo. Requires the
# CLI_REPO_TOKEN secret (contents:read on UiPath/cli) — the default
# GITHUB_TOKEN cannot read a different private repo.

on:
  schedule:
    - cron: '0 18 * * 0' # Sunday 18:00 UTC
  workflow_dispatch:
    inputs:
      minor_override:
        description: 'Target line as MAJOR.MINOR (e.g. 1.197) — skips reading the cli repo'
        required: false
        default: ''
      dry_run:
        description: 'Print the computed plan without pushing anything'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

# Shared with daily-version-bump.yml so the cut never races a daily bump.
concurrency:
  group: release-line-updates
  cancel-in-progress: false

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Resolve target line
        id: target
        env:
          GH_TOKEN: ${{ secrets.CLI_REPO_TOKEN }}
          MINOR_OVERRIDE: ${{ github.event.inputs.minor_override }}
        run: |
          if [ -n "$MINOR_OVERRIDE" ]; then
            TARGET_LINE="$MINOR_OVERRIDE"
            echo "Using minor_override=$TARGET_LINE"
          else
            if [ -z "$GH_TOKEN" ]; then
              echo "::error::CLI_REPO_TOKEN secret is not configured (needs contents:read on UiPath/cli)."
              exit 1
            fi
            CLI_VERSION=$(gh api "repos/UiPath/cli/contents/packages/cli/package.json?ref=main" \
              -H "Accept: application/vnd.github.raw" | jq -r '.version')
            echo "UiPath/cli main is at $CLI_VERSION"
            TARGET_LINE=$(echo "$CLI_VERSION" | cut -d. -f1-2)
          fi

          if ! echo "$TARGET_LINE" | grep -Eq '^[0-9]+\.[0-9]+$'; then
            echo "::error::Resolved target line '$TARGET_LINE' is not MAJOR.MINOR."
            exit 1
          fi

          CURRENT_LINE=$(jq -r '.version | split(".") | "\(.[0]).\(.[1])"' package.json)
          echo "target_line=$TARGET_LINE" >> "$GITHUB_OUTPUT"
          echo "current_line=$CURRENT_LINE" >> "$GITHUB_OUTPUT"

          # Never cut the same line twice, never regress.
          if [ "$(printf '%s\n%s\n' "$CURRENT_LINE" "$TARGET_LINE" | sort -V | tail -1)" = "$CURRENT_LINE" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## Skipped: no minor advance"
              echo ""
              echo "Skills are on \`$CURRENT_LINE\`, CLI target line is \`$TARGET_LINE\` — nothing to cut."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry run — print plan
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          {
            echo "## Dry run — planned sprint cut"
            echo ""
            echo "- current line: \`${{ steps.target.outputs.current_line }}\`"
            echo "- target line: \`${{ steps.target.outputs.target_line }}\`"
            echo "- would create: \`release/v${{ steps.target.outputs.target_line }}\` from \`main\` @ \`$(git rev-parse --short HEAD)\`"
            echo "- would force-update: \`release/latest\`"
            echo "- would open PR: \`auto/sprint-cut-${{ steps.target.outputs.target_line }}\` -> \`main\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cut release branch and advance release/latest
        id: cutbranch
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          LINE="${{ steps.target.outputs.target_line }}"
          BRANCH="release/v$LINE"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            echo "::error::$BRANCH already exists on origin but main is still on ${{ steps.target.outputs.current_line }} — resolve manually."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          npm version "$LINE.0" --no-git-tag-version --allow-same-version
          node scripts/sync-version.mjs
          git add package.json version-manifest.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore(release): cut $LINE line"
          git push origin "$BRANCH"
          git push --force origin "$BRANCH:release/latest"

          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Open version-bump PR against main
        id: mainpr
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LINE="${{ steps.target.outputs.target_line }}"
          PR_BRANCH="auto/sprint-cut-$LINE"

          EXISTING=$(gh pr list --state open --head "$PR_BRANCH" --json url --jq '.[0].url // empty')
          if [ -n "$EXISTING" ]; then
            echo "url=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "Bump PR already open: $EXISTING"
            exit 0
          fi

          # The release branch HEAD already carries exactly the version bump
          # commit on top of main — reuse it as the PR branch.
          git push origin "release/v$LINE:refs/heads/$PR_BRANCH"
          URL=$(gh pr create \
            --head "$PR_BRANCH" \
            --base main \
            --title "chore(release): bump main to $LINE.0 (sprint cut)" \
            --body "Automated sprint release cut: \`release/v$LINE\` was created and \`release/latest\` now points at it. This PR applies the same version bump to \`main\` so \`version:check\` keeps the line consistent. See docs/RELEASE.md.")
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: steps.target.outputs.proceed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          {
            echo "## Sprint cut complete"
            echo ""
            echo "- \`${{ steps.target.outputs.current_line }}\` → \`${{ steps.target.outputs.target_line }}\`"
            echo "- \`release/v${{ steps.target.outputs.target_line }}\` @ \`${{ steps.cutbranch.outputs.sha }}\` (\`release/latest\` advanced)"
            echo "- main bump PR: ${{ steps.mainpr.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
